<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>題目</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
        :root {
            --bg: #f6f1e7; --bg-deep: #efe4d6; --ink: #171717; --muted: #5b5b5b; --accent: #d3542c;
            --accent-light: #ff8f5a; --accent-dark: #b14320; --teal: #1f6f78; --card: #fff7ef;
            --stroke: #e3d6c5; --shadow: 0 18px 40px rgba(23, 23, 23, 0.12); --radius-sm: 10px;
            --radius-md: 12px; --radius-lg: 14px; --radius-xl: 18px; --radius-2xl: 22px;
            --space-1: 6px; --space-2: 8px; --space-3: 10px; --space-4: 12px; --space-5: 14px;
            --space-6: 16px; --space-7: 18px; --space-8: 20px; --space-9: 24px; --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif; --font-body: 'IBM Plex Sans', sans-serif; --error: #b54832;
        }
        body {
            font-family: var(--font-body);
            background: radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%), radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%), linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .quiz-container { width: 100%; max-width: 800px; padding: var(--space-10) var(--space-8); box-sizing: border-box; background: var(--card); border-radius: var(--radius-2xl); border: 1px solid var(--stroke); box-shadow: var(--shadow); }
        .progress-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .progress-text { color: var(--muted); font-size: 0.9em; }
        .status-bar { display: flex; gap: 16px; font-size: 0.9em; font-weight: 500; }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-correct { color: var(--teal); } .status-wrong { color: var(--error); }
        .question-text { font-family: var(--font-display); font-size: 1.5em; font-weight: 600; margin-bottom: 32px; line-height: 1.4; white-space: pre-line; }
        .options-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 12px; }
        .option-item { background-color: #fff; border: 1px solid var(--stroke); padding: var(--space-4) var(--space-6); border-radius: var(--radius-lg); cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; display: flex; flex-direction: column; gap: 8px; }
        .option-item:hover:not(.selected) { background-color: var(--card); transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .option-item.selected.correct { background-color: rgba(31, 111, 120, 0.12); border-color: var(--teal); }
        .option-item.selected.incorrect { background-color: rgba(181, 72, 50, 0.12); border-color: var(--error); }
        .option-item.revealed-correct { border-color: rgba(31, 111, 120, 0.5); box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16); }
        .option-label { font-weight: 500; display: flex; align-items: center; gap: 12px; }
        .feedback-state { font-weight: bold; font-size: 0.9em; display: none; }
        .selected .feedback-state, .revealed-correct .feedback-state { display: block; }
        .correct .feedback-state, .revealed-correct .feedback-state { color: var(--teal); } .incorrect .feedback-state { color: var(--error); }
        .rationale { font-size: 0.95em; color: var(--muted); margin-top: 4px; line-height: 1.5; display: none; }
        .selected .rationale, .revealed-correct .rationale { display: block; }
        .hint-toggle { border: 1px solid var(--stroke); color: var(--muted); cursor: pointer; padding: var(--space-2) var(--space-6); border-radius: var(--radius-md); background-color: #fff; display: flex; align-items: center; gap: 8px; font-size: 0.9em; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hint-toggle:hover { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .hint-content { margin-top: 32px; padding: var(--space-6); background-color: #fff; border: 1px solid var(--stroke); border-radius: var(--radius-lg); font-size: 0.95em; color: var(--muted); display: none; align-items: flex-start; gap: 16px; }
        .hint-content.active { display: flex; }
        .hint-icon-box { color: var(--accent-dark); font-size: 1.2em; margin-top: -2px; }
        
        .navigation { margin-top: 32px; display: flex; justify-content: space-between; align-items: center; }
        .nav-buttons { display: flex; gap: 12px; align-items: center; }
        .btn { border-radius: var(--radius-md); padding: var(--space-2) var(--space-7); font-size: 0.95em; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .btn-prev { background-color: #fff; color: var(--ink); border-color: var(--stroke); }
        .btn-prev:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .btn-next { background: linear-gradient(90deg, var(--accent), var(--accent-light)); color: #fff; }
        .btn-next:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .btn-submit-early { background-color: transparent; border: 1px solid #b54832; color: #b54832; margin-right: 8px; }
        .btn-submit-early:hover { background-color: #fff5f2; transform: translateY(-1px); }

        .results-screen { display: flex; flex-direction: column; gap: var(--space-8); }
        .results-title { font-family: var(--font-display); font-size: 2.1em; margin: 0; }
        .results-subtitle { color: var(--muted); margin: 0; font-size: 1em; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-6); }
        .result-card { padding: var(--space-6); border-radius: var(--radius-xl); background: #fff; border: 1px solid var(--stroke); display: flex; flex-direction: column; gap: var(--space-3); }
        .result-label { color: var(--muted); font-size: 0.95em; }
        .result-value { font-size: 2em; font-family: var(--font-display); }
        .result-metrics { display: flex; flex-direction: column; gap: var(--space-2); color: var(--muted); font-size: 0.95em; }
        .results-actions { display: flex; gap: var(--space-4); flex-wrap: wrap; }
        .btn-ghost { background-color: transparent; border: 1px solid var(--stroke); color: var(--ink); }
        .hidden { display: none; }
        @media (max-width: 900px) { .quiz-container { margin: var(--space-8); max-width: 100%; } }
        @media (max-width: 720px) { .quiz-container { padding: var(--space-8) var(--space-6); } .question-text { font-size: 1.3em; } .option-item { padding: var(--space-4); } }
        @media (max-width: 520px) { body { align-items: flex-start; } .quiz-container { margin: var(--space-6); padding: var(--space-7) var(--space-5); } .progress-container { flex-direction: column; align-items: flex-start; gap: var(--space-3); } .navigation { flex-direction: column; align-items: stretch; gap: var(--space-4); } .nav-buttons { width: 100%; } .btn { width: 100%; } .hint-toggle { justify-content: space-between; } .results-actions { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="quiz-content"></div>
        <div id="results-content" class="hidden"></div>
        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>
        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle"><span>Hint</span><span id="hint-icon-arrow">▼</span></button>
            <div class="nav-buttons">
                <button id="submit-early-btn" class="btn btn-submit-early hidden">提前結算 (Submit)</button>
                <button id="prev-btn" class="btn btn-prev">Previous</button>
                <button id="next-btn" class="btn btn-next">Next</button>
            </div>
        </div>
    </div>
    <script>
        const quizData = [{"answerOptions":[{"isCorrect":false,"rationale":"此為情感上的希冀，與軍隊進攻的物理動向無關。","text":"盼望、期待"},{"isCorrect":false,"rationale":"雖然「望」有看的意思，但在接續地點名詞且描述軍隊行進時，譯為方向較為貼切。","text":"遠看、眺望"},{"isCorrect":true,"rationale":"文中描述大軍正朝著西城的方向前進，此處「望」字作為介詞，指引方向。","text":"向、朝著"},{"isCorrect":false,"rationale":"此處「望」為動詞或介詞，而非名詞性的聲譽。","text":"名聲、聲望"}],"hint":"請觀察「望」字後面接的是地點「西城」，且描述軍隊移動的狀態。","question":"在〈空城計〉文中，「望西城蜂擁而來」的「望」字意思為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"此處指物理上的色彩，而非人的表情。","text":"「五顏六色」的色"},{"isCorrect":false,"rationale":"此處指自然界的景觀風貌。","text":"「景色」宜人的色"},{"isCorrect":true,"rationale":"兩者皆指臉上的神情或臉色，形容官員驚恐及虛偽者的面容。","text":"「巧言令色」的色"},{"isCorrect":false,"rationale":"此處常用於指代情慾或美色，與神情無關。","text":"「色」大膽心粗的色"}],"hint":"這是在形容眾官聽到敵軍來襲後，臉部表情產生的劇烈變化。","question":"「眾官聽得這個消息，盡皆失色」中的「色」字，與下列何者意思相同？"},{"answerOptions":[{"isCorrect":false,"rationale":"此意思通常見於「截止」，在此無法解釋兵力的多寡。","text":"抵達、到達"},{"isCorrect":false,"rationale":"此為名詞用法，無法修飾後方的數量詞。","text":"舉止、行為"},{"isCorrect":false,"rationale":"若解為停止，文意將變成阻攔文官，與描述城內空虛的語境不符。","text":"停止、阻攔"},{"isCorrect":true,"rationale":"此處作為副詞，強調兵力與人手的稀少，與「只」通假。","text":"僅、只"}],"hint":"這個字在文言文中常用來限定數量，表示「僅僅」的意思。","question":"文中「止有一般文官」與「止剩二千五百軍」中的「止」字，其用法為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"此為名詞用法，如「故人」，與此處動詞結構不符。","text":"老友、舊識"},{"isCorrect":true,"rationale":"司馬昭懷疑孔明是因為沒有軍隊才刻意擺出這種悠閒的姿態，屬於人為的造作。","text":"故意"},{"isCorrect":false,"rationale":"如「已故」，與孔明擺設陣法的語境完全無關。","text":"死亡、逝世"},{"isCorrect":false,"rationale":"雖然「故」有原因之意，但在此處接動詞「作」，應理解為蓄意行為。","text":"原因、緣故"}],"hint":"司馬昭在推測孔明的動機，認為這是一種人為的表演。","question":"司馬昭說：「莫非諸葛亮無軍，故作此態？」句中的「故」字意義為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"弄險主語是孔明，指其自身行為，而非針對敵人的陷害。","text":"陷害他人於險境"},{"isCorrect":false,"rationale":"此為字面誤解，文中是指戰略上的選擇而非物理上的危險。","text":"玩弄危險物品"},{"isCorrect":true,"rationale":"司馬懿認為孔明一向穩紮穩打，不會採取高風險且無把握的計策。","text":"冒險行事"},{"isCorrect":false,"rationale":"這是在描述地形，而非形容人的行事風格。","text":"處於險要的地勢"}],"hint":"這與孔明一貫「謹慎」的性格相對立，代表一種不尋常的賭博行為。","question":"司馬懿驚嘆：「諸葛亮平生謹慎，不曾弄險。」句中的「弄險」是指什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"表態句由「主語+表語」組成，主要描述性質，此處是定義類別。","text":"表態句"},{"isCorrect":true,"rationale":"使用「乃」字（相當於「是」）來聯繫主語與斷語，解釋司馬懿的身份。","text":"判斷句"},{"isCorrect":false,"rationale":"句中缺乏「有」或「無」等表示存在的動詞。","text":"有無句"},{"isCorrect":false,"rationale":"敘事句需有具體動詞描述動作，此處僅在說明身份。","text":"敘事句"}],"hint":"注意句中的「乃」字，它在文言文中常起到定義主體身份的作用。","question":"「司馬懿乃魏之名將」這句話屬於哪一種句型？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然含有否定詞「不」，但整體句義是肯定的反詰，重點在於反問而非單純感嘆。","text":"否定與感嘆"},{"isCorrect":false,"rationale":"此處並非定義身份，也不是在下達命令或請求。","text":"判斷與祈使"},{"isCorrect":true,"rationale":"「為……所」表示被動，而句末的「乎」結合反問形式形成激問語氣。","text":"被動與激問"},{"isCorrect":false,"rationale":"文中是「被擒」而非「去抓人」，且孔明心中已有答案，非懸而未決。","text":"主動與懸問"}],"hint":"請注意「為……所」的特殊結構，以及句尾問號所傳達的肯定意向。","question":"「得不為司馬懿所擒乎？」這句話結合了哪兩種語氣或句法？"},{"answerOptions":[{"isCorrect":false,"rationale":"孔明下令「旌旗盡皆隱匿」，城牆上不能有大量軍隊出現。","text":"站在城牆上虛張聲勢"},{"isCorrect":false,"rationale":"空城計的精髓在於「空」，若埋伏被發現則計畫失敗，因此士兵是公開灑掃。","text":"埋伏在城門後準備偷襲"},{"isCorrect":false,"rationale":"文中並未提及叫賣情節，而是強調灑掃街道的悠閒感。","text":"扮作商販在城門叫賣"},{"isCorrect":true,"rationale":"為了製造城內太平、毫無戒備的假象，孔明命令士兵穿布衣灑掃。","text":"扮作百姓灑掃街道"}],"hint":"這種偽裝是為了營造一種「若無其事」的氛圍，讓疑心重的敵人不敢進城。","question":"在〈空城計〉中，孔明命令士兵「大開四門」，並派士兵做什麼偽裝？"},{"answerOptions":[{"isCorrect":false,"rationale":"撤兵是由於對眼前西城局勢的疑慮，而非後方受敵。","text":"後方大本營遭到襲擊"},{"isCorrect":false,"rationale":"文中並未提及魏軍糧草問題，魏軍是帶著15萬大軍風湧而來。","text":"糧草不足無法久戰"},{"isCorrect":false,"rationale":"司馬懿是從琴聲的鎮定推測孔明胸有成竹，而非被音樂旋律吸引。","text":"被孔明的琴聲所打動"},{"isCorrect":true,"rationale":"司馬懿基於孔明「平生謹慎」的認知，認為大開城門必有伏兵。","text":"懷疑城內有埋伏"}],"hint":"司馬懿認為「事出反常必有妖」，孔明的悠閒讓他感到恐懼。","question":"根據課文，司馬懿最後撤兵的主要原因是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"此時孔明正處於兵力空虛、被迫防禦的撤退階段。","text":"孔明此時計畫主動出擊進攻洛陽"},{"isCorrect":false,"rationale":"這是一場心理戰與生死決鬥，兩者並無協議。","text":"司馬懿與孔明事先達成秘密協議撤兵"},{"isCorrect":false,"rationale":"城內僅剩二千五百軍，主力已分撥去運糧草或撤退。","text":"西城內當時聚集了蜀漢所有的主力精銳"},{"isCorrect":true,"rationale":"街亭失守是空城計發生的直接導火線，導致諸葛亮必須親自在西城斷後。","text":"因為馬謖失守街亭，導致蜀軍陷入危機"}],"hint":"這跟諸葛亮那位「言過其實」的徒弟有關，他犯下了戰略錯誤。","question":"下列關於「空城計」背景的敘述，何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"孔明深知兵力懸殊，必須以極度的從容來欺騙司馬懿，這是一種心理博弈。","text":"故作鎮定，掩飾緊張"},{"isCorrect":false,"rationale":"事實上情況非常危險，孔明並非真的輕鬆，而是不得已才行險。","text":"勝券在握，嘲笑敵人"},{"isCorrect":false,"rationale":"兩人在戰場上是生死之敵，並非聚首歡慶。","text":"見到老友，由衷高興"},{"isCorrect":false,"rationale":"當時司馬懿尚未撤兵，孔明必須維持神態直到對方離去。","text":"計謀成功，忍不住發笑"}],"hint":"這是一種「表演」，目的是讓對方覺得自己後方有強大的伏兵。","question":"文中描述孔明的神態為「笑容可掬」，這反映出他當下什麼樣的心理？"},{"answerOptions":[{"isCorrect":false,"rationale":"若兩人都想入城，空城計就不會成功了。","text":"兩人都認為城內空虛，爭相入城"},{"isCorrect":false,"rationale":"反應恰好相反，司馬懿才是那個因為過於謹慎而退縮的人。","text":"司馬懿想要生擒孔明，司馬昭感到害怕"},{"isCorrect":false,"rationale":"這是在打仗，雙方考量的是軍事風險而非藝術欣賞。","text":"兩人都被琴聲吸引，駐足欣賞"},{"isCorrect":true,"rationale":"司馬懿因了解孔明而產生恐懼，司馬昭則認為孔明可能只是虛張聲勢。","text":"司馬懿疑慮撤軍，司馬昭主張進攻"}],"hint":"父親因為「知己知彼」反而受挫，兒子則比較初生之犢。","question":"司馬懿父子對於孔明坐於城樓的反應有何不同？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然受話本影響，但它是文人經過整理、再創作的長篇著作。","text":"它是話本，是宋代說書人的底本"},{"isCorrect":false,"rationale":"這是《世說新語》的特徵，《三國演義》主要是長篇歷史演義。","text":"它是志人小說，記載名士的言行軼事"},{"isCorrect":true,"rationale":"書中分為許多回，且文字介於古文與白話之間，方便大眾閱讀。","text":"它是章回小說，屬於文白交雜的語體"},{"isCorrect":false,"rationale":"它是小說，含有許多如「空城計」等虛構或誇大的情節。","text":"它是正史，內容完全符合歷史真實"}],"hint":"注意它的結構是一章一回，且內容雖然描述歷史但有虛構成分。","question":"關於《三國演義》這本書的體裁，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"施耐庵通常被視為《水滸傳》的作者。","text":"施耐庵，元末明初"},{"isCorrect":true,"rationale":"羅貫中生活在動盪的元明之際，將民間傳說與史料結合創作出此書。","text":"羅貫中，元末明初"},{"isCorrect":false,"rationale":"曹雪芹是《紅樓夢》的作者。","text":"曹雪芹，清代"},{"isCorrect":false,"rationale":"陳壽是正史《三國志》的作者，並非小說創作者。","text":"陳壽，西晉"}],"hint":"這位作者據傳曾是施耐庵的弟子，號「湖海散人」。","question":"《三國演義》的作者是誰？他生活在什麼時代？"},{"answerOptions":[{"isCorrect":false,"rationale":"孔明是利用「空」來掩飾弱點，而非故意展示自己的不足給人抓。","text":"自曝其短"},{"isCorrect":true,"rationale":"面對15萬大軍與兵力懸殊的絕境，孔明依然能焚香操琴，極其冷靜。","text":"處變不驚"},{"isCorrect":false,"rationa         let state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));
        
        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered; const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }
        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1)); [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }
        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1)); [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }
        function resetState() { state = quizData.map(() => ({ selectedIndex: null, hintVisible: false })); }
        function renderQuestion() {
            const q = quizData[currentIndex]; const s = state[currentIndex];
            const content = document.getElementById('quiz-content'); const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box'); const nav = document.querySelector('.navigation');
            const nextBtn = document.getElementById('next-btn'); const prevBtn = document.getElementById('prev-btn');
            const submitEarlyBtn = document.getElementById('submit-early-btn');
            
            let optionsHtml = ''; const correctIndex = q.answerOptions.findIndex((o) => o.isCorrect);
            const selectedCorrect = s.selectedIndex !== null && q.answerOptions[s.selectedIndex].isCorrect;
            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx; const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : ''; const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);
                const revealClass = revealCorrect ? 'revealed-correct' : '';
                optionsHtml += `
                    <li class="option-item ${selectedClass} ${statusClass} ${revealClass}" onclick="selectOption(${idx})">
                        <div class="option-label"><span>${String.fromCharCode(65 + idx)}. ${opt.text}</span></div>
                        <div class="feedback-state">${opt.isCorrect ? '✓ Right answer' : '✕ Not quite'}</div>
                        ${opt.rationale ? '<div class="rationale">' + opt.rationale + '</div>' : ''}
                    </li>
`;
            });
            const stats = getStats();
            content.innerHTML = `
                <div class="progress-container">
                    <div class="progress-text">${currentIndex + 1} / ${quizData.length}</div>
                    <div class="status-bar">
                        <div class="status-item status-correct"><span>✓</span><span>${stats.correct}</span></div>
                        <div class="status-item status-wrong"><span>✕</span><span>${stats.wrong}</span></div>
                    </div>
                </div>
                <div class="question-text">${escapeHtml(q.question)}</div>
                <ul class="options-list">${optionsHtml}</ul>
`;
            const hintText = document.getElementById('hint-text'); hintText.innerText = q.hint || 'No hint available for this question.';
            if (s.hintVisible) { hintBox.classList.add('active'); } else { hintBox.classList.remove('active'); }
            results.classList.add('hidden'); content.classList.remove('hidden'); hintBox.classList.remove('hidden'); nav.classList.remove('hidden');
            
            prevBtn.disabled = currentIndex === 0; nextBtn.disabled = false;
            
            if (mode === 'quiz') { submitEarlyBtn.classList.remove('hidden'); } else { submitEarlyBtn.classList.add('hidden'); }
            
            if (mode === 'review') { nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Back to Results' : 'Next'; }
            else { nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finish' : 'Next'; }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }
        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        function selectOption(idx) { if (mode !== 'quiz' || state[currentIndex].selectedIndex !== null) return; state[currentIndex].selectedIndex = idx; renderQuestion(); }
        function toggleHint() { if (mode === 'results') return; state[currentIndex].hintVisible = !state[currentIndex].hintVisible; renderQuestion(); }
        
        function renderResults() {
            const stats = getStats(); const content = document.getElementById('quiz-content'); const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box'); const nav = document.querySelector('.navigation');
            results.innerHTML = `
                <div class="results-screen">
                    <div><h1 class="results-title">You did it! Quiz Complete.</h1><p class="results-subtitle">Review your score or take another run.</p></div>
                    <div class="results-grid">
                        <div class="result-card"><div class="result-label">Score</div><div class="result-value">${stats.correct} / ${quizData.length}</div></div>
                        <div class="result-card"><div class="result-label">Accuracy</div><div class="result-value">${stats.accuracy}%</div></div>
                        <div class="result-card"><div class="result-metrics"><div>Right <strong>${stats.correct}</strong></div><div>Wrong <strong>${stats.wrong}</strong></div><div>Skipped <strong>${stats.skipped}</strong></div></div></div>
                    </div>
                    <div class="results-actions"><button id="review-btn" class="btn btn-ghost">Review Quiz</button><button id="retake-btn" class="btn btn-next">Retake Quiz</button></div>
                </div>
`;
            content.classList.add('hidden'); results.classList.remove('hidden'); hintBox.classList.add('hidden'); nav.classList.add('hidden');
            document.getElementById('review-btn').onclick = () => { mode = 'review'; currentIndex = 0; renderQuestion(); };
            document.getElementById('retake-btn').onclick = () => { mode = 'quiz'; currentIndex = 0; shuffleQuestions(); shuffleAnswers(); resetState(); renderQuestion(); };
        }
        
        document.getElementById('prev-btn').onclick = () => { if (currentIndex > 0) { currentIndex--; renderQuestion(); } };
        document.getElementById('next-btn').onclick = () => {
            if (mode === 'review') { if (currentIndex < quizData.length - 1) { currentIndex++; renderQuestion(); } else { mode = 'results'; renderResults(); } return; }
            if (currentIndex < quizData.length - 1) { currentIndex++; renderQuestion(); } else { mode = 'results'; renderResults(); }
        };
        
        document.getElementById('submit-early-btn').onclick = () => {
            if(confirm("確定要提前結束測驗並觀看目前的得分與結果嗎？")) {
                mode = 'results';
                renderResults();
            }
        };
        
        document.getElementById('hint-toggle').onclick = toggleHint; renderQuestion();
    </script>
</body>
</html>
