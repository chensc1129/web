<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>題目</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
        :root {
            --bg: #f6f1e7; --bg-deep: #efe4d6; --ink: #171717; --muted: #5b5b5b; --accent: #d3542c;
            --accent-light: #ff8f5a; --accent-dark: #b14320; --teal: #1f6f78; --card: #fff7ef;
            --stroke: #e3d6c5; --shadow: 0 18px 40px rgba(23, 23, 23, 0.12); --radius-sm: 10px;
            --radius-md: 12px; --radius-lg: 14px; --radius-xl: 18px; --radius-2xl: 22px;
            --space-1: 6px; --space-2: 8px; --space-3: 10px; --space-4: 12px; --space-5: 14px;
            --space-6: 16px; --space-7: 18px; --space-8: 20px; --space-9: 24px; --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif; --font-body: 'IBM Plex Sans', sans-serif; --error: #b54832;
        }
        body {
            font-family: var(--font-body);
            background: radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%), radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%), linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .quiz-container { width: 100%; max-width: 800px; padding: var(--space-10) var(--space-8); box-sizing: border-box; background: var(--card); border-radius: var(--radius-2xl); border: 1px solid var(--stroke); box-shadow: var(--shadow); }
        .progress-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .progress-text { color: var(--muted); font-size: 0.9em; }
        .status-bar { display: flex; gap: 16px; font-size: 0.9em; font-weight: 500; }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-correct { color: var(--teal); } .status-wrong { color: var(--error); }
        .question-text { font-family: var(--font-display); font-size: 1.5em; font-weight: 600; margin-bottom: 32px; line-height: 1.4; white-space: pre-line; }
        .options-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 12px; }
        .option-item { background-color: #fff; border: 1px solid var(--stroke); padding: var(--space-4) var(--space-6); border-radius: var(--radius-lg); cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; display: flex; flex-direction: column; gap: 8px; }
        .option-item:hover:not(.selected) { background-color: var(--card); transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .option-item.selected.correct { background-color: rgba(31, 111, 120, 0.12); border-color: var(--teal); }
        .option-item.selected.incorrect { background-color: rgba(181, 72, 50, 0.12); border-color: var(--error); }
        .option-item.revealed-correct { border-color: rgba(31, 111, 120, 0.5); box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16); }
        .option-label { font-weight: 500; display: flex; align-items: center; gap: 12px; }
        .feedback-state { font-weight: bold; font-size: 0.9em; display: none; }
        .selected .feedback-state, .revealed-correct .feedback-state { display: block; }
        .correct .feedback-state, .revealed-correct .feedback-state { color: var(--teal); } .incorrect .feedback-state { color: var(--error); }
        .rationale { font-size: 0.95em; color: var(--muted); margin-top: 4px; line-height: 1.5; display: none; }
        .selected .rationale, .revealed-correct .rationale { display: block; }
        .hint-toggle { border: 1px solid var(--stroke); color: var(--muted); cursor: pointer; padding: var(--space-2) var(--space-6); border-radius: var(--radius-md); background-color: #fff; display: flex; align-items: center; gap: 8px; font-size: 0.9em; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hint-toggle:hover { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .hint-content { margin-top: 32px; padding: var(--space-6); background-color: #fff; border: 1px solid var(--stroke); border-radius: var(--radius-lg); font-size: 0.95em; color: var(--muted); display: none; align-items: flex-start; gap: 16px; }
        .hint-content.active { display: flex; }
        .hint-icon-box { color: var(--accent-dark); font-size: 1.2em; margin-top: -2px; }
        
        .navigation { margin-top: 32px; display: flex; justify-content: space-between; align-items: center; }
        .nav-buttons { display: flex; gap: 12px; align-items: center; }
        .btn { border-radius: var(--radius-md); padding: var(--space-2) var(--space-7); font-size: 0.95em; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .btn-prev { background-color: #fff; color: var(--ink); border-color: var(--stroke); }
        .btn-prev:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .btn-next { background: linear-gradient(90deg, var(--accent), var(--accent-light)); color: #fff; }
        .btn-next:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .btn-submit-early { background-color: transparent; border: 1px solid #b54832; color: #b54832; margin-right: 8px; }
        .btn-submit-early:hover { background-color: #fff5f2; transform: translateY(-1px); }

        .results-screen { display: flex; flex-direction: column; gap: var(--space-8); }
        .results-title { font-family: var(--font-display); font-size: 2.1em; margin: 0; }
        .results-subtitle { color: var(--muted); margin: 0; font-size: 1em; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-6); }
        .result-card { padding: var(--space-6); border-radius: var(--radius-xl); background: #fff; border: 1px solid var(--stroke); display: flex; flex-direction: column; gap: var(--space-3); }
        .result-label { color: var(--muted); font-size: 0.95em; }
        .result-value { font-size: 2em; font-family: var(--font-display); }
        .result-metrics { display: flex; flex-direction: column; gap: var(--space-2); color: var(--muted); font-size: 0.95em; }
        .results-actions { display: flex; gap: var(--space-4); flex-wrap: wrap; }
        .btn-ghost { background-color: transparent; border: 1px solid var(--stroke); color: var(--ink); }
        .hidden { display: none; }
        @media (max-width: 900px) { .quiz-container { margin: var(--space-8); max-width: 100%; } }
        @media (max-width: 720px) { .quiz-container { padding: var(--space-8) var(--space-6); } .question-text { font-size: 1.3em; } .option-item { padding: var(--space-4); } }
        @media (max-width: 520px) { body { align-items: flex-start; } .quiz-container { margin: var(--space-6); padding: var(--space-7) var(--space-5); } .progress-container { flex-direction: column; align-items: flex-start; gap: var(--space-3); } .navigation { flex-direction: column; align-items: stretch; gap: var(--space-4); } .nav-buttons { width: 100%; } .btn { width: 100%; } .hint-toggle { justify-content: space-between; } .results-actions { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="quiz-content"></div>
        <div id="results-content" class="hidden"></div>
        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>
        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle"><span>Hint</span><span id="hint-icon-arrow">▼</span></button>
            <div class="nav-buttons">
                <button id="submit-early-btn" class="btn btn-submit-early hidden">提前結算 (Submit)</button>
                <button id="prev-btn" class="btn btn-prev">Previous</button>
                <button id="next-btn" class="btn btn-next">Next</button>
            </div>
        </div>
    </div>
    <script>
        const quizData = [{"answerOptions":[{"isCorrect":false,"rationale":"'Many' 只能用來修飾可數名詞，不可數名詞（如 water）應使用 'Much'。","text":"Many of the water in the bottle is dirty."},{"isCorrect":false,"rationale":"當主詞為 'Each of + 複數名詞' 時，後方的動詞必須使用單數形式。","text":"Each of the students have their own dictionary."},{"isCorrect":true,"rationale":"'One of + 複數名詞' 作為主詞時，強調的是其中的『那一個』，故動詞需用單數。","text":"One of the boys in the classroom is my brother."},{"isCorrect":false,"rationale":"'Meat' 為不可數名詞，應搭配 'little' 修飾且動詞需為單數。","text":"Few of the meat are fresh enough to eat."}],"hint":"請注意不定代名詞所修飾的名詞是可數還是不可數，以及動詞的單複數一致性。","question":"下列哪一個句子在語法上是正確的？"},{"answerOptions":[{"isCorrect":false,"rationale":"以 '-thing' 結尾的不定代名詞（如 nothing），其附加問句的主詞代名詞應使用 'it'。","text":"is they"},{"isCorrect":true,"rationale":"否定主詞 'Nothing' 視為單數，且因句意為否定，附加問句需用肯定 'is it'。","text":"is it"},{"isCorrect":false,"rationale":"主詞 'Nothing' 是單數概念，不應對應複數代名詞 'they'，且句意是否定。","text":"aren't they"},{"isCorrect":false,"rationale":"當句首出現否定字 'Nothing' 時，附加問句必須使用肯定形式。","text":"isn't it"}],"hint":"注意主詞包含否定意義時，問句的肯定/否定狀態以及對應的代名詞。","question":"選出正確的附加問句：'Nothing is impossible for him, ______?'"},{"answerOptions":[{"isCorrect":false,"rationale":"這是一個正確的語法規則，雖然中文常說『雖然...但是...』，英文則僅能擇一使用。","text":"Although 與 but 不能同時出現在同一個複合句中。"},{"isCorrect":false,"rationale":"這是 'though' 的特殊用法，在非正式語境中常見於句尾，此敘述正確。","text":"Though 可以放在句尾當作副詞使用，表示『然而』。"},{"isCorrect":false,"rationale":"在寫作中 although 的確被視為較正式的用法，此敘述正確。","text":"Although 通常比 though 更正式一些。"},{"isCorrect":true,"rationale":"加強語氣應使用 'Even though'，英文中並無 'Even although' 的寫法。","text":"可以用 'Even although' 來加強語氣。"}],"hint":"思考哪一個連接詞可以與 'even' 連用，以及它們與 'but' 的相容性。","question":"關於 'although' 與 'though' 的用法，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"'Despite' 是介係詞，後方只能接名詞或動名詞，不能接完整子句。","text":"Despite"},{"isCorrect":false,"rationale":"'But' 是對等連接詞，不應放在句首連接這兩個子句，應放在兩句中間。","text":"But"},{"isCorrect":true,"rationale":"這是引導讓步子句的正確連接詞，用於描述與預期相反的情況。","text":"Although"},{"isCorrect":false,"rationale":"單獨的 'Even' 是副詞，不能直接連接兩個完整的句子。","text":"Even"}],"hint":"這個位置需要一個能引導完整子句並表示『雖然』意思的連接詞。","question":"請選出正確的句子：'______ all the players were tired, they kept practicing.'"},{"answerOptions":[{"isCorrect":false,"rationale":"附加問句的助動詞需與原句動詞屬性一致，'Let's' 並非搭配 'do'。","text":"don't we"},{"isCorrect":false,"rationale":"'Let's' 引導的提議句有其固定的附加問句形式，並非搭配 'will'。","text":"will we"},{"isCorrect":false,"rationale":"'Won't you' 通常用於邀請對方（不含說話者）做某事的祈使句。","text":"won't you"},{"isCorrect":true,"rationale":"針對 'Let's' (包含說話者在內) 的提議，標準的附加問句是 'shall we?'。","text":"shall we"}],"hint":"對於包含『我們一起吧』意涵的提議，習慣上會使用哪種助動詞詢問意見？","question":"選出正確的附加問句：'Let's go for a walk in the park, ______?'"},{"answerOptions":[{"isCorrect":false,"rationale":"此句中的 'that' 純粹是連接詞，後方接完整的陳述句，並非修飾前面的名詞。","text":"是關係代名詞，用來修飾 Earth。"},{"isCorrect":false,"rationale":"在此句中名詞子句位於句首當作主詞，此時的 'that' 絕對不能省略。","text":"可以省略，因為它是受格。"},{"isCorrect":true,"rationale":"當 'that' 引導的子句作為整個句子的主詞時，為了語法結構清晰，'that' 必須保留。","text":"引導整個主詞子句，不可省略。"},{"isCorrect":false,"rationale":"當作引導陳述事實的名詞子句連接詞時，應使用 'that' 而非關係代名詞 'which'。","text":"可以換成 'Which'。"}],"hint":"觀察名詞子句在句子中的位置（主詞、動詞後受格等）來決定是否可省略連接詞。","question":"在名詞子句 'That the Earth is round is a well-known fact.' 中，'that' 的功能為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"這不符合祈使句附加問句的慣用法，祈使句主要是在要求對方（you）去做某事。","text":"don't you"},{"isCorrect":true,"rationale":"不論肯否定，一般的祈使句（命令、請求）通常搭配 'will you?' 作為附加問句。","text":"will you"},{"isCorrect":false,"rationale":"祈使句（命令或請求）的附加問句有特殊規則，不直接根據助動詞 'do' 變換。","text":"do you"},{"isCorrect":false,"rationale":"'Shall we' 僅用於 'Let's' 開頭的提議句。","text":"shall we"}],"hint":"這是一個祈使句（命令句），思考祈使句對應的代名詞與助動詞慣用法。","question":"選出正確的附加問句：'Don't forget to lock the door, ______?'"},{"answerOptions":[{"isCorrect":false,"rationale":"'Half of + 單數可數名詞/不可數名詞' 時，動詞應使用單數形式 'is'。","text":"Half of the apple are eaten by the worm."},{"isCorrect":true,"rationale":"'Both' 永遠表示兩者，搭配複數名詞後動詞必須使用複數形式。","text":"Both of the options are acceptable."},{"isCorrect":false,"rationale":"'Information' 是不可數名詞，因此 'Some of the information' 應視為單數。","text":"Some of the information were wrong."},{"isCorrect":false,"rationale":"'Most of + 複數可數名詞' 時，動詞應該使用複數形式 'are'。","text":"Most of the students in this class is from Tainan."}],"hint":"關鍵在於 'of' 後方的名詞性質，以及不定代名詞本身所代表的數量。","question":"下列哪一個句子使用的動詞單複數是正確的？"},{"answerOptions":[{"isCorrect":false,"rationale":"'Will you' 適用於一般的祈使句，而非 'Let's not' 形式。","text":"will you"},{"isCorrect":false,"rationale":"'Shall we' 常用於肯定的 'Let's' 提議句。","text":"shall we"},{"isCorrect":true,"rationale":"對於否定的提議 'Let's not...'，附加問句通常使用 'ok?'、'okay?' 或 'all right?'。","text":"ok"},{"isCorrect":false,"rationale":"這不是英語中標準的附加問句表達方式。","text":"won't we"}],"hint":"當提議是『我們不要...好嗎？』時，我們會用什麼口語詞彙來確認對方的同意？","question":"關於 'Let's not go there, ______?' 的附加問句，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然 'Someone' 語法上是單數，但在附加問句中，代名詞習慣用複數 'they'。","text":"didn't he"},{"isCorrect":true,"rationale":"不定代名詞如 someone、everyone 等，在附加問句中代名詞需用複數 'they'，且原句為肯定，問句用否定。","text":"didn't they"},{"isCorrect":false,"rationale":"'It' 用於指代物（如 something），指代人時應使用 'they'。","text":"didn't it"},{"isCorrect":false,"rationale":"原句 'called' 是肯定動詞，附加問句應使用否定形式。","text":"did they"}],"hint":"注意 indefinite pronouns (如 someone) 在附加問句中對應的代名詞習慣用法。","question":"選出正確的附加問句：'Someone called your name just now, ______?'"},{"answerOptions":[{"isCorrect":false,"rationale":"名詞子句也可以由連接詞 'that' 引導一個完整的陳述句。","text":"名詞子句中一定要有疑問詞。"},{"isCorrect":false,"rationale":"此子句為名詞子句作為形容詞（happy）的補語，並非修飾名詞的形容詞子句。","text":"We are happy that summer is coming. 中的 that 子句是形容詞。"},{"isCorrect":true,"rationale":"此處的名詞子句用來補充說明 'The news' 的內容，屬於同位語用法。","text":"The news that he won the race is true. 中的 that 引導同位語子句。"},{"isCorrect":false,"rationale":"當名詞子句作為及物動詞的受格時，連接詞 'that' 通常可以省略。","text":"I think that he is honest. 中的 that 不能省略。"}],"hint":"同位語子句是用來具體說明前面抽象名詞（如 news, fact, story）的內容。","question":"下列關於名詞子句的描述，哪一項正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"'Much' 修飾不可數名詞 'food'，主詞視為單數，故搭配單數動詞 'is'。","text":"Much; is"},{"isCorrect":false,"rationale":"'Food' 為不可數名詞，不能使用 'Many' 修飾。","text":"Many; are"},{"isCorrect":false,"rationale":"'A few' 僅能用於可數複數名詞，不適用於不可數名詞 'food'。","text":"A few; are"},{"isCorrect":false,"rationale":"'One of' 後方必須接複數可數名詞，不能接不可數名詞。","text":"One; is"}],"hint":"判斷 'food' 是否可數，並找出對應的修飾詞與動詞型態。","question":"填入正確的字組：'______ of the food on the table ______ ready.'"},{"answerOptions":[{"isCorrect":false,"rationale":"原句為肯定，附加問句必須使用否定形式。","text":"do you"},{"isCorrect":false,"rationale":"當 'have' 作為『必須』(have to) 解釋時，它是普通動詞，附加問句應借用助動詞 'do'。","text":"haven't you"},{"isCorrect":false,"rationale":"雖然 'have to' 意思接近 'must'，但附加問句需根據原句的動詞屬性來形成。","text":"mustn't you"},{"isCorrect":true,"rationale":"'Have to' 中的 'have' 視為一般動詞，現在式對應的助動詞為 'do'，肯定句變否定問句。","text":"don't you"}],"hint":"當 'have' 不是助動詞而是一般動詞 (例如 have to 或 have sth.) 時，附加問句的助動詞為何？","question":"選出正確的附加問句：'You have to finish the report tonight, ______?'"},{"answerOptions":[{"isCorrect":false,"rationale":"英文句子中 'although' 與 'but' 產生語意重疊，不可同時使用。","text":"Although it was raining, but he still went out."},{"isCorrect":false,"rationale":"語法上只有 'Even though'，沒有 'Even although'。","text":"Even although I am busy, I will help you."},{"isCorrect":true,"rationale":"'Though' 放在句尾作為副詞表示『然而/但是』，是正確且常見的用法。","text":"He didn't study hard, he still passed the exam, though."},{"isCorrect":false,"rationale":"'Though' 已經表示讓步，不需再加 'yet'，這在英文中也是贅字。","text":"Though she is small, yet she is very strong."}],"hint":"注意連接詞的重複使用問題，以及 'though' 作為副詞的句尾用法。","question":"請選出語法正確的句子："},{"answerOptions":[{"isCorrect":false,"rationale":"原句為肯定句，附加問句需改為否定。","text":"is there"},{"isCorrect":true,"rationale":"'There is/are' 結構的附加問句，主詞代名詞直接使用 'there'，並維持動詞一致性。","text":"isn't there"},{"isCorrect":false,"rationale":"雖然 'something' 對應 'it'，但在 'There is' 句型中，附加問句的主詞固定用 'there'。","text":"isn't it"},{"isCorrect":false,"rationale":"原句動詞是 'is'，附加問句應保持單數動詞形式。","text":"aren't there"}],"hint":"在 'There + be' 的句型中，附加問句的『虛主詞』要用哪一個字？","question":"選出正確的附加問句：'There is something wrong with the computer, ______?'"},{"answerOptions":[{"isCorrect":true,"rationale":"'Each of + 複數名詞' 作為主詞時，必須搭配單數動詞。","text":"wants"},{"isCorrect":false,"rationale":"感官或狀態動詞 'want' 通常不使用進行式，且主詞為單數。","text":"are wanting"},{"isCorrect":false,"rationale":"單獨的動名詞不能作為句子的主要謂語動詞。","text":"wanting"},{"isCorrect":false,"rationale":"'Each' 強調的是個體，不論後方名詞為何，主詞均視為單數。","text":"want"}],"hint":"'Each' (每一個) 作為主詞時，動詞應採取何種形式？","question":"關於句子 'Each of the players ______ to win the game.' 應填入："},{"answerOptions":[{"isCorrect":false,"rationale":"雖然 books 是複數，但原句強調的是 'One' (單數)，故問句動詞也應為單數。","text":"How many of the books are missing?"},{"isCorrect":false,"rationale":"Books 是可數名詞，不能使用 'How much'。","text":"How much of the books are missing?"},{"isCorrect":false,"rationale":"提問方式不符合原句強調『其中之一』的結構。","text":"What books is missing?"},{"isCorrect":true,"rationale":"針對數量的範圍提問，使用 'How many of + 範圍'，且因問的是『其中哪一個』，動詞用單數。","text":"How many of the books is missing?"}],"hint":"考慮名詞的可數性，以及原句中主詞的單複數性質。","question":"選出正確的問句：'One of the books is missing.' (對劃線部分 One of the books 提問)"},{"answerOptions":[{"isCorrect":false,"rationale":"代名詞與助動詞的單複數配合錯誤。","text":"hasn't they"},{"isCorrect":false,"rationale":"原句為肯定句，問句應改為否定。","text":"has it"},{"isCorrect":false,"rationale":"以 '-thing' 結尾的詞，代名詞應為單數的 'it' 而非複數的 'they'。","text":"haven't they"},{"isCorrect":true,"rationale":"'Everything' 對應代名詞 'it'，且完成式助動詞為 'has'，原句肯定變否定。","text":"hasn't it"}],"hint":"注意 'Everything' 結尾的類別（人還是物），以及完成式中助動詞的處理。","question":"選出正確的附加問句：'Everything has been settled, ______?'"},{"answerOptions":[{"isCorrect":false,"rationale":"受格通常接在及物動詞後，此處 'is' 是連綴動詞。","text":"受格"},{"isCorrect":false,"rationale":"同位語通常緊跟在名詞後方進行說明，而非透過 be 動詞連接。","text":"同位語"},{"isCorrect":false,"rationale":"主詞是前面的 'The problem'。","text":"主詞"},{"isCorrect":true,"rationale":"接在 be 動詞後面用來補充說明主詞性質或內容的名詞子句，稱為主詞補語。","text":"補語"}],"hint":"觀察該子句是否放在 be 動詞之後，用來具體描述主詞是什麼。","question":"句子 'The problem is that you didn't study hard.' 中的名詞子句功能為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"原句為肯定，附加問句需改為否定。","text":"are"},{"isCorrect":false,"rationale":"原句使用 be 動詞，附加問句不可改用一般助動詞 'do'。","text":"don't"},{"isCorrect":true,"rationale":"'Both of + 複數名詞' 為複數主詞，搭配 be 動詞 'are'，附加問句變為否定。","text":"aren't"},{"isCorrect":false,"rationale":"'Both' 指兩者，必須搭配複數動詞。","text":"isn't"}],"hint":"'Both' 的單複數性質，以及附加問句應如何對應 be 動詞。","question":"填入適當的助動詞：'Both of your parents are doctors, ______ they?'"},{"answerOptions":[{"isCorrect":true,"rationale":"'Most of + 不可數名詞' 時，主詞為單數概念，普通動詞應使用單數型態。","text":"comes"},{"isCorrect":false,"rationale":"現在分詞不能單獨作句子的主要動詞。","text":"coming"},{"isCorrect":false,"rationale":"不可數名詞搭配的主詞不應使用複數動詞 'are'。","text":"are coming"},{"isCorrect":false,"rationale":"'Tea' 為不可數名詞，'Most of the tea' 視為單數，動詞需加 s。","text":"come"}],"hint":"注意 'tea' 的可數性，並根據主詞單複數決定一般動詞的型態。","question":"關於 'Most of the tea ______ from Taiwan.' 應填入："},{"answerOptions":[{"isCorrect":false,"rationale":"'Seldom' (很少) 具有否定含意，因此附加問句必須用肯定形式。","text":"doesn't he"},{"isCorrect":false,"rationale":"主詞 'He' 為單數，且原句含否定詞，問句應為肯定。","text":"don't he"},{"isCorrect":true,"rationale":"準否定詞如 seldom, never 等會使句子變為否定，故問句應為肯定 'does he'。","text":"does he"},{"isCorrect":false,"rationale":"原句使用一般動詞 'watches'，附加問句應使用助動詞 'do/does'。","text":"is he"}],"hint":"思考 'seldom' 這個字會如何影響整句話的肯定或否定屬性。","question":"選出正確的附加問句：'He seldom watches TV, ______?'"},{"answerOptions":[{"isCorrect":true,"rationale":"對於『邀請吃喝』或提議的祈使句，附加問句常用 'won't you?' 表示客氣。","text":"won't you"},{"isCorrect":false,"rationale":"雖然 'will you' 沒錯，但此句帶有『邀請』意味，使用 'won't you' 更為道地禮貌。","text":"will you"},{"isCorrect":false,"rationale":"這不是提議『我們一起』，而是邀請對方做某事。","text":"shall we"},{"isCorrect":false,"rationale":"祈使句的附加問句不使用 'do/don't'。","text":"don't you"}],"hint":"這句話是邀請對方喝咖啡，思考針對『邀請、招待』的祈使句，哪種附加問句最合適。","question":"關於祈使句的附加問句，下列何者正確？'Have a cup of coffee, ______?'"},{"answerOptions":[{"isCorrect":false,"rationale":"作及物動詞 hope 的受格時，that 常被省略。","text":"I hope that you can come."},{"isCorrect":true,"rationale":"引導同位語子句說明名詞內容時，that 通常不可省略以維持語法結構。","text":"The fact that he failed is sad."},{"isCorrect":false,"rationale":"作及物動詞 said 的受格時，that 可以省略。","text":"He said that it was fun."},{"isCorrect":false,"rationale":"作及物動詞 believe 的受格時，that 可以省略。","text":"I believe that he is right."}],"hint":"回想連接詞 'that' 在哪些位置（主詞、受格、補語、同位語）是必須保留的。","question":"在名詞子句用法中，下列何者的 'that' 最不建議省略？"},{"answerOptions":[{"isCorrect":true,"rationale":"指示代名詞 'these/those' 在附加問句中一律轉化為 'they'。","text":"aren't they"},{"isCorrect":false,"rationale":"附加問句的主詞必須使用代名詞，不可直接重複指示代名詞。","text":"aren't these"},{"isCorrect":false,"rationale":"原句主詞 'These' 是複數，附加問句必須對應複數代名詞 'they'。","text":"isn't it"},{"isCorrect":false,"rationale":"原句為肯定句，問句應改為否定。","text":"are they"}],"hint":"當主詞是指示代名詞 (this, that, these, those) 時，問句中的代名詞應如何變化？","question":"選出正確的附加問句：'These are your books, ______?'"},{"answerOptions":[{"isCorrect":false,"rationale":"'Milk' 是不可數名詞，不能搭配 'Many' 或複數動詞。","text":"Many; are"},{"isCorrect":true,"rationale":"'A little' 修飾不可數名詞 'milk'，搭配單數動詞 'is' 語法正確。","text":"A little; is"},{"isCorrect":false,"rationale":"'Several' 只能修飾可數複數名詞。","text":"Several; are"},{"isCorrect":false,"rationale":"'Both' 用於修飾兩個可數對象，不適用於不可數名詞。","text":"Both; are"}],"hint":"考慮 'milk' 的名詞屬性，選擇適合的數量形容詞與動詞。","question":"填入正確答案：'______ of the milk ______ sour.'"},{"answerOptions":[{"isCorrect":false,"rationale":"連接詞排列錯誤，不符合基本英文結構。","text":"Jack didn't feel well, although but he still went to school."},{"isCorrect":false,"rationale":"雖然中文邏輯通順，但在英文語法中 'although' 不能搭配 'but' 出現。","text":"Although Jack didn't feel well, but he still went to school."},{"isCorrect":true,"rationale":"這是一個正確的並列句，使用對等連接詞 'but' 連接兩個轉折關係的子句。","text":"Jack didn't feel well, but he still went to school."},{"isCorrect":false,"rationale":"連接詞語意重複，'but' 與 'although' 不應並列使用。","text":"Jack didn't feel well, but although he still went to school."}],"hint":"記住『一山不容二虎』原則：一個句子裡轉折連接詞只能出現一個。","question":"選出語法正確的句子："},{"answerOptions":[{"isCorrect":false,"rationale":"代名詞 'he' 與助動詞 'don't' 的單複數配合不一致。","text":"don't he"},{"isCorrect":false,"rationale":"雖然 'everybody' 取單數動詞，但附加問句代名詞習慣用複數 'they'。","text":"doesn't he"},{"isCorrect":true,"rationale":"'Everybody' 對應複數代名詞 'they'，因此助動詞也要跟著變成複數型的 'don't'。","text":"don't they"},{"isCorrect":false,"rationale":"'Everybody' 是指人，代名詞應使用 'they' 而非物稱的 'it'。","text":"doesn't it"}],"hint":"對於 -one 或 -body 結尾的主詞，雖然句中動詞用單數，但問句代名詞要變為什麼？","question":"選出正確的附加問句：'Everybody knows the secret, ______?'"},{"answerOptions":[{"isCorrect":true,"rationale":"當 'Most of' 修飾複數名詞時，主詞為複數，需搭配複數動詞 'are'。","text":"are"},{"isCorrect":false,"rationale":"這是單數過去式動詞，不符合複數主詞的語法要求。","text":"was"},{"isCorrect":false,"rationale":"助動詞或原形動詞不可單獨作主要謂語動詞。","text":"be"},{"isCorrect":false,"rationale":"'Students' 為複數可數名詞，'Most of' 之後的動詞也應為複數。","text":"is"}],"hint":"檢查 'of' 後方的名詞 'students' 是單數還是複數。","question":"關於 'Most of the Taiwanese students ______ great.' 應填入："},{"answerOptions":[{"isCorrect":true,"rationale":"單數指示代名詞 'this/that' 在附加問句中一律以 'it' 代替。","text":"isn't it"},{"isCorrect":false,"rationale":"原句為肯定，問句應為否定。","text":"is it"},{"isCorrect":false,"rationale":"附加問句不可直接使用 'this' 作為主詞，需轉化為代名詞。","text":"isn't this"},{"isCorrect":false,"rationale":"主詞是指代該輛車 (this)，並非指代 father，故不能用 'he'。","text":"isn't he"}],"hint":"考慮單數指示代名詞在附加問句中應轉變為哪一個人稱代名詞。","question":"選出正確的附加問句：'This is your father's car, ______?'"},{"answerOptions":[{"isCorrect":false,"rationale":"助動詞或特定句型後才使用原形動詞，此處作為主要動詞應根據主詞進行時態變化。","text":"be"},{"isCorrect":false,"rationale":"雖然 of 後面接的是複數名詞 students，但真正的主詞是 one，故不能使用複數動詞。","text":"are"},{"isCorrect":false,"rationale":"除了複數問題外，這也涉及過去式，但主詞 one 的單數特性仍決定了動詞應為單數。","text":"were"},{"isCorrect":true,"rationale":"當主詞為「one of + 複數名詞」時，主詞的核心是「one」，因此動詞必須使用單數形式。","text":"is"}],"hint":"注意「...之中的其中一個」這個構造中，真正的數量核心是哪一個字。","question":"One of the most talented students in our class __ chosen to participate in the national competition."},{"answerOptions":[{"isCorrect":false,"rationale":"現在分詞不能直接當作句子的主要動詞使用。","text":"seeming"},{"isCorrect":false,"rationale":"information 是不可數名詞，與 much 連用時應視為單數，動詞需加 s。","text":"seem"},{"isCorrect":false,"rationale":"此選項為複數完成式，與不可數名詞主詞應搭配的單數動詞不符。","text":"have seemed"},{"isCorrect":true,"rationale":"當「much of」接不可數名詞（如 information）時，應視為單數主詞，動詞需配合單數時態。","text":"seems"}],"hint":"請判斷 information 是可數還是不可數名詞，以及它對動詞變化的影響。","question":"Much of the information provided in these documents __ to be outdated and needs review."},{"answerOptions":[{"isCorrect":false,"rationale":"both 指的是「兩者都」，代表主詞為複數，動詞不應加 s。","text":"looks"},{"isCorrect":false,"rationale":"has 是單數形式，與表示兩者的複數主詞 both 不相符。","text":"has been"},{"isCorrect":true,"rationale":"both of 後接複數名詞時，動詞應使用複數形式以符合「兩者」的含義。","text":"look"},{"isCorrect":false,"rationale":"both 引導的主詞代表兩者，應搭配複數 be 動詞。","text":"is"}],"hint":"關鍵在於 both 代表的是單數還是複數的概念。","question":"Both of the players on the court __ exhausted after the long match."},{"answerOptions":[{"isCorrect":false,"rationale":"附加問句的主詞必須使用代名詞，不能重複使用原本的主詞名詞。","text":"doesn't everything"},{"isCorrect":false,"rationale":"主要動詞是一般動詞 looks 而非 be 動詞，故附加問句需使用助動詞。","text":"isn't it"},{"isCorrect":true,"rationale":"不定代名詞 everything 視為單數 it，且主要動詞 looks 為一般動詞，助動詞用 does，肯定句配否定附加問句。","text":"doesn't it"},{"isCorrect":false,"rationale":"everything 的代名詞應為 it 而非 they，且應使用單數助動詞。","text":"don't they"}],"hint":"先確認 everything 對應的代名詞，再觀察主要動詞是 be 動詞還是一般動詞。","question":"Everything on the menu looks delicious, __?"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然 children 是複數，但 each 強調的是「每一個」單體，應接單數動詞。","text":"were"},{"isCorrect":false,"rationale":"這除了是複數動詞外，時態上也與強調過去發生的動作不符。","text":"are"},{"isCorrect":true,"rationale":"each of 後接複數名詞時，主詞核心仍是單數的 each，故需使用單數動詞。","text":"was"},{"isCorrect":false,"rationale":"have 為複數形式，與單數主詞 each 不一致。","text":"have been"}],"hint":"這題的主詞核心是「每一個」，這在英文中被視為單數。","question":"Each of the children __ given a small gift at the end of the party."},{"answerOptions":[{"isCorrect":false,"rationale":"語意邏輯錯誤，雖然的意思應該引導「疲累」這個前提，而非工作。","text":"He is tired although he continues to work."},{"isCorrect":true,"rationale":"although 是從屬連接詞，引導讓步子句，後面的主要子句不需也不可再加 but。","text":"Although he is tired, he continues to work."},{"isCorrect":false,"rationale":"雖然與但是不能連用，且子句順序與邏輯不符。","text":"But he is tired, although he continues to work."},{"isCorrect":false,"rationale":"although 與 but 不能同時出現在同一個句子中，這是常見的語法錯誤。","text":"Although he is tired, but he continues to work."}],"hint":"注意英文中「雖然」和「但是」是否可以像中文一樣同時使用。","question":"Which of the following sentences is grammatically CORRECT?"},{"answerOptions":[{"isCorrect":true,"rationale":"though 可以放在句尾作為副詞使用，意思是「但是、不過」。","text":"though"},{"isCorrect":false,"rationale":"although 是連接詞，通常放在子句開頭，不可像 though 那樣放在句尾當副詞。","text":"although"},{"isCorrect":false,"rationale":"英文中只有 even though 的用法，並沒有 even although 這種組合。","text":"even although"},{"isCorrect":false,"rationale":"but 是對等連接詞，必須連接兩個對等成分，不可放在句尾作為副詞。","text":"but"}],"hint":"找一個可以放在句尾表達「轉折」語氣的單字。","question":"The movie was very long and boring. I finished watching it, __."},{"answerOptions":[{"isCorrect":true,"rationale":"這裡 that 引導的是一個名詞子句，在句子中擔任「主詞」的角色。","text":"That"},{"isCorrect":false,"rationale":"what 引導子句時，子句內通常會缺少主詞或受詞，但此處子句結構完整，應使用 that。","text":"What"},{"isCorrect":false,"rationale":"如果使用 It，後方需接 is a fact that...，而非直接連接 that 子句作為完整主詞。","text":"It"},{"isCorrect":false,"rationale":"which 通常用於引導關係子句或疑問句，不適合在此作為引導主詞的名詞子句連接詞。","text":"Which"}],"hint":"這裡需要一個連接詞來引導一整個子句作為句子的「主詞」。","question":"__ that the Earth travels around the Sun is a scientific fact."},{"answerOptions":[{"isCorrect":false,"rationale":"以 Let's 開頭的祈使句，其固定搭配的附加問句應為 shall we。","text":"will we"},{"isCorrect":false,"rationale":"雖然是肯定句，但 Let's 提議句型的附加問句習慣上不使用 won't we。","text":"won't we"},{"isCorrect":true,"rationale":"Let's 是 Let us 的縮寫，表示提議，傳統上固定搭配 shall we 作為附加問句。","text":"shall we"},{"isCorrect":false,"rationale":"提議句型不使用一般助動詞 do/does 來構成附加問句。","text":"don't we"}],"hint":"對於「Let's...」開頭的邀請或建議，有一種專門的附加問句用法。","question":"Let's go for a walk in the park after dinner, __?"},{"answerOptions":[{"isCorrect":false,"rationale":"nobody 是否定詞，附加問句應使用肯定形式，而非否定。","text":"didn't they"},{"isCorrect":true,"rationale":"主要子句包含否定詞 nobody，因此附加問句需用肯定；且 nobody 的代名詞通常用 they。","text":"did they"},{"isCorrect":false,"rationale":"此選項同時犯了代名詞錯誤以及肯否定極性錯誤。","text":"didn't he"},{"isCorrect":false,"rationale":"雖然 nobody 是單數概念，但在附加問句中習慣以複數代名詞 they 來對應。","text":"did he"}],"hint":"注意 nobody 本身帶有否定的意思，這會影響附加問句的肯定或否定形式。","question":"Nobody in the office knew about the surprise party, __?"},{"answerOptions":[{"isCorrect":false,"rationale":"這不僅是複數動詞，且 Sugar 的不可數性質決定了它不能接 are。","text":"are"},{"isCorrect":false,"rationale":"have 為複數助動詞，不符合不可數名詞主詞的語法要求。","text":"have been"},{"isCorrect":false,"rationale":"雖然 half 是「一半」，但 Sugar 不可數，不應使用複數動詞。","text":"were"},{"isCorrect":true,"rationale":"sugar 是不可數名詞，因此 half of sugar 仍視為單數，動詞用 was。","text":"was"}],"hint":"這題需要先確認 sugar 是可數還是不可數名詞。","question":"Half of the sugar in the bowl __ spilled on the floor."},{"answerOptions":[{"isCorrect":false,"rationale":"several 是複數主詞，且時態應與 yesterday 配合使用過去式。","text":"has been"},{"isCorrect":true,"rationale":"several 引導的主詞必定是複數，搭配過去時間 yesterday，應使用 were。","text":"were"},{"isCorrect":false,"rationale":"several 表示「幾個」，是複數概念，不能接單數動詞 is。","text":"is"},{"isCorrect":false,"rationale":"several 是複數，且時間標記為 yesterday，應使用複數過去式。","text":"was"}],"hint":"several 這個單字所代表的數量是單數還是複數？","question":"Several of the members __ present at the annual meeting yesterday."},{"answerOptions":[{"isCorrect":false,"rationale":"祈使句不使用助動詞 do 來構成附加問句。","text":"do you"},{"isCorrect":true,"rationale":"祈使句（命令、請求、否定命令）的附加問句通常固定使用 will you。","text":"will you"},{"isCorrect":false,"rationale":"shall 常用於 Let's 句型或 I/We 的提議，不適用於一般祈使句。","text":"shall you"},{"isCorrect":false,"rationale":"否定的祈使句固定使用肯定助動詞 will you 作為附加問句。","text":"won't you"}],"hint":"對於命令或請求（即使是否定的），附加問句通常會用到哪個助動詞？","question":"Please don't be late for the important interview tomorrow morning, __?"},{"answerOptions":[{"isCorrect":false,"rationale":"附加問句應對應祈使句的語法規則，而非一般陳述句。","text":"don't you"},{"isCorrect":false,"rationale":"雖然 will you 可用於命令，但對於「邀請吃喝」的親切建議，won't you 更為貼切。","text":"will you"},{"isCorrect":false,"rationale":"這不是以 Let's 開頭的提議，主語是指對方「你」，不適用 shall we。","text":"shall we"},{"isCorrect":true,"rationale":"這是一個表示邀請或建議（吃喝）的祈使句，附加問句用 won't you 顯得較有禮貌且客氣。","text":"won't you"}],"hint":"當你熱情地「邀請」別人吃東西時，附加問句會用哪個比較有禮貌的形式？","question":"Have some more cookies and milk, __?"},{"answerOptions":[{"isCorrect":false,"rationale":"子句內結構完整（主詞、動詞、補語都有），不需要 what 來擔任子句內的成分。","text":"what"},{"isCorrect":false,"rationale":"if 通常引導「是否」的疑問性質子句，但此處是陳述一個事實信念。","text":"if"},{"isCorrect":false,"rationale":"which 用於選擇或引導關係子句，在此受詞子句結構中並不合適。","text":"which"},{"isCorrect":true,"rationale":"這裡 that 引導名詞子句作為動詞 believe 的受詞，在這種結構中 that 常被省略。","text":"that"}],"hint":"這個字可以用來引導一個完整的子句作為受詞，而且有時候可以省略。","question":"I believe __ honesty is the best policy in any relationship."},{"answerOptions":[{"isCorrect":false,"rationale":"are 是複數動詞，與單數不可數名詞主詞不符。","text":"are smelling"},{"isCorrect":false,"rationale":"milk 是不可數名詞，搭配 a little 時視為單數，動詞需加 s。","text":"smell"},{"isCorrect":false,"rationale":"分詞不能直接充當句子的主要動詞。","text":"smelling"},{"isCorrect":true,"rationale":"不可數名詞 milk 視為單數主詞，因此連綴動詞 smell 應使用單數形式 smells。","text":"smells"}],"hint":"判斷 milk 這個主詞在語法上是單數還是複數。","question":"A little of the milk in the fridge __ sour, so don't drink it."},{"answerOptions":[{"isCorrect":false,"rationale":"主要子句使用 be 動詞 is，附加問句也應使用 be 動詞而非助動詞。","text":"doesn't it"},{"isCorrect":true,"rationale":"當主要子句主詞為 this 或 that 時，附加問句的代名詞固定使用 it。","text":"isn't it"},{"isCorrect":false,"rationale":"主要子句是肯定句，附加問句應使用否定形式。","text":"is it"},{"isCorrect":false,"rationale":"附加問句的主詞必須使用代名詞，this/that 在附加問句中應變為 it。","text":"isn't this"}],"hint":"當主詞是 this 或 that 時，附加問句裡的代名詞要換成哪一個？","question":"This is a very difficult problem to solve, __?"},{"answerOptions":[{"isCorrect":false,"rationale":"even but 並非英文的標準用法，語法錯誤。","text":"but"},{"isCorrect":false,"rationale":"雖然 although 意思相近，但習慣上不與 even 連用，應直接用 although 或 even though。","text":"although"},{"isCorrect":true,"rationale":"Even though 是固定用法，表示「雖然、即使」。","text":"though"},{"isCorrect":false,"rationale":"even if 表示「即使」，通常用於假設尚未發生的事，但此句描述的是既定事實。","text":"if"}],"hint":"找一個常跟「even」搭配在一起，表示「雖然」的單字。","question":"Even __ he didn't have much money, he still donated some to the charity."},{"answerOptions":[{"isCorrect":false,"rationale":"who 用於指代人，不適用於指代 news 或引導事實子句。","text":"who"},{"isCorrect":false,"rationale":"when 引導時間子句，雖然句中有 next month，但此處是解釋消息的具體內容而非時間點。","text":"when"},{"isCorrect":false,"rationale":"which 引導關係子句時應在子句中擔任成分，但此子句結構完整，應為同位語 that 子句。","text":"which"},{"isCorrect":true,"rationale":"這裡 that 引導一個同位語子句，用來解釋名詞 the news 的具體內容。","text":"that"}],"hint":"這裡需要一個連接詞來引導一個完整的訊息，這個訊息是跟前面的「消息」指稱同一件事。","question":"The news __ the factory will close next month shocked everyone."},{"answerOptions":[{"isCorrect":false,"rationale":"trees 是複數名詞，且與 many 連用，主詞為複數，不能用 was。","text":"was"},{"isCorrect":false,"rationale":"has 是單數助動詞，不符合複數主詞 many of the trees 的要求。","text":"has been"},{"isCorrect":true,"rationale":"many of 後接複數可數名詞時，主詞為複數，應使用複數動詞 were。","text":"were"},{"isCorrect":false,"rationale":"many 指的是多個，應搭配複數 be 動詞，且 is 是現在式單數。","text":"is"}],"hint":"注意 many 這個字修飾的是可數名詞 trees，這會影響動詞的單複數。","question":"Many of the trees in the forest __ damaged by the strong wind."},{"answerOptions":[{"isCorrect":false,"rationale":"are 為複數 be 動詞，不符合完成式結構，也不符合單數主詞要求。","text":"are"},{"isCorrect":true,"rationale":"當「part of」接不可數名詞時，動詞應使用單數形式。","text":"has"},{"isCorrect":false,"rationale":"work 是不可數名詞，即使是 part of work 仍應視為單數，助動詞用 has。","text":"have"},{"isCorrect":false,"rationale":"is 雖為單數，但此處後接 been finished，需要助動詞 has 構成完成式。","text":"is"}],"hint":"「一部分的工作」中的「工作 (work)」在英文中是可數還是不可數？","question":"Part of the work __ already been finished by the team."},{"answerOptions":[{"isCorrect":false,"rationale":"提議句型中，否定形式並不搭配 won't we 作為附加問句。","text":"won't we"},{"isCorrect":true,"rationale":"根據講義，否定的提議「Let's not...」其附加問句應使用 ok, okey 或 alright。","text":"alright"},{"isCorrect":false,"rationale":"只有肯定的 Let's... 附加問句才用 shall we；否定時則用 ok/alright。","text":"shall we"},{"isCorrect":false,"rationale":"will you 用於一般祈使句命令，不適用於 Let's not 提議句型。","text":"will you"}],"hint":"當提議是「我們不要做某事 (Let's not...)」時，我們會用什麼來徵詢同意？","question":"Let's not go swimming today, __?"},{"answerOptions":[{"isCorrect":true,"rationale":"主要子句主詞為 these 或 those 時，附加問句的代名詞固定使用複數的 they。","text":"aren't they"},{"isCorrect":false,"rationale":"附加問句中的主詞必須使用代名詞，these/those 應轉換為 they。","text":"aren't those"},{"isCorrect":false,"rationale":"主詞 those 是複數，代名詞不能使用單數的 it。","text":"isn't it"},{"isCorrect":false,"rationale":"主要子句使用 be 動詞 are，附加問句也應使用 be 動詞，而非一般助動詞。","text":"don't they"}],"hint":"這些 (these) 或那些 (those) 在附加問句中要變身成哪個複數代名詞？","question":"Those are your keys on the table, __?"},{"answerOptions":[{"isCorrect":false,"rationale":"which 在此處不具備引導形容詞補語子句的功能。","text":"which"},{"isCorrect":true,"rationale":"這是形容詞 happy 後方的補語子句，由 that 引導來具體說明感到高興的原因。","text":"that"},{"isCorrect":false,"rationale":"子句內容已經完整（主詞 you，動詞 joined，受詞 group），不需要 what。","text":"what"},{"isCorrect":false,"rationale":"because of 後面應接名詞或代名詞，不能直接接一個完整的子句。","text":"because of"}],"hint":"這是在形容詞之後引導一個子句，用來解釋原因或內容。","question":"I am very happy __ you decided to join our group."},{"answerOptions":[{"isCorrect":false,"rationale":"seldom（很少）是否定副詞，主要子句應視為否定，附加問句需用肯定。","text":"don't you"},{"isCorrect":false,"rationale":"此選項同時違反了動詞種類不符與肯否定極性錯誤。","text":"aren't you"},{"isCorrect":true,"rationale":"主要子句中含有否定性質的詞 seldom，故附加問句需使用肯定形式 do you。","text":"do you"},{"isCorrect":false,"rationale":"主要動詞是一般動詞 exercise，應使用助動詞 do 而非 be 動詞。","text":"are you"}],"hint":"「seldom」是一個帶有否定意味的副詞，這會如何影響後面的問句？","question":"You seldom exercise in the morning, __?"},{"answerOptions":[{"isCorrect":false,"rationale":"have 為複數形式，與單數不可數名詞主詞 tea 不一致。","text":"have come"},{"isCorrect":true,"rationale":"由於 tea 為不可數名詞，所以「大多數的茶 (most of the tea)」視為單數，動詞需用單數形式。","text":"comes"},{"isCorrect":false,"rationale":"tea 是不可數名詞，與 most 連用仍視為單數，動詞應加 s。","text":"come"},{"isCorrect":false,"rationale":"V-ing 形式不能直接擔任句子的主要動詞。","text":"coming"}],"hint":"大多數的「茶」，這在語法上應該被當作單數還是複數處理？","question":"Most of the tea sold in this shop __ from high mountain areas in Taiwan."},{"answerOptions":[{"isCorrect":false,"rationale":"主詞是複數概念，應使用複數 be 動詞，且 is/are 比 was 更有現在進行的意義。","text":"was"},{"isCorrect":false,"rationale":"此處需要 be 動詞來構成進行式（be + Ving），而非助動詞 has。","text":"has"},{"isCorrect":true,"rationale":"all of 後接複數可數名詞（students）時，動詞應使用複數形式。","text":"are"},{"isCorrect":false,"rationale":"students 是可數複數名詞，與 all 連用代表全部學生，應使用複數動詞。","text":"is"}],"hint":"「全部的學生」指的多於一個人，所以動詞要選哪一種？","question":"All of the students in the library __ studying hard for the final exam."},{"answerOptions":[{"isCorrect":false,"rationale":"子句內成分完整，不需要具有指示意義的 what。","text":"what"},{"isCorrect":false,"rationale":"雖然 how 引導方式，但此句重點在於陳述「時間不夠」這項事實，故用 that 最合適。","text":"how"},{"isCorrect":false,"rationale":"which 通常引導定語子句或疑問句，不適合在此引導補語子句。","text":"which"},{"isCorrect":true,"rationale":"這裡 that 引導的名詞子句放在 be 動詞之後，擔任「主詞補語」的角色。","text":"that"}],"hint":"這是在 be 動詞後面，引導一整個子句來解釋主詞「問題」是什麼。","question":"The problem is __ we don't have enough time to finish the project."},{"answerOptions":[{"isCorrect":true,"rationale":"someone/somebody 的代名詞在附加問句中用 they，且 they 需搭配複數助動詞 haven't。","text":"haven't they"},{"isCorrect":false,"rationale":"主要子句使用了完成式助動詞 has，附加問句應對應使用 have/has。","text":"doesn't he"},{"isCorrect":false,"rationale":"雖然 someone 語義上可能是單數，但在附加問句中習慣以複數 they 代替。","text":"hasn't he"},{"isCorrect":false,"rationale":"助動詞與代名詞主詞不一致，they 應搭配 have 而非 has。","text":"hasn't they"}],"hint":"注意不定代名詞「someone」在問句尾巴要換成哪一個代名詞，以及動詞的配合。","question":"Someone has stolen my bicycle, __?"},{"answerOptions":[{"isCorrect":true,"rationale":"few 帶有否定語意，故附加問句採用肯定；且 people 為複數，用代名詞 they。","text":"do they"},{"isCorrect":false,"rationale":"people 為複數，代名詞應用 they；且 few 是否定詞，附加問句應為肯定。","text":"doesn't it"},{"isCorrect":false,"rationale":"few 是否定性質的詞（幾乎沒有），因此附加問句必須用肯定形式。","text":"don't they"},{"isCorrect":false,"rationale":"附加問句的主詞必須使用代名詞，不能直接使用 few 或 people。","text":"do few"}],"hint":"「Few」指的是「幾乎沒有」，它在英文中具有負面、否定的力道。","question":"Few people know the answer to this difficult question, __?"},{"answerOptions":[{"isCorrect":true,"rationale":"根據講義規則，「each」作為主詞的一部分時，不論後面名詞是否複數，動詞需與單數性質的 each 一致。","text":"Each of the boxes is heavy."},{"isCorrect":false,"rationale":"當主詞是「each of + 複數名詞」時，重點在於「每一個」，因此後接動詞應使用單數型態。","text":"Each of the players have a uniform."},{"isCorrect":false,"rationale":"「One of...」的主詞核心是單數的「一」，後面的動詞必須使用單數動詞。","text":"One of my friends are going to Japan."},{"isCorrect":false,"rationale":"「Every」不能直接放在「of」前面作為代名詞使用，應改為「Every one of」或單用「Every student」。","text":"Every of the students loves English."}],"hint":"請注意主詞的核心是「單數」還是「複數」的概念。","question":"下列關於「不定代名詞 + of + 範圍」的句子，哪一個動詞用法是正確的？"},{"answerOptions":[{"isCorrect":false,"rationale":"這與講義標註的內容相反，both 僅限於「兩個都」。","text":"both of 用於超過兩個，two of 用於剛好兩個"},{"isCorrect":false,"rationale":"這兩者在語法正式程度上沒有顯著差異，差異在於數量的邏輯範疇。","text":"both of 是非正式用法，two of 是正式用法"},{"isCorrect":true,"rationale":"講義特別標註了兩者的區別：both 專指「兩者都」，而 two 則是在大於二的群體中取出兩個。","text":"both of 指兩者都，two of 指超過兩個中的其中兩個"},{"isCorrect":false,"rationale":"兩者通常都與複數可數名詞連用，而非以可數與否作為主要區分。","text":"both of 只能接不可數名詞，two of 只能接可數名詞"}],"hint":"思考「兩者都」與「三者以上取其二」的邏輯區別。","question":"根據講義內容，「both of」與「two of」的主要差異為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"除非上下文指過去式，否則在此語境下應選擇單數現在式，且 were 是複數型態。","text":"were"},{"isCorrect":false,"rationale":"「Meat」是不可數名詞，其對應的數量代名詞「much」所引導的主詞應視為單數。","text":"are"},{"isCorrect":true,"rationale":"當「much of」後面接不可數名詞時，整個主詞視為單數，因此使用 is。","text":"is"},{"isCorrect":false,"rationale":"動詞必須根據主詞的人稱與時態進行變化，不應直接使用原形。","text":"be"}],"hint":"肉類（meat）是可數還是不可數名詞？","question":"句子「Much of the meat _____ (be) fresh.」應填入哪個動詞？"},{"answerOptions":[{"isCorrect":false,"rationale":"although 引導的從屬子句可以放在主要子句之後，且不需要加逗號。","text":"He is not happy although he is rich."},{"isCorrect":false,"rationale":"這是標準的 although 句型，表達對比且沒有連接詞重複的問題。","text":"Although he is rich, he is not happy."},{"isCorrect":true,"rationale":"講義明確指出 although 與 but 不能同時出現在一個句子中，這是常見的中文邏輯錯誤。","text":"Although he is rich, but he is not happy."},{"isCorrect":false,"rationale":"although 常與 still 連用以強化對比感，這是正確用法。","text":"Although he is rich, he still is not happy."}],"hint":"請回想英文中「雖然...但是...」的連接詞規則。","question":"下列關於「although」的用法，哪一個選項是**錯誤**的？"},{"answerOptions":[{"isCorrect":false,"rationale":"though 和 although 一樣，常與 still 搭配使用來增加語氣。","text":"它不能跟 still 一起使用"},{"isCorrect":false,"rationale":"作為副詞時，它的位置通常與連接詞不同。","text":"它必須放在句首引導子句"},{"isCorrect":true,"rationale":"講義提到 though 可以放在句尾當副詞用，意思是「不過」，例如：It’s not easy, I’ll try it though.","text":"它可以用於句尾，表示「但是、不過」"},{"isCorrect":false,"rationale":"講義指出 although 比較正式，而 though 比較口語。","text":"它的語氣比 although 正式"}],"hint":"看看講義中關於 though 放在句尾的範例。","question":"關於「though」作為副詞的用法，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"詢問數量時使用 How many，後方接複數名詞範圍，動詞需使用複數型 are。","text":"How many of the zebras are sleeping?"},{"isCorrect":false,"rationale":"雖然原句主詞是 one，但改為 How many 引導時，動詞需配合複數概念。","text":"How many of the zebras is sleeping?"},{"isCorrect":false,"rationale":"斑馬是可數名詞，詢問可數名詞數量應使用 How many 而非 How much。","text":"How much of the zebras are sleeping?"},{"isCorrect":false,"rationale":"How many 後面必須接複數名詞，且動詞也需變化。","text":"How many of the zebra is sleeping?"}],"hint":"斑馬是可數名詞，且詢問複數數量時動詞應如何變化？","question":"將「One of the zebras is sleeping.」改為問句，下列何者最恰當？"},{"answerOptions":[{"isCorrect":true,"rationale":"根據講義，附加問句的時態必須與主要子句保持一致。","text":"附加問句的動詞時態必須與主要子句相同"},{"isCorrect":false,"rationale":"附加問句遵循「前肯後否，前否後肯」的原則。","text":"主要子句若是否定，附加問句也要用否定"},{"isCorrect":false,"rationale":"若主要子句有 be 動詞或助動詞，問句應沿用該動詞；僅在一般動詞時才使用助動詞。","text":"不管主要子句是什麼動詞，問句一律用 do/does/did"},{"isCorrect":false,"rationale":"附加問句的主詞必須改為對應的「代名詞」。","text":"主詞必須使用與主要子句相同的主詞名詞"}],"hint":"考慮主要子句與問句之間的肯否定關係以及時態關聯。","question":"附加問句的動詞選擇與時態規則，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"主要子句動詞是 drinks（一般動詞），應使用助動詞 does 而非 be 動詞。","text":"is he"},{"isCorrect":true,"rationale":"由於子句中含有否定性質的詞 never，附加問句需用肯定型態 does he。","text":"does he"},{"isCorrect":false,"rationale":"「never」是否定詞，因此主要子句被視為否定，附加問句應使用肯定形式。","text":"doesn't he"},{"isCorrect":false,"rationale":"drinks 是現在式，附加問句時態應與主要子句一致，故不能用過去式 did。","text":"did he"}],"hint":"注意「never」這個字對句子肯定或否定性質的影響。","question":"句子「He never drinks coffee, _____?」的附加問句應為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"附加問句的主詞必須是人稱代名詞，that 並非合適的人稱代名詞主詞。","text":"that"},{"isCorrect":false,"rationale":"附加問句的主詞必須是人稱代名詞，不可使用指示代名詞 those。","text":"those"},{"isCorrect":false,"rationale":"「they」通常用於指代人（如 everyone）或複數物（如 these）。","text":"they"},{"isCorrect":true,"rationale":"講義重點補充提到，~thing（如 nothing, anything, everything）結尾的代名詞，在附加問句中一律用 it 指代。","text":"it"}],"hint":"尋找講義中關於 ~thing 系列代名詞的轉化規則。","question":"當主要子句的主詞是「Everything」時，附加問句的主詞應使用哪一個代名詞？"},{"answerOptions":[{"isCorrect":false,"rationale":"附加問句必須由助動詞或 be 動詞開頭，不能直接使用一般動詞。","text":"stole not they"},{"isCorrect":false,"rationale":"主要子句是肯定句（stole），附加問句必須使用否定縮寫（didn't）。","text":"did they"},{"isCorrect":true,"rationale":"根據講義，~body 或 ~one（如 someone）結尾的詞，在附加問句中主詞通常用 they 指代。","text":"didn't they"},{"isCorrect":false,"rationale":"雖然指人，但在不確定性別或泛指時，語法慣例上附加問句傾向使用複數代名詞 they。","text":"didn't he"}],"hint":"不定代名詞 someone 在附加問句中應變換為何種人稱代名詞？","question":"對於「Someone stole my bag, _____?」這個句子，正確的附加問句是："},{"answerOptions":[{"isCorrect":false,"rationale":"這類句型固定使用 shall we，不使用 be 動詞形式。","text":"aren't we"},{"isCorrect":false,"rationale":"will you 通常用於一般的祈使句或請求，而非 Let's 開頭的提議。","text":"will you"},{"isCorrect":false,"rationale":"Let's 句型不使用一般助動詞 don't，而是使用助動詞 shall。","text":"don't we"},{"isCorrect":true,"rationale":"講義特殊句型第一點指出，Let's 引導的建議句，固定搭配 shall we? 作為附加問句。","text":"shall we"}],"hint":"這是一個關於「提議」的特殊句型，請查閱講義特殊句型區塊。","question":"「Let's go home, _____?」這類祈使句的附加問句應填入："},{"answerOptions":[{"isCorrect":false,"rationale":"will you 是針對一般命令或請求的附加問句，不適用於否定提議。","text":"will you"},{"isCorrect":false,"rationale":"這並非標準的祈使句附加問句用法。","text":"do we"},{"isCorrect":true,"rationale":"講義標註，否定提議 Let's not... 的附加問句應為 ok, okay 或 all right。","text":"ok / all right
