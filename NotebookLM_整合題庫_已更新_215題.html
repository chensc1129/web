定，附加問句需用肯定形式。","text":"did they"},{"isCorrect":false,"rationale":"附加問句主詞必須是代名詞（they），不可重複名詞或不定代名詞。","text":"didn't few"}],"hint":"注意「Few」與「A few」在肯定/否定語義上的關鍵區別。","question":"關於「Few of the students passed the exam, _____?」的問句，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"Those 是複數概念，不能使用單數的 it。","text":"isn't it"},{"isCorrect":true,"rationale":"指示代名詞 these/those 在附加問句中應統一變換為 they。","text":"aren't they"},{"isCorrect":false,"rationale":"主要子句是肯定（are），附加問句應為否定（aren't）。","text":"are they"},{"isCorrect":false,"rationale":"附加問句的主詞不可使用指示代名詞 those，必須轉換為人稱代名詞。","text":"aren't those"}],"hint":"複數指示代名詞在問句中要變換成哪一個代名詞？","question":"句子「Those are your books, _____?」的附加問句應為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"整個「That Ruby is over 30」區塊作為動詞 surprises 的主詞。","text":"引導名詞子句作為句子的主詞"},{"isCorrect":false,"rationale":"當名詞子句當主詞時，that 不可省略，此句法完全正確。","text":"這是一個錯誤句子，that 應該省略"},{"isCorrect":false,"rationale":"這裡的 that 是連接詞，引導整個名詞子句。","text":"指示代名詞，意思是「那個」"},{"isCorrect":false,"rationale":"關係代名詞引導的是形容詞子句，而此句是名詞性質的子句。","text":"關係代名詞，用來修飾 Ruby"}],"hint":"觀察 that 引導的這串字在句子中擔任什麼角色。","question":"在名詞子句作為主詞的句子「That Ruby is over 30 surprises us.」中，that 的功能是："},{"answerOptions":[{"isCorrect":false,"rationale":"祈使句的習慣用法不涉及 do/does 助動詞。","text":"don't you"},{"isCorrect":false,"rationale":"這不是以 Let's 開頭的句子，故不適用 shall we。","text":"shall we"},{"isCorrect":false,"rationale":"雖然 will you 用於祈使句，但針對吃喝邀請，講義有更具建議性的選項。","text":"will you"},{"isCorrect":true,"rationale":"根據講義特殊句型 5-(4) 及其下方的備註，表示邀請吃喝時，附加問句用 won't you 以示禮貌或熱情。","text":"won't you"}],"hint":"尋找講義中關於「邀請吃喝」的特殊附加問句規則。","question":"「Go for a drink, _____?」這是一個表達邀請（Invitation）的句子，其附加問句為："},{"answerOptions":[{"isCorrect":false,"rationale":"回答應根據事實本身，而非問句的形式。","text":"必須根據問句的肯否定來回答"},{"isCorrect":false,"rationale":"簡答時通常會使用代名詞以保持簡潔。","text":"回答時不需要使用代名詞"},{"isCorrect":false,"rationale":"這是常見的誤解，在英文中 Yes 永遠代表肯定的事實。","text":"若問句是否定，回答 Yes 代表「不」"},{"isCorrect":true,"rationale":"講義重點補充第 2 點提到，附加問句的回答跟普通問句「相同」，事實是肯定的就說 Yes，否定的就說 No。","text":"回答方式與普通疑問句相同"}],"hint":"英文的 Yes/No 回答邏輯是否會隨問句形式改變？","question":"對於附加問句的回答，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"動詞需配合時態與人稱進行變化。","text":"be"},{"isCorrect":true,"rationale":"water 是不可數名詞，a little 用於不可數，主詞性質為單數。","text":"is"},{"isCorrect":false,"rationale":"不可數名詞的代名詞不可接複數動詞。","text":"are"},{"isCorrect":false,"rationale":"am 僅能搭配第一人稱單數主詞 I。","text":"am"}],"hint":"a little 修飾的是可數還是不可數名詞？","question":"「A little of the water _____ dirty.」應選擇哪一個動詞？"},{"answerOptions":[{"isCorrect":false,"rationale":"時態取決於發生的時間點，並非固定為現在式。","text":"永遠只能使用現在式"},{"isCorrect":true,"rationale":"根據講義 IMG_20260623_185744 的最後一項重點，兩邊的時態應保持「相同」。","text":"必須與主要子句時態相同"},{"isCorrect":false,"rationale":"這取決於事情發生的時間，重點在於前後一致性。","text":"一定要使用過去式"},{"isCorrect":false,"rationale":"這並非完成式的規則，講義強調的是相同時態原則。","text":"從屬子句時態必須比主要子句早一格"}],"hint":"查看講義中關於連接子句時態的筆記。","question":"下列關於「although」子句時態的規則，何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"講義重點觀念第 2 點明確要求：附加問句中的動詞若為否定，一定要「縮寫」。","text":"必須使用縮寫形式，如 don't"},{"isCorrect":false,"rationale":"當主要子句是肯定時，附加問句就必須包含否定項。","text":"不需要與 not 結合"},{"isCorrect":false,"rationale":"在語法規範中，附加問句的否定項固定要求縮寫。","text":"視說話者的正式程度而定"},{"isCorrect":false,"rationale":"附加問句的否定形式必須縮寫。","text":"可以分開寫成兩字，如 do not"}],"hint":"尋找講義中關於否定助動詞格式的規定。","question":"附加問句中，助動詞與 not 的結合必須如何呈現？"},{"answerOptions":[{"isCorrect":false,"rationale":"由於句子已經是否定（Never），附加問句應使用肯定式。","text":"won't you"},{"isCorrect":false,"rationale":"附加問句需包含助動詞 will。","text":"be you"},{"isCorrect":false,"rationale":"祈使句不使用 do 助動詞作為問句結尾。","text":"don't you"},{"isCorrect":true,"rationale":"根據講義特殊句型標註，否定祈使句 Never be late... 的附加問句為 will you。","text":"will you"}],"hint":"否定命令句的結尾通常是肯定的請求。","question":"「Never be late, _____?」這個句子的正確附加問句是："},{"answerOptions":[{"isCorrect":false,"rationale":"雖然這是疑問句，但通常針對底線部分提問會使用疑問詞 How many。","text":"Are some of the Taiwanese students great?"},{"isCorrect":false,"rationale":"學生是可數的，不能使用 How much。","text":"How much of the Taiwanese students are great?"},{"isCorrect":true,"rationale":"Taiwanese students 是複數可數名詞，詢問數量使用 How many，動詞配合複數用 are。","text":"How many of the Taiwanese students are great?"},{"isCorrect":false,"rationale":"How many 之後必須接複數名詞範圍。","text":"How many of the Taiwanese student is great?"}],"hint":"參考講義中針對數量不定代名詞造句的問句法。","question":"「Some of the Taiwanese students are great.」改為問句應為："},{"answerOptions":[{"isCorrect":false,"rationale":"It is a common mistake to use a plural verb because of the word 'workers', but the true subject 'each' is singular.","text":"wear"},{"isCorrect":false,"rationale":"A present participle cannot function as the main verb of a sentence without an accompanying auxiliary verb.","text":"wearing"},{"isCorrect":false,"rationale":"An infinitive cannot act as the finite verb needed to complete the predicate of the sentence.","text":"to wear"},{"isCorrect":true,"rationale":"The word 'each' focuses on individuals within a group, requiring a singular verb regardless of the plural noun following it.","text":"wears"}],"hint":"注意主詞核心字是 'each' 而非 'workers'。","question":"Each of the workers in this factory ________ a special uniform."},{"answerOptions":[{"isCorrect":false,"rationale":"This form is exclusively used with the first-person singular subject 'I'.","text":"am"},{"isCorrect":false,"rationale":"Although 'bottles' is plural, the quantity refers to the uncountable 'water' within them, which takes a singular verb.","text":"are"},{"isCorrect":true,"rationale":"When 'some of' refers to an uncountable noun like 'water', the verb must remain in the singular form.","text":"is"},{"isCorrect":false,"rationale":"The base form of the verb cannot be used here without a modal verb or as part of a specific grammatical structure.","text":"be"}],"hint":"判斷 'water' 是可數還是不可數名詞。","question":"Some of the water in the bottles ________ not safe to drink."},{"answerOptions":[{"isCorrect":false,"rationale":"This phrase is used to ask about duration of time or physical length, not the volume of a material.","text":"How long"},{"isCorrect":true,"rationale":"Since 'trash' is an uncountable noun, the question word used to ask about its quantity must be 'how much'.","text":"How much"},{"isCorrect":false,"rationale":"'How many' is used for plural countable nouns, but 'trash' is considered uncountable in English.","text":"How many"},{"isCorrect":false,"rationale":"This phrase asks about frequency rather than the amount or quantity of a substance.","text":"How often"}],"hint":"根據不可數名詞 'trash' 選擇正確的疑問詞。","question":"A: ________ of the trash was cleaned up?\nB: About half of it."},{"answerOptions":[{"isCorrect":false,"rationale":"Using 'but' together with 'although' is a common grammatical error influenced by Chinese sentence patterns.","text":"but"},{"isCorrect":true,"rationale":"In English, 'although' and 'but' cannot be used in the same sentence to express contrast; only one is needed.","text":"(Leave Blank)"},{"isCorrect":false,"rationale":"'And' is used for addition or sequence, which contradicts the contrast established by 'although'.","text":"and"},{"isCorrect":false,"rationale":"'So' indicates a result or consequence, but 'although' requires the main clause to show a contrasting fact.","text":"so"}],"hint":"英文中「雖然」與「但是」不能同時出現在同一個句子裡。","question":"Although the movie was very long, ________ I enjoyed it very much."},{"answerOptions":[{"isCorrect":false,"rationale":"'Despite' is a preposition and must be followed by a noun or gerund, not placed at the end of a sentence.","text":"despite"},{"isCorrect":false,"rationale":"Unlike 'though', 'although' is strictly a conjunction and cannot be used as an adverb at the end of a clause.","text":"although"},{"isCorrect":false,"rationale":"This phrase is used as a subordinating conjunction to introduce a clause, not as a sentence-final adverb.","text":"even though"},{"isCorrect":true,"rationale":"'Though' can function as an adverb meaning 'however' when placed at the end of a sentence.","text":"though"}],"hint":"找一個可以用在句尾當作「然而」或「不過」的副詞。","question":"It was a very difficult test; he passed it, ________."},{"answerOptions":[{"isCorrect":true,"rationale":"The main clause is affirmative and uses 'has' as an auxiliary, so the tag must be negative and use the same auxiliary with a pronoun.","text":"hasn't she"},{"isCorrect":false,"rationale":"Since 'has' is functioning as an auxiliary verb for the present perfect tense here, 'does' should not be used in the tag.","text":"doesn't she"},{"isCorrect":false,"rationale":"An affirmative main clause requires a negative tag question to correctly seek confirmation.","text":"has she"},{"isCorrect":false,"rationale":"The tag question must match the auxiliary verb of the main clause, which is 'has' in this case, not 'is'.","text":"isn't she"}],"hint":"主要子句是肯定句且使用現在完成式，附加問句應如何變化？","question":"Your sister has already finished her homework, ________?"},{"answerOptions":[{"isCorrect":false,"rationale":"Indefinite pronouns ending in '-thing' are treated as singular, so 'they' is the incorrect pronoun to use.","text":"are they"},{"isCorrect":true,"rationale":"'Nothing' provides a negative meaning to the main clause, so the tag question must be affirmative, and 'it' is the pronoun for '~thing' subjects.","text":"is it"},{"isCorrect":false,"rationale":"Tag questions must always use a pronoun (like 'it') rather than repeating the subject word.","text":"is nothing"},{"isCorrect":false,"rationale":"Using a negative tag with a negative subject like 'nothing' would create an incorrect double negative.","text":"isn't it"}],"hint":"注意 'nothing' 是否定詞，且其代名詞應為單數。","question":"Nothing is impossible for him, ________?"},{"answerOptions":[{"isCorrect":false,"rationale":"The main verb 'likes' is a general verb, so the tag must use the auxiliary 'do/does/did' rather than the 'be' verb.","text":"aren't they"},{"isCorrect":false,"rationale":"While 'everyone' takes a singular verb, the standard pronoun used in tag questions for people-based indefinite pronouns is 'they'.","text":"doesn't he"},{"isCorrect":false,"rationale":"This is grammatically incorrect as 'he' cannot be paired with the plural auxiliary 'don't'.","text":"don't he"},{"isCorrect":true,"rationale":"Indefinite pronouns ending in '-one' or '-body' are replaced by 'they' in tag questions, and a negative auxiliary is needed for the affirmative verb 'likes'.","text":"don't they"}],"hint":"指代人的不定代名詞（如 everyone）在附加問句中應使用哪個代名詞？","question":"Everyone in the class likes the new teacher, ________?"},{"answerOptions":[{"isCorrect":false,"rationale":"'Will you' is used for general imperatives or requests, but 'Let's' specifically requires 'shall we'.","text":"will you"},{"isCorrect":true,"rationale":"Tag questions for suggestions starting with 'Let's' (let us) always use 'shall we' to express the collective proposal.","text":"shall we"},{"isCorrect":false,"rationale":"This tag is typically used for invitations or offerings, not for collective suggestions starting with 'Let's'.","text":"won't you"},{"isCorrect":false,"rationale":"The auxiliary 'do' is not used for tag questions following 'Let's' structures.","text":"do we"}],"hint":"以 'Let's' 開頭的祈使句有其固定的附加問句形式。","question":"Let's go to the night market tonight, ________?"},{"answerOptions":[{"isCorrect":true,"rationale":"When an imperative sentence functions as an invitation or a polite offer, 'won't you' is used to make the tag question.","text":"won't you"},{"isCorrect":false,"rationale":"'Shall we' is reserved for suggestions including the speaker ('Let's'), which is not the case for this direct invitation.","text":"shall we"},{"isCorrect":false,"rationale":"While 'can you' asks about ability, 'won't you' is the conventional way to finish a polite invitation.","text":"can you"},{"isCorrect":false,"rationale":"Tag questions for imperatives do not use 'do' or 'don't' based on the verb in the same way regular statements do.","text":"don't you"}],"hint":"這是一個邀請吃喝的祈使句，應使用哪種附加問句？","question":"Have a cup of tea, ________?"},{"answerOptions":[{"isCorrect":true,"rationale":"'That' introduces a noun clause that serves as the subject of the sentence, and it cannot be omitted in this position.","text":"That"},{"isCorrect":false,"rationale":"'Whether' suggests doubt (yes or no), which conflicts with the concluding phrase 'is very clear'.","text":"Whether"},{"isCorrect":false,"rationale":"'What' would imply the object of the verb 'told' is missing, but 'a lie' already completes the meaning within the clause.","text":"What"},{"isCorrect":false,"rationale":"'Which' is used for choosing between options and does not correctly introduce a factual statement as a subject clause.","text":"Which"}],"hint":"這個子句在句中當作主詞，且後方子句結構完整。","question":"________ the boy told a lie is very clear."},{"answerOptions":[{"isCorrect":false,"rationale":"The sentence already has a subject 'Ruby', so 'who' cannot be used to introduce this complete factual clause.","text":"who"},{"isCorrect":false,"rationale":"While 'because' explains a reason, the structure 'surprised that' is the standard way to introduce the content of the surprise.","text":"because"},{"isCorrect":true,"rationale":"'That' introduces a noun clause acting as an adjective complement, explaining the reason for being surprised.","text":"that"},{"isCorrect":false,"rationale":"'If' would express uncertainty, which does not fit the context of expressing surprise at a known fact.","text":"if"}],"hint":"此處需要一個連接詞來引導補充說明的名詞子句。","question":"I am surprised ________ Ruby can speak five languages."},{"answerOptions":[{"isCorrect":true,"rationale":"'one of' 後接複數名詞，其核心主語是 'one'，因此動詞須用單數 'is'。","text":"One of the apples is rotten."},{"isCorrect":false,"rationale":"'every' 不能直接接 'of'，應使用 'every one of' 或直接接單數名詞。","text":"Every of the students likes music."},{"isCorrect":false,"rationale":"根據教材，'each of' 後面接複數名詞，但動詞必須使用單數形式。","text":"Each of the boys are smart."},{"isCorrect":false,"rationale":"'many' 只能修飾可數名詞，不可數名詞如 'water' 應使用 'much'。","text":"Many of the water is cold."}],"hint":"注意 quantifier 與其後方名詞的可數性，以及動詞的單複數一致性。","question":"下列哪一個句子關於數量不定代名詞的用法是正確的？"},{"answerOptions":[{"isCorrect":true,"rationale":"'both of' 用於指稱兩者皆是，且後方動詞需用複數型態。","text":"Both of the men are doctors."},{"isCorrect":false,"rationale":"'both of' 表示複數主語，動詞不應使用單數型態 'is'。","text":"Both of the men is a doctor."},{"isCorrect":false,"rationale":"'all' 通常用於指稱三個或三個以上的人事物。","text":"All of the men are doctors."},{"isCorrect":false,"rationale":"'two of' 隱含範圍超過兩個，若強調「這兩個人」，使用 'both' 更精確。","text":"Two of the men are doctors."}],"hint":"區分「兩者都」與「兩個人」在語意上的精確範圍差異。","question":"「這兩個人都是醫生。」這句話最適合的英文表達是？"},{"answerOptions":[{"isCorrect":false,"rationale":"'were' 是複數過去式，與不可數名詞主語不匹配。","text":"were"},{"isCorrect":false,"rationale":"'news' 是不可數名詞，'much of' 修飾不可數名詞時，動詞應為單數。","text":"are"},{"isCorrect":false,"rationale":"一般陳述句中應根據主語進行動詞變化，不能直接使用動詞原形。","text":"be"},{"isCorrect":true,"rationale":"不可數名詞對應的部分（much/part/little）在句子中視為單數主語。","text":"is"}],"hint":"判斷 'news' 是否為可數名詞，進而決定 'much of' 後的動詞變化。","question":"選出正確的動詞形式：Much of the news ____ surprising."},{"answerOptions":[{"isCorrect":false,"rationale":"使用對等連接詞 'but' 連接兩個獨立子句是正確的。","text":"Ruby is short, but she is good at playing basketball."},{"isCorrect":false,"rationale":"將從屬子句放在主要子句後方是正確的，且通常不加逗號。","text":"Ruby is good at playing basketball although she is short."},{"isCorrect":true,"rationale":"教材明確指出 'although' 與 'but' 不能在同一個句子中同時出現。","text":"Although Ruby is short, but she is good at playing basketball."},{"isCorrect":false,"rationale":"這符合 $Although + S + V, S + V$ 的標準句型。","text":"Although Ruby is short, she is good at playing basketball."}],"hint":"注意讓步連接詞與對等連接詞是否可以並存於英文句子中。","question":"「雖然 Ruby 很矮，但她很擅長打籃球。」這句英文哪種寫法是錯的？"},{"answerOptions":[{"isCorrect":true,"rationale":"這裡的 though 作為副詞使用，置於句尾是正確的非正式用法。","text":"It was hard; she tried her best though."},{"isCorrect":false,"rationale":"加強語氣應使用 'even though'，'even although' 在語法上是不通的。","text":"even although 是常見的加強語氣用法。"},{"isCorrect":false,"rationale":"根據講義內容，although 比較正式，though 比較口語。","text":"though 比 although 更正式。"},{"isCorrect":false,"rationale":"教材指出 though 可以放在句尾當副詞使用，表示「但是、不過」。","text":"though 只能放在句首引導子句。"}],"hint":"回憶講義中關於 though 作為副詞的位置以及與 although 的正式度比較。","question":"關於 though 的用法，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"代名詞 'it' 應搭配單數動詞 'is/isn't'。","text":"aren't it"},{"isCorrect":false,"rationale":"'everything' 在附加問句中應轉為 'it' 而非 'they'。","text":"aren't they"},{"isCorrect":true,"rationale":"主語為不定代名詞 '~thing' 時，附加問句的代名詞要用 'it'。","text":"isn't it"},{"isCorrect":false,"rationale":"主要子句是肯定的，附加問句必須用否定形式。","text":"is it"}],"hint":"考慮不定代名詞在附加問句中對應的代名詞，以及肯定/否定配對原則。","question":"請選出正確的附加問句：Everything is ready, ____?"},{"answerOptions":[{"isCorrect":false,"rationale":"'no one' 具有否定意涵，因此附加問句應使用肯定形式。","text":"don't they"},{"isCorrect":true,"rationale":"'no one' 是否定詞，且指代人時在附加問句中需用 'they' 作為代名詞。","text":"do they"},{"isCorrect":false,"rationale":"'no one' 指人，不應使用 'it'，且應為肯定問句。","text":"doesn't it"},{"isCorrect":false,"rationale":"不定代名詞指代人時，附加問句慣例上使用 'they' 而非 'he'。","text":"does he"}],"hint":"注意 negative words (如 no one, never) 會影響附加問句的肯定或否定屬性。","question":"請選出正確的附加問句：No one knows the truth, ____?"},{"answerOptions":[{"isCorrect":false,"rationale":"'do we' 並非 'Let's' 祈使句的正確附加問句型態。","text":"Let's have lunch, do we?"},{"isCorrect":false,"rationale":"'won't you' 通常用於邀請對方的祈使句，而非包含自己的 'Let's' 句型。","text":"Let's have lunch, won't you?"},{"isCorrect":false,"rationale":"'Let's' 引導的祈使句，其附加問句固定搭配為 'shall we'。","text":"Let's have lunch, will you?"},{"isCorrect":true,"rationale":"根據教材，'Let's' 的附加問句應使用 'shall we' 來表達提議。","text":"Let's have lunch, shall we?"}],"hint":"回憶講義中對於 'Let's' 這種特殊祈使句所規定的附加問句形式。","question":"「讓我們去吃午餐吧，好嗎？」最適當的英文翻譯為："},{"answerOptions":[{"isCorrect":true,"rationale":"'that he lied' 用來解釋並補充說明抽象名詞 'The fact' 的內容。","text":"The fact that he lied is clear."},{"isCorrect":false,"rationale":"這裡的 'that' 子句是動詞 'hope' 的受詞。","text":"I hope that you can come."},{"isCorrect":false,"rationale":"這個 'that' 子句放在句首作為整句的主詞。","text":"That he is rich is known to all."},{"isCorrect":false,"rationale":"這個 'that' 子句放在 be 動詞之後，作為主詞補語。","text":"The problem is that we have no money."}],"hint":"找尋位於名詞之後，且功能為詳細說明該名詞具體內容的子句。","question":"下列哪一個 'that' 引導的子句是作為「同位語」？"},{"answerOptions":[{"isCorrect":false,"rationale":"教材指出補語及受詞時的 'that' 傾向於可以省略。","text":"當 that 子句作為主詞補語時，that 通常可以省略。"},{"isCorrect":false,"rationale":"此選項敘述錯誤，同位語的 'that' 通常不建議省略以維持文意清晰。","text":"當 that 子句作為同位語時，that 可以隨意省略。"},{"isCorrect":false,"rationale":"這是正確的規則，例如 'I think (that) he is right.'。","text":"當 that 子句作為動詞的受詞時，that 通常可以省略。"},{"isCorrect":true,"rationale":"若將 'that' 子句置於句首作主詞，'that' 必須保留以標示子句的開始。","text":"當 that 子句作為主詞時，that 絕對不能省略。"}],"hint":"回憶講義最後一頁底部關於 'that' 省略時機的筆記。","question":"關於名詞子句中 'that' 的省略，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"祈使句的附加問句應使用助動詞 'will' 而非 be 動詞。","text":"Don't be late, are you?"},{"isCorrect":false,"rationale":"'shall we' 僅用於 'Let's' 開頭的句子。","text":"Don't be late, shall we?"},{"isCorrect":true,"rationale":"否定祈使句（Don't...）的附加問句固定使用 'will you'。","text":"Don't be late, will you?"},{"isCorrect":false,"rationale":"否定祈使句不適合搭配 'won't you'，後者多用於肯定的邀請。","text":"Don't be late, won't you?"}],"hint":"注意教材中針對否定祈使句所列出的特定附加問句。 ","question":"「別遲到了，好嗎？」最適當的附加問句是："},{"answerOptions":[{"isCorrect":false,"rationale":"'Most' 既可以接可數名詞（複數），也可以接不可數名詞。","text":"Most"},{"isCorrect":false,"rationale":"'All' 可修飾可數複數名詞或不可數名詞。","text":"All"},{"isCorrect":false,"rationale":"'Some' 具備通用性，可接可數複數或不可數名詞。","text":"Some"},{"isCorrect":true,"rationale":"根據教材，'several' 屬於只能接複數可數名詞的類別。","text":"Several"}],"hint":"從講義表格中尋找「只能接可數(複數)名詞」的特定清單。","question":"下列哪個 quantifier 之後只能接可數名詞的複數形式？"},{"answerOptions":[{"isCorrect":true,"rationale":"'a little' 用於修飾不可數名詞，符合文法結構。","text":"A little"},{"isCorrect":false,"rationale":"'money' 是不可數名詞，不能與 'many' 連用。","text":"Many"},{"isCorrect":false,"rationale":"'several' 用於複數可數名詞，不適用於 'money'。","text":"Several"},{"isCorrect":false,"rationale":"'few' 僅能與複數可數名詞連用。","text":"Few"}],"hint":"確認名詞 'money' 的性質，並選擇對應的數量不定代名詞。","question":"句子：____ of the money was stolen. (選出最適當者)"},{"answerOptions":[{"isCorrect":false,"rationale":"改寫後語意改變了，原句是他「不舒服」但還是去了。","text":"Jack went to school although he felt well."},{"isCorrect":false,"rationale":"'because' 表示因果，而原句是表示讓步/對比（儘管...還是...）。","text":"Because Jack didn't feel well, he still went to school."},{"isCorrect":false,"rationale":"'although' 與 'but' 再次重複使用，這是常見的錯誤。","text":"Although Jack didn't feel well, but he still went to school."},{"isCorrect":true,"rationale":"這展示了將從屬連詞 'although' 改為對等連詞 'but' 的正確轉換方式。","text":"Jack didn't feel well, but he still went to school."}],"hint":"尋找文意相同且連接詞使用正確（不重複使用 but）的選項。","question":"「Although Jack didn't feel well, he still went to school.」這句話可以改寫為？"},{"answerOptions":[{"isCorrect":false,"rationale":"原句中沒有 be 動詞，不能在附加問句中使用 'isn't'。","text":"isn't he"},{"isCorrect":false,"rationale":"原句時態是現在式，附加問句應保持一致，而非未來式。","text":"won't he"},{"isCorrect":true,"rationale":"'has to' 是一般動詞用法，第三人稱單數肯定句對應的附加問句為 'doesn't he'。","text":"doesn't he"},{"isCorrect":false,"rationale":"當 'has to' 作為一般動詞（必須）時，應使用助動詞 'do/does'。","text":"hasn't he"}],"hint":"注意 'has to' 的動詞性質，它並非像 'has + p.p.' 中的助動詞。","question":"附加問句練習：He has to study hard, ____?"},{"answerOptions":[{"isCorrect":false,"rationale":"這裡的名詞子句是動詞 'think' 的受詞。","text":"I think that Ruby is over 30."},{"isCorrect":true,"rationale":"'That Ruby is over 30' 是一整個名詞子句，作為主要動詞 surprises 的主詞。","text":"That Ruby is over 30 surprises us."},{"isCorrect":false,"rationale":"雖然意義相同，但此句的主詞是虛主詞 'It'，子句是真主詞（後置）。","text":"It surprises us that Ruby is over 30."},{"isCorrect":false,"rationale":"這裡的名詞子句是主詞補語。","text":"The news is that Ruby is over 30."}],"hint":"尋找直接置於動詞之前且充當動作發出者的整個 'that' 子句。","question":"關於「名詞子句作為主詞」的例子，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"依照文法規範，指代不明性別的 '~one' 應使用 'they'。","text":"didn't he"},{"isCorrect":false,"rationale":"原句動詞 'stole' 是過去式，助動詞也必須是過去式。","text":"doesn't he"},{"isCorrect":false,"rationale":"主要子句是肯定的，附加問句必須用否定。","text":"did they"},{"isCorrect":true,"rationale":"不定代名詞 '~one' 在附加問句中應轉化為 'they'，且過去式肯定動詞對應 'didn't'。","text":"didn't they"}],"hint":"回憶教材中對於指稱「人」的不定代名詞（someone, everyone）在附加問句中的代換規則。","question":"選出正確的代名詞：Someone stole my bike, ____?"},{"answerOptions":[{"isCorrect":true,"rationale":"教材指出，祈使句若表「邀請吃喝」，附加問句常用 'won't you' 表示客氣。","text":"Go for a drink, won't you?"},{"isCorrect":false,"rationale":"'shall we' 用於 'Let's' 開頭的建議。","text":"Go for a drink, shall we?"},{"isCorrect":false,"rationale":"雖然文法通，但教材強調「邀約吃喝」時 'won't you' 是更精確的標註用法。","text":"Go for a drink, will you?"},{"isCorrect":false,"rationale":"祈使句的附加問句習慣使用助動詞 'will' 的變化型。","text":"Go for a drink, don't you?"}],"hint":"在祈使句的特殊用法中，區分「命令」與「邀請」對應的附加問句差異。","question":"「喝杯飲料吧，好嗎？」(表達邀請) 最合適的寫法是："},{"answerOptions":[{"isCorrect":false,"rationale":"'cookies' 是複數，'most of' 後應接複數動詞 'were'。","text":"Most of the cookies was eaten."},{"isCorrect":false,"rationale":"'Some' 修飾複數可數名詞時，動詞應為複數 'are'。","text":"Some of the students is great."},{"isCorrect":false,"rationale":"'All' 修飾不可數名詞 'milk' 時，動詞應為單數 'is'。","text":"All of the milk are fresh."},{"isCorrect":true,"rationale":"'Half of' 後接單數/不可數名詞時，動詞使用單數，這是正確的。","text":"Half of the cake is gone."}],"hint":"檢視講義中第三類 quantifier (any/some/all/most/half) 的動詞變化規則。","question":"下列哪組 quantifier 的動詞一致性完全正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"'seldom'、'never'、'hardly' 等否定副詞會使句子視為否定，故附加問句需用肯定。","text":"肯定形式"},{"isCorrect":false,"rationale":"否定副詞在附加問句規則中是非常明確的一個考點。","text":"以上皆非"},{"isCorrect":false,"rationale":"因為主要子句已含有否定意義的 'seldom'，附加問句不能再用否定。","text":"否定形式"},{"isCorrect":false,"rationale":"副詞的意義會直接決定附加問句的正負極性。","text":"不影響形式"}],"hint":"回憶講義中關於否定詞 (never, few, little, seldom) 的小字註解。","question":"附加問句中，若主要子句含有 'seldom'，問句部分應為："},{"answerOptions":[{"isCorrect":false,"rationale":"bought 確實是過去式，這點沒有錯。","text":"bought 應該用過去式。"},{"isCorrect":false,"rationale":"although 後面接的是完整的 $S+V$ 結構（it was expensive），形容詞放補語位置沒錯。","text":"expensive 是形容詞，不能放在 although 後面。"},{"isCorrect":false,"rationale":"這句話違反了連接詞的使用規範。","text":"這句話完全正確。"},{"isCorrect":true,"rationale":"英文邏輯中，從屬連接詞與對等連接詞在一句話中只能擇一使用。","text":"although 和 but 重複使用。"}],"hint":"找出中文語法與英文語法在「雖然...但是...」結構上的核心差異。","question":"「Although it was expensive, but I bought it.」這句話的問題在於："},{"answerOptions":[{"isCorrect":false,"rationale":"此選項語意不明確。even though 的用法類似 although，但語氣更強。","text":"它可以放在雖然 Ruby 面前，像是 although 一樣。"},{"isCorrect":false,"rationale":"教材未提及此限制，它主要功能是作為加強語氣的讓步連接詞。","text":"even though 只能引導真實發生的事。"},{"isCorrect":true,"rationale":"教材明確指出 though 前可以加 even 加強語氣，但 although 不行。","text":"even though 是正確的，但 even although 並不存在。"},{"isCorrect":false,"rationale":"教材中並未特別區分 even though 的正式度，僅強調其強化的語氣。","text":"even though 比較不正式。"}],"hint":"注意講義中提到 'even' 可以加在哪一個字前面，哪一個字則不行。","question":"關於 even though 的說法何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"在時態確立的敘述句中需使用變化的 be 動詞（is/are）。","text":"be"},{"isCorrect":false,"rationale":"'am' 僅能搭配第一人稱單數 'I'。","text":"am"},{"isCorrect":true,"rationale":"'One of...' 的主語是 'One'，不論後面名詞多長，動詞皆為單數。","text":"is"},{"isCorrect":false,"rationale":"容易被前面的 'singers' 誤導，但真正的核心主語是單數的 'One'。","text":"are"}],"hint":"在長主語結構中尋找「真正的核心主詞」來決定動詞。","question":"「One of the most famous singers in the USA ____ Taylor Swift.」"},{"answerOptions":[{"isCorrect":false,"rationale":"補語通常位於 be 動詞之後用來補充說明主詞。","text":"補語"},{"isCorrect":false,"rationale":"前方沒有被補充說明的抽象名詞。","text":"同位語"},{"isCorrect":false,"rationale":"它不在動詞之後，因此不是受詞。","text":"受詞"},{"isCorrect":true,"rationale":"子句位於整句的最前端，並作為後方動詞 'is' 的發出者。","text":"主詞"}],"hint":"判斷子句在整體句子結構中所扮演的角色。","question":"「That he is a genius is true.」句子中的 that 子句是什麼位置？"},{"answerOptions":[{"isCorrect":false,"rationale":"原句已有 be 動詞，不應借用助動詞 'do'。","text":"don't you"},{"isCorrect":false,"rationale":"違反了「前肯後否」的原則。","text":"are you"},{"isCorrect":false,"rationale":"be 動詞與代名詞 'you' 的配合應為 'are/aren't'。","text":"isn't you"},{"isCorrect":true,"rationale":"肯定句配上否定附加問句，且原句有 be 動詞，附加問句也要用 be 動詞。","text":"aren't you"}],"hint":"這是附加問句最基礎的「肯否定互換」與「動詞對應」規則。","question":"請選出正確的附加問句：You are a student, ____?"},{"answerOptions":[{"isCorrect":false,"rationale":"祈使句的附加問句不會使用 'don't you'。","text":"don't you"},{"isCorrect":false,"rationale":"祈使句動詞變化不涉及 be 動詞問句形式。","text":"are you"},{"isCorrect":true,"rationale":"祈使句表命令或請求時，附加問句通常使用 'will you'。","text":"will you"},{"isCorrect":false,"rationale":"'shall we' 是提議，而非對他人的請求。","text":"shall we"}],"hint":"回憶講義中對於普通祈使句（命令、請求）所建議的附加問句。","question":"「Open the window, ____?」(表達命令/請求)"},{"answerOptions":[{"isCorrect":false,"rationale":"兩者都是指稱複數，皆應接複數動詞。","text":"both of 接單數動詞；two of 接複數動詞。"},{"isCorrect":false,"rationale":"講義強調的是數量範圍的差異，而非正式度的區別。","text":"two of 比較正式。"},{"isCorrect":true,"rationale":"根據講義，'both of' 強調全部就兩個，'two of' 則是從多個中選出兩個。","text":"both of 指範圍中只有兩個；two of 指範圍中超過兩個中的兩個。"},{"isCorrect":false,"rationale":"教材明確指出兩者在總數範圍上有細微差異。","text":"兩者完全沒有差別。"}],"hint":"注意講義中關於範圍 (只有兩個 vs. 超過兩個) 的手寫筆記。","question":"關於 both of 和 two of 的區別，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"原句動詞為 'looks' 而非 be 動詞，不能直接用 'isn't'。","text":"isn't she"},{"isCorrect":false,"rationale":"主詞為單數 teacher，助動詞應使用 'doesn't' 而非 'don't'。","text":"don't she"},{"isCorrect":false,"rationale":"附加問句的主詞必須使用代名詞（she/he），不能重複名詞。","text":"does my teacher"},{"isCorrect":true,"rationale":"'looks' 是一般動詞，且主詞為第三人稱單數，須借用助動詞 'does'。","text":"doesn't she"}],"hint":"檢查原句是否含有 be 動詞，若無，則需使用合適的助動詞並更換為主詞代名詞。","question":"附加問句：My English teacher looks young, ____?"},{"answerOptions":[{"isCorrect":false,"rationale":"它位於形容詞之後，而非抽象名詞之後。","text":"同位語"},{"isCorrect":false,"rationale":"'happy' 是形容詞而非動詞，因此不是其受詞。","text":"動詞受詞"},{"isCorrect":false,"rationale":"句子開頭已有主詞 'We'。","text":"主詞"},{"isCorrect":true,"rationale":"子句接在形容詞 'happy' 之後，用來解釋感到快樂的原因。","text":"形容詞補語"}],"hint":"注意 that 子句出現的位置是否緊跟在一個表示情感的形容詞之後。","question":"「We are happy that summer vacation is coming.」中的子句是？"},{"answerOptions":[{"isCorrect":true,"rationale":"教材用這句話來說明 'that...' 子句作為 'The story' 的同位語位置。","text":"The story that the dog spent 20 years finding its master is touching."},{"isCorrect":false,"rationale":"這裡是名詞子句當主詞。","text":"That the story is touching is a fact."},{"isCorrect":false,"rationale":"這句中的 'that' 是關係代名詞引導的形容詞子句，而非同位語名詞子句。","text":"I like the story that you told me."},{"isCorrect":false,"rationale":"這語法結構不對，同位語應緊跟在所說明的名詞之後。","text":"The story is touching that the dog found its master."}],"hint":"找尋講義中關於 'The story' 被長子句具體化說明的範例。","question":"「這故事真感人。」在講義中作為同位語的例子是："},{"answerOptions":[{"isCorrect":false,"rationale":"在英文語法中，although 與 but 不能同時出稱在同一個複合句中。","text":"Although it was raining, but we still went hiking."},{"isCorrect":false,"rationale":"雖然中文翻譯會說「雖然...但是...」，但英文中 although 和 but 具有排他性，不可並列。","text":"Although Ruby is short, but she is good at basketball."},{"isCorrect":true,"rationale":"though 可以放在句尾作為副詞使用，表示「但是、不過」。","text":"He didn't pass the exam, but he still studied hard though."},{"isCorrect":false,"rationale":"雖然 although 和 though 意思接近，但 even 只能與 though 連用（even though），不能與 although 連用。","text":"Even although he is young, he is very wise."}],"hint":"注意 although 與 but 的使用規則，以及 though 在句尾的特殊功能。","question":"根據教材內容，下列哪一個句子在語法上是完全正確的？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"當主詞是以 'Each of' 開頭時，焦點在於「每一個」，動詞必須使用單數形式。","text":"have"},{"isCorrect":false,"rationale":"動名詞不能單獨作為句子的主要動詞。","text":"having"},{"isCorrect":true,"rationale":"Indefinite pronouns 如 'one' 或 'each' 後接複數名詞時，其動詞仍需維持單數。","text":"has"},{"isCorrect":false,"rationale":"這裡描述的是規定或習慣，且 'are' 是複數動詞，與單數代名詞 'each' 不符。","text":"are having"}],"hint":"找出句中的真正主詞是複數名詞還是不定代名詞。","question":"「Each of the students in my class ____ to wear a uniform.」 根據主詞一致性，空格應填入？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":true,"rationale":"以 -one 或 -body 結尾的不定代名詞，在附加問句中應使用 they 作為代名詞。","text":"Someone/Everybody $\\rightarrow$ it"},{"isCorrect":false,"rationale":"這是正確的，以 -thing 結尾的不定代名詞通常視為單數事物，用 it 代替。","text":"Everything/Nothing $\\rightarrow$ it"},{"isCorrect":false,"rationale":"這是正確的對應，單數指示代名詞在附加問句中應轉換為 it。","text":"This/That $\\rightarrow$ it"},{"isCorrect":false,"rationale":"這是正確的，動名詞當主詞視為「一件事」，因此用 it。","text":"V-ing (動名詞) $\\rightarrow$ it"}],"hint":"回想教材中對於「人」的不定代名詞與「物」的不定代名詞在附加問句中的區別。","question":"關於附加問句的代名詞轉換，下列哪一組對應是**錯誤**的？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"當主要子句包含 few 或 little 時，語意為否定，附加問句不能再用否定式。","text":"didn't they"},{"isCorrect":false,"rationale":"主要子句動詞 'failed' 為過去式，附加問句應使用助動詞 did。","text":"do they"},{"isCorrect":true,"rationale":"few 本身具有否定意味（幾乎沒有），因此主要子句視為否定，附加問句須用肯定形式。","text":"did they"},{"isCorrect":false,"rationale":"主詞 'students' 是複數人稱，應使用 they 而非 it。","text":"did it"}],"hint":"注意 'few' 這個字的否定本質以及主要子句的時態。","question":"請選出正確的附加問句： 「Few of the students failed the test, ____?」","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"教材明確指出在受詞或補語位置時，that 有省略的可能性。","text":"that 在任何位置都不能省略。"},{"isCorrect":false,"rationale":"同位語中的 that 用以連接先行詞與解釋內容，通常不建議省略以維持句意完整。","text":"當 that 子句作為「同位語」時，that 絕對可以省略。"},{"isCorrect":true,"rationale":"在動詞後的受詞位置，that 通常可以省略，例如 I think (that)...。","text":"當 that 子句作為動詞的「受詞」時，that 可以省略。"},{"isCorrect":false,"rationale":"當 that 引導的名詞子句放在句首當主詞時，that 不可省略。","text":"當 that 子句作為句子的「主詞」時，that 可以省略。"}],"hint":"思考 'that' 在句首與句中的重要性差異。","question":"在名詞子句的用法中，關於 'that' 的省略規則，下列敘述何者正確？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"shall we 通常用於肯定建議「Let's...」。","text":"shall we"},{"isCorrect":false,"rationale":"will you 用於一般的祈使句（命令或請求），不適用於 Let's 開頭的句子。","text":"will you"},{"isCorrect":false,"rationale":"won't you 用於表示邀請或提議（如請人吃喝）。","text":"won't you"},{"isCorrect":true,"rationale":"針對否定建議「Let's not...」，附加問句常使用 ok 或 all right。","text":"ok"}],"hint":"區分「Let's」與「Let's not」在語氣與慣用問句上的差異。","question":"「Let's not go to the park, ____?」 根據特殊句型，橫線上應填入？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"這並不符合原句的轉換邏輯。","text":"How many of the famous singers in the USA are singers?"},{"isCorrect":false,"rationale":"How many 後接複數名詞，後面的動詞與主詞應對應，Taylor Swift 是單數人名，語意不通。","text":"How many of the famous singers in the USA is Taylor Swift?"},{"isCorrect":true,"rationale":"根據教材 P.2 練習，問句應改為 How many... are...？以符合數量提問。","text":"How many of the famous singers in the USA are Taylor Swift?"},{"isCorrect":false,"rationale":"教材示例中，詢問數量不定的範圍時使用 How many。","text":"Who of the famous singers in the USA is Taylor Swift?"}],"hint":"參考教材中關於 One of the zebras... 的改寫練習，注意 be 動詞的變化。","question":"「One of the famous singers in the USA is Taylor Swift.」 若要針對畫線部分 (One of the famous singers) 提問，正確問法為何？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"tea 為不可數名詞，其對應的動詞必須是單數形式。","text":"come"},{"isCorrect":false,"rationale":"不定詞不能直接作為限定動詞使用。","text":"to come"},{"isCorrect":false,"rationale":"單獨使用 V-ing 無法構成句子的主要謂語。","text":"coming"},{"isCorrect":true,"rationale":"當 most of 後接不可數名詞時，動詞應使用單數型。","text":"comes"}],"hint":"判斷 'tea' 是可數還是不可數名詞。","question":"「Most of the tea ____ from Taiwan.」 空格應填入哪一個形式？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"both of 指的是「只有兩個」的全部。","text":"both of 用於超過兩個人的範圍中選出兩個。"},{"isCorrect":false,"rationale":"兩者在隱含的母數範圍上有明確的區別。","text":"兩者用法完全相同，可以互換。"},{"isCorrect":true,"rationale":"這是教材中特別註記的數量範圍差異。","text":"both of 指的是「兩者都」，範圍只有兩個；two of 指的是「...中的兩個」，範圍超過兩個。"},{"isCorrect":false,"rationale":"two of 通常隱含範圍內超過兩個，而從中取出兩個。","text":"two of 用於只有兩個人時。"}],"hint":"思考「兩者都」與「其中兩個」在母體總數上的邏輯區別。","question":"關於 「both of」 與 「two of」 的差別，下列敘述何者正確？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"Which 引導的是疑問詞名詞子句，用於選擇；此處應為陳述一項事實。","text":"Which"},{"isCorrect":false,"rationale":"what 引導的名詞子句通常在子句中擔任受詞或主詞成分，而子句 'the story is interesting' 已經語意完整。","text":"What"},{"isCorrect":false,"rationale":"if 引導主詞子句時通常會放在虛主詞 It 的結構中，不直接放在句首。","text":"If"},{"isCorrect":true,"rationale":"that 在此處引導一個名詞子句作為全句的主詞，表示「那件事」。","text":"That"}],"hint":"這是一個名詞子句當主詞的用法，子句本身語意完整且為陳述事實。","question":"「____ the story is interesting is known to all.」 空格處填入何者最恰當？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":true,"rationale":"肯定祈使句表示命令或請求時，附加問句慣用 will you。","text":"will you"},{"isCorrect":false,"rationale":"shall we 僅用於 Let's 引導的建議句。","text":"shall we"},{"isCorrect":false,"rationale":"附加問句應對應祈使句隱含的主詞 you 及語氣助動詞。","text":"do you"},{"isCorrect":false,"rationale":"祈使句的附加問句通常不使用 don't you。","text":"don't you"}],"hint":"回想教材中關於祈使句（表命令、請求、建議）的對應規則。","question":"「Open the window, ____?」 根據語氣，下列哪一個附加問句最適合作為「命令或請求」？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"原形動詞 be 不能直接作為限定動詞。","text":"be"},{"isCorrect":false,"rationale":"meat 為不可數名詞，much of 所修飾的範圍也是不可數，應接單數動詞。","text":"are"},{"isCorrect":false,"rationale":"were 是複數過去式，與主詞的單數性質不符。","text":"were"},{"isCorrect":true,"rationale":"不可數名詞（meat）的部分（much of）在文法上視為單數。","text":"is"}],"hint":"判斷肉類（meat）在文法上的數量性質。","question":"「Much of the meat ____ pork.」 橫線上應填入？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"both 指的是兩者，動詞必須使用複數。","text":"is; isn't he"},{"isCorrect":false,"rationale":"附加問句的代名詞必須與主詞（them $\\rightarrow$ they）一致。","text":"are; aren't he"},{"isCorrect":false,"rationale":"主詞動詞不一致。","text":"is; aren't they"},{"isCorrect":true,"rationale":"both 修飾複數代名詞 them，動詞用 are，附加問句也應採用對應的複數否定形式。","text":"are; aren't they"}],"hint":"確認 'both' 所要求的動詞數數形式，並確保附加問句的主格代名詞正確。","question":"「Both of them ____ doctors, ____?」 橫線上依序應填入？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":true,"rationale":"位於 be 動詞之後的名詞子句，擔任補足說明主詞的角色，稱為主詞補語。","text":"補語"},{"isCorrect":false,"rationale":"受詞通常位於一般及物動詞之後，而非 be 動詞。","text":"受詞"},{"isCorrect":false,"rationale":"子句出現在 be 動詞後面，用來修飾前面的主詞。","text":"主詞"},{"isCorrect":false,"rationale":"同位語通常緊跟在另一個名詞之後進行解釋，而非透過 be 動詞連接。","text":"同位語"}],"hint":"觀察名詞子句在句子中的位置，它是否位於 be 動詞之後？","question":"「The problem is ____ he didn't study hard.」 此處的名詞子句擔任什麼角色？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"Nothing 是否定字，附加問句必須用肯定形式。","text":"can't it"},{"isCorrect":false,"rationale":"這違反了「前否後肯」的規則，且代名詞錯誤。","text":"can't they"},{"isCorrect":false,"rationale":"Nothing 指代事物，代名詞應為 it 而非 they。","text":"can they"},{"isCorrect":true,"rationale":"主要子句主詞為 Nothing（否定），故問句用肯定；Nothing 對應代名詞為 it。","text":"can it"}],"hint":"注意到 'Nothing' 同時包含否定含義和指代事物的特性。","question":"「Nothing can stop us, ____?」 根據附加問句規則，正確選項為？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":true,"rationale":"這是標準的對等連接詞用法，取代了從屬連接詞 although 的結構。","text":"He is rich, but he is not happy."},{"isCorrect":false,"rationale":"but 是對等連接詞，不能像 although 一樣放在句首引導第一個子句後加逗號。","text":"But he is rich, he is not happy."},{"isCorrect":false,"rationale":"既然已經使用了 but，就不需要再加句尾的 though 來強調對比。","text":"He is rich, but he is not happy though."},{"isCorrect":false,"rationale":"這不是正確的轉換，而是在句子中誤用了兩個連接詞。","text":"Although he is rich, but he is not happy."}],"hint":"連接詞的轉換需要注意從屬連接詞與對等連接詞的位置差異。","question":"下列哪一個句子正確地將 although 句型轉換為 but 句型？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"will you 常用於命令或請求，而非親切的邀請。","text":"will you"},{"isCorrect":true,"rationale":"根據教材，表示邀請對方吃喝（要不要吃喝點東西）時，慣用 won't you。","text":"won't you"},{"isCorrect":false,"rationale":"shall we 用於包含說話者在內的 Let's 結構。","text":"shall we"},{"isCorrect":false,"rationale":"祈使句不使用 don't you 作附加問句。","text":"don't you"}],"hint":"注意教材中針對「邀請吃喝」所標註的特殊問句。","question":"「Have a drink, ____?」 當這句話表示「邀請（吃喝）」時，附加問句應填？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":true,"rationale":"教材指出 some of + 不可數名詞時，動詞應為單數。","text":"必須用 is，因為 food 是不可數名詞。"},{"isCorrect":false,"rationale":"在此特定結構中，不可數名詞的判定是明確的。","text":"is 或 are 都可以，視情況而定。"},{"isCorrect":false,"rationale":"some 的單複數取決於它所修飾的範圍名詞。","text":"必須用 are，因為 some 是複數。"},{"isCorrect":false,"rationale":"這不符合時態動詞的變化規則。","text":"必須用 be 的原形。"}],"hint":"觀察 'some of' 後面的名詞性質。","question":"「Some of the food ____ delicious.」 關於空格處的動詞，下列敘述何者正確？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"never 是否定詞，問句應改用肯定。","text":"don't I"},{"isCorrect":true,"rationale":"主要子句包含否定副詞 never，故附加問句需用肯定式 do I。","text":"do I"},{"isCorrect":false,"rationale":"drink 是現在式，不應改用過去式助動詞。","text":"did I"},{"isCorrect":false,"rationale":"附加問句的代名詞應與主詞 I 一致。","text":"do you"}],"hint":"找出子句中的否定關鍵字，並確認時態與人稱。","question":"「I never drink coffee, ____?」 附加問句應填入？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"進行式與 be 動詞的單複數變化無關。","text":"因為 sleeping 是現在進行式。"},{"isCorrect":false,"rationale":"問句的主詞其實是 'How many'，它代表的是數量複數。","text":"因為問句的主詞變成了 zebras。"},{"isCorrect":false,"rationale":"這是正確的語法轉變，而非錯誤。","text":"這是一個印刷錯誤，應該維持 is。"},{"isCorrect":true,"rationale":"當詢問「有多少個」時，語法焦點轉向了複數的個體，故動詞隨之改變。","text":"因為 How many 引導的結構通常搭配複數動詞來詢問複數個體。"}],"hint":"思考 'How many' 這個詞組本身隱含的數量概念。","question":"「One of the zebras is sleeping.」 改寫成問句 「How many of the zebras are sleeping?」 中，動詞為何從 is 變成了 are？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然傳統語法曾使用 he，但教材標註 -one/-body 結尾者對應 they。","text":"shouldn't he"},{"isCorrect":false,"rationale":"主要子句是肯定句，附加問句應為否定。","text":"should they"},{"isCorrect":true,"rationale":"在現代英文附加問句中，everyone 等不定代名詞對應的代名詞通常是 they。","text":"shouldn't they"},{"isCorrect":false,"rationale":"everyone 指的是人，不應使用代名詞 it。","text":"shouldn't it"}],"hint":"參考教材補充中關於 -one / -body 系列代名詞的轉換法則。","question":"「Everyone should do their best, ____?」 雖然主詞是「每個人」，但附加問句應使用？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":true,"rationale":"它緊接在抽象名詞 story 後面，用來詳細說明故事的內容，這在語法上稱為同位語。","text":"同位語名詞子句"},{"isCorrect":false,"rationale":"這只是全句主詞部分的一個組成子句。","text":"主要子句"},{"isCorrect":false,"rationale":"名詞子句並不擔任副詞的角色。","text":"副詞子句"},{"isCorrect":false,"rationale":"雖然看起來像，但 that 引導的是一個完整的名詞子句，內容就是 story 本身。","text":"形容詞子句修飾 story"}],"hint":"判斷該子句是否在補充說明前面的「抽象名詞」內容。","question":"「The story that the dog spent 20 years finding its master is really touching.」 句子中畫底線部分 (that the dog... master) 的功能是？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"指示代名詞是複數，不能對應單數的 it。","text":"isn't it"},{"isCorrect":false,"rationale":"附加問句必須使用「人稱代名詞」（I, you, he, it, they...），不能使用指示代名詞。","text":"aren't these"},{"isCorrect":true,"rationale":"These 為指示代名詞複數，在附加問句中應對應為 they。","text":"aren't they"},{"isCorrect":false,"rationale":"主要子句是肯定句，問句應為否定。","text":"are they"}],"hint":"注意指示代名詞（this/that/these/those）在問句中的代名詞轉換。","question":"下列哪一個附加問句的組合是正確的？ 「These are your books, ____?」","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"A little 用於修飾不可數名詞，表示少量，語法正確。","text":"A little"},{"isCorrect":true,"rationale":"Many 只能修飾可數複數名詞，而 information 是不可數名詞。","text":"Many"},{"isCorrect":false,"rationale":"Part of 之後可以接不可數名詞，語法正確。","text":"Part"},{"isCorrect":false,"rationale":"Much 用於修飾不可數名詞，語法正確。","text":"Much"}],"hint":"檢查 'information' 是可數還是不可數名詞，並找出不符的修飾詞。","question":"「____ of the information is correct.」 填入哪一個選項在語法上是**錯誤**的？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"回答內容完全取決於真實情況，而非問句的形式。","text":"如果問句是肯定的，回答就必須用肯定。"},{"isCorrect":false,"rationale":"它雖然常用於確認，但在溝通中仍需要對應的回應。","text":"附加問句不需要回答，它只是口頭禪。"},{"isCorrect":false,"rationale":"無論問句形式如何，回答 Yes 或 No 僅根據事實（你是學生就答 Yes，不是就答 No）。","text":"回答時需考慮問句的肯定或否定語氣來決定 Yes 或 No。"},{"isCorrect":true,"rationale":"根據教材 P.1 說明，附加問句的回答方式與普通問句完全相同，只看事實。","text":"附加問句的回答與普通疑問句的回答方式相同。"}],"hint":"回想教材中提到的回答原則，事實是否優於句型結構？","question":"在回答附加問句如 「You are a student, aren't you?」 時，下列敘述何者正確？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然 yet 也有「但是」的意思，但在這類結構中，有時被視為副詞使用。","text":"yet"},{"isCorrect":false,"rationale":"這是最標準的做法，用逗號隔開兩個子句即可。","text":"$\\times$ (不填任何詞)"},{"isCorrect":false,"rationale":"這是正確用法。","text":"(不填，直接接 she)"},{"isCorrect":true,"rationale":"although 與 but 不能重複出現在同一個關係連結結構中。","text":"but"}],"hint":"尋找那個絕對禁止與 although 同時出現的連接詞。","question":"「Although she was tired, ____ she still finished her homework.」 下列何者**不能**填入橫線中？","type":"multiple_choice"},{"answerOptions":[{"isCorrect":false,"rationale":"Both 代表「兩者都」，屬於複數概念，根據教材表格，必須搭配複數動詞。","text":"Both of 接複數名詞時，動詞可用單數或複數。"},{"isCorrect":false,"rationale":"Much 用於修飾不可數名詞，不能接可數名詞複數。","text":"Much of 後面接可數名詞複數，動詞用單數。"},{"isCorrect":false,"rationale":"教材中明確指出 every 是一個人稱代名詞，不能直接接 of 形成「every of」的用法。","text":"Every of 後面接複數名詞，動詞用複數。"},{"isCorrect":true,"rationale":"根據教材，each of 代表「每一個」，雖然範圍是複數，但焦點在於個體，故需搭配單數動詞。","text":"Each of 後面接複數名詞，但動詞要用單數。"}],"hint":"請注意教材第一頁中關於單複數動詞搭配的表格規則。","question":"下列關於數量不定代名詞的敘述，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"此句表達的是被動語態（被清理），使用 has 會導致語法不完整。","text":"has"},{"isCorrect":true,"rationale":"Trash（垃圾）為不可數名詞，當 most 修飾不可數名詞時，動詞須採用單數形式。","text":"was"},{"isCorrect":false,"rationale":"此選項誤將 Most 視為複數，但動詞單複數應取決於其後的不可數名詞。","text":"were"},{"isCorrect":false,"rationale":"除了單複數不符外，此句描述的是「今天早上」發生的事，應使用過去式。","text":"are"}],"hint":"判斷 trash 是可數還是不可數名詞，並注意時態。","question":"句子「Most of the trash \\_\\_\\_\\_ cleaned up this morning.」空格處應填入？"},{"answerOptions":[{"isCorrect":true,"rationale":"教材強調 although 和 but 不能同時使用，這是中文母語者常犯的語法錯誤。","text":"Although 可以與 but 同時出現在同一個句子中。"},{"isCorrect":false,"rationale":"這是教材提到的正確用法，though 在口語中常置於句尾。","text":"Though 可以放在句尾當作副詞，表示「但是」。"},{"isCorrect":false,"rationale":"這符合教材中關於兩者語氣正式程度的比較。","text":"Although 通常比 though 顯得更正式一些。"},{"isCorrect":false,"rationale":"教材補充說明 even though 是正確的強調用法，而 even although 則不行。","text":"Though 前面可以加 even 用於加強語氣。"}],"hint":"回想教材中提到的「不能同時使用」的連接詞規則。","question":"關於 although 與 though 的用法，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然 everything 語意涵蓋全部，但在語法上被視為單數，不可用 they。","text":"isn't they"},{"isCorrect":false,"rationale":"這混淆了主詞的單複數代換規則，everything 應對應單數動詞與 it。","text":"aren't they"},{"isCorrect":true,"rationale":"不定代名詞 everything 代表事物，在附加問句中主詞須代換為單數的 it。","text":"isn't it"},{"isCorrect":false,"rationale":"附加問句需與前方主要子句肯定否定相反，主要子句為肯定，附加問句應為否定。","text":"is it"}],"hint":"以 -thing 結尾的不定代名詞，其代名詞應使用哪一個？","question":"請選出正確的附加問句：Everything in this room is expensive, \\_\\_\\_\\_?"},{"answerOptions":[{"isCorrect":false,"rationale":"Won't you 特指邀請吃喝的附加問句，不適用於此處的建議。","text":"won't you"},{"isCorrect":false,"rationale":"Will you 通常用於一般祈使句或邀請，而非 Let's 引導的提議。","text":"will you"},{"isCorrect":true,"rationale":"教材規定 Let's not 開頭的祈使句，其附加問句應使用 ok、okay 或 all right。","text":"ok"},{"isCorrect":false,"rationale":"Shall we 是用於肯定句「Let's...」的附加問句，而非否定句。","text":"shall we"}],"hint":"注意教材中「特殊句型」關於 Let's 的肯定與否定區分。","question":"「Let's not stay here too long, \\_\\_\\_\\_?」空格處最適合的附加問句為？"},{"answerOptions":[{"isCorrect":true,"rationale":"That 子句緊跟在及物動詞 believe 之後，作為該動詞的對象，故為受詞功能。","text":"受詞"},{"isCorrect":false,"rationale":"主詞應位於動詞 believe 之前，此處 that 子句是在動詞之後。","text":"主詞"},{"isCorrect":false,"rationale":"同位語是用來解釋前面的名詞，此處 that 子句直接接在動詞後，並非名詞後。","text":"同位語"},{"isCorrect":false,"rationale":"補語通常接在連綴動詞（如 be 動詞）或形容詞後，用於補充說明主詞或性質。","text":"補語"}],"hint":"觀察 that 子句在動詞 believe 後方所擔任的角色。","question":"在句子「I believe that honesty is the best policy.」中，that 子句的功能為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"They 用於代替 these 或 those 等複數指示代名詞。","text":"they"},{"isCorrect":false,"rationale":"附加問句的主詞規定必須使用代名詞（I, you, he, she, it, we, they）。","text":"this/that"},{"isCorrect":true,"rationale":"根據教材「重點補充」第 1 點，this 與 that 指向單一事物，在附加問句中用 it 代替。","text":"it"},{"isCorrect":false,"rationale":"One 用於代替以 -one 結尾的人稱代名詞，不適用於指示代名詞。","text":"one"}],"hint":"參考教材第四頁有關不定代名詞代換的對照表。","question":"附加問句主詞選用：當主要子句的主詞為「This or That」時，附加問句的主詞應變更為？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然補充中提到補語省略較少見，但規範中主要強調主詞位置最不可省略。","text":"當作連綴動詞後的補語時"},{"isCorrect":true,"rationale":"根據教材最後一頁的說明，that 在引導主詞子句時通常不可省略，以免造成句意混淆。","text":"當作主詞時"},{"isCorrect":false,"rationale":"形容詞後的 that 子句通常也可以省略 that。","text":"放在形容詞後面當補語時"},{"isCorrect":false,"rationale":"教材提到當 that 引導受詞子句時，通常是可以被省略的。","text":"當作及物動詞的受詞時"}],"hint":"尋找教材第六頁最下方關於「省略」的註記。","question":"關於 that 引導的名詞子句，下列哪一種位置的 that 通常不可省略？"},{"answerOptions":[{"isCorrect":true,"rationale":"Cake 在第一句為單數不可數概念，第二句 cakes 為複數可數名詞，動詞需相應配合。","text":"is; are"},{"isCorrect":false,"rationale":"這完全反轉了主詞單複數對動詞的要求。","text":"are; is"},{"isCorrect":false,"rationale":"此選項忽視了第一句中的 cake 是不可數名詞的單數性質。","text":"are; are"},{"isCorrect":false,"rationale":"第二句的主詞是複數名詞 cakes，動詞不能使用單數。","text":"is; is"}],"hint":"注意「some of + 範圍」中的名詞是單數不可數還是複數可數。","question":"「Some of the cake \\_\\_\\_\\_ delicious.」與「Some cakes \\_\\_\\_\\_ delicious.」空格應依序填入？"},{"answerOptions":[{"isCorrect":true,"rationale":"Seldom 具有否定意涵，因此附加問句必須使用肯定形式，並搭配助動詞 does。","text":"does she"},{"isCorrect":false,"rationale":"附加問句的主詞必須使用代名詞，不可直接重複專有名詞 Ruby。","text":"does Ruby"},{"isCorrect":false,"rationale":"主要子句動詞為一般動詞 goes，應使用助動詞 does 而非 be 動詞。","text":"is she"},{"isCorrect":false,"rationale":"這沒有考慮到 seldom 的否定性質，誤用了否定附加問句。","text":"doesn't she"}],"hint":"尋找教材第四頁右上角關於「negative words」如 never, seldom 的規則。","question":"「Ruby seldom goes to the gym, \\_\\_\\_\\_?」正確的附加問句應為？"},{"answerOptions":[{"isCorrect":false,"rationale":"Be 動詞在現在式中需要根據主詞變化為 am, is 或 are。","text":"be"},{"isCorrect":false,"rationale":"這是常見錯誤，將複數名詞 girls 誤認為主詞，忽略了真正的主詞是 one。","text":"are"},{"isCorrect":true,"rationale":"「One of...」結構的主詞是「One」，代表一群人中的「那一個」，故動詞用單數。","text":"is"},{"isCorrect":false,"rationale":"Being 為分詞形式，不能直接作為句子的主要動詞。","text":"being"}],"hint":"思考「那群女孩中的一位」是指多少人？","question":"「One of the girls \\_\\_\\_\\_ my sister.」空格處應填？"},{"answerOptions":[{"isCorrect":false,"rationale":"Even 只能接 though，不能接 although。","text":"Even although he is young, he is very brave."},{"isCorrect":false,"rationale":"Although 與 but 重複使用是語法錯誤。","text":"Although he is young, but he is very brave."},{"isCorrect":false,"rationale":"雖然語法正確，但邏輯不通；通常是「雖然年輕（劣勢），但很勇敢（優勢）」。","text":"He is young although he is very brave."},{"isCorrect":true,"rationale":"這符合 $S + V$ although $S + V$ 或 Although $S + V$, $S + V$ 的正確結構。","text":"Although he is young, he is very brave."}],"hint":"注意連接詞的逻辑關係以及教材中提到的重複使用禁忌。","question":"選擇最符合語法的一句："},{"answerOptions":[{"isCorrect":true,"rationale":"教材第五頁提到，表示「邀請吃喝」的祈使句，附加問句慣用 won't you。","text":"won't you"},{"isCorrect":false,"rationale":"Shall we 僅用於 Let's 開頭的提議句。","text":"shall we"},{"isCorrect":false,"rationale":"主要子句為祈使句（無主詞），其附加問句應對應 will/won't 而非現在式助動詞。","text":"don't you"},{"isCorrect":false,"rationale":"Will you 用於一般的命令、請求或建議，並非最道地的邀請吃喝用法。","text":"will you"}],"hint":"查看教材第五頁特殊句型中的第 4 小點。","question":"「Have a piece of cake, \\_\\_\\_\\_?」在邀請對方吃東西時，附加問句最常用？"},{"answerOptions":[{"isCorrect":false,"rationale":"教材明確指出 -one 或 -body 結尾的代名詞對應 they，而非單數的 he。","text":"shouldn't he"},{"isCorrect":false,"rationale":"主要子句已有助動詞 should，附加問句應沿用 should 而非 do。","text":"don't they"},{"isCorrect":false,"rationale":"主要子句為肯定，附加問句應為否定。","text":"should they"},{"isCorrect":true,"rationale":"以 -one 結尾的人稱不定代名詞，在附加問句中代換為複數的 they。","text":"shouldn't they"}],"hint":"注意 everyone 的代名詞轉換規律。","question":"「Everyone should follow the rules, \\_\\_\\_\\_?」空格應填？"},{"answerOptions":[{"isCorrect":false,"rationale":"主詞是 The truth，that 子句是放在後方解釋主詞的。","text":"主詞"},{"isCorrect":true,"rationale":"此子句位於 be 動詞 (is) 之後，用來補述主詞「事實」的內容，故為補語。","text":"補語"},{"isCorrect":false,"rationale":"Be 動詞是不及物動詞，後接補語而非受詞。","text":"受詞"},{"isCorrect":false,"rationale":"雖然語意接近，但語法上直接接在 be 動詞後的子句稱為補語。","text":"同位語"}],"hint":"觀察 that 子句在 be 動詞後的結構功能。","question":"教材中提到「The truth is that he didn't study hard.」，這句中的 that 子句擔任什麼角色？"},{"answerOptions":[{"isCorrect":false,"rationale":"Often 詢問頻率，不符合詢問「多少比例」的句意。","text":"often"},{"isCorrect":false,"rationale":"Many 僅能用於詢問可數名詞的複數數量。","text":"many"},{"isCorrect":true,"rationale":"Water 是不可數名詞，詢問不可數名詞的數量（部分）時應使用 much。","text":"much"},{"isCorrect":false,"rationale":"Long 詢問長度或時間長短，不符合此處語法。","text":"long"}],"hint":"根據教材第二頁左下角的問句用法表格判斷。","question":"「How \\_\\_\\_\\_ of the water is clean?」"},{"answerOptions":[{"isCorrect":false,"rationale":"教材明確指出了兩者在「總範圍數量」上的邏輯差異。","text":"兩者完全沒有區別，可以隨意互換。"},{"isCorrect":false,"rationale":"兩者代表的數量都是複數，皆需接複數動詞。","text":"Both of 後面接單數動詞；two of 接複數動詞。"},{"isCorrect":true,"rationale":"這是教材第二頁中間特別標註的細微差別。","text":"Both of 的總範圍只有兩個；two of 的總範圍超過兩個。"},{"isCorrect":false,"rationale":"這與教材提供的定義恰好相反。","text":"Both of 的總範圍超過兩個；two of 只有兩個。"}],"hint":"回憶教材第二頁關於「差別」的手寫筆記。","question":"下列關於「both of」與「two of」的區別，何者敘述正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"Know 為靜態動詞，通常不使用進行式，且主詞為複數，be 動詞不應用 is。","text":"is knowing"},{"isCorrect":true,"rationale":"Few 代表「幾乎沒有」，用於複數名詞，動詞應使用複數形式（原型）。","text":"know"},{"isCorrect":false,"rationale":"Few 為複數概念的不定代名詞，不可搭配單數動詞 knows。","text":"knows"},{"isCorrect":false,"rationale":"Ving 形式不能單獨作為句子的主要動詞。","text":"knowing"}],"hint":"判斷 few 屬於教材中哪一類的代名詞（單數或複數）。","question":"「Few of the students \\_\\_\\_\\_ the answer.」"},{"answerOptions":[{"isCorrect":true,"rationale":"一般肯定祈使句（命令、請求）的附加問句通常使用 will you。","text":"will you"},{"isCorrect":false,"rationale":"主要子句並非現在式疑問句結構，不使用 do you。","text":"do you"},{"isCorrect":false,"rationale":"祈使句不使用現在式一般助動詞 don't 作為附加問句。","text":"don't you"},{"isCorrect":false,"rationale":"附加問句的動詞需對應主要子句，祈使句隱含未來意涵，對應 will。","text":"are you"}],"hint":"參考教材第五頁特殊句型第 3 點。","question":"「Open the window, \\_\\_\\_\\_?」最合適的附加問句是？"},{"answerOptions":[{"isCorrect":false,"rationale":"It 本身是代名詞，不能在此結構中引導後面的完整子句作為主詞。","text":"It"},{"isCorrect":false,"rationale":"What 在名詞子句中需擔任受詞或主詞，但後方 Ruby is over 30 已經是完整句。","text":"What"},{"isCorrect":true,"rationale":"此處需要一個連接詞引導整個名詞子句作為句子的主詞，that 為標準引導詞。","text":"That"},{"isCorrect":false,"rationale":"Which 用於選擇，且在此處不符合語法邏輯。","text":"Which"}],"hint":"名詞子句放在句首當主詞時，應使用哪個連接詞？","question":"「\\_\\_\\_\\_ Ruby is over 30 surprises us.」空格應填入？"},{"answerOptions":[{"isCorrect":false,"rationale":"這混淆了不可數名詞與複數名詞對動詞的要求。","text":"are; is"},{"isCorrect":true,"rationale":"Half 的單複數取決於其後的名詞：food 為不可數用單數，apples 為複數用複數動詞。","text":"is; are"},{"isCorrect":false,"rationale":"第一句主詞 food 是不可數，動詞必須使用單數 is。","text":"are; are"},{"isCorrect":false,"rationale":"第二句主詞 apples 是複數，動詞必須使用複數 are。","text":"is; is"}],"hint":"參考教材第一頁表格 3，這類詞的動詞取決於「名詞」的種類。","question":"「Half of the food \\_\\_\\_\\_ gone.」與「Half of the apples \\_\\_\\_\\_ gone.」分別應填入？"},{"answerOptions":[{"isCorrect":false,"rationale":"No 後面必須接否定，不能接肯定動詞 am。","text":"No, I am."},{"isCorrect":false,"rationale":"雖然語法正確，但與「我是學生」的事實相反。","text":"No, I am not."},{"isCorrect":false,"rationale":"Yes 後面必須接肯定，不能接否定動詞 am not。","text":"Yes, I am not."},{"isCorrect":true,"rationale":"附加問句的回答需依照事實：事實是肯定就用 Yes，事實是否定就用 No。","text":"Yes, I am."}],"hint":"教材第四頁提到「附加問句回答跟普通句子相同」。","question":"關於附加問句的回答，「You are a student, aren't you?」，若事實「我是學生」，應如何回答？"},{"answerOptions":[{"isCorrect":false,"rationale":"Because 表示因果關係，語意上與「雖然...但是...」的讓步語氣不符。","text":"Because it was raining, he still went hiking."},{"isCorrect":false,"rationale":"But 不會放在句尾，語法結構錯誤。","text":"He still went hiking though it was raining but."},{"isCorrect":true,"rationale":"Although 引導的從屬子句可以轉換成對等連接詞 but 連接的句子，但兩者不可並存。","text":"It was raining, but he still went hiking."},{"isCorrect":false,"rationale":"同時使用 although 和 but 是嚴重的語法錯誤。","text":"Although it was raining, but he still went hiking."}],"hint":"尋找與 although 語意相同但不能共存的連接詞。","question":"「Although it was raining, he still went hiking.」此句可改寫為："},{"answerOptions":[{"isCorrect":false,"rationale":"All 也屬於「兩者都可以接」的類別。","text":"all"},{"isCorrect":false,"rationale":"Some 屬於「兩者都可以接」的類別（表格 3）。","text":"some"},{"isCorrect":false,"rationale":"A few 專門用於修飾複數可數名詞。","text":"a few"},{"isCorrect":true,"rationale":"根據教材第一頁表格 2，a little 與 little 專門用於修飾不可數名詞。","text":"a little"}],"hint":"對照教材第一頁的三種不定代名詞分類表格。","question":"下列哪一個不定代名詞「僅能」接不可數名詞？"},{"answerOptions":[{"isCorrect":false,"rationale":"此處並非引導形容詞子句修飾人，而是引導完整事件的名詞子句。","text":"who"},{"isCorrect":false,"rationale":"Which 在名詞子句中需擔任特定成分，且此處無選擇意涵。","text":"which"},{"isCorrect":false,"rationale":"後方句子結構完整，不需要 what 作為代名詞補位。","text":"what"},{"isCorrect":true,"rationale":"此處 that 引導名詞子句作為 think 的受詞，此 that 通常可以省略。","text":"that"}],"hint":"這是在動詞後引導受詞子句最常見的連接詞。","question":"「I think \\_\\_\\_\\_ Ruby is a kind teacher.」"},{"answerOptions":[{"isCorrect":false,"rationale":"主要子句是現在完成式 (has been)，附加問句不應轉為過去式 did。","text":"did he"},{"isCorrect":true,"rationale":"Never 為否定詞，附加問句須用肯定。主要子句有助動詞 has，附加問句沿用之。","text":"has he"},{"isCorrect":false,"rationale":"忽視了 never 的否定作用，錯誤地使用了否定附加問句。","text":"hasn't he"},{"isCorrect":false,"rationale":"助動詞必須對應主要子句的 has，不可隨意更換為 be 動詞。","text":"is he"}],"hint":"注意 never 是否定詞，且主要子句的時態是現在完成式。","question":"「Jack has never been to Japan, \\_\\_\\_\\_?」"},{"answerOptions":[{"isCorrect":true,"rationale":"Each of 後接複數名詞，但主詞是單數的 each，故動詞使用單數 wants。","text":"wants"},{"isCorrect":false,"rationale":"Want 為狀態動詞，通常不用進行式，且主詞與 be 動詞單複數不符。","text":"are wanting"},{"isCorrect":false,"rationale":"Ving 形式不可單獨作為主要動詞。","text":"wanting"},{"isCorrect":false,"rationale":"此選項誤將複數名詞 students 當成主詞，導致動詞一致性錯誤。","text":"want"}],"hint":"「Each of...」結構的動詞單複數應如何決定？","question":"「Each of the students \\_\\_\\_\\_ to pass the test.」"},{"answerOptions":[{"isCorrect":false,"rationale":"What 不能引導同位語子句來解釋前方的名詞 story。","text":"what"},{"isCorrect":false,"rationale":"Who 只能用來指涉人，不能修飾故事。","text":"who"},{"isCorrect":true,"rationale":"That 引導同位語子句，用來解釋「故事」的具體內容。","text":"that"},{"isCorrect":false,"rationale":"雖然 which 可引導形容詞子句，但此處子句結構完整且旨在解釋內容，語法上 that 更適合作為同位語引導詞。","text":"which"}],"hint":"這個子句是用來補充說明前面的名詞「故事」的具體內容。","question":"「The story \\_\\_\\_\\_ the dog spent 20 years finding its master is touching.」空格應填入？"},{"answerOptions":[{"isCorrect":false,"rationale":"祈使句的附加問句固定使用助動詞 will 或 shall，不使用 do。","text":"do you"},{"isCorrect":false,"rationale":"否定祈使句的附加問句習慣上維持 will you，不使用否定形式。","text":"won't you"},{"isCorrect":false,"rationale":"Shall we 只適用於 Let's 開頭的句子。","text":"shall we"},{"isCorrect":true,"rationale":"教材第五頁顯示，否定祈使句（如 Never 開頭）的附加問句應使用 will you。","text":"will you"}],"hint":"參考教材第五頁特殊句型第 3 點旁邊的手寫註記。","question":"「Never be late, \\_\\_\\_\\_?」正確的附加問句應為？"},{"answerOptions":[{"isCorrect":true,"rationale":"Though 可當副詞置於句尾，表示「不過、但是」，符合教材第三頁的重點說明。","text":"He is smart. He failed, though."},{"isCorrect":false,"rationale":"連接詞重複使用且結構混亂。","text":"Though he is smart, though he failed."},{"isCorrect":false,"rationale":"雖然文法通順，但邏輯與原句相反（原句是「聰明但失敗」）。","text":"He is smart though he failed."},{"isCorrect":false,"rationale":"句子結構不完整，缺乏主詞。","text":"He is smart, failed though."}],"hint":"though 放在句尾當副詞時，通常用逗號與前面隔開。","question":"「He is smart, but he still failed.」可以用 though 放在句尾改寫為："},{"answerOptions":[{"isCorrect":false,"rationale":"不定詞不能在沒有助動詞的情況下充當主動詞。","text":"to want"},{"isCorrect":false,"rationale":"這是一個分詞形式，不能單獨作為句子的主要動詞。","text":"wanting"},{"isCorrect":false,"rationale":"這個選項忽視了主詞是單數的規則，這是一個常見的錯誤。","text":"want"},{"isCorrect":true,"rationale":"當「each of」接複數名詞時，其後應接單數動詞，因為主詞核心是單數的「每一個」。","text":"wants"}],"hint":"請注意「each」這個不定代名詞對動詞單複數的影響。","question":"Each of the boys in the classroom _____ to play basketball after school."},{"answerOptions":[{"isCorrect":false,"rationale":"「many」僅能用於可數名詞，而「money」是不可數名詞。","text":"Many"},{"isCorrect":false,"rationale":"「a few」用於可數名詞，不適用於不可數的「money」。","text":"A few"},{"isCorrect":true,"rationale":"「much」用於修飾不可數名詞（如 money），且後方搭配單數動詞「was」。","text":"Much"},{"isCorrect":false,"rationale":"「several」必須接複數可數名詞，與不可數名詞不相符。","text":"Several"}],"hint":"思考「錢（money）」在英文中是可數還是不可數名詞。","question":"_____ of the money was stolen by the thief last night."},{"answerOptions":[{"isCorrect":false,"rationale":"這不僅是單數動詞，還代表過去式，與句意不符。","text":"was"},{"isCorrect":false,"rationale":"雖然「most」可以接不可數名詞，但在此處接的是複數學生，因此動詞應隨之變動。","text":"is"},{"isCorrect":true,"rationale":"當「most of」接複數可數名詞時，動詞應使用複數形式。","text":"are"},{"isCorrect":false,"rationale":"原形動詞「be」不能直接作為主詞後的限定動詞使用。","text":"be"}],"hint":"判斷「most of」後面所接的名詞是單數、複數還是不可數。","question":"Most of the students in this class _____ from Taiwan."},{"answerOptions":[{"isCorrect":false,"rationale":"「even」是副詞，不能單獨作為連接詞使用，除非與「if」或「though」搭配。","text":"Even"},{"isCorrect":true,"rationale":"「although」引導讓步子句，用來對比兩個相反的情況。","text":"Although"},{"isCorrect":false,"rationale":"「but」是對等連接詞，不能放在句首來連接兩個完整的子句。","text":"But"},{"isCorrect":false,"rationale":"「despite」是介系詞，後方應接名詞或動名詞，而非完整的子句。","text":"Despite"}],"hint":"尋找一個能引導「雖然...但是...」邏輯的從屬連接詞。","question":"_____ he is very busy, he still takes time to exercise every day."},{"answerOptions":[{"isCorrect":false,"rationale":"「yet」與「but」功能相似，不應與「although」連用。","text":"yet"},{"isCorrect":false,"rationale":"在英文語法中，「although」與「but」不能同時出現在同一個複合句中。","text":"but"},{"isCorrect":true,"rationale":"當句首已有連接詞「although」時，主要子句不需要額外的對等連接詞。","text":"(不填任何詞)"},{"isCorrect":false,"rationale":"「so」表示因果關係，會破壞「although」所建立的對比邏輯。","text":"so"}],"hint":"注意英文句子中連接詞的使用限制，尤其是「雖然」與「但是」。","question":"Although it was raining hard, _____ she went to the market alone."},{"answerOptions":[{"isCorrect":false,"rationale":"「although」是連接詞，必須引導一個子句，不能單獨放在句尾。","text":"although"},{"isCorrect":false,"rationale":"「even though」是從屬連接詞，需要連接子句，不能放在句尾作副詞。","text":"even though"},{"isCorrect":true,"rationale":"「though」可以作為副詞放在句尾，意思等同於「不過、但是」。","text":"though"},{"isCorrect":false,"rationale":"「but」是對等連接詞，通常放在兩個子句中間，而非句尾。","text":"but"}],"hint":"哪個詞可以放在句尾作為副詞，表示「然而」或「不過」？","question":"The movie was very long. I enjoyed it, _____."},{"answerOptions":[{"isCorrect":false,"rationale":"雖然「nobody」在語法上視為單數，但在附加問句中慣用「they」來指代。","text":"did he"},{"isCorrect":false,"rationale":"「it」用來指代事物，而非指代人的「nobody」。","text":"did it"},{"isCorrect":true,"rationale":"「Nobody」是否定詞，附加問句需用肯定形式；且不定代名詞代稱人時，附加問句代名詞用「they」。","text":"did they"},{"isCorrect":false,"rationale":"因為「nobody」本身含有否定意義，附加問句不能再使用否定式。","text":"didn't they"}],"hint":"注意「nobody」的否定意義以及它在附加問句中所對應的代名詞。","question":"Nobody called me today, _____?"},{"answerOptions":[{"isCorrect":false,"rationale":"主要子句使用 $be$ 動詞，附加問句也必須對應使用 $be$ 動詞而非助動詞。","text":"doesn't it"},{"isCorrect":false,"rationale":"「Everything」指代事物，其附加問句代名詞應使用單數的「it」。","text":"aren't they"},{"isCorrect":true,"rationale":"主要子句是肯定句，附加問句用否定；「everything」指代事物，代名詞用「it」。","text":"isn't it"},{"isCorrect":false,"rationale":"主要子句為肯定句，附加問句必須使用否定形式。","text":"is it"}],"hint":"檢查主要子句的動詞類型以及「everything」對應的代名詞。","question":"Everything on the table is for the party, _____?"},{"answerOptions":[{"isCorrect":false,"rationale":"附加問句通常是助動詞加代名詞的簡短形式，而非重複祈使動詞。","text":"let us"},{"isCorrect":false,"rationale":"附加問句應反映提議的性質，而非單純的否定助動詞。","text":"don't we"},{"isCorrect":false,"rationale":"「will you」用於一般的祈使句（如 Open the door），而非「Let's」。","text":"will you"},{"isCorrect":true,"rationale":"「Let's」開頭的祈使句，其附加問句固定使用「shall we」。","text":"shall we"}],"hint":"這是一個包含第一人稱複數的提議，有其特定的固定用法。","question":"Let's go to the park, _____?"},{"answerOptions":[{"isCorrect":true,"rationale":"不論祈使句是肯定還否定（如 Never...），其附加問句通常使用「will you」。","text":"will you"},{"isCorrect":false,"rationale":"祈使句的附加問句通常使用「will you」，而非一般動詞的助動詞。","text":"don't you"},{"isCorrect":false,"rationale":"祈使句並非普通陳述句，不能直接套用「前否後肯」的助動詞規則。","text":"do you"},{"isCorrect":false,"rationale":"否定祈使句通常不使用「won't you」作為附加問句。","text":"won't you"}],"hint":"對於命令或請求（即使是否定的），附加問句通常有一種通用的未來式形式。","question":"Never tell a lie again, _____?"},{"answerOptions":[{"isCorrect":false,"rationale":"「What」在名詞子句中必須充當受詞或主詞成分，而後方的「you are safe」已經結構完整。","text":"What"},{"isCorrect":true,"rationale":"「That」引導一個完整的名詞子句作為全句的主詞，表示「這件事」。","text":"That"},{"isCorrect":false,"rationale":"「Whether」表示「是否」，與句意「你平安這件事（事實）」不符。","text":"Whether"},{"isCorrect":false,"rationale":"「Which」表示選擇，且在此處語法不合，因為後方子句不缺成分。","text":"Which"}],"hint":"此處需要一個連接詞來引導一個「完整的子句」作為句子的主詞。","question":"_____ you are safe makes us feel very happy."},{"answerOptions":[{"isCorrect":true,"rationale":"「that」可用來引導名詞子句作為及物動詞的受詞，且在此處常可省略。","text":"that"},{"isCorrect":false,"rationale":"「this」是代名詞，不能用來引導一個包含主詞和動詞的子句。","text":"this"},{"isCorrect":false,"rationale":"「if」在此表示「是否」，通常用於不確定的情況，而「相信」通常接確定的事實。","text":"if"},{"isCorrect":false,"rationale":"後方的子句「honesty is the best policy」已經完整，不需要「what」來充當成分。","text":"what"}],"hint":"尋找一個用來連接動詞「believe」和其所相信內容的連接詞。","question":"I believe _____ honesty is the best policy."},{"answerOptions":[{"isCorrect":false,"rationale":"這裡並非形容詞子句修飾「news」，而是說明其內容的名詞子句，故不用「which」。","text":"which"},{"isCorrect":true,"rationale":"此處的「that」引導同位語子句，用來具體說明前面名詞「the news」的內容。","text":"that"},{"isCorrect":false,"rationale":"「where」引導地點相關的子句，不適合說明消息的內容。","text":"where"},{"isCorrect":false,"rationale":"「who」用來指代人，不能引導關於「news」內容的名詞子句。","text":"who"}],"hint":"這裡需要一個能引導「同位語子句」來補充說明消息內容的詞。","question":"The news _____ the famous singer will visit Taiwan is true."},{"answerOptions":[{"isCorrect":false,"rationale":"在陳述句中，必須根據主詞人稱和時態將 $be$ 動詞變化。","text":"be"},{"isCorrect":true,"rationale":"「One of」後接複數名詞，但真正的主詞是單數的「One」，因此動詞用「is」。","text":"is"},{"isCorrect":false,"rationale":"這是一個常見錯誤，將動詞與靠近它的複數名詞「friends」一致化，而非真正主詞。","text":"are"},{"isCorrect":false,"rationale":"「am」僅能搭配第一人稱單數主詞「I」。","text":"am"}],"hint":"請找出這句話真正的「主詞核心」是哪個字。","question":"One of my best friends _____ living in London now."},{"answerOptions":[{"isCorrect":false,"rationale":"在美式英語中，一般動詞的「has」附加問句不使用「has he」而用「does he」。","text":"has he"},{"isCorrect":false,"rationale":"「little」具有否定意義（幾乎沒有），因此附加問句應使用肯定形式。","text":"doesn't he"},{"isCorrect":true,"rationale":"「little」使句子具有否定意義，且「has」是一般動詞，故用肯定助動詞「does」。","text":"does he"},{"isCorrect":false,"rationale":"當「has」作為一般動詞（擁有）時，在附加問句中通常使用助動詞「does/do」。","text":"hasn't he"}],"hint":"注意「little」這個詞是肯定還是否定意義，以及動詞「has」的類型。","question":"He has little time to study for the test, _____?"},{"answerOptions":[{"isCorrect":false,"rationale":"「Both」代表兩者都，後方應接複數動詞「are」。","text":"Both"},{"isCorrect":true,"rationale":"「Each of」指兩者或以上中的「每一個」，強調單體，接單數動詞「is」。","text":"Each"},{"isCorrect":false,"rationale":"「All」用於三者或以上，不適用於只有兩人的情況。","text":"All"},{"isCorrect":false,"rationale":"「Many」用於描述多數，且後方應接複數動詞。","text":"Many"}],"hint":"觀察動詞「is」是單數還是複數，並考慮人數限制。","question":"_____ of the two sisters is a doctor."},{"answerOptions":[{"isCorrect":false,"rationale":"「Each of」後應接單數動詞「is」，但此句使用的是「are」。","text":"Each of"},{"isCorrect":false,"rationale":"根據來源二，「two of」通常暗示總數超過兩個，這裡已知總共只有兩個兄弟。","text":"Two of"},{"isCorrect":false,"rationale":"「All」通常指三者或以上，對於兩個人應使用「both」。","text":"All of"},{"isCorrect":true,"rationale":"當對象明確只有兩個人時，應使用「both of」。","text":"Both of"}],"hint":"注意「只有兩個」與「超過兩個中的兩個」在用法上的區別。","question":"I have two brothers. _____ them are taller than me."},{"answerOptions":[{"isCorrect":true,"rationale":"「information」是不可數名詞，因此詢問數量時應使用「how much」。","text":"much"},{"isCorrect":false,"rationale":"「few」用於可數名詞，且此處為問句開頭，不符合「How + 數量詞」的結構。","text":"few"},{"isCorrect":false,"rationale":"雖然「little」修飾不可數名詞，但問句詢問量度時慣用「how much」。","text":"little"},{"isCorrect":false,"rationale":"「information」是不可數名詞，不能使用修飾複數可數名詞的「many」。","text":"many"}],"hint":"思考「資訊（information）」在英文中是否可以計數。","question":"How _____ information did you find on the internet?"},{"answerOptions":[{"isCorrect":true,"rationale":"當祈使句為「Let's not...」時，附加問句通常使用「ok」或「all right」。","text":"ok"},{"isCorrect":false,"rationale":"「shall we」是用於肯定形式的「Let's」，否定形式則有不同用法。","text":"shall we"},{"isCorrect":false,"rationale":"附加問句不應直接使用主要動詞的簡單助動詞形式。","text":"do we"},{"isCorrect":false,"rationale":"「will you」用於一般祈使句，而非以「Let's」開頭的句子。","text":"will you"}],"hint":"注意「Let's not」這種否定提議的特殊附加問句形式。","question":"Let's not stay here any longer, _____?"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然中文邏輯通順，但文法上「The problem is that...」是固定用來描述問題內容的結構。","text":"because"},{"isCorrect":true,"rationale":"「that」在此引導名詞子句作為連綴動詞「is」的補語（主詞補語）。","text":"that"},{"isCorrect":false,"rationale":"「which」通常引導選擇性的子句，不適用於此處陳述事實的補語句。","text":"which"},{"isCorrect":false,"rationale":"後方子句結構完整，不需要「what」來充當任何成分。","text":"what"}],"hint":"這個詞引導的名詞子句放在 $be$ 動詞後面，用來解釋「問題是什麼」。","question":"The problem is _____ we don't have enough money for the trip."},{"answerOptions":[{"isCorrect":true,"rationale":"「Part of」接不可數名詞「water」時，視為單數，動詞用「is」。","text":"is"},{"isCorrect":false,"rationale":"「been」是過去分詞，不能在句中單獨作為主動詞。","text":"been"},{"isCorrect":false,"rationale":"「water」是不可數名詞，不應搭配複數動詞。","text":"are"},{"isCorrect":false,"rationale":"這是複數過去式動詞，既不符合單複數規則，時態也無特定暗示。","text":"were"}],"hint":"判斷「part of」後面接的名詞類型以決定動詞。","question":"Part of the water in the glass _____ dirty."},{"answerOptions":[{"isCorrect":false,"rationale":"在英文中，「even though」是正確組合，但「even although」是不存在的用法。","text":"Even although"},{"isCorrect":false,"rationale":"「still」通常放在子句內部，不應直接與連接詞連在一起放在句首。","text":"Though still"},{"isCorrect":false,"rationale":"「Despite」是介系詞，不能直接接「Ruby is...」這種完整的子句。","text":"Despite"},{"isCorrect":true,"rationale":"「Even though」用來強調對比，語法正確。","text":"Even though"}],"hint":"尋找一個表示「即使、雖然」且能加強語氣的正確短語。","question":"_____ Ruby is over 18 years old, she still looks like a teenager."},{"answerOptions":[{"isCorrect":false,"rationale":"主要子句是肯定句，附加問句必須是否定形式。","text":"is it"},{"isCorrect":false,"rationale":"在附加問句中，主詞必須使用代名詞，而「this」應轉換為「it」。","text":"isn't this"},{"isCorrect":false,"rationale":"附加問句的時態必須與主要子句的時態（現在式）一致。","text":"wasn't it"},{"isCorrect":true,"rationale":"主要子句主詞是「this」，附加問句代名詞用「it」，且採前肯後否規則。","text":"isn't it"}],"hint":"注意當主詞是「this」或「that」時，附加問句中的代名詞該如何變化。","question":"This is a very easy job, _____?"},{"answerOptions":[{"isCorrect":false,"rationale":"「these」是複數，不能使用單數代名詞「it」。","text":"isn't it"},{"isCorrect":false,"rationale":"主要子句為肯定句，附加問句應使用否定式「aren't」。","text":"are they"},{"isCorrect":false,"rationale":"附加問句的主詞必須是人稱代名詞，不能直接重複指示代名詞「these」。","text":"aren't these"},{"isCorrect":true,"rationale":"「these」或「those」在附加問句中應轉換為代名詞「they」。","text":"aren't they"}],"hint":"考慮「these」代表的是複數概念，且附加問句需使用人稱代名詞。","question":"These are your books, _____?"},{"answerOptions":[{"isCorrect":false,"rationale":"「would」是助動詞，不應切換到「do」系列的助動詞。","text":"don't you"},{"isCorrect":true,"rationale":"根據來源五，表示「邀請」或「招待吃喝」時，附加問句常用「won't you」。","text":"won't you"},{"isCorrect":false,"rationale":"這是一個邀請，不應簡單重複主要子句的助動詞形式。","text":"would you"},{"isCorrect":false,"rationale":"「will you」通常用於命令或一般請求，而非客氣的邀請。","text":"will you"}],"hint":"這是一個關於「邀請對方吃喝」的特殊附加問句用法。","question":"Would you like some coffee, _____?"},{"answerOptions":[{"isCorrect":false,"rationale":"動詞類型不匹配，主要子句使用一般動詞時需用助動詞對應。","text":"is he"},{"isCorrect":false,"rationale":"主要子句動詞是「goes」（一般動詞），附加問句不應使用 $be$ 動詞。","text":"isn't he"},{"isCorrect":true,"rationale":"主要子句含有否定意義的詞（seldom），附加問句應為肯定形式「does he」。","text":"does he"},{"isCorrect":false,"rationale":"「seldom」意為「很少」，是否定副詞，因此附加問句需用肯定式。","text":"doesn't he"}],"hint":"找出句子中的否定副詞，並判斷主要子句動詞的類型。","question":"He seldom goes to school late, _____?"},{"answerOptions":[{"isCorrect":true,"rationale":"當「most of」修飾不可數名詞「tea」時，動詞應採用單數形式。","text":"comes"},{"isCorrect":false,"rationale":"這既是複數形式，也暗示進行式，與描述來源事實的語境不符。","text":"are coming"},{"isCorrect":false,"rationale":"「tea」是不可數名詞，主詞視為單數，動詞應加 -s。","text":"come"},{"isCorrect":false,"rationale":"不定詞不能單獨擔任句子的主要動詞。","text":"to come"}],"hint":"檢查「茶（tea）」是可數還是不可數，並調整動詞形式。","question":"Most of the tea in this shop _____ from Taiwan."}];
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('list') === 'random') {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        let currentIndex = 0; let mode = 'quiz';
        let state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));
        
        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered; const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }
        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1)); [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }
        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1)); [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }
        function resetState() { state = quizData.map(() => ({ selectedIndex: null, hintVisible: false })); }
        function renderQuestion() {
            const q = quizData[currentIndex]; const s = state[currentIndex];
            const content = document.getElementById('quiz-content'); const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box'); const nav = document.querySelector('.navigation');
            const nextBtn = document.getElementById('next-btn'); const prevBtn = document.getElementById('prev-btn');
            const submitEarlyBtn = document.getElementById('submit-early-btn');
            
            let optionsHtml = ''; const correctIndex = q.answerOptions.findIndex((o) => o.isCorrect);
            const selectedCorrect = s.selectedIndex !== null && q.answerOptions[s.selectedIndex].isCorrect;
            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx; const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : ''; const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);
                const revealClass = revealCorrect ? 'revealed-correct' : '';
                optionsHtml += `
                    <li class="option-item ${selectedClass} ${statusClass} ${revealClass}" onclick="selectOption(${idx})">
                        <div class="option-label"><span>${String.fromCharCode(65 + idx)}. ${opt.text}</span></div>
                        <div class="feedback-state">${opt.isCorrect ? '✓ Right answer' : '✕ Not quite'}</div>
                        ${opt.rationale ? '<div class="rationale">' + opt.rationale + '</div>' : ''}
                    </li>
`;
            });
            const stats = getStats();
            content.innerHTML = `
                <div class="progress-container">
                    <div class="progress-text">${currentIndex + 1} / ${quizData.length}</div>
                    <div class="status-bar">
                        <div class="status-item status-correct"><span>✓</span><span>${stats.correct}</span></div>
                        <div class="status-item status-wrong"><span>✕</span><span>${stats.wrong}</span></div>
                    </div>
                </div>
                <div class="question-text">${escapeHtml(q.question)}</div>
                <ul class="options-list">${optionsHtml}</ul>
`;
            const hintText = document.getElementById('hint-text'); hintText.innerText = q.hint || 'No hint available for this question.';
            if (s.hintVisible) { hintBox.classList.add('active'); } else { hintBox.classList.remove('active'); }
            results.classList.add('hidden'); content.classList.remove('hidden'); hintBox.classList.remove('hidden'); nav.classList.remove('hidden');
            
            prevBtn.disabled = currentIndex === 0; nextBtn.disabled = false;
            
            if (mode === 'quiz') { submitEarlyBtn.classList.remove('hidden'); } else { submitEarlyBtn.classList.add('hidden'); }
            
            if (mode === 'review') { nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Back to Results' : 'Next'; }
            else { nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finish' : 'Next'; }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }
        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        function selectOption(idx) { if (mode !== 'quiz' || state[currentIndex].selectedIndex !== null) return; state[currentIndex].selectedIndex = idx; renderQuestion(); }
        function toggleHint() { if (mode === 'results') return; state[currentIndex].hintVisible = !state[currentIndex].hintVisible; renderQuestion(); }
        
        function renderResults() {
            const stats = getStats(); const content = document.getElementById('quiz-content'); const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box'); const nav = document.querySelector('.navigation');
            results.innerHTML = `
                <div class="results-screen">
                    <div><h1 class="results-title">You did it! Quiz Complete.</h1><p class="results-subtitle">Review your score or take another run.</p></div>
                    <div class="results-grid">
                        <div class="result-card"><div class="result-label">Score</div><div class="result-value">${stats.correct} / ${quizData.length}</div></div>
                        <div class="result-card"><div class="result-label">Accuracy</div><div class="result-value">${stats.accuracy}%</div></div>
                        <div class="result-card"><div class="result-metrics"><div>Right <strong>${stats.correct}</strong></div><div>Wrong <strong>${stats.wrong}</strong></div><div>Skipped <strong>${stats.skipped}</strong></div></div></div>
                    </div>
                    <div class="results-actions"><button id="review-btn" class="btn btn-ghost">Review Quiz</button><button id="retake-btn" class="btn btn-next">Retake Quiz</button></div>
                </div>
`;
            content.classList.add('hidden'); results.classList.remove('hidden'); hintBox.classList.add('hidden'); nav.classList.add('hidden');
            document.getElementById('review-btn').onclick = () => { mode = 'review'; currentIndex = 0; renderQuestion(); };
            document.getElementById('retake-btn').onclick = () => { mode = 'quiz'; currentIndex = 0; shuffleQuestions(); shuffleAnswers(); resetState(); renderQuestion(); };
        }
        
        document.getElementById('prev-btn').onclick = () => { if (currentIndex > 0) { currentIndex--; renderQuestion(); } };
        document.getElementById('next-btn').onclick = () => {
            if (mode === 'review') { if (currentIndex < quizData.length - 1) { currentIndex++; renderQuestion(); } else { mode = 'results'; renderResults(); } return; }
            if (currentIndex < quizData.length - 1) { currentIndex++; renderQuestion(); } else { mode = 'results'; renderResults(); }
        };
        
        document.getElementById('submit-early-btn').onclick = () => {
            if(confirm("確定要提前結束測驗並觀看目前的得分與結果嗎？")) {
                mode = 'results';
                renderResults();
            }
        };
        
        document.getElementById('hint-toggle').onclick = toggleHint; renderQuestion();
    </script>
</body>
</html>
