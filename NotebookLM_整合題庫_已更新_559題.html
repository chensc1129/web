{3}$"}],"hint":"浮體所受浮力等於重力，考慮排水體積佔總體積的比例。","question":"一物體浮在水面上，若物體一半體積沒入水中，物體密度應為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"兩者皆僅含碳與氫，是典型的烷類。","text":"皆為烴類化合物"},{"isCorrect":false,"rationale":"這是正確的能源知識。","text":"甲烷是天然氣的主成分"},{"isCorrect":true,"rationale":"兩者在常溫常壓下皆為氣態；丙烷需經高壓液化（液化石油氣）。","text":"常溫下丙烷是液態而甲烷是氣態"},{"isCorrect":false,"rationale":"身為烴類，其燃燒化學性質一致。","text":"完全燃燒產物皆為二氧化碳與水"}],"hint":"回想天然氣與桶裝瓦斯的儲存與原始狀態。","question":"關於「甲烷」($CH_{4}$) 與「丙烷」($C_{3}H_{8}$)，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"單體是構成聚合物的基本單元，屬於較小的有機分子。","text":"小分子有機化合物"},{"isCorrect":false,"rationale":"乙烯是單體，其聚合成的聚乙烯才是聚合物。","text":"有機聚合物"},{"isCorrect":false,"rationale":"乙烯由碳與氫組成，是有機化合物。","text":"無機化合物"},{"isCorrect":false,"rationale":"乙烯通常來自石油化學工業的裂解產物。","text":"天然聚合物"}],"hint":"單體是製作巨大分子的「零件」。","question":"聚乙烯 ($PE$) 是一種常見的塑膠，其單體為「乙烯」，乙烯屬於下列何者？"},{"answerOptions":[{"isCorrect":false,"rationale":"深度增加，壓力應隨之增加。","text":"壓力減半"},{"isCorrect":true,"rationale":"液體壓力與深度成正比，深度由 $100m$ 變為 $200m$，壓力也隨之加倍。","text":"壓力加倍"},{"isCorrect":false,"rationale":"潛水艇體積不變，排開水量不變，浮力基本不變。","text":"只有浮力會變大"},{"isCorrect":false,"rationale":"深度明顯改變，壓力必然改變。","text":"壓力保持不變"}],"hint":"液體壓力 $P = h \\times D$，其中 $h$ 代表深度。","question":"一艘潛水艇在水下 $100$ 公尺處與 $200$ 公尺處相比，所受的「液體壓力」有何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"食鹽水是中性的，不具中和功能。","text":"食鹽水"},{"isCorrect":false,"rationale":"酒精雖能消毒，但無法中和酸性。","text":"酒精"},{"isCorrect":false,"rationale":"酸與酸不能發生中和反應。","text":"醋酸溶液"},{"isCorrect":true,"rationale":"酸與鹼反應生成鹽和水，可減輕蚊蟲叮咬的酸痛感。","text":"稀薄的小蘇打溶液（鹼性）"}],"hint":"這需要一種弱鹼性物質來對抗酸性。","question":"下列哪一種有機化合物可用於「中和」螞蟻叮咬分泌的甲酸？"},{"answerOptions":[{"isCorrect":false,"rationale":"壓力集中會造成更嚴重的局部形變。","text":"力會造成形變，壓力則不會"},{"isCorrect":false,"rationale":"所有物體皆可傳遞力與壓力。","text":"只有固體有力，液體只有壓力"},{"isCorrect":false,"rationale":"壓力是力的分佈而非總和。","text":"壓力是力的加總結果"},{"isCorrect":true,"rationale":"這精確描述了壓力的物理定義與計算方式。","text":"壓力是垂直作用力除以受力面積"}],"hint":"回想一下壓力公式中的兩個變數。","question":"關於「力」與「壓力」的區分，下列敘述何者最貼切？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是物體重，由於密度大於水，它會沉底。","text":"200 gw"},{"isCorrect":false,"rationale":"這與排水量不符。","text":"50 gw"},{"isCorrect":true,"rationale":"沉體浮力 $B = V_{排} \\times D_{水} = 100 \\times 1 = 100$。","text":"100 gw"},{"isCorrect":false,"rationale":"只要排開流體就有浮力。","text":"0 gw"}],"hint":"沉入水中的物體，其排開水的體積等於「物體體積」。","question":"一物體密度為 $2.0 g/cm^{3}$，體積為 $100 cm^{3}$，放入水中後所受浮力為多少？"},{"answerOptions":[{"isCorrect":true,"rationale":"現代定義以成分為準，有機物必含碳，但須排除 $CO$、$CO_{2}$、碳酸鹽及氰化物等例外。","text":"有機化合物必然含有碳元素，但含碳的不一定是有機化合物"},{"isCorrect":false,"rationale":"燃燒性質並非劃分有機與無機的唯一標準，例如食鹽雖不能燃燒但仍屬無機物。","text":"有機化合物與無機化合物的區別在於是否可以燃燒"},{"isCorrect":false,"rationale":"早期科學家認為有機物需具備「生命力」，但自從實驗室合成尿素後，此定義已被推翻。","text":"有機化合物只能從具有生命力的生物體中取得"},{"isCorrect":false,"rationale":"雖然絕大多數有機物含碳，但某些簡單含碳物如 $CO_{2}$、碳酸鹽等被歸類為無機物。","text":"有機化合物是指所有含有碳元素的化合物"}],"hint":"請思考維勒（Wöhler）在實驗室合成出有機物的科學史意義。","question":"根據現代化學的定義，下列關於「有機化合物」的敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"醋酸、酒精及葡萄糖皆為常見的有機化合物。","text":"醋酸、酒精、葡萄糖、碳酸鈉"},{"isCorrect":true,"rationale":"這幾種含碳物質雖然含碳，但在分類上屬於有機化合物的例外，即無機化合物。","text":"一氧化碳、二氧化碳、碳酸鈣、氫氰酸"},{"isCorrect":false,"rationale":"甲烷（$CH_{4}$）是構造最簡單的有機化合物。","text":"小蘇打、大理石、食鹽、甲烷"},{"isCorrect":false,"rationale":"木炭、鑽石與石墨為元素（單質），不屬於化合物。","text":"木炭、鑽石、石墨、二氧化碳"}],"hint":"注意「元素」與「化合物」的區別，以及含碳但非有機的例外清單。","question":"下列哪一組物質全都是「無機化合物」？"},{"answerOptions":[{"isCorrect":false,"rationale":"乾餾木材會產生多種小分子氣體，其中 $H_{2}$、$CH_{4}$ 與 $CO$ 皆具可燃性。","text":"乾餾產生的可燃性氣體包含氫氣、甲烷與一氧化碳"},{"isCorrect":false,"rationale":"乾餾的定義即為隔絕空氣加熱以促使物質分解。","text":"鋁箔紙的主要功能是隔絕空氣（氧氣）加熱"},{"isCorrect":true,"rationale":"乾餾過程中產生了新物質（如氣體、液體），應屬於化學變化。","text":"乾餾是物理變化，因為產物仍含有原本的碳元素"},{"isCorrect":false,"rationale":"有機物受熱分解後，碳元素常以固體形式殘留。","text":"乾餾後殘留的黑色固體主要成分為木炭（碳）"}],"hint":"判斷物理變化與化學變化的關鍵在於是否有新物質生成。","question":"將竹筷以鋁箔紙包裹後進行「乾餾」實驗，關於此過程的敘述何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"澄清石灰水變混濁代表產生了 $CO_{2}$，其中的碳必來自於待測物。","text":"碳元素"},{"isCorrect":false,"rationale":"氣體來自粉末與氧化銅的反應，石灰水變混濁是 $CO_{2}$ 的特徵。","text":"氧元素"},{"isCorrect":false,"rationale":"氫元素氧化後產生水蒸氣，通常使用氯化亞鈷試紙檢驗。","text":"氫元素"},{"isCorrect":false,"rationale":"氧化銅僅作為氧化劑提供氧，不參與待測物成分的推論。","text":"銅元素"}],"hint":"澄清石灰水是檢驗哪一種氣體的專屬試劑？","question":"在有機化合物檢驗實驗中，若將未知粉末與氧化銅（$CuO$）混合加熱，產生的氣體使澄清石灰水變混濁。這可以證明粉末中含有哪種元素？"},{"answerOptions":[{"isCorrect":false,"rationale":"同分異構物要求總個數也必須相同（分子式相同），而不僅是比例。","text":"原子種類相同，但個數比例（實驗式）相同的化合物"},{"isCorrect":false,"rationale":"同分異構物的分子式必須完全相同，因此分子量也必然相同。","text":"分子量不同，但原子種類相同的化合物"},{"isCorrect":true,"rationale":"結構的不同賦予了它們不同的物理性質與化學性質。","text":"分子式相同，但原子排列方式不同的化合物"},{"isCorrect":false,"rationale":"由於結構不同，同分異構物的化學與物理性質通常都有顯著差異。","text":"化學性質完全相同，但物理性質不同的化合物"}],"hint":"「同分」代表組成的成分相同，「異構」代表構造不同。","question":"關於「同分異構物」的定義，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"乙醇含有 $-OH$ 官能基，而甲醚的氧原子夾在碳鏈中間，性質大不相同。","text":"兩者皆屬於醇類，具有相同的官能基"},{"isCorrect":true,"rationale":"兩者的分子式皆為 $C_{2}H_{6}O$，符合同分異構物的特徵。","text":"兩者的原子個數與種類完全相同"},{"isCorrect":false,"rationale":"結構不同的分子，其化學反應活性與性質亦不相同。","text":"兩者具有完全相同的化學性質"},{"isCorrect":false,"rationale":"若兩者質量相同，由於碳含量相同，燃燒後產生的 $CO_{2}$ 質量理論上也會相同。","text":"兩者燃燒後產生的 $CO_{2}$ 質量不同"}],"hint":"計算兩者的碳、氫、氧原子總數。","question":"乙醇（$C_{2}H_{5}OH$）與甲醚（$CH_{3}OCH_{3}$）互為同分異構物。下列關於兩者的敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"分餾只是將混合物依沸點分開，過程中並未產生新的物質。","text":"石油分餾屬於物理變化"},{"isCorrect":false,"rationale":"分餾是利用物質「沸點」的差異，而非熔點。","text":"分餾是利用成分物質熔點的差異進行分離"},{"isCorrect":false,"rationale":"沸點越低代表越容易揮發成氣體，會由分餾塔的上方排出。","text":"在分餾塔中，沸點越低的成分會由塔底排出"},{"isCorrect":false,"rationale":"分餾出的產物多為具有一定沸點範圍的混合物。","text":"分餾出的產物，如汽油、柴油等皆為純物質"}],"hint":"分離物質的原理是利用物質在相變時的哪一種特性？","question":"石油是重要的有機原料，關於石油的「分餾」，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"碳數較少的烴（如 $C_{1}$ 到 $C_{4}$）在常溫下通常呈氣態。","text":"碳原子數越少的烴類，常溫下多呈固態"},{"isCorrect":true,"rationale":"天然氣以甲烷為主；桶裝瓦斯（液化石油氣）則多包含丙烷與丁烷。","text":"天然氣的主要成分是甲烷，液化石油氣的主要成分是丙烷與丁烷"},{"isCorrect":false,"rationale":"烴類化合物通常難溶於水，屬於疏水性物質。","text":"烴類極易溶於水，因為它們含有碳氫鍵"},{"isCorrect":false,"rationale":"烴類（聽類）是指僅含有碳（$C$）與氫（$H$）兩種元素的有機化合物。","text":"烴類化合物是指只含有碳與氧兩種元素的化合物"}],"hint":"根據中文字「烴」的組合，聯想其組成的元素。","question":"關於烴類（聽類）化合物的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"醇類在水中不會解離出氫氧根離子，其水溶液呈中性。","text":"醇類溶於水後會解離出 $OH^{-}$，使水溶液呈鹼性"},{"isCorrect":false,"rationale":"這類酒精稱為變性酒精，通常含有有毒的甲醇。","text":"工業酒精常加入粉紅色的染料以示警告，避免誤飲"},{"isCorrect":false,"rationale":"甲醇對人體神經系統有強烈毒性，尤其是視神經。","text":"甲醇俗稱木精，具有劇毒，誤飲可能導致失明"},{"isCorrect":false,"rationale":"醇類的定義即為烴中的氫原子被 $-OH$ 基取代而成的化合物。","text":"醇類分子中皆含有 $-OH$ 官能基"}],"hint":"區分「醇類的 $-OH$」與「強鹼解離出的 $OH^{-}$」在化學性質上的差異。","question":"醇類有機化合物具有獨特的特徵。下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"冰醋酸指的是高純度的乙酸，在低溫下凝固的特性。","text":"純乙酸在 $16.7^{\\circ}C$ 以下會凝結成冰狀固體，故稱「冰醋酸」"},{"isCorrect":false,"rationale":"乙酸為弱酸，會使藍色石蕊試紙變為紅色。","text":"乙酸是一種強酸，可使石蕊試紙變為藍色"},{"isCorrect":true,"rationale":"有機酸的共同特徵是含有羧基（$-COOH$）。","text":"乙酸分子的官能基為 $-COOH$"},{"isCorrect":false,"rationale":"雖然分子式是對的，但通常用示性式 $CH_{3}COOH$ 來表達其酸性特徵。","text":"乙酸的分子式可以簡寫為 $C_{2}H_{4}O_{2}$"}],"hint":"思考有機酸在水溶液中的酸鹼性，以及它們共有的結構特徵。","question":"乙酸（醋酸）是生活中常見的有機酸。下列敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"酯類具有特殊的果香味，難溶於水，會分層浮在上層。","text":"生成的酯類不溶於水，且密度通常小於水而浮於水面"},{"isCorrect":false,"rationale":"有機反應通常速度較慢，需要加熱與催化劑輔助。","text":"酯化反應速度極快，不需要加熱即可完成"},{"isCorrect":false,"rationale":"酯化反應是由「有機酸」與「醇類」反應生成的。","text":"酯化反應是由烴類與醇類反應而成的"},{"isCorrect":false,"rationale":"濃硫酸在此反應中擔任催化劑與脫水劑。","text":"反應時需加入濃硫酸，作為氧化劑"}],"hint":"想想酯類在自然界（如水果）中帶來的香氣，以及實驗中如何分離它。","question":"關於「酯化反應」的實驗與性質，下列何者敘述正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"皂化反應是由「油脂」與「強鹼」反應生成的。","text":"皂化反應是由油脂與強酸反應生成的"},{"isCorrect":false,"rationale":"酒精作為界面活性劑（溶劑），能讓油脂與鹼液混合均勻。","text":"反應過程中加入酒精，是為了當作催化劑加速反應"},{"isCorrect":true,"rationale":"皂化產物除了主產物脂肪酸鈉（肥皂），還有副產物丙三醇（甘油）。","text":"皂化反應產生的物質包含肥皂與甘油"},{"isCorrect":false,"rationale":"加入食鹽水是為了進行「鹽析」，讓肥皂析出並浮在液面。","text":"反應結束後加入飽和食鹽水，目的是為了溶解甘油"}],"hint":"肥皂反應的材料包括脂肪。酒精的功能與反應物間的溶解度有關。","question":"有關肥皂的製作（皂化反應），下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"長鏈碳氫結構不具電性，因此屬於親油端。","text":"親水端是由長鏈的碳、氫原子所組成"},{"isCorrect":false,"rationale":"親水端（頭部）通常是帶電荷或極性強的部分，親油端則是長鏈碳氫結構。","text":"親油端通常是帶電荷的原子團"},{"isCorrect":false,"rationale":"肥皂作為界面活性劑，是讓水與油「互相混合」而非排斥。","text":"肥皂分子能使水與油互相排斥，進而帶走汙垢"},{"isCorrect":true,"rationale":"肥皂分子擔任橋樑角色，將油垢包圍後分散於水中。","text":"去污時，親油端會伸入油垢中，親水端則朝向水"}],"hint":"想像肥皂分子像一支長針，哪一端會扎入油滴中？","question":"肥皂分子具有「親水端」與「親油端」。關於肥皂去污原理的敘述，何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"肥皂在硬水中會產生脂肪酸鈣等沉澱而失去效用，合成清潔劑則無此問題。","text":"合成清潔劑在硬水中仍能保有良好的去汙能力"},{"isCorrect":false,"rationale":"合成清潔劑與肥皂的去汙原理相同，皆具有親水與親油端。","text":"合成清潔劑無法使油水互溶，僅能物理性沖刷"},{"isCorrect":false,"rationale":"合成清潔劑多半來自石油化學工業，而肥皂則多來自天然油脂。","text":"合成清潔劑的原料來自於天然植物油，較環保"},{"isCorrect":false,"rationale":"合成清潔劑可以是酸性、中性或鹼性，依設計而定。","text":"合成清潔劑必定是中性的，不會傷手"}],"hint":"考慮水質中含有的鈣、鎂離子對不同清潔劑的影響。","question":"合成清潔劑與肥皂相比，其主要的優點為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"酚醛樹脂是典型具有三度空間網狀結構的熱固性聚合物。","text":"酚醛樹脂"},{"isCorrect":true,"rationale":"具鏈狀結構的聚合物加熱後會軟化，可重新加工利用。","text":"寶特瓶（$PET$）"},{"isCorrect":false,"rationale":"輪胎橡膠具有交聯的網狀結構，屬於熱固性聚合物。","text":"輪胎橡膠"},{"isCorrect":false,"rationale":"電路板需要耐高溫不變形，通常使用熱固性塑膠。","text":"電路板基材"}],"hint":"「熱塑性」意味著受熱後可以變形並回收再利用。","question":"關於聚合物的分類，下列何者屬於「熱塑性聚合物」？"},{"answerOptions":[{"isCorrect":false,"rationale":"澱粉是由許多葡萄糖分子聚合而成的天然大分子。","text":"澱粉"},{"isCorrect":true,"rationale":"聚乙烯是人工合成的塑膠製品，不屬於自然產生的聚合物。","text":"聚乙烯（$PE$）"},{"isCorrect":false,"rationale":"植物細胞壁的主要成分纖維素是常見的天然聚合物。","text":"纖維素"},{"isCorrect":false,"rationale":"蛋白質是由多個胺基酸單體組成的天然聚合物。","text":"蛋白質"}],"hint":"尋找日常生活中常見的人工合成塑膠名稱。","question":"聚合物是由許多單體組成的巨大分子。下列物質中，哪一個「不屬於」天然聚合物？"},{"answerOptions":[{"isCorrect":false,"rationale":"聚合物分子量巨大，常溫下皆為固態。","text":"常溫下為氣態，因為分子間引力較小"},{"isCorrect":false,"rationale":"網狀結構多為熱固性，一旦固化後難以重新熔化回收。","text":"通常具有可以回收重複利用的符號"},{"isCorrect":true,"rationale":"網狀結構因分子間有交聯結合，使其性質較為堅硬且耐熱。","text":"結構中分子鏈之間具有強固的化學鍵結（支鏈連結）"},{"isCorrect":false,"rationale":"這是熱塑性聚合物的特徵，網狀結構受熱不易軟化。","text":"受熱後容易軟化變形，可反覆加工"}],"hint":"想像分子間像織網一樣緊緊扣住，受熱時是否容易滑動？","question":"某種聚合物具有「三度空間網狀結構」，關於此物質的性質敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"運動狀態包括物體運動的速度快慢與方向。","text":"力可以使物體的運動狀態發生改變"},{"isCorrect":true,"rationale":"壓力並非力，而是力在單位面積上的分布，單位為 $kgw/cm^{2}$ 等。","text":"壓力也是力的一種，其單位通常為公斤重（$kgw$）"},{"isCorrect":false,"rationale":"例如捏扁鋁罐，這屬於力造成的形變效應。","text":"力可以使物體的形狀發生改變"},{"isCorrect":false,"rationale":"合力為零時，物體會保持靜止或作等速度運動。","text":"物體受平衡力作用時，其運動狀態不改變"}],"hint":"區分「力」的總量與「力分布在面積上」的概念差異。","question":"力的大小與方向可以用有向線段表示。關於「力」的效應，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"手必須抓握彈簧才能施力，屬於接觸力。","text":"用手拉開彈簧的彈力"},{"isCorrect":false,"rationale":"空氣分子與帆面接觸碰撞產生的推力，屬接觸力。","text":"風吹動帆船前進的力"},{"isCorrect":true,"rationale":"磁力不需透過物體直接接觸即可產生作用。","text":"磁鐵吸引迴紋針的磁力"},{"isCorrect":false,"rationale":"摩擦力發生在兩個接觸面之間，必然是接觸力。","text":"摩擦力阻止物體在地面滑動"}],"hint":"思考哪一種力可以在一段距離外就發揮效用。","question":"下列哪一種力屬於「超距力」（非接觸力）？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是伸長量，而非題目要求的總長度。","text":"$5 cm$"},{"isCorrect":true,"rationale":"$20 gw \\rightarrow 2 cm$；則 $50 gw \\rightarrow 5 cm$。總長 = 原長 $10 cm$ + 伸長 $5 cm$ = $15 cm$。","text":"$15 cm$"},{"isCorrect":false,"rationale":"計算錯誤，應以伸長量加上原長。","text":"$12.5 cm$"},{"isCorrect":false,"rationale":"直接將總長度與外力成正比計算，忽略了原長不為零。","text":"$25 cm$"}],"hint":"注意公式中 $F$ 是與「伸長量」成正比，而非與「總長度」成正比。","question":"根據「虎克定律」，若一彈簧在彈性限度內受到 $20 gw$ 的外力作用，伸長量為 $2 cm$。當外力增加為 $50 gw$ 時，該彈簧的總長度應為多少？（已知原長為 $10 cm$）"},{"answerOptions":[{"isCorrect":true,"rationale":"壓力最小發生在面積最大時（$10 \\times 5 = 50$）。$P = 600 / 50 = 12$。","text":"$12 gw/cm^{2}$"},{"isCorrect":false,"rationale":"這是使用最小面積（$2 \\times 5$）產生的最大壓力。","text":"$60 gw/cm^{2}$"},{"isCorrect":false,"rationale":"這是使用中間大小面積產生的壓力。","text":"$30 gw/cm^{2}$"},{"isCorrect":false,"rationale":"計算錯誤，或是誤用了錯誤的面積數值。","text":"$6 gw/cm^{2}$"}],"hint":"要使壓力最小，應該讓物體與桌面的「接觸面積」最大。","question":"一個長方體金屬塊重 $600 gw$，其長、寬、高分別為 $10 cm$、$5 cm$、$2 cm$。將此金屬塊放置於桌面時，所能產生的「最小壓力」是多少 $gw/cm^{2}$？"},{"answerOptions":[{"isCorrect":false,"rationale":"液體內部任一點各個方向均有壓力。","text":"液體壓力只會產生向下的作用力"},{"isCorrect":false,"rationale":"液體壓力僅與深度及液體密度有關，與容器形狀及底面積無關。","text":"容器底面積越大，底部所受的液體壓力一定越大"},{"isCorrect":false,"rationale":"液體壓力的作用方向必垂直於接觸面。","text":"液體壓力的方向必平行於接觸面"},{"isCorrect":true,"rationale":"根據公式 $P = h \\times d$，深度 $h$ 與壓力 $P$ 成正比。","text":"同一液體中，深度越深的地方，液體壓力越大"}],"hint":"回想潛水時，身體感受到的壓力隨深度變化的經驗。","question":"關於靜止液體中的壓力，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"不論管徑粗細，靜止時液面高度必定相同。","text":"管徑越細的地方，液面會越高"},{"isCorrect":false,"rationale":"特定深度的壓力與體積無關，僅由垂直高度決定。","text":"底部總壓力與容器內水的總體積成正比"},{"isCorrect":true,"rationale":"若底部相通且為同種液體，同一水平面之壓力必相同。","text":"同一水平面上的各點，壓力必定相等"},{"isCorrect":false,"rationale":"大氣壓力會同時作用於所有開口，使其液面達成平衡。","text":"水位高度與大氣壓力無關"}],"hint":"觀察茶壺或供水系統如何利用高度一致來平衡壓力。","question":"利用「連通管原理」，在如下圖所示的容器中裝入水。關於各點壓力的敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"地球重力吸引空氣，導致上方空氣柱對下方產生壓迫力。","text":"大氣壓力是由於空氣的重量所產生的"},{"isCorrect":false,"rationale":"高處上方的空氣柱較短且稀薄，壓力隨高度增加而減少。","text":"海拔越高的地方，大氣壓力越大"},{"isCorrect":false,"rationale":"水銀柱高度僅與大氣壓力平衡的垂直高度有關。","text":"托里切利實驗中，水銀柱的高度會隨玻璃管的粗細而改變"},{"isCorrect":false,"rationale":"$1 atm$ 約等於 $76 cmHg$。","text":"一個標準大氣壓（$1 atm$）恰好等於 $100 cmHg$"}],"hint":"想像頭頂上頂著一根透明的空氣柱。","question":"關於「大氣壓力」的性質與測量，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"除非管內壓力等於大氣壓，否則仍會維持一定高度差。","text":"水銀會完全流回水槽中"},{"isCorrect":false,"rationale":"雖然外壓不變，但管內不再是真空，壓力差變小了。","text":"高度不變，因為大氣壓力沒有改變"},{"isCorrect":false,"rationale":"氣體分子運動產生的壓力會向下推壓水銀柱。","text":"高度增加，因為空氣會將水銀往上吸"},{"isCorrect":true,"rationale":"內部氣壓抵消部分大氣壓力，導致水銀柱支撐的高度下降。","text":"高度減少，因為管內氣體產生向下的壓力"}],"hint":"原本管頂是「真空」，現在多了一個力在「往下推」。","question":"在「托里切利實驗」中，若管內水銀柱垂直高度為 $76 cm$，且管頂為真空。若不慎有微量空氣進入管頂，則水銀柱垂直高度會如何變化？"},{"answerOptions":[{"isCorrect":true,"rationale":"摩擦力是一種阻礙物體發生相對運動或運動趨勢的力。","text":"摩擦力的方向一定與物體運動方向相反"},{"isCorrect":false,"rationale":"在一定範圍內，摩擦力與接觸面積的大小無關。","text":"物體與地面的接觸面積越大，摩擦力就越大"},{"isCorrect":false,"rationale":"若接觸面完全光滑（理想狀態），則無摩擦力產生。","text":"只要物體受力作用，就一定會產生摩擦力"},{"isCorrect":false,"rationale":"最大靜摩擦力與接觸面的粗糙程度及正向力（垂直壓力）有關。","text":"最大靜摩擦力的大小僅取決於推力的大小"}],"hint":"考慮推一個重物時，是哪一種因素讓你覺得「很難推開」。","question":"關於「摩擦力」的性質，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"物體靜止時，靜摩擦力的大小等於水平推力，兩者相互抵消。","text":"$10 kgw$"},{"isCorrect":false,"rationale":"若摩擦力大於推力，物體將向反方向運動，這不符合物理常理。","text":"大於 $10 kgw$"},{"isCorrect":false,"rationale":"這是物體受到的重力（正向力來源），而非水平摩擦力。","text":"$100 kgw$"},{"isCorrect":false,"rationale":"若無摩擦力，物體在施力下必然會移動。","text":"$0 kgw$"}],"hint":"物體維持「靜止」代表水平方向的合力為零。","question":"小明用力推一個重 $100 kgw$ 的箱子，若小明施力 $10 kgw$ 但箱子依然靜止不動。此時箱子受到的摩擦力為多少？"},{"answerOptions":[{"isCorrect":true,"rationale":"完全沒入後，排開體積不再改變，浮力亦不再隨深度增加。","text":"物體沒入液體中越深，所受的浮力就一定越大"},{"isCorrect":false,"rationale":"這是著名的阿基米德原理。","text":"浮力的大小等於物體所排開的液體重量"},{"isCorrect":false,"rationale":"浮力是由流體各個面壓力差造成的總合力，方向向上。","text":"浮力的方向永遠垂直向上"},{"isCorrect":false,"rationale":"只要排開液體，物體就會受到向上的浮力，只是浮力小於重力。","text":"沈在液體底部的物體，依然受到浮力的作用"}],"hint":"當一個石頭完全沉入水中後，繼續往下拉，它排開水的體積有改變嗎？","question":"關於「浮力」的基本概念，下列何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是若木塊完全沒入水中時排開的液體重，但它是浮體。","text":"$100 gw$"},{"isCorrect":true,"rationale":"浮體所受浮力等於物重。物重 = 體積 $100 \\times$ 密度 $0.6 = 60 gw$。","text":"$60 gw$"},{"isCorrect":false,"rationale":"浮在面上的物體依然有重力作用，必有等大的浮力平衡。","text":"$0 gw$"},{"isCorrect":false,"rationale":"這可能是誤算了露出水面的重量。","text":"$40 gw$"}],"hint":"對於「浮體」而言，浮力與重力之間有什麼關係？","question":"密度為 $0.6 g/cm^{3}$ 的木塊浮在水面上（水的密度為 $1 g/cm^{3}$）。若該木塊體積為 $100 cm^{3}$，則木塊所受的浮力為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"若浮力較大，石頭應該會上浮。","text":"石頭在水中所受的浮力大於它的重量"},{"isCorrect":true,"rationale":"因為浮力不足以支撐物重，所以合力向下導致下沉。","text":"石頭在水中所受的浮力小於它的重量"},{"isCorrect":false,"rationale":"只要有體積排開液體，浮力依然存在。","text":"石頭下沉是因為它在水中失去了所有的浮力"},{"isCorrect":false,"rationale":"這是浮體或懸浮體的狀態，下沉物體不適用。","text":"石頭在水中所受的浮力等於它的重量"}],"hint":"判斷沉浮的關鍵在於比較物體密度與液體密度的關係。","question":"將一顆密度為 $2.5 g/cm^{3}$ 的石頭丟入水中，石頭會下沉至底部。關於石頭在水中的浮力與重量敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是現代的定義方式，且仍需排除如二氧化碳等無機物。","text":"所有含碳原子的化合物"},{"isCorrect":false,"rationale":"這與早期「生命力學說」相違背，是後來科學突破後的觀點。","text":"實驗室中可以人工合成的物質"},{"isCorrect":false,"rationale":"早期定義涵蓋所有動植物產物，不限於油脂或特定來源。","text":"僅限於植物中提取的油脂"},{"isCorrect":true,"rationale":"在維勒合成尿素之前，科學界普遍認為有機物只能由生命體透過「生命力」產生。","text":"必須來自於有生命力的生命體"}],"hint":"回想一下以前的人如何看待「生命」與「非生命」物質的區隔。","question":"根據科學史的發展，早期化學家對「有機化合物」的定義為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"葡萄糖是生物體內常見的有機營養素，屬於典型的有機化合物。","text":"葡萄糖 ($C_6H_{12}O_6$)"},{"isCorrect":false,"rationale":"蛋白質是生物體構成的主要成分，屬於複雜的高分子有機化合物。","text":"蛋白質"},{"isCorrect":true,"rationale":"碳酸鹽、氰化物及簡單的一氧化碳、二氧化碳等雖含碳，但性質與無機物相近，故歸類為無機物。","text":"碳酸氫鈉 ($NaHCO_3$)"},{"isCorrect":false,"rationale":"乙醇屬於醇類，是結構中含碳、氫、氧的有機化合物。","text":"乙醇 ($C_2H_5OH$)"}],"hint":"注意含有「碳酸根」家族成員的物質通常不屬於有機物。","question":"下列哪一種含碳化合物，在分類上卻被歸類為「無機化合物」？"},{"answerOptions":[{"isCorrect":false,"rationale":"蒸餾是加熱液體使其氣化再冷凝，用於提純，不涉及木材的化學分解。","text":"蒸餾"},{"isCorrect":true,"rationale":"乾餾是指將有機物隔絕空氣加熱，使其發生熱分解的過程。","text":"乾餾"},{"isCorrect":false,"rationale":"分餾是利用沸點不同來分離混合物（如原油）物理方法，並非分解反應。","text":"分餾"},{"isCorrect":false,"rationale":"燃燒需要氧氣參與，而該實驗強調必須「隔絕空氣」。","text":"燃燒"}],"hint":"這是一種藉由熱能將複雜物質拆解成多種產物的化學過程。","question":"在「認識有機化合物」的實驗中，將木材進行隔絕空氣加熱的過程稱為什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"焦油確實是產物，但屬於「液態」產物，並非殘留的固體。","text":"焦油；黏稠黑色液體"},{"isCorrect":false,"rationale":"二氧化錳是無機實驗常用的催化劑，並非有機物分解的產物。","text":"二氧化錳；黑色催化劑"},{"isCorrect":false,"rationale":"草木灰是木材在空氣中充分燃燒後的灰燼，與隔絕空氣的乾餾不同。","text":"草木灰；白色不可燃"},{"isCorrect":true,"rationale":"乾餾後留下的黑色固體是木炭，主要成分為碳元素，仍具備燃燒釋放能量的特性。","text":"碳；黑色且可燃"}],"hint":"回想一下烤肉時使用的燃料顏色與成分。","question":"竹筷乾餾後的殘餘固體產物主要成份是什麼，其性質為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"石灰水是用於檢驗二氧化碳，即檢驗是否含「碳」元素。","text":"澄清石灰水"},{"isCorrect":false,"rationale":"碘液主要用於檢驗澱粉，而非檢驗特定的化學元素。","text":"碘液"},{"isCorrect":false,"rationale":"試紙初始狀態應為藍色（乾燥），遇水才變為粉紅色。","text":"粉紅色的氯化亞鈷試紙"},{"isCorrect":true,"rationale":"有機物含氫，氧化後產生水，水會使藍色氯化亞鈷試紙變為粉紅色。","text":"藍色的氯化亞鈷試紙"}],"hint":"考慮含氫物質燃燒後會產生的「水」該如何檢驗。","question":"在檢驗有機化合物是否含「氫」元素時，常用哪種試劑來觀察顏色變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"同分異構物是有機化學中極為重要且普遍的現象。","text":"僅存在於無機化合物中的特殊現象"},{"isCorrect":false,"rationale":"這指的是單一化合物的分子結構特性，而非混合物的濃度比例。","text":"重量百分濃度相同的兩種混合物"},{"isCorrect":false,"rationale":"雖然組成相同，但結構不同會導致物理與化學性質迥異。","text":"組成元素比例相同，所以化學性質也相同"},{"isCorrect":true,"rationale":"同分異構物擁有相同的原子種類與數量，但結構決定了不同的化學性質。","text":"分子式相同，但原子排列方式不同"}],"hint":"想想「乙醇」與「甲醚」的關係：材料一樣但組裝出的東西不同。","question":"有關「同分異構物」的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"加入溶質通常會提高沸點，且實驗目的是加熱反應，並非降低沸點。","text":"降低反應溶液的沸點"},{"isCorrect":false,"rationale":"酯化反應是在酸性環境下進行，產物也非鹼性。","text":"中和產生的鹼性物質"},{"isCorrect":true,"rationale":"濃硫酸具有脫水性與催化作用，能加速酯化反應並使平衡向產物方向移動。","text":"作為催化劑並吸收反應產生的水"},{"isCorrect":false,"rationale":"硫酸根並不會出現在酯類的結構中，它僅輔助反應進行。","text":"作為主要的反應物，參與酯的構成"}],"hint":"這是一種化學中的「助攻手」，既能加快速度也能移走干擾物。","question":"在有機酸與醇類的反應中，加入濃硫酸的主要目的是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是典型的酸鹼中和反應，產生的是無機鹽類。","text":"鹽酸 $+$ 氫氧化鈉 $\\rightarrow$ 食鹽 $+$ 水"},{"isCorrect":false,"rationale":"這是酯化反應，產物通常具有香味，而肥皂則是用於清潔。","text":"有機酸 $+$ 醇 $\\rightarrow$ 酯 $+$ 水"},{"isCorrect":true,"rationale":"皂化反應是利用動植物油脂與鹼液反應，生成脂肪酸鈉（肥皂）與丙三醇（甘油）。","text":"油脂 $+$ 強鹼 $\\rightarrow$ 肥皂 $+$ 甘油"},{"isCorrect":false,"rationale":"這是生物學中的呼吸作用或燃燒反應。","text":"葡萄糖 $+$ 氧氣 $\\rightarrow$ 二氧化碳 $+$ 水"}],"hint":"肥皂的「肥」字暗示了原料中包含某種黏膩的物質。","question":"製作肥皂的「皂化反應」方程式，可以用下列哪一項來表示？"},{"answerOptions":[{"isCorrect":false,"rationale":"肥皂水雖顯鹼性，但氫氧根離子並非肥皂分子的去污結構主體。","text":"氫氧根離子"},{"isCorrect":false,"rationale":"甘油是皂化反應的副產物，通常會被分離或僅具保濕作用，無清潔力。","text":"甘油分子"},{"isCorrect":false,"rationale":"帶電的一端具有極性，負責與水分子結合，稱為「親水端」。","text":"帶電荷的鈉離子頭部"},{"isCorrect":true,"rationale":"長碳鏈結構的性質與油污相似（非極性），因此能與油垢結合。","text":"碳氫長鏈（碳鏈）"}],"hint":"考慮「同性相吸」原理，什麼樣的結構會和油脂「長得很像」？","question":"肥皂分子中具備「去污能力」的長鏈結構稱為「親油端」，其主要成分是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"酒精是溶劑，不參與反應，最後通常會揮發或被洗去。","text":"作為產物之一，增加肥皂產量"},{"isCorrect":false,"rationale":"這是「鹽析」步驟中食鹽水的功能，並非酒精。","text":"降低肥皂在水中的溶解度以析出固體"},{"isCorrect":false,"rationale":"酒精是中性物質，無法中和鹼液；肥皂的鹼性來自反應過程。","text":"中和強鹼，避免肥皂腐蝕皮膚"},{"isCorrect":true,"rationale":"油脂不溶於水，加入酒精作為共溶劑可打破界面，加速反應進行。","text":"溶解油脂與鹼液，增加接觸機會"}],"hint":"回想一下油和水如果不互溶，反應速度會如何？酒精能幫忙嗎？","question":"在皂化實驗中，加入酒精的目的為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"儘管成分不同，但發揮清潔作用的基本分子構型是一致的。","text":"兩者的去污原理皆具備親水端與親油端結構"},{"isCorrect":false,"rationale":"這是兩者來源的主要差異，肥皂較古老，清潔劑為現代石化產物。","text":"肥皂通常由動植物油脂製成，合成清潔劑多來自石油化學原料"},{"isCorrect":true,"rationale":"肥皂在含鈣、鎂離子的硬水中會產生沉澱而失效；合成清潔劑則較不受影響。","text":"兩者在硬水中皆能保持優良的清潔效果"},{"isCorrect":false,"rationale":"合成清潔劑具備可調控性，中性配方對皮膚與纖維較溫和。","text":"肥皂水溶液呈弱鹼性，合成清潔劑則可設計為中性"}],"hint":"回想一下哪一種清潔用品在山泉水（硬水）中洗頭會感覺乾澀且沒泡沫？","question":"關於「合成清潔劑」與「肥皂」的比較，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"這可能是單純將受力增加的差值（$30\\text{ gw}$）與原始伸長量相加的直覺錯誤。","text":"$14\\text{ cm}$"},{"isCorrect":false,"rationale":"這可能是將長度與力量反向計算比例的錯誤。","text":"$25\\text{ cm}$"},{"isCorrect":false,"rationale":"這可能是誤算正比關係或將數據帶錯比例所得出的結果。","text":"$8\\text{ cm}$"},{"isCorrect":true,"rationale":"根據 $F=kx$，伸長量與外力成正比。$\\frac{20}{4} = \\frac{50}{x}$，求得 $x=10$。","text":"$10\\text{ cm}$"}],"hint":"利用「伸長量」與「外力」的正比關係進行十字交叉相乘。","question":"在虎克定律實驗中，若彈簧下端懸掛 $20\\text{ gw}$ 的物體，彈簧伸長量為 $4\\text{ cm}$；若改掛 $50\\text{ gw}$ 的物體且未超過彈性限度，則伸長量為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"磁力、重力（萬有引力）與靜電力皆不需要介質接觸即可跨越空間作用。","text":"磁力"},{"isCorrect":false,"rationale":"彈力源於彈性體受力變形，需透過接觸傳遞力道。","text":"彈力"},{"isCorrect":false,"rationale":"摩擦力必須發生在兩個互相接觸且有相對運動趨勢的面之間。","text":"摩擦力"},{"isCorrect":false,"rationale":"浮力必須由流體（液體或氣體）接觸並包圍物體才能產生。","text":"浮力"}],"hint":"想想看，磁鐵吸引迴紋針時，兩者一定要碰到嗎？","question":"下列哪一種力不需要物體互相接觸即可發揮作用，稱為「超距力」？"},{"answerOptions":[{"isCorrect":false,"rationale":"若摩擦力大於推力，物體將會往反方向移動，這不符合物理事實。","text":"摩擦力大於推力，所以推不動"},{"isCorrect":true,"rationale":"物體靜止表示合力為零，此時「靜摩擦力」會與外加推力大小相等、方向相反。","text":"摩擦力的大小等於小明施加的推力"},{"isCorrect":false,"rationale":"正是因為有摩擦力抵消了推力，物體才無法移動。","text":"此時沒有摩擦力存在，因為物體沒動"},{"isCorrect":false,"rationale":"重量影響最大靜摩擦力的限度，但不直接等於此時的靜摩擦力。","text":"摩擦力的大小等於物體的重量"}],"hint":"處於「平衡狀態」的物體，所受的合力應該是多少？","question":"小明用力推動一只重物，但重物仍靜止不動，此時關於摩擦力的敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"在正向力與接觸面性質相同時，摩擦力與接觸面積的大小無關。","text":"增加鞋底與地面的接觸面積"},{"isCorrect":false,"rationale":"撒砂子是改變接觸面的材質，使其變得粗糙以增加摩擦力。","text":"在結冰的路面上撒砂子"},{"isCorrect":false,"rationale":"增加表面粗糙度可以顯著提高摩擦係數，達到止滑效果。","text":"在鞋底設計凹凸不平的紋路"},{"isCorrect":false,"rationale":"摩擦力與正向力成正比，壓力越大，最大靜摩擦力也越大。","text":"增加背負的重量（正向力）"}],"hint":"回想一下摩擦力的公式，是否包含「面積」這一項參數？","question":"如果要減少行走時滑倒的危險，增加地面與鞋底間的摩擦力，下列方法何者無效？"},{"answerOptions":[{"isCorrect":false,"rationale":"這可能是數值計算中位數移動（除法單位換算）出現錯誤。","text":"$4\\text{ kgw/cm}^2$"},{"isCorrect":false,"rationale":"這是只計算單腳面積所得出的錯誤結果。","text":"$0.4\\text{ kgw/cm}^2$"},{"isCorrect":true,"rationale":"雙腳總面積為 $300\\text{ cm}^2$。壓力 $P = \\frac{60}{300} = 0.2$。","text":"$0.2\\text{ kgw/cm}^2$"},{"isCorrect":false,"rationale":"這是誤將力量與面積相乘所得出的結果，並非壓力。","text":"$9000\\text{ kgw}\\cdot\\text{cm}^2$"}],"hint":"計算壓力時，記得考慮它是用「雙腳」站立，總面積是多少？","question":"一名體重 $60\\text{ kgw}$ 的男士站在地板上，若其每隻腳掌面積為 $150\\text{ cm}^2$，則他雙腳站立時對地板產生的壓力為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"在同一種靜止液體中，相同水平面的壓力必然相等。","text":"在液體中，相同深度的各點壓力可能不同"},{"isCorrect":true,"rationale":"液體壓力 $P = hD$，隨垂直深度 $h$ 增加而線性成長。","text":"同一液體中，深度越深的地方壓力越大"},{"isCorrect":false,"rationale":"壓力僅與深度及密度有關，與容器的粗細或水量多少無直接關係。","text":"容器形狀越細長，底部壓力一定越小"},{"isCorrect":false,"rationale":"靜止液體中，任一點所受壓力是來自四面八方的，且垂直於接觸面。","text":"液體壓力的方向一律向上"}],"hint":"潛水員下潛得越深，耳朵感受到的擠壓感會如何變化？","question":"關於液體壓力的特性，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這可能是誤用除法（$76/13.6$）而非乘法比例關係的結果。","text":"$5.6\\text{ cm}$"},{"isCorrect":false,"rationale":"這是誤以為所有液體在相同大氣壓下高度皆相同的錯誤想法。","text":"$76\\text{ cm}$"},{"isCorrect":false,"rationale":"這可能是將單位由公分誤記為公尺後的數值混淆。","text":"$10\\text{ cm}$"},{"isCorrect":true,"rationale":"大氣壓力固定，液柱壓力 $P=hD$。$76 \\times 13.6 = h \\times 1$，故 $h=1033.6$。","text":"$1033.6\\text{ cm}$"}],"hint":"水比水銀輕很多，要達到同樣的壓力，水柱必須變高還是變矮？","question":"在托里切利實驗中，若在海平面處使用水銀（密度 $13.6\\text{ g/cm}^3$）進行實驗，垂直高度為 $76\\text{ cm}$。若改用水進行實驗，其水柱垂直高度約為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"液壓千斤頂利用小面積施力產生大面積舉力，是典型的應用。","text":"千斤頂舉起重物"},{"isCorrect":true,"rationale":"吸飲料是利用「大氣壓力差」，並非密閉液體傳遞壓力的帕斯卡原理。","text":"吸管吸取飲料"},{"isCorrect":false,"rationale":"手術床的升降機構通常利用液壓傳動原理進行微調。","text":"醫生使用的液壓手術床"},{"isCorrect":false,"rationale":"煞車系統利用密閉油路傳遞壓力，符合帕斯卡原理。","text":"汽車的液壓煞車系統"}],"hint":"帕斯卡原理強調「密閉液體」內部壓力的傳遞。","question":"有關「帕斯卡原理」的應用，下列哪一項不是其範例？"},{"answerOptions":[{"isCorrect":false,"rationale":"若浮力小於重力，萬噸油輪將會沉入海底。","text":"小於船隻受到的重力"},{"isCorrect":true,"rationale":"物體浮在液面上時處於平衡狀態，向上浮力必等於向下重力。","text":"等於船隻的總重量"},{"isCorrect":false,"rationale":"浮力等於「排開液體的重量」，並非單純等於體積數值。","text":"等於船隻沒入水下部分的體積"},{"isCorrect":false,"rationale":"若浮力大於重量，船隻會向上加速直到露出更多體積使浮力減小至等於重量。","text":"大於船隻的總重量"}],"hint":"思考「浮體」處於靜止平衡時，合力應該是多少？","question":"一艘萬噸鋼鐵油輪能浮在海面上，主要是因為其受到的浮力為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"這是阿基米德原理的核心定義，浮力 $B = V_{排} \\times D_{液}$。","text":"物體排開液體的重量"},{"isCorrect":false,"rationale":"這僅在「浮體」情況下數值相等，並非浮力的物理起源定義。","text":"物體在空氣中的重量"},{"isCorrect":false,"rationale":"體積乘密度得出的是「物重」，而非液體提供的向上浮力。","text":"物體的體積乘以物體的密度"},{"isCorrect":false,"rationale":"深度影響的是壓力大小，浮力則與排開液體之總量相關。","text":"容器中液體的總深度"}],"hint":"想想看，物體進入水中後，水面為什麼會上升？上升的那部分水與浮力有何關係？","question":"阿基米德原理指出，物體在液體中所受的浮力等於什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"這忽略了冰原本排開的水重已等於其總重的事實。","text":"上升，因為原本露出的部分入水"},{"isCorrect":false,"rationale":"這是基於物理定律的必然結果，與冰塊絕對大小無關。","text":"無法判斷，需視冰塊大小而定"},{"isCorrect":false,"rationale":"雖然密度增加體積縮小，但冰原本就有一部分露在水面上，縮小部分剛好抵消。","text":"下降，因為冰變成水體積縮小"},{"isCorrect":true,"rationale":"冰融化後變成水的重量等於冰原本排開的水重，體積剛好填補原本排開的位置。","text":"保持不變"}],"hint":"冰塊是浮體，它排開水的重量等於它的總重。融化後它變成什麼？","question":"當冰塊浮在水面上融化後，若不考慮蒸發，水面的高度將如何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"這可能是錯誤地將體積與重量相加所得出的無意義數值。","text":"$160\\text{ gw}$"},{"isCorrect":false,"rationale":"這是誤將物體「總體積」直接當作排開水重的錯誤計算。","text":"$100\\text{ gw}$"},{"isCorrect":true,"rationale":"木塊密度小於水，為浮體。浮力 $=$ 物重 $= 100 \\times 0.6 = 60$。","text":"$60\\text{ gw}$"},{"isCorrect":false,"rationale":"這可能是誤用露出水面的比例進行錯誤運算的結果。","text":"$40\\text{ gw}$"}],"hint":"先判斷木塊會浮起來還是沉下去，再決定使用哪種浮力計算方式。","question":"一塊密度為 $0.6\\text{ g/cm}^3$ 的木塊丟入水中，已知木塊體積為 $100\\text{ cm}^3$，則其在水中受到的浮力為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"只要管口不離開液面且高度足夠，大氣壓依然會支撐液柱。","text":"消失，水銀會全部流回槽中"},{"isCorrect":false,"rationale":"壓力是由大氣壓決定的恆定量，垂直高度不會因此縮短。","text":"變短，因為受力面積變大"},{"isCorrect":true,"rationale":"大氣壓力支撐的是「垂直高度」的水銀柱，與管子的傾斜角度或粗細無關。","text":"保持不變"},{"isCorrect":false,"rationale":"管內水銀沿斜面長度確實增加，但題幹問的是「垂直高度」。","text":"變長，沿著管壁的長度增加"}],"hint":"區分「沿管長度」與「垂直高度」的不同。","question":"在托里切利實驗中，若將水銀管由垂直改為傾斜，則管內水銀柱的「垂直高度」將會如何？"},{"answerOptions":[{"isCorrect":false,"rationale":"水的化學性質與分子結構在高山上保持一致，無物理變化。","text":"高山上的水分子結構發生改變"},{"isCorrect":false,"rationale":"雖然氧氣稀薄，但主要影響燃燒效率，而非直接影響水的沸騰溫度。","text":"山上含氧量低，火不夠旺"},{"isCorrect":true,"rationale":"高山氣壓低，水在不到 $100^{\\circ}C$ 時就沸騰，熱量不足以煮熟米飯。","text":"大氣壓力較低，導致水的沸點下降"},{"isCorrect":false,"rationale":"熱散失雖快，但若水溫能達 $100^{\\circ}C$ 仍可煮熟，關鍵在於氣壓影響沸點。","text":"山上氣溫太低，熱量散失快"}],"hint":"考慮「氣壓」與「沸點」之間的關係。","question":"登山客在高山上煮飯時發現米飯難以煮熟，主要原因是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是利用白努利定律或氣流造成的壓力改變，不屬連通管範疇。","text":"噴霧器將藥水噴成細霧狀"},{"isCorrect":true,"rationale":"相連通的管路中，靜止液體會趨於相同液面高度，可用於配水。","text":"自來水供水系統利用水塔與各戶的高低差供水"},{"isCorrect":false,"rationale":"機翼升力主要源於流體流速與壓力的關係。","text":"飛機機翼產生的升力"},{"isCorrect":false,"rationale":"這是利用口內與杯外的大氣壓力差，而非連通管平衡。","text":"利用吸管喝珍珠奶茶"}],"hint":"想想看，為什麼住家裡的水龍頭一開就有水？水是從哪裡流下來的？","question":"有關「連通管原理」的應用，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是金屬塊在水中的「視重」，即彈簧秤的讀數。","text":"$420\\text{ gw}$"},{"isCorrect":true,"rationale":"浮力等於物體在空氣中的重量與液體中重量的差值（減輕的重量）。","text":"$80\\text{ gw}$"},{"isCorrect":false,"rationale":"這是金屬塊的實際重量，除非它是浮體，否則浮力不等於此值。","text":"$500\\text{ gw}$"},{"isCorrect":false,"rationale":"誤將空氣中重量與水中重量相加，並無物理意義。","text":"$920\\text{ gw}$"}],"hint":"當物體進入水中後變輕了，變輕的那部分重量是誰提供的？","question":"一個金屬塊分別在空氣中秤得 $500\\text{ gw}$，沒入水中秤得 $420\\text{ gw}$，則此金屬塊受到的浮力為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然大多數有機物含氫，但「不含氫」並非判斷無機的絕對標準（如四氯化碳是有機物）。","text":"二氧化碳分子中不含氫原子"},{"isCorrect":false,"rationale":"甲烷等許多烴類也是氣體，狀態並非區分有機與無機的標準。","text":"二氧化碳是氣體，而有機物都是固體或液體"},{"isCorrect":false,"rationale":"可燃性是有機物的常見特徵，但不能作為科學分類的唯一依據。","text":"二氧化碳無法進行燃燒反應"},{"isCorrect":true,"rationale":"早期歸類基於來源與性質，二氧化碳廣泛存在於大氣與礦石中，非生命特有。","text":"其性質較接近礦物等無機物質且不具生命特徵結構"}],"hint":"回想課程中提到的「例外情況」，這些物質通常在生命出現前就存在於環境中。","question":"在「認識有機化合物」單元中，提到二氧化碳不屬於有機物。下列哪一項敘述可用來解釋其主要原因？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然沸點不同，但操作複雜且危險，不如加水測試直觀。","text":"測量兩者的沸點是否超過 $100^{\\circ}C$"},{"isCorrect":false,"rationale":"兩者皆非磁性物質，磁鐵無反應。","text":"使用磁鐵測試是否有磁性"},{"isCorrect":false,"rationale":"兩者在純淨狀態下皆為無色透明液體，無法目測區分。","text":"觀察液體是否有顏色"},{"isCorrect":true,"rationale":"乙酸能與水互溶；乙酸乙酯屬於酯類，不溶於水且會浮在水面上。","text":"加入水中觀察是否互溶"}],"hint":"想想看，哪一種物質通常聞起來像水果，而且和水「不對盤」？","question":"如果要辨別兩杯無色液體分別為「乙酸」與「乙酸乙酯」，下列哪種方法最簡單且有效？"},{"answerOptions":[{"isCorrect":true,"rationale":"這項突破打破了「有機物必來自生命體」的舊觀念，促使科學家重新定義有機化合物。","text":"科學家在實驗室中成功利用無生命物質合成出原本認為僅能由生命體產生的有機物。"},{"isCorrect":false,"rationale":"事實上，科學家發現所有生命體產生的有機物都含有碳元素。","text":"科學家發現所有生命體都不含碳元素，因此必須更改定義。"},{"isCorrect":false,"rationale":"無機物不一定含碳，且分類混亂是因為有機物的來源不再局限於生物。","text":"無機化合物被證明一定含有碳元素，導致分類混亂。"},{"isCorrect":false,"rationale":"舊定義的傾覆正是因為有機物可以在實驗室中「憑空」做出來。","text":"有機化合物被發現無法在實驗室中合成，只能從天然礦石提取。"}],"hint":"思考人工合成尿素的實驗對化學史的意義。","question":"根據理化老師的說法，下列關於有機化合物「舊定義」被推翻的原因，何者敘述最正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"葡萄糖是標準的有機化合物。","text":"葡萄糖（$C_{6}H_{12}O_{6}$）、食鹽（$NaCl$）、水（$H_{2}O$）"},{"isCorrect":false,"rationale":"酒精與蛋白質皆為有機化合物。","text":"酒精（$C_{2}H_{5}OH$）、蛋白質、木炭"},{"isCorrect":true,"rationale":"這些雖然含碳，但屬於有理化老師提到的例外情況（氧化物、碳酸鹽、氰化物）。","text":"一氧化碳（$CO$）、碳酸鈣（$CaCO_{3}$）、氰化鈉（$NaCN$）"},{"isCorrect":false,"rationale":"醋酸是含碳且具有特定性質的有機化合物。","text":"二氧化碳（$CO_{2}$）、醋酸（$CH_{3}COOH$）、小蘇打（$NaHCO_{3}$）"}],"hint":"注意含有碳元素但被歸類為無機物的特定族群。","question":"下列哪一組物質「全部」都屬於無機化合物？"},{"answerOptions":[{"isCorrect":true,"rationale":"乾溜的定義是隔絕空氣加熱，否則碳會與氧結合變成氣體散失。","text":"為了隔絕空氣中的氧氣，防止竹筷直接燃燒成二氧化碳。"},{"isCorrect":false,"rationale":"竹筷受熱會分解而非熔化，包裹的主因是為了控制反應環境。","text":"為了保持竹筷的溫度均衡，避免局部過熱熔化。"},{"isCorrect":false,"rationale":"產生的氣體會從留下的開口排出，鋁箔紙並無吸收氣體的功能。","text":"鋁箔紙能吸收產生的毒氣，保護實驗者安全。"},{"isCorrect":false,"rationale":"鋁箔紙在此實驗中僅作為物理性的隔絕屏障，不具催化作用。","text":"鋁箔紙可以作為催化劑，加速竹筷分解。"}],"hint":"乾溜與一般燃燒最大的差別在於反應環境的氧氣含量。","question":"在進行「乾溜」實驗時，為何需要使用鋁箔紙將竹筷緊密包裹？"},{"answerOptions":[{"isCorrect":false,"rationale":"一氧化碳在常溫下是氣態，且不具備酸鹼性。","text":"一氧化碳"},{"isCorrect":false,"rationale":"乾溜過程中會產生二氧化碳氣體，並非直接產生液態碳酸。","text":"碳酸"},{"isCorrect":false,"rationale":"焦油雖是液態，但性質黏稠且呈黑色，並非酸性主要來源。","text":"焦油"},{"isCorrect":true,"rationale":"乾溜產生的液體包含醋酸與焦油，其中醋酸具有酸性。","text":"醋酸"}],"hint":"尋找乾溜液體中具有「酸味」性質的物質。","question":"竹筷乾溜後，其產物中屬於「液態」且能使石蕊試紙變紅的是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"結構雖然不同，但包含的原子種類與數量一致，故分子量相同。","text":"因為乙醇含有 $OH$ 基，而甲醚沒有，所以兩者的分子量不同。"},{"isCorrect":true,"rationale":"這是同分異構物的核心定義：組成材料相同但「長相」不同。","text":"兩者的分子式相同，但原子排列結構不同，因此化學性質迥異。"},{"isCorrect":false,"rationale":"同分異構物的組成元素種類與原子總數是完全相同的。","text":"兩者的組成元素種類不同，所以是不同的物質。"},{"isCorrect":false,"rationale":"兩者結構極不對稱，乙醇屬醇類而甲醚屬醚類，性質差別很大。","text":"甲醚與乙醇在結構上完全對稱，性質極為相似。"}],"hint":"關鍵在於「分子式」與「結構式」的差異。","question":"老師提到「同分異構物」是有機化學中非常重要的概念。下列關於乙醇（酒精）與甲醚的敘述，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"乙酸乙酯屬於酯類，結構中含有氧元素。","text":"乙酸乙酯"},{"isCorrect":true,"rationale":"丙烷屬於「烴類」（聽類），性質上僅含有碳與氫。","text":"丙烷（桶裝瓦斯主要成分）"},{"isCorrect":false,"rationale":"乙酸含有 $COOH$ 官能基，且含有氧元素。","text":"乙酸"},{"isCorrect":false,"rationale":"甘油屬於醇類，含有 $OH$ 官能基。","text":"甘油"}],"hint":"回想「聽類」這個字的造字原理。","question":"下列哪一種化合物在結構上「不含」 $OH$ 或 $COOH$ 等官能基，且僅由碳與氫組成？"},{"answerOptions":[{"isCorrect":false,"rationale":"加入酒精是工藝需求，香味通常是事後額外添加的香精。","text":"為了讓肥皂產生特殊的酒香味，提升產品品質。"},{"isCorrect":true,"rationale":"油脂不溶於水，酒精能讓反應物混合均勻，提高碰撞頻率。","text":"作為界面活性劑，幫助油與氫氧化鈉溶液互相溶解以增加反應機會。"},{"isCorrect":false,"rationale":"反應物是油脂與強鹼，酒精只是輔助反應進行的溶劑。","text":"酒精是反應物之一，會與油脂結合生成肥皂。"},{"isCorrect":false,"rationale":"實驗需加熱進行，酒精並非用於冷卻目的。","text":"利用酒精的揮發性帶走反應產生的熱量，防止容器炸裂。"}],"hint":"油脂與強鹼溶液在常溫下是分層的，需解決互溶問題。","question":"在製作肥皂的「造化反應」中，加入酒精的主要目的是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"鹽析屬於物理變化，甘油仍留在下方的食鹽水中。","text":"鹽析是利用化學反應將甘油轉化為食鹽，方便後續清理。"},{"isCorrect":true,"rationale":"食鹽水密度大且讓肥皂溶解度下降，進而將肥皂排擠出來。","text":"利用肥皂不溶於濃食鹽水的特性，使肥皂與甘油分離並浮出液面。"},{"isCorrect":false,"rationale":"食鹽是中性鹽類，無法有效中和強鹼，且其目的是物理分離。","text":"加入食鹽是為了中和剩餘的強鹼，讓肥皂變為中性。"},{"isCorrect":false,"rationale":"肥皂密度較小且受食鹽水推擠，會浮在液體上方。","text":"鹽析後沈澱在杯底的白色固體即為純淨的肥皂。"}],"hint":"思考加入飽和食鹽水後，混合物產生的物理層次變化。","question":"有關「鹽析」步驟的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"兩者來源剛好相反：肥皂源自天然油脂，清潔劑常源自石化產品。","text":"肥皂是石油化學工業的產物，合成清潔劑則是利用油脂製作。"},{"isCorrect":false,"rationale":"兩者去污原理相同，皆具備親油端與親水端。","text":"肥皂與合成清潔劑的去污原理完全不同。"},{"isCorrect":true,"rationale":"這是合成清潔劑相對於肥皂（會產生沈澱）的重要優勢。","text":"合成清潔劑在硬水中（含 $Ca^{2+}$、$Mg^{2+}$）仍能保有良好的去污效果。"},{"isCorrect":false,"rationale":"肥皂的鹼性其實會破壞某些蛋白質纖維（如羊毛）。","text":"肥皂呈鹼性不傷衣料，合成清潔劑呈酸性會腐蝕蛋白質。"}],"hint":"考慮「硬水」與「酸鹼性」對兩者的影響。","question":"關於肥皂與合成清潔劑的比較，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"只要有嘗試推動的趨勢，接觸面就會產生抵銷推力的摩擦力。","text":"0"},{"isCorrect":true,"rationale":"木塊靜止代表合力為零，靜摩擦力必須剛好抵銷外力。","text":"5 公斤重"},{"isCorrect":false,"rationale":"這是木塊的重量（向下），並非水平方向的摩擦力。","text":"10 公斤重"},{"isCorrect":false,"rationale":"若摩擦力大於施力，木塊會往推力相反方向運動，這不符合物理邏輯。","text":"大於 5 公斤重"}],"hint":"靜止狀態意味著水平方向上的合力關係。","question":"當我們用力推動一個 10 公斤重的木塊，若施力 5 公斤重時木塊仍靜止不動，此時木塊受到的摩擦力為多少？"},{"answerOptions":[{"isCorrect":true,"rationale":"20 克重使伸長量增加 2 公分（12-10），則 50 克重會使伸長量增加 5 公分，總長為 10+5=15。","text":"15 公分"},{"isCorrect":false,"rationale":"此計算可能誤將總長度直接與重量成正比，忽視了原長的存在。","text":"25 公分"},{"isCorrect":false,"rationale":"伸長量與重量成正比，50 克重的伸長量應為 5 公分而非 7 公分。","text":"17 公分"},{"isCorrect":false,"rationale":"這只是「伸長量」，題目問的是彈簧的「總長度」。","text":"5 公分"}],"hint":"虎克定律指出「伸長量」與「外力」成正比，而非總長度。","question":"在彈簧秤實驗中，原長 10 公分的彈簧掛上 20 克重的砝碼後長度變為 12 公分。若改掛 50 克重的砝碼（未超過彈性限度），彈簧的總長度應為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"針頭端的設計是為了減少壓力保護手指，增加壓力的是尖端。","text":"圖釘的針頭設計成寬大的圓盤狀。"},{"isCorrect":false,"rationale":"這是為了增大受力面積以減少對地面的壓力，防止下陷。","text":"坦克車使用寬大的履帶前進。"},{"isCorrect":false,"rationale":"增大面積是為了降低單位面積受力，讓人浮在雪面上。","text":"滑雪板設計得很寬長。"},{"isCorrect":true,"rationale":"減少受力面積 $A$，可以使相同的力 $F$ 產生更大的壓力 $P$。","text":"菜刀的刀鋒磨得很薄、很鋒利。"}],"hint":"壓力的大小與受力面積的大小成反比。","question":"關於壓力（$P = F / A$）的概念，下列哪一個生活實例是為了「增加壓力」而設計的？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是面積最大的面，產生的壓力應為最小。","text":"$5 \times 4$ 的面"},{"isCorrect":true,"rationale":"受力面積最小（12 $cm^{2}$），在重量固定的情況下壓力最大。","text":"$4 \times 3$ 的面"},{"isCorrect":false,"rationale":"壓力與受力面積有關，只有施力（重量）是一樣的。","text":"不論哪一面，壓力都一樣。"},{"isCorrect":false,"rationale":"此面積介於中間，壓力並非極大或極小值。","text":"$5 \times 3$ 的面"}],"hint":"相同的重量下，面積越小則壓力越集中。","question":"一長方體金屬塊尺寸為 $5 \times 4 \times 3$ cm，將其以不同面放置於水平地面。請問以哪一個面接觸地面時，產生的「壓力最大」？"},{"answerOptions":[{"isCorrect":true,"rationale":"液體壓力與深度成正比，因為上方承載的液柱重量較多。","text":"在同一種液體中，深度越深的地方壓力越大。"},{"isCorrect":false,"rationale":"液體內任一點受到的壓力在各方向大小皆相等，且必垂直於接觸面。","text":"液體壓力的方向一律向下，與重力方向相同。"},{"isCorrect":false,"rationale":"液體壓力只看垂直深度，與容器的形狀或胖瘦無關。","text":"裝水的圓錐形瓶底壓力，會隨著瓶口變窄而變大。"},{"isCorrect":false,"rationale":"需考量液體密度，若密度不同則壓力亦不相同。","text":"在不同容器中，只要水面一樣高，容器底部的總壓力必相等。"}],"hint":"液體壓力主要受到兩個變數的影響：深度與液體種類。","question":"關於靜止液體內部的壓力（$P = h \times D$），下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"76 是水銀柱的「高度」單位為 cmHg，並非壓力單位 $gw/cm^{2}$。","text":"76"},{"isCorrect":false,"rationale":"1 代表的是「一大氣壓」（atm），數值不同。","text":"1"},{"isCorrect":true,"rationale":"$76 \text{ cm} \times 13.6 \text{ g/cm}^{3} = 1033.6 \text{ gw/cm}^{2}$。","text":"1033.6"},{"isCorrect":false,"rationale":"這是水銀的密度，單一密度數值無法代表大氣壓力。","text":"13.6"}],"hint":"利用液體壓力公式計算垂直水銀柱底部的壓力。","question":"托里切利在海平面進行水銀（密度 13.6 $g/cm^{3}$）測量實驗。若管內水銀柱高度為 76 公分，此時的大氣壓力約為多少 $gw/cm^{2}$？"},{"answerOptions":[{"isCorrect":false,"rationale":"大氣壓力作用於水面或物體外部，非關排開液體的體積。","text":"大氣壓力"},{"isCorrect":false,"rationale":"在靜止的水中，摩擦力並非判斷純度與體積的主要受力因素。","text":"摩擦力"},{"isCorrect":true,"rationale":"浮力等於排開液體的重量。若排開水量不同，代表兩者受到的浮力不同。","text":"浮力"},{"isCorrect":false,"rationale":"題目已說明兩者「等重」，因此受到的重力是相同的。","text":"重力"}],"hint":"浮力的大小取決於物體在液體中「排開的體積」。","question":"當阿基米德將金冠丟入水中時，發現它排開的水量與等重的純金塊不同。這證明了金冠受到的什麼力與純金塊不同？"},{"answerOptions":[{"isCorrect":false,"rationale":"若浮力大於物重，木塊會被往上彈射，直到浮力減小至等於物重。","text":"大於 100 克重"},{"isCorrect":true,"rationale":"物體浮在水面上時，向上浮力必須等於向下的物重（合力為零）。","text":"100 克重"},{"isCorrect":false,"rationale":"既然已經確定木塊是「浮體」，浮力必然等於物重。","text":"無法判斷，需知道木塊密度。"},{"isCorrect":false,"rationale":"若浮力小於物重，木塊將會沈入水中。","text":"小於 100 克重"}],"hint":"分析「浮體」處於平衡狀態時的合力狀況。","question":"一個重量 100 克的木塊浮在水面上，若水的密度為 1 $g/cm^{3}$，則該木塊受到的浮力大小為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"氣體分子碰撞會產生向四周的壓力，包含向下推擠液面。","text":"上升，因為氣體會把水銀往上吸。"},{"isCorrect":true,"rationale":"管內氣壓與水銀柱壓力共同抗衡大氣壓力，因此水銀柱高度會縮短。","text":"下降，因為管內氣體產生向下壓的壓力。"},{"isCorrect":false,"rationale":"雖然外在大氣壓力不變，但內部平衡條件因氣體加入而改變。","text":"不變，因為大氣壓力是固定的。"},{"isCorrect":false,"rationale":"除非滲入氣體壓力大於等於一大氣壓，否則仍會維持一定高度。","text":"管內水銀會全部流回水銀槽。"}],"hint":"密閉空間內的氣體分子碰撞會提供額外的壓力成分。","question":"在托里切利實驗管中，若不慎滲入少量空氣，則管內水銀柱高度將會如何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"由於海水的密度大於淡水，相同排開體積下的液體重會增加。","text":"變小"},{"isCorrect":false,"rationale":"液體密度改變了，即使排開體積相同，浮力也會隨之改變。","text":"不變"},{"isCorrect":false,"rationale":"根據阿基米德原理，只要知道排開液體重量的變化即可判斷。","text":"無法判斷"},{"isCorrect":true,"rationale":"浮力公式 $B = V \times D$，當 $V$（潛艇體積）不變但 $D$（密度）變大時，浮力變大。","text":"變大"}],"hint":"注意浮力公式中「排開液體密度」的角色。","question":"一艘潛水艇從淡水河駛入海中（海水密度較大），若潛水艇保持完全沒入水中的深度不變，則其受到的浮力有何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"這雖是事實，但老師在課堂中是用此例子說明有機物的含碳定義。","text":"酸類物質必含氫，但含氫的不一定是酸類。"},{"isCorrect":false,"rationale":"老師使用兩隻腳的譬喻是針對「含碳與有機」的關係進行釐清。","text":"酯類物質必具果香味，但具果香味的不一定是酯類。"},{"isCorrect":false,"rationale":"課堂論述重點在於物質的分類定義而非實驗過程的歸納。","text":"固體乾溜必產生碳，但產生碳的過程不一定是乾溜。"},{"isCorrect":true,"rationale":"這說明了邏輯的單向性，含碳是必要條件但非充分條件。","text":"有機化合物必含碳，但含碳的不一定是有機化合物。"}],"hint":"這是在討論有機化合物與碳元素之間的集合關係。","question":"理化老師提到「人有兩隻腳，但兩隻腳的不一定是人」，這是用來解釋哪一個化學邏輯？"},{"answerOptions":[{"isCorrect":false,"rationale":"甲烷僅含一個碳原子，確實是結構最簡單的烴類。","text":"最簡單的聽類是甲烷（$CH_{4}$）。"},{"isCorrect":true,"rationale":"聽類由碳和氫組成，燃燒會產生二氧化碳（來自碳）與水（來自氫）。","text":"聽類完全燃燒後的產物只有二氧化碳，不含水蒸氣。"},{"isCorrect":false,"rationale":"烴類為非極性分子，與水不互溶，這是正確敘述。","text":"聽類在水中溶解度極低，通常難溶於水。"},{"isCorrect":false,"rationale":"這是烴類同系物的基本特徵，碳數越多分子間作用力通常越大。","text":"聽類的物理性質隨碳原子數增加而變化，如沸點會提高。"}],"hint":"回想「聽類」的化學組成元素。","question":"下列關於「聽類」（烴類）的敘述，何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"這是定義有機酸（羧酸）的核心結構特徵。","text":"結構中必含有 $COOH$ 官能基。"},{"isCorrect":false,"rationale":"酸性物質溶於水後 PH 值應小於 7。","text":"有機酸溶於水後 PH 值會大於 7。"},{"isCorrect":false,"rationale":"有機酸可透過醇類氧化等方式製得，並非與食鹽反應。","text":"有機酸是由烴類與食鹽水反應生成的。"},{"isCorrect":false,"rationale":"多數有機酸（如醋酸）在水中僅部分解離，屬於弱電解質。","text":"所有有機酸都具有強烈的腐蝕性且為強電解質。"}],"hint":"辨識羧基（羧基）的化學寫法。","question":"關於有機酸類（如醋酸）的特徵，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"反應物酸與醇通常已是液態或可溶，不需靠硫酸溶解脂肪。","text":"為了溶解脂肪，讓反應可以在液相中進行。"},{"isCorrect":false,"rationale":"氧原子主要由酸與醇提供，硫酸並不參與組成產物。","text":"濃硫酸是反應物，提供酯類所需的氧原子。"},{"isCorrect":true,"rationale":"濃硫酸能移除產物中的水，促進反應向右進行（酯化）。","text":"作為催化劑與脫水劑，加速反應並提高產率。"},{"isCorrect":false,"rationale":"此實驗目的是酸醇縮合產生酯，而非將醇轉化為酸。","text":"作為氧化劑，將醇氧化成酸。"}],"hint":"這與濃硫酸對水分子的強大吸引力有關。","question":"在「酯化反應」實驗中，加入「濃硫酸」的主要作用是什麼？"},{"answerOptions":[{"isCorrect":true,"rationale":"酯類普遍具有宜人的果香氣味。","text":"乙酸乙酯"},{"isCorrect":false,"rationale":"蟻酸具有強烈的刺激性酸味，並非果香。","text":"蟻酸"},{"isCorrect":false,"rationale":"甲醇具有刺鼻的酒精味，且具毒性。","text":"甲醇"},{"isCorrect":false,"rationale":"甲烷是無色無味的氣體。","text":"甲烷"}],"hint":"回想「酸加醇」產生的特定類別物質。","question":"下列哪一種有機化合物具有特殊的「果香味」，常被用來製作香精？"},{"answerOptions":[{"isCorrect":true,"rationale":"長碳鏈結構與油性質相似（非極性），故可互相吸引。","text":"長碳鏈端為親油端，可與油垢結合。"},{"isCorrect":false,"rationale":"若兩端皆親水，則無法與油垢結合，失去去污功能。","text":"肥皂分子的兩端皆為親水性，可讓油水混合。"},{"isCorrect":false,"rationale":"帶電的頭端具極性，是親水端而非親油端。","text":"帶有電荷的頭端為親油端，負責穿透油污。"},{"isCorrect":false,"rationale":"親水端是為了讓整個油滴微胞能懸浮或溶解在水中被帶走。","text":"親水端負責與空氣結合，產生泡沫浮出水面。"}],"hint":"考慮「同性相吸」的原則與碳鏈的性質。","question":"有關肥皂分子的結構原理，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"浮力需透過液體與物體表面的直接接觸才能產生。","text":"浮力"},{"isCorrect":true,"rationale":"磁力屬於超距力，不需接觸即可產生吸引或排斥作用。","text":"磁力"},{"isCorrect":false,"rationale":"摩擦力產生於兩物體接觸面間的相對運動趨勢。","text":"摩擦力"},{"isCorrect":false,"rationale":"必須拉扯或壓縮彈簧（接觸）才能感受到彈力。","text":"彈力"}],"hint":"尋找可以在一段距離外就發揮效用的力。","question":"下列何者「不屬於」接觸力？"},{"answerOptions":[{"isCorrect":false,"rationale":"同樣屬於運動狀態改變的範疇。","text":"物體的運動方向發生改變。"},{"isCorrect":false,"rationale":"這是力作用的兩大基本效應之一。","text":"物體的形狀發生改變（形變）。"},{"isCorrect":true,"rationale":"受力通常導致形變或運動狀態改變，發光並非力作用的必然特徵。","text":"物體一定會受力而產生明亮的發光現象。"},{"isCorrect":false,"rationale":"屬於運動狀態改變的一部分。","text":"物體的速度大小發生改變。"}],"hint":"回想物理學中定義「力」的兩大觀測指標。","question":"關於力對物體產生的效應，下列何者「不一定」會發生？"},{"answerOptions":[{"isCorrect":true,"rationale":"根據比例：$100 : 2 = 300 : x$，解得 $x=6$。","text":"6cm"},{"isCorrect":false,"rationale":"此數值與三倍正比關係不符。","text":"8cm"},{"isCorrect":false,"rationale":"伸長量應隨力倍增，施力變為 3 倍，伸長量亦應變為 3 倍。","text":"4cm"},{"isCorrect":false,"rationale":"受力增加，彈簧伸長量不應維持不變。","text":"2cm"}],"hint":"計算施力增加的倍數，並應用於伸長量。","question":"在彈性限度內，若彈簧伸長量與受力成正比。若施力 100g 伸長 2cm，則施力 300g 時的伸長量為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"這符合力平衡原理，是正確的敘述。","text":"物體靜止時受到的靜摩擦力等於推力。"},{"isCorrect":false,"rationale":"一旦推動後，阻力會稍微下降，這是常見物理現象。","text":"動摩擦力的大小通常小於最大靜摩擦力。"},{"isCorrect":false,"rationale":"壓得越重，接觸面的微觀卡合越緊，這是正確的。","text":"最大靜摩擦力隨正向力的增加而增大。"},{"isCorrect":true,"rationale":"理化老師特別強調，接觸面積的大小並非影響摩擦力的主要因素。","text":"摩擦力的大小與接觸面積大小成正比。"}],"hint":"尋找那個關於「面積」的常見誤解。","question":"有關摩擦力的敘述，下列何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"根據作用力與反作用力定律，大小相等方向相反。","text":"20 公斤重"},{"isCorrect":false,"rationale":"既然有施力，必然存在大小相等的反作用力。","text":"0"},{"isCorrect":false,"rationale":"力不會將體重與推力直接相加來得出反作用力。","text":"70 公斤重"},{"isCorrect":false,"rationale":"這是人的體重（向下），並非水平推牆產生的反作用力。","text":"50 公斤重"}],"hint":"回想牛頓運動定律中有關「互相作用」的原則。","question":"一位 50 公斤重的人穿著溜冰鞋在冰面上滑行，若冰面摩擦力極小。當他用力推牆壁 20 公斤重時，牆壁對他的反作用力為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"$P = 200 \text{ g} / 20 \text{ cm}^{2} = 10 \text{ gw/cm}^{2}$。","text":"10"},{"isCorrect":false,"rationale":"計算結果應為 10。","text":"1"},{"isCorrect":false,"rationale":"壓力是相除而非相乘得出。","text":"4000"},{"isCorrect":false,"rationale":"這是重量總量，尚未除以分佈面積。","text":"200"}],"hint":"壓力等於「垂直作用力」除以「受力面積」。","question":"將一杯 200 克的空杯放在桌面上，接觸面積為 20 $cm^{2}$。此時杯子對桌面產生的壓力為多少 $gw/cm^{2}$？"},{"answerOptions":[{"isCorrect":false,"rationale":"不同粗細管子中的水量（重力）不同，但壓力相等。","text":"各管中的水受到的重力完全相同。"},{"isCorrect":false,"rationale":"連通管原理與液體壓力平衡有關，與浮力無直接相關。","text":"液體具有向上的浮力，抵銷了形狀的影響。"},{"isCorrect":true,"rationale":"這迫使各管液柱高度必須一致，以維持底部壓力平衡。","text":"底部相連通，在相同水平高度處各點的液體壓力必相等。"},{"isCorrect":false,"rationale":"大氣壓力在各管口的作用是一致的，非調節水量之主因。","text":"大氣壓力會自動調節各管的水量。"}],"hint":"考慮同一靜止液體中「同深度壓力相等」的原則。","question":"在連通管實驗中，不論管子的形狀、粗細或傾斜程度，各管中的水面高度皆相同。其主要原因為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"數值計算錯誤，應乘以 13.6 而非除以。","text":"13.6 公分"},{"isCorrect":false,"rationale":"這是支撐高密度水銀的高度，水密度低故高度會大增。","text":"76 公分"},{"isCorrect":true,"rationale":"$76 \text{ cm} \times 13.6 = 1033.6 \text{ cm}$（約 10.3 公尺）。","text":"1033.6 公分"},{"isCorrect":false,"rationale":"單位應為公分，若是公尺則太過巨大（約 1 公里高）。","text":"1033.6 公尺"}],"hint":"水比水銀輕得多，若要產生同樣壓力，需要極高的水柱。","question":"若在一大氣壓下，改用「水」來進行托里切利實驗。已知水銀密度為 13.6 $g/cm^{3}$，大氣壓力可支撐的水柱高度約為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"這與米飯煮不熟（需熱能）沒有直接物理關係。","text":"水的凝固點升高，水容易結冰。"},{"isCorrect":false,"rationale":"重力雖略微減小，但對烹飪熱傳導無明顯影響。","text":"高山上的重力較小，熱傳導效率變差。"},{"isCorrect":false,"rationale":"水的密度隨氣壓變化極小，不是主因。","text":"水的密度變小，熱對流速度變慢。"},{"isCorrect":true,"rationale":"沸點隨外部氣壓降低而下降，低溫的水無法迅速煮熟食物。","text":"水的沸點降低，水在未達到 100 度前就已沸騰。"}],"hint":"考慮氣壓對液體相變溫度（如沸騰）的影響。","question":"在高山上煮飯時，米飯往往不容易熟透。這是因為高山上的大氣壓力較低，導致水的什麼物理性質改變？"},{"answerOptions":[{"isCorrect":false,"rationale":"空氣壓力與物體沈入水中的浮力計算無直接減法關係。","text":"物體的總重量減去空氣的壓力。"},{"isCorrect":true,"rationale":"即阿基米德原理：浮力等於所排開之液體重。","text":"物體排開的水量（體積）乘以水的密度。"},{"isCorrect":false,"rationale":"這是不符合物理因次的計算公式。","text":"物體的密度除以水的體積。"},{"isCorrect":false,"rationale":"雖然浮力源自壓力差，但正確算法是下表面受力減上表面受力。","text":"水底部的總壓力減去水面的壓力。"}],"hint":"回想阿基米德原理中「排開液重」的定義。","question":"關於浮力大小的判斷，若物體完全沈入水中，其浮力大小等於何者？"},{"answerOptions":[{"isCorrect":false,"rationale":"數值與物重及排開體積皆無邏輯關聯。","text":"25 克重"},{"isCorrect":false,"rationale":"浮力不可能自發性大於物體沒入時排開的水重。","text":"150 克重"},{"isCorrect":false,"rationale":"這是木塊「完全沒入」時可產生的最大浮力，但木塊會浮起減少排開量。","text":"100 克重"},{"isCorrect":true,"rationale":"木塊密度 0.5 小於水，會浮在水面。浮體浮力等於物重。","text":"50 克重"}],"hint":"先判斷木塊會「沈下去」還是「浮起來」。","question":"將一個質量 50 克、體積 100 $cm^{3}$ 的木塊丟入水中（水密度為 1 $g/cm^{3}$）。平衡後木塊受到的浮力為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"摩擦力與「變輕感」的垂直分力抵銷無關。","text":"摩擦力"},{"isCorrect":false,"rationale":"游泳池各處的大氣壓力幾乎是相同的。","text":"大氣壓力"},{"isCorrect":true,"rationale":"沒入水中的體積增加，排開的水重增加，故浮力變大。","text":"浮力"},{"isCorrect":false,"rationale":"人的重量（重力）並不會因為走入水中而改變。","text":"重力"}],"hint":"身體「變輕」是因為水提供了一個向上的支撐力。","question":"當你在游泳池中從淺水區走向深水區，你會覺得身體變輕了。這主要是因為什麼物理量的增加？"},{"answerOptions":[{"isCorrect":false,"rationale":"液柱越高，產生的液體壓力越大，這是正確的應用。","text":"點滴架掛得越高，點滴液進入血管的壓力越大。"},{"isCorrect":true,"rationale":"底部壓力大，應該設計成「底部較厚」以承受強大壓力。","text":"水壩的牆壁通常設計成上方較厚、底部較薄。"},{"isCorrect":false,"rationale":"基於連通管與壓力原理，高度差決定了噴射壓力。","text":"噴泉噴出的高度，與水源的垂直高度差有關。"},{"isCorrect":false,"rationale":"球狀或圓筒狀有利於壓力分布，減少尖角應力集中。","text":"瓦斯桶通常設計成圓筒狀以均勻承受壓力。"}],"hint":"考慮液體壓力隨深度的變化情形。","question":"關於液體壓力的生活應用，下列何者「錯誤」？"},{"answerOptions":[{"isCorrect":true,"rationale":"利用小面積活塞施力，將壓力傳遞到大面積活塞產生大力量。","text":"汽車的液壓煞車系統"},{"isCorrect":false,"rationale":"虹吸現象主要涉及大氣壓力與高度差，非帕斯卡原理。","text":"抽水馬桶的虹吸現象"},{"isCorrect":false,"rationale":"這是利用電能轉動能，並非利用封閉流體傳遞壓力。","text":"電風扇的葉片轉動"},{"isCorrect":false,"rationale":"這是利用固體彈力，並非流體壓力原理。","text":"彈簧床的支撐結構"}],"hint":"尋找利用「密閉液體」傳達力量的裝置。","question":"帕斯卡原理（壓力等量傳遞）常用於下列哪一種機械裝置中？"},{"answerOptions":[{"isCorrect":false,"rationale":"分子活動空間變小，碰撞頻率應增加而非減少。","text":"壓力變小"},{"isCorrect":false,"rationale":"氣體壓力與體積有明顯的負相關性（波以耳定律）。","text":"壓力不變"},{"isCorrect":true,"rationale":"體積縮小導致單位面積內的分子碰撞頻率增加，故壓力上升。","text":"壓力變大"},{"isCorrect":false,"rationale":"只要有氣體分子存在且在運動，壓力就不會消失。","text":"壓力消失"}],"hint":"想像分子在變小的空間內撞擊牆壁的頻率。","question":"有一密閉容器內裝有氣體。若將容器體積壓縮為原來的一半，且溫度保持不變，管內氣體壓力會如何？"},{"answerOptions":[{"isCorrect":false,"rationale":"顏色外觀不足以判斷有機或無機，重點在於化學組成。","text":"食鹽與砂糖都是白色結晶，因此兩者皆為有機化合物。"},{"isCorrect":false,"rationale":"食鹽是強電解質會導電；砂糖是非電解質，不導電。","text":"砂糖加入水中會導電，食鹽則不會。"},{"isCorrect":false,"rationale":"食鹽不含碳，燃燒氧化不可能產生二氧化碳。","text":"食鹽與氧氣作用會產生二氧化碳氣體。"},{"isCorrect":true,"rationale":"砂糖是有機化合物含碳；食鹽是無機鹽類（$NaCl$），不含碳。","text":"砂糖加熱乾溜後會產生黑色的碳，食鹽則不會。"}],"hint":"回想老師提到的「黑色的物質就是碳」的判定標準。","question":"下列關於「食鹽」與「砂糖」的實驗辨別，何者敘述正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"有機化合物必須含碳，金屬銀不符合定義。","text":"有機化合物"},{"isCorrect":false,"rationale":"聽類必須由碳與氫組成，純銀不含這些元素。","text":"聽類"},{"isCorrect":false,"rationale":"聚合物是由大量小分子聚合而成的巨分子，金屬銀是元素晶體。","text":"聚合物"},{"isCorrect":true,"rationale":"金屬元素如銀不含碳，且非生物體特有之有機結構。","text":"無機化合物（或元素）"}],"hint":"考慮銀（$Ag$）是否具備有機化合物「必須含碳」的條件。","question":"小明發現家中的銀製餐具變黑了。老師說這是銀與空氣中的硫化物反應。請問「銀」本身屬於哪一類物質？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然某些蛋白含鐵（如血紅素），但非所有有機物的共同特徵。","text":"鐵"},{"isCorrect":false,"rationale":"鈣常見於無機鹽或骨骼，非有機化合物分子的核心骨架。","text":"鈣"},{"isCorrect":true,"rationale":"碳元素是有機化合物最基礎且必須具備的骨架元素。","text":"碳"},{"isCorrect":false,"rationale":"氯常見於食鹽等無機物，並非有機物的主體元素。","text":"氯"}],"hint":"這是有機化合物目前最核心的定義基礎。","question":"在「認識有機化合物」章節中，老師提到蛋白質、澱粉等天然物質。這些物質雖然組成複雜，但共通點是都含有哪一種關鍵元素？"},{"answerOptions":[{"isCorrect":false,"rationale":"氣味特徵剛好相反：醋酸刺鼻，酯類有果香。","text":"乙酸乙酯的氣味酸辣刺鼻，醋酸則具果香味。"},{"isCorrect":false,"rationale":"醋酸是 $COOH$（羧基），酯類是 $COOC$（酯基）。","text":"兩者的官能基完全相同，都是 $COOH$。"},{"isCorrect":true,"rationale":"酯類通常難溶且浮在水面上，這是區分兩者的關鍵性質。","text":"醋酸可溶於水，而乙酸乙酯難溶於水且密度較水小。"},{"isCorrect":false,"rationale":"乙酸乙酯是中性的酯類，不具酸性。","text":"兩者都具有酸性，可使藍色石蕊試紙變紅。"}],"hint":"思考「酯化反應」產物的溶解性與氣味。","question":"關於「醋酸」（乙酸）與「乙酸乙酯」的比較，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"含碳物質燃燒產生 $CO_{2}$，會與石灰水反應生成碳酸鈣沈澱。","text":"碳"},{"isCorrect":false,"rationale":"氮氧化物不會讓澄清石灰水產生明顯的混濁沈澱。","text":"氮"},{"isCorrect":false,"rationale":"含氫物質燃燒產生水（$H_{2}O$），通常用氯化亞鈷紙檢驗。","text":"氫"},{"isCorrect":false,"rationale":"氧氣是助燃物，無法透過二氧化碳產量來證明原物質含氧。","text":"氧"}],"hint":"聯想二氧化碳與石灰水的經典化學反應。","question":"在進行「氧化法」檢驗有機物時，若實驗後澄清石灰水變混濁，代表待測物含有哪一種元素？"},{"answerOptions":[{"isCorrect":false,"rationale":"味道好壞與有機/無機分類無關。","text":"因為無機化合物通常味道較美，適合調味。"},{"isCorrect":false,"rationale":"有機物也包含許多天然的營養素（如醣類、蛋白質）。","text":"因為有機化合物都是人工合成的，對人體有害。"},{"isCorrect":false,"rationale":"大多數人體所需的營養成分皆為有機化合物。","text":"因為有機化合物在體內無法被消化系統分解。"},{"isCorrect":true,"rationale":"分類僅基於化學組成，與生理毒性或安全性並無絕對關聯。","text":"因為許多無機物（如水、食鹽）是生存必需，而部分有機物（如毒蛇液）具劇毒。"}],"hint":"舉出生活中的反例：必需的無機物與致命的有機物。","question":"為何理化老師說「不是有機就一定好，不是無機就不能吃」？"},{"answerOptions":[{"isCorrect":true,"rationale":"貨輪重量減輕，作為浮體其浮力（等於物重）也隨之減小。","text":"變小"},{"isCorrect":false,"rationale":"浮體受力平衡，重量變了，平衡所需的浮力也會改變。","text":"不變"},{"isCorrect":false,"rationale":"沒入體積減少，代表排開的液體重量減少，浮力應變小。","text":"變大"},{"isCorrect":false,"rationale":"根據「浮體浮力等於物重」的原則可以直接判斷。","text":"無法判斷"}],"hint":"分析貨輪減重後，為了平衡所需要的向上支撐力。","question":"一艘貨輪從海中卸載貨物後，其沒入水中的體積變小了。請問此時貨輪受到的浮力有何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"數值計算不符合壓力守恆的比例。","text":"20 公斤"},{"isCorrect":false,"rationale":"計算未考量小活塞的施力數值。","text":"100 公斤"},{"isCorrect":true,"rationale":"壓力相等：$5/1 = F/100$，得 $F=500$。","text":"500 公斤"},{"isCorrect":false,"rationale":"帕斯卡原理的優點在於透過面積比來放大力量。","text":"5 公斤"}],"hint":"密閉液體中傳遞的是「壓力」，而非直接的力量數值。","question":"根據「帕斯卡原理」，在連通的液壓油系統中，若小活塞（面積 1 $cm^{2}$）受力 5 公斤，則大活塞（面積 100 $cm^{2}$）可產生多少公斤的推力？"},{"answerOptions":[{"isCorrect":true,"rationale":"沈體排開體積不變，但液體密度 $D$ 增加，故 $B = V \times D$ 變大。","text":"變大"},{"isCorrect":false,"rationale":"只要物體排開液體，浮力就不會為零。","text":"變為零"},{"isCorrect":false,"rationale":"液體密度增加會使浮力變大，而非變小。","text":"變小"},{"isCorrect":false,"rationale":"雖然鐵球排開的「體積」不變，但排開的「重量」增加了。","text":"不變"}],"hint":"注意阿基米德原理中「液體密度」對沈體浮力的影響。","question":"一個鐵球沈入水底。若將水換成密度更大的食鹽水，鐵球依然沈底。請問鐵球受到的浮力有何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"太空中接近真空，沒有大氣分佈，故大氣壓力趨近於零。","text":"在太空中因為沒有重力，大氣壓力反而會無限大。"},{"isCorrect":false,"rationale":"平地上方承載的空氣柱較長且重，故壓力較大。","text":"平地的氣壓通常比高山上小。"},{"isCorrect":false,"rationale":"氣壓會隨溫度、濕度及空氣流動狀況而變化。","text":"大氣壓力的大小與溫度無關。"},{"isCorrect":true,"rationale":"氣壓與液壓相似，皆為流體壓力，作用力垂直於表面。","text":"大氣壓力的方向必垂直於接觸面。"}],"hint":"壓力是一種「流體」的性質，考慮其作用方向的特徵。","question":"關於大氣壓力的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"聲音的主因是壓力差平衡產生的氣體快速流動。","text":"高山上的冷空氣進入瓶內凝結。"},{"isCorrect":true,"rationale":"瓶內封存了平地的高氣壓，打開時氣體由高壓往低壓處流動。","text":"瓶內壓力（平地大氣壓）大於高山上的大氣壓力。"},{"isCorrect":false,"rationale":"固體形變並非造成氣體流動聲音的主因。","text":"保溫瓶在高山上因重力變小而膨脹。"},{"isCorrect":false,"rationale":"高山上空氣稀薄，氧氣壓力反而較低，且不會發生自發爆炸。","text":"高山上的氧氣濃度太高導致爆炸。"}],"hint":"考慮不同海拔高度「氣壓大小」的差異。","question":"若一個有蓋的空保溫瓶由平地帶到高山上，打開瓶蓋時常會聽到「嘶」的一聲。這是因為什麼原因？"},{"answerOptions":[{"isCorrect":false,"rationale":"纖維素是木頭的主體，乾溜正是讓纖維素分解成碳和其他產物。","text":"木頭中的纖維素。"},{"isCorrect":true,"rationale":"這些成分在燃燒時會產生大量煙霧並帶走熱量，乾溜可將其先行分離。","text":"水蒸氣與揮發性氣體（如氫氣、甲烷）。"},{"isCorrect":false,"rationale":"乾溜主要分解有機結構，礦物質通常會殘留在灰燼或碳中。","text":"泥土與礦物質渣滓。"},{"isCorrect":false,"rationale":"這些氣體在木頭內含量極微，且乾溜並非為了移除氧氣。","text":"二氧化碳與氧氣。"}],"hint":"思考木頭直接燒與燒「木炭」時產生的煙霧差異。","question":"理化老師提到「乾溜」是以前的人為了讓木頭燃燒效能更好。這是因為乾溜後去除了什麼物質，留下了發熱量高的碳？"},{"answerOptions":[{"isCorrect":true,"rationale":"這也是「碳水」化合物名稱的由來。","text":"其氫與氧原子的比例通常與水相同（$2:1$）。"},{"isCorrect":false,"rationale":"醣類含碳，乾溜後會留下黑色的碳殘渣。","text":"醣類在乾溜後不會留下殘餘物質。"},{"isCorrect":false,"rationale":"食鹽是無機物，完全不具備醣類的分子結構。","text":"葡萄糖與食鹽皆屬於醣類。"},{"isCorrect":false,"rationale":"所有有機物都含碳，醣類也不例外。","text":"醣類是唯一不含碳元素的有機化合物。"}],"hint":"尋找名稱中「碳」與「水」比例關係的線索。","question":"有關「醣類」（碳水化合物）的化學特徵，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是為了增加抓地力，防止打滑。","text":"運動鞋底設計深凹的紋路。"},{"isCorrect":false,"rationale":"白粉可吸收手汗，增加手部與器械間的摩擦力以防滑落。","text":"體操運動員在手上抹白粉（碳酸鎂粉）。"},{"isCorrect":false,"rationale":"雖然做法存議，但通常增加接地面積是為了提升抓地力（摩擦力）。","text":"雨天開車時降低輪胎胎壓。"},{"isCorrect":true,"rationale":"利用油膜隔離接觸面，降低粗糙度的卡合影響。","text":"在機械齒輪間加入潤滑油。"}],"hint":"尋找讓物體變得更「滑順」的手段。","question":"關於摩擦力的應用，下列何者是採取「減少摩擦力」的做法？"},{"answerOptions":[{"isCorrect":false,"rationale":"粗糙程度由材料本身決定，與上方加壓重量無關。","text":"物體與地面的粗糙程度（摩擦係數）變大"},{"isCorrect":false,"rationale":"加了重物，整體受到的向下重力應變大。","text":"物體受到的重力變小"},{"isCorrect":false,"rationale":"摩擦力與接觸面積基本無關，且重物不一定改變面積。","text":"接觸面積變大導致摩擦力變小"},{"isCorrect":true,"rationale":"正向力增加，使接觸面卡合更緊密，推動所需的力也變大。","text":"最大靜摩擦力變大"}],"hint":"考慮「正向力」對啟動木塊所需力量的影響。","question":"一個重量為 $W$ 的物體置於水平面上，其受到的最大靜摩擦力為 $f$。若在物體上再疊放一個重物，則下列何者會發生改變？"},{"answerOptions":[{"isCorrect":true,"rationale":"液體越深壓力越大，因此下表面向上的受力大於上表面向下的受力。","text":"浮力是由液體對物體上下表面的「壓力差」所產生的。"},{"isCorrect":false,"rationale":"浮力需要介質（流體），真空中沒有流體可排開，故無浮力。","text":"物體在真空中受到的浮力最大。"},{"isCorrect":false,"rationale":"只要物體排開液體，浮力就存在，只是不足以支撐物重。","text":"沈入水底的石頭不再受到浮力作用。"},{"isCorrect":false,"rationale":"浮力永遠是抵銷重力的方向，故必向上。","text":"浮力的方向不一定向上，由重力方向決定。"}],"hint":"回想液體壓力與深度的關係。","question":"關於浮力（Buoyancy）的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖水量不變，但壓力分布與垂直高度（深度）密切相關。","text":"不變"},{"isCorrect":false,"rationale":"立放過程深度持續增加，壓力單向變大。","text":"先變小後變大"},{"isCorrect":true,"rationale":"根據 $P = h \times D$，水位深度 $h$ 增加，底部壓力隨之增大。","text":"變大"},{"isCorrect":false,"rationale":"水位加深會增加垂直液柱重量的壓強。","text":"變小"}],"hint":"思考液體壓力公式中「$h$」（深度）的影響。","question":"一長方體容器裝水。若將其由「橫放」改為「立放」（水位變深），則容器底部所受的壓力有何變化？"},{"answerOptions":[{"isCorrect":true,"rationale":"蘋果正受到重力加速下降，速度在變，合力不為零。","text":"自由落體中的蘋果。"},{"isCorrect":false,"rationale":"等速度運動代表合力為零（慣性定律），也屬於力平衡。","text":"在水平冰面上等速直線滑行的冰球。"},{"isCorrect":false,"rationale":"吊燈靜止，拉力與重力 素。","text":"醋酸 ($CH_{3}COOH$)"},{"isCorrect":true,"rationale":"氰化物雖然含有碳，但在化學分類上因其性質與生命體關聯性較低，被歸類為無機化合物。","text":"氰化鉀 ($KCN$)"},{"isCorrect":false,"rationale":"尿素是動物代謝產物，屬於含氮的有機化合物。","text":"尿素 ($NH_{2}CONH_{2}$)"}],"hint":"請注意含碳化合物中的例外情況，如碳酸鹽、氰化物等。","question":"下列哪一種含碳化合物屬於「無機化合物」？"},{"answerOptions":[{"isCorrect":true,"rationale":"乾餾的定義是在隔絕空氣的狀態下加熱分解物質。","text":"隔絕空氣加熱"},{"isCorrect":false,"rationale":"鋁箔無法起到過濾氣體分子的物理作用。","text":"過濾分解出的氣體"},{"isCorrect":false,"rationale":"鋁箔雖導熱快，但此實驗核心是控制反應環境而非提升加熱效率。","text":"增加導熱速度"},{"isCorrect":false,"rationale":"鋁箔是為了防止氧氣進入參與燃燒，而非單純承接液體。","text":"防止液體產物流出"}],"hint":"乾餾與燃燒最大的差別在於是否與氧氣接觸。","question":"在木材乾餾實驗中，鋁箔紙包覆木匙的主要目的是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"焦油屬於乾餾產物中的液體部分，而非留下的固體渣滓。","text":"焦油"},{"isCorrect":false,"rationale":"石墨是純碳的一種結構，雖然木炭含碳，但結晶排列與石墨不同。","text":"石墨"},{"isCorrect":true,"rationale":"有機物在隔絕空氣加熱後，氫、氧等元素會以氣體或液體形式逸出，最後留下高含量的碳。","text":"碳 ($C$)"},{"isCorrect":false,"rationale":"這是常見的催化劑，並非木材分解的產物。","text":"二氧化錳 ($MnO_{2}$)"}],"hint":"此物質是證明該物含有碳元素的最直接證據。","question":"木材乾餾後留下的黑色固體，主要成分為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"氮氣在一般乾餾過程中並非主要的可燃產物。","text":"$N_{2}$ 與 $H_{2}$"},{"isCorrect":true,"rationale":"氫氣與甲烷是乾餾產物中主要的可燃性氣體成分。","text":"$H_{2}$ 與 $CH_{4}$"},{"isCorrect":false,"rationale":"氬氣是惰性氣體，二氧化碳不可燃，皆無法點火燃燒。","text":"$CO_{2}$ 與 $Ar$"},{"isCorrect":false,"rationale":"二氧化碳不助燃亦不可燃，且乾餾環境中不應產生氧氣。","text":"$CO_{2}$ 與 $O_{2}$"}],"hint":"尋找具有燃料潛力的氣體分子。","question":"下列哪一組氣體是木材乾餾時產生的「木煤氣」中可燃的部分？"},{"answerOptions":[{"isCorrect":false,"rationale":"液體產物是含碳、氫、氧的複雜化合物，碳單質通常以固體形式存在。","text":"液體產物主要由碳元素直接組成"},{"isCorrect":false,"rationale":"焦油具有強烈的刺鼻臭味，酯類才具有香味。","text":"焦油具有水果香味"},{"isCorrect":true,"rationale":"木醋液密度較小且主成分為水，會浮在黑色的焦油之上。","text":"分為兩層，上層為木醋液，下層為焦油"},{"isCorrect":false,"rationale":"木醋液含有醋酸，性質為酸性。","text":"木醋液呈鹼性，可中和胃酸"}],"hint":"根據產物的性質（酸鹼性、密度、顏色）來區分。","question":"關於乾餾液體產物的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"廣用試紙主要反映 $pH$ 值，無法精準辨識液體是否為水。","text":"廣用試紙"},{"isCorrect":true,"rationale":"藍色氯化亞鈷試紙遇水會變為粉紅色，是常用的水檢驗工具。","text":"乾燥的藍色氯化亞鈷試紙"},{"isCorrect":false,"rationale":"石蕊試紙用於檢驗酸鹼性，無法特異性檢驗水分子的存在。","text":"紅色石蕊試紙"},{"isCorrect":false,"rationale":"酚酞僅用於酸鹼滴定中指示強鹼，對水無變色反應。","text":"酚酞試液"}],"hint":"這種試紙的變色反應與水分子的化合有關。","question":"要檢驗某不明液體是否含有「水」，最適合使用下列哪一種試紙？"},{"answerOptions":[{"isCorrect":false,"rationale":"氧氣本身不具備使石灰水變濁的特性，它是助燃劑。","text":"氧 ($O$)"},{"isCorrect":false,"rationale":"氫燃燒產物是水，不會使石灰水變混濁。","text":"氫 ($H$)"},{"isCorrect":true,"rationale":"碳元素燃燒生成二氧化碳，二氧化碳能與澄清石灰水生成碳酸鈣沉澱。","text":"碳 ($C$)"},{"isCorrect":false,"rationale":"氮氧化物與石灰水的反應現象與二氧化碳不同，不會產生典型的混濁。","text":"氮 ($N$)"}],"hint":"澄清石灰水是檢驗二氧化碳的特效藥。","question":"燃燒法檢驗有機物時，若產生能使澄清石灰水變混濁的氣體，代表原物質含什麼元素？"},{"answerOptions":[{"isCorrect":true,"rationale":"這是現代化學的基本定義，碳酸鹽與二氧化碳是含碳的無機物。","text":"有機化合物一定含有碳，但含碳的不一定是有機化合物"},{"isCorrect":false,"rationale":"自從維勒人工合成尿素後，此定義已被打破。","text":"只有生物體才能製造有機化合物"},{"isCorrect":false,"rationale":"二氧化碳、一氧化碳等均是含碳的無機物。","text":"無機化合物一定不含碳"},{"isCorrect":false,"rationale":"雖然多數可燃，但如四氯化碳等有機物則具有不燃性。","text":"有機化合物一定可以燃燒"}],"hint":"思考二氧化碳 ($CO_{2}$) 屬於哪一類，以及它是如何產生的。","question":"有關有機化合物與無機化合物的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"烴類分子極性極低，通常難溶於水且密度較水小，常浮在水面上。","text":"烴類易溶於水，可與水形成均勻溶液"},{"isCorrect":false,"rationale":"甲烷 ($CH_{4}$) 的確是結構最簡單的烷類化合物。","text":"甲烷是最簡單的烴類，也是天然氣的主成分"},{"isCorrect":false,"rationale":"烴僅含碳氫兩元素，完全燃燒必產生二氧化碳與水。","text":"烴類燃燒後會產生二氧化碳與水"},{"isCorrect":false,"rationale":"桶裝瓦斯（液化石油氣）確實主要由丙烷 ($C_{3}H_{8}$) 與丁烷 ($C_{4}H_{10}$) 組成。","text":"液化石油氣的主要成分是丙烷與丁烷"}],"hint":"考慮油污或汽油滴入水中的現象。","question":"下列關於烴類的敘述，何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"有機酸與醇在酸性催化下反應生成酯與水，並產生特有香氣。","text":"有機酸與醇類"},{"isCorrect":false,"rationale":"烴類與水不反應生成酯類。","text":"烴類與水"},{"isCorrect":false,"rationale":"此為皂化反應，產生肥皂而非酯類。","text":"油脂與鹼液"},{"isCorrect":false,"rationale":"碳酸為無機酸，標準酯化反應通常指有機酸參與。","text":"碳酸與酒精"}],"hint":"這兩種物質結合會產生特殊的果香味。","question":"酯化反應是由哪兩種物質反應產生的？"},{"answerOptions":[{"isCorrect":false,"rationale":"酒精的存在對最後肥皂的溶解度提升無關，甚至是為了促成反應發生。","text":"提高肥皂在水中的溶解度"},{"isCorrect":true,"rationale":"油脂不溶於水，酒精能與水及油互溶，增加反應物接觸機率。","text":"作為溶劑使油脂與鹼液均勻混合"},{"isCorrect":false,"rationale":"酒精在此作為物理上的界面媒介，化學上不參與皂化反應的產物結構。","text":"作為反應物參與反應"},{"isCorrect":false,"rationale":"酒精沸點低，加熱過猛反而容易蒸發，非防止突沸的主因。","text":"降低溶液沸點，防止突沸"}],"hint":"油與水通常互不相容，需要一個中間橋樑。","question":"皂化反應中加入「酒精」的主要功能為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"電解需通入電流，此步驟純粹是溶解度差異的物理分離。","text":"電解"},{"isCorrect":false,"rationale":"食鹽水為中性，無法與剩餘鹼液進行酸鹼中和反應。","text":"中和"},{"isCorrect":true,"rationale":"利用肥皂難溶於飽和食鹽水的特性，使其浮出液面以便收集。","text":"鹽析"},{"isCorrect":false,"rationale":"蒸餾是利用沸點差異分離液體，與食鹽水的加入無關。","text":"蒸餾"}],"hint":"這個過程是利用溶解度的差異將肥皂「擠」出來。","question":"製造肥皂後，加入「飽和食鹽水」的步驟稱為什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"親油端負責抓住油垢，親水端則讓整體溶於水被帶走。","text":"親水端帶走油垢，親油端溶於水中"},{"isCorrect":true,"rationale":"長碳鏈具有非極性特質，與油親和；帶電頭部則與極性水分子親和。","text":"親油端長碳鏈深入油污，親水端朝向水"},{"isCorrect":false,"rationale":"這與實際物理特性完全相反。","text":"親油端與水結合，親水端深入油垢"},{"isCorrect":false,"rationale":"肥皂去污是物理包裹與分散過程，並非化學反應生成新物。","text":"肥皂與油垢反應生成可溶性的新物質"}],"hint":"烴鏈（碳鏈）部分的化學性質與油相似。","question":"有關肥皂分子的去污原理，下列何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"肥皂中的脂肪酸根會與鈣、鎂離子結合形成沉澱物，喪失界面活性。","text":"會產生不溶性的鈣肥皂與鎂肥皂沉澱"},{"isCorrect":false,"rationale":"硬水是指礦物質含量高，並非指其酸鹼度的高低。","text":"硬水的 $pH$ 值過高，中和了肥皂的鹼性"},{"isCorrect":false,"rationale":"硬水與軟水的水分子大小相同，差別在於溶解的礦物質離子。","text":"硬水分子過大，無法與肥皂分子結合"},{"isCorrect":false,"rationale":"肥皂遇酸才會分解成脂肪酸，遇硬水是產生沉澱。","text":"肥皂會直接被硬水分解成脂肪酸"}],"hint":"離子間會發生置換反應生成沉澱。","question":"為什麼肥皂在「硬水」（含鈣、鎂離子的水）中洗滌效果不佳？"},{"answerOptions":[{"isCorrect":false,"rationale":"兩者均利用親油端與親水端組成的界面活性劑原理。","text":"去污原理與肥皂完全不同"},{"isCorrect":true,"rationale":"合成清潔劑的親水頭部設計不會與鈣、鎂離子產生沉澱。","text":"在硬水中仍能保持良好的洗滌能力"},{"isCorrect":false,"rationale":"這是肥皂的原料，合成清潔劑通常源自石油化學產品。","text":"主要原料是動植物油脂與氫氧化鈉"},{"isCorrect":false,"rationale":"合成清潔劑可配製為中性，相較於肥皂對纖維傷害較小。","text":"一定是鹼性的，會傷害羊毛衣料"}],"hint":"合成清潔劑是針對肥皂的缺點（如硬水適應性）而開發的。","question" 動量有影響，但靜力學上深淺主要由壓力決定。","text":"步行速度"},{"isCorrect":false,"rationale":"人體體積不直接決定對地面的壓強效果。","text":"體積"},{"isCorrect":true,"rationale":"單位面積所受的力量決定了沙地的形變程度，即腳印深淺。","text":"壓力"},{"isCorrect":false,"rationale":"若穿上大雪鞋，重量不變但接觸面增加，腳印會變淺，故主因是壓力。","text":"總重量"}],"hint":"考慮「集中力道」與「分散力道」的區別。","question":"一個人在沙灘上行走，腳印深淺取決於下列哪一項物理量？"},{"answerOptions":[{"isCorrect":true,"rationale":"大氣壓力如液壓般是向四面八方傳遞的，且始終垂直於物體接面，並非僅向下。","text":"大氣壓力的方向始終垂直向下"},{"isCorrect":false,"rationale":"海拔高則上方空氣柱較短，壓力自然較低，敘述正確。","text":"海拔越高，大氣壓力越小"},{"isCorrect":false,"rationale":"排除吸盤內空氣後，外大氣壓將其壓在牆上，敘述正確。","text":"吸盤吸住牆面是利用大氣壓力的作用"},{"isCorrect":false,"rationale":"高氣壓區域通常伴隨晴朗天氣，敘述正確。","text":"晴天時的氣壓通常比陰雨天高"}],"hint":"壓力是流體性質，具有全向性。","question":"下列關於大氣壓力的敘述，何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然丙密度高，但乙與丙的浮力均與雞蛋重力達成平衡，故相等。","text":"丙 > 乙 > 甲"},{"isCorrect":true,"rationale":"乙、丙均為浮體（含懸浮），浮力均等於蛋重。甲為沉體，浮力小於蛋重。","text":"丙 = 乙 > 甲"},{"isCorrect":false,"rationale":"沉體的浮力實際上是不足以支撐物重的。","text":"甲 > 乙 > 丙"},{"isCorrect":false,"rationale":"沉底狀態與平衡狀態的受力情形不同。","text":"三者一樣大"}],"hint":"浮體與懸浮體的浮力皆等於物重；沉體浮力小於物重。","question":"將同一顆雞蛋放入不同濃度的鹽水中，雞蛋在甲杯完全沉底，在乙杯懸浮，在丙杯浮出水面。三杯浮力大小關係為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"木材乾餾的液體產物中含有乙酸，俗稱醋酸。","text":"醋酸 ($CH_{3}COOH$)"},{"isCorrect":false,"rationale":"這是無機強酸，非生物纖維分解的典型產物。","text":"硫酸 ($H_{2}SO_{4}$)"},{"isCorrect":false,"rationale":"這屬於強鹼，不可能出現在酸性的木醋液中。","text":"氫氧化鈉 ($NaOH$)"},{"isCorrect":false,"rationale":"酒精雖可溶於水，但其水溶液呈中性。","text":"酒精 ($C_{2}H_{5}OH$)"}],"hint":"名字暗示了其具有與食用醋相同的化學成分。","question":"木醋液具有酸性，主要是因為含有下列哪一種成分？"},{"answerOptions":[{"isCorrect":false,"rationale":"PET 是熱塑性塑膠，高溫下會變形熔化。","text":"1 號塑膠 PET 加熱後也不會熔化"},{"isCorrect":true,"rationale":"只有能反覆熔化成型的鏈狀聚合物才具備大規模回收再製的商業價值。","text":"能回收代表多屬於熱塑性聚合物"},{"isCorrect":false,"rationale":"編號僅作為化學材質分類，與耐用度或品質等級無關。","text":"編號越高代表品質越好"},{"isCorrect":false,"rationale":"回收編號主要是針對人工合成的塑膠製品。","text":"只有天然聚合物才有回收編號"}],"hint":"回收的前提是物質可以重新改變外觀形狀。","question":"有關合成聚合物的回收代碼，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"根據水的密度為 1，浮力值即可直接對應沒入體積。","text":"浮力 80gw，體積無法判斷"},{"isCorrect":false,"rationale":"誤將原重當作浮力，忽略了物體沉入。","text":"浮力 500gw，體積 $500 cm^{3}$"},{"isCorrect":false,"rationale":"誤將讀數當作浮力。","text":"浮力 420gw，體積 $420 cm^{3}$"},{"isCorrect":true,"rationale":"浮力 $B = 500 - 420 = 80 \\text{ gw}$。沒入水中，浮力 = 排開水重 = 體積，故體積為 80。","text":"浮力 80gw，體積 $80 cm^{3}$"}],"hint":"減輕的重量即為液體提供的浮力。","question":"一個金屬塊重 500gw，沒入水中後，彈簧秤讀數變為 420gw。請問金屬塊受到的浮力及體積為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"加速反應達成平衡，並吸收生成的分子水以使反應向右進行。","text":"催化劑與脫水劑"},{"isCorrect":false,"rationale":"雖然有助於反應，但這並非加入硫酸的主要化學功能。","text":"降低產物的溶解度"},{"isCorrect":false,"rationale":"濃硫酸在此反應中並非燃燒用途，亦不進行氧化反應。","text":"氧化劑與燃料"},{"isCorrect":false,"rationale":"香味來自酯類分子本身，硫酸不提供香氣成分。","text":"增加產物的香味"}],"hint":"此反應會產生水，而濃硫酸具有極強的親水性。","question":"在進行「酯化反應」實驗時，通常會加入濃硫酸，其作用為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"天然氣主成分甲烷是典型的有機烴類。","text":"天然氣含碳，屬於無機化合物"},{"isCorrect":false,"rationale":"甘油（丙三醇）含有羥基，屬於醇類而非醣類。","text":"甘油含 $-OH$ 基，屬於醣類"},{"isCorrect":false,"rationale":"烴類僅含碳、氫，不含氧。","text":"葡萄糖含碳、氫、氧，屬於烴類"},{"isCorrect":true,"rationale":"羧基（$-COOH$）是有機酸的特徵官能基。","text":"乙酸含 $-COOH$ 基，屬於有機酸類"}],"hint":"識別化合物中的特徵原子團（官能基）。","question":"有關常見有機化合物的分類，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"壓力與底面積不成正比或反比，而是獨立於面積之外的變量。","text":"5 : 1"},{"isCorrect":false,"rationale":"此比例無物理依據。","text":"4 : 1"},{"isCorrect":true,"rationale":"液體壓力 $P = h \\times D$，深度與密度相同，則壓強（壓力）必然相同，與底面積無關。","text":"1 : 1"},{"isCorrect":false,"rationale":"這混淆了壓力（壓強）與總壓力的概念。","text":"1 : 5"}],"hint":"注意題目問的是「壓力」（單位面積力）而非「總力」。","question":"兩個底面積不同的容器 A (底面積 10) 與 B (底面積 50)，皆裝有 20 公分深的水。兩容器底部的「水壓力比」為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"水位上升的高度反映了身體所排開的液體體積。","text":"身體進入水中的體積"},{"isCorrect":false,"rationale":"水位上升與重量無關，而是由物體佔據的空間（體積）決定的。","text":"身體重量的變化"},{"isCorrect":false,"rationale":"浮力原理與盛裝液體的容器材質無關。","text":"浴缸的材質"},{"isCorrect":false,"rationale":"人體進入浴缸對整體水溫的熱學影響不影響浮力原理的建立。","text":"水的溫度升高"}],"hint":"物體進入液體後會「佔據」原本液體的空間。","question":"關於阿基米德與浮力的故事，當他在浴缸中發現原理時，是因為他注意到水位的變化與下列何者有關？"},{"answerOptions":[{"isCorrect":false,"rationale":"烴類與酯類皆屬於有機化合物的範疇。","text":"甲烷 ($CH_4$)、液化石油氣 ($C_3H_8, C_4H_{10}$)、乙酸乙酯"},{"isCorrect":true,"rationale":"雖然含有碳，但一氧化碳、二氧化碳、碳酸鹽類及氰化物在化學上被歸類為無機化合物。","text":"一氧化碳 ($CO$)、碳酸鈣 ($CaCO_3$)、氰化鈉 ($NaCN$)"},{"isCorrect":false,"rationale":"這三者皆是由碳、氫、氧組成的典型有機化合物。","text":"乙醇 ($C_2H_5OH$)、乙酸 ($CH_3COOH$)、葡萄糖 ($C_6H_{12}O_6$)"},{"isCorrect":false,"rationale":"尿素是第一種人工合成的有機物，蛋白質與油脂則是生物體內重要的有機聚合物與小分子。","text":"尿素 ($NH_2CONH_2$)、蛋白質、油脂"}],"hint":"注意含有碳但不屬於有機化合物的特定例外。","question":"根據理化課程中有關有機化合物的定義，下列哪一組物質「皆不屬於」有機化合物？"},{"answerOptions":[{"isCorrect":false,"rationale":"隔絕空氣加熱後的黑色固體即為碳元素，這是判斷有機物含碳的基本方法。","text":"殘留的固體產物為黑色的碳，可證明木材含有碳元素"},{"isCorrect":true,"rationale":"液體產物包含醋酸與焦油，醋酸呈酸性可使石蕊試紙變紅，焦油則為黑色黏稠狀物質。","text":"液體產物中，能使藍色石蕊試紙變紅的是焦油"},{"isCorrect":false,"rationale":"乾餾的定義即為「隔絕空氣加熱」，鋁箔能有效防止木材直接與氧氣接觸燃燒。","text":"實驗過程中使用鋁箔包覆，其主要目的是為了隔絕氧氣"},{"isCorrect":false,"rationale":"乾餾產生的混合氣體中，氫氣、甲烷與一氧化碳均可燃，僅二氧化碳不可燃。","text":"氣體產物中，氫氣、甲烷與一氧化碳皆具有可燃性"}],"hint":"乾餾產生的酸性物質與黑色黏稠物分別是不同的東西。","question":"在進行木材的「乾餾」實驗時，將木材以鋁箔包覆後隔絕空氣加熱。關於產物的敘述，下列何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"氧化銅是反應物中的氧化劑，並非待測粉末中的組成元素。","text":"銅 ($Cu$)"},{"isCorrect":true,"rationale":"澄清石灰水變混濁是檢驗二氧化碳的標準方法，其中的碳源必來自待測有機物。","text":"碳 ($C$)"},{"isCorrect":false,"rationale":"氧化法中會加入氧化銅提供氧，故無法由此法直接證明物質本身含氧。","text":"氧 ($O$)"},{"isCorrect":false,"rationale":"檢驗氫元素通常觀察是否有水生成，並使用藍色氯化亞鈷試紙檢測。","text":"氫 ($H$)"}],"hint":"石灰水的化學反應與二氧化碳分子中的碳來源有關。","question":"欲證明某白色粉末是否為有機化合物，可將其與氧化銅混合加熱。若反應過程中產生的氣體使澄清石灰水變混濁，則可證明該粉末含有什麼元素？"},{"answerOptions":[{"isCorrect":true,"rationale":"同分異構物指分子式相同但結構不同的物質，其物理與化學性質皆不同。","text":"乙醇與甲醚具有相同的分子式 $C_2H_6O$，但原子排列方式不同"},{"isCorrect":false,"rationale":"碳原子數愈多，原子的排列組合方式愈複雜，同分異構物的數量反而會顯著增加。","text":"烴類化合物中，碳原子數愈多，其同分異構物的種類愈少"},{"isCorrect":false,"rationale":"雖然原子種類與個數相同，但若空間排列不同，性質也會隨之改變。","text":"只要是由相同的原子種類與個數組成的物質，性質必完全相同"},{"isCorrect":false,"rationale":"乙酸（酸類）與乙酸乙酯（酯類）的分子式並不相同。","text":"乙酸與乙酸乙酯互為同分異構物"}],"hint":"思考「相同的材料，不同的拼法」對性質的影響。","question":"關於「同分異構物」的觀念，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"甲烷雖為天然氣主成分，但屬於烴類，難溶於水。","text":"甲烷為天然氣的主成分，在水中的溶解度極高"},{"isCorrect":true,"rationale":"烴類定義為碳氫化合物，其特性通常為密度小於水且不溶於水。","text":"僅含碳、氫兩種元素，且難溶於水"},{"isCorrect":false,"rationale":"烴類含有氫，完全燃燒時除了產生二氧化碳，還會產生水。","text":"燃燒後的產物僅有二氧化碳"},{"isCorrect":false,"rationale":"烴類的狀態隨碳原子數增加，從氣態（如甲烷）轉變為液態（如汽油）或固態（如石蠟）。","text":"在常溫常壓下，烴類皆為氣態"}],"hint":"烴類的中文命名反映了其組成的元素種類。","question":"下列有關「烴類」化合物的敘述，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"醇類燃燒通常產物為氣態的 $CO_2$ 與 $H_2O$，且火焰清澈，不會有大量黑煙或白煙。","text":"實驗室常用乙醇當作燃料，是因為其燃燒產生大量白煙"},{"isCorrect":true,"rationale":"甲醇具有劇毒，經人體代謝會產生甲醛等有毒物質攻擊神經系統。","text":"甲醇俗稱木精，誤食會導致失明甚至死亡"},{"isCorrect":false,"rationale":"醇類的 $-OH$ 並非離子狀態，故不會解離出 $OH^-$ 離子，水溶液呈中性。","text":"乙醇與甲醇皆含有 $-OH$ 官能基，故水溶液呈鹼性"},{"isCorrect":false,"rationale":"醇類雖含有 $-OH$ 原子團，但其水溶液為中性非電解質，不具導電性。","text":"兩者皆屬於電解質，水溶液可導電"}],"hint":"醇類的 $-OH$ 與無機鹼的 $OH^-$ 性質完全不同。","question":"關於乙醇 ($C_2H_5OH$) 與甲醇 ($CH_3OH$) 的比較，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"乙酸乙酯為酯類，在水溶液中既不解離氫離子也不解離氫氧根離子，呈中性。","text":"產物的中文名稱為「乙酸乙酯」，是一種酸性物質"},{"isCorrect":false,"rationale":"酯類密度小於水且難溶於水，故會浮在液體表面。","text":"生成的酯類會沉在水底，方便收集"},{"isCorrect":false,"rationale":"酯類雖有果香，但其顯著特性是「難溶於水」。","text":"酯類通常具有特殊的果香味，且易溶於水"},{"isCorrect":true,"rationale":"濃硫酸具脫水性，能移除反應產生的水分子，促使反應向酯的方向進行。","text":"濃硫酸的主要作用是作為催化劑並吸水，以增加產量"}],"hint":"注意生成物在水中的溶解性與密度表現。","question":"在「酯化反應」實驗中，將乙醇與乙酸混合後加入濃硫酸並加熱。關於此實驗的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"酒精作為界面活性劑，能同時溶解油脂與水，增加反應物碰撞機率以加速反應。","text":"使用酒精作為溶劑，是為了讓油脂與氫氧化鈉溶液混合均勻"},{"isCorrect":false,"rationale":"反應產物包含肥皂（脂肪酸鈉）與副產物甘油（丙三醇）。","text":"皂化反應後的產物僅有肥皂"},{"isCorrect":false,"rationale":"食鹽水是為了進行「鹽析」，利用溶解度差異將肥皂析出。","text":"加入飽和食鹽水的目的是為了中和多餘的鹼性物質"},{"isCorrect":false,"rationale":"甘油學名為丙三醇，結構含有三個 $-OH$，屬於醇類。","text":"皂化實驗所得的產物「甘油」，其實是屬於酯類化合物"}],"hint":"皂化反應涉及油脂與強鹼的反應，且需要特殊溶劑幫助混合。","question":"製作肥皂的過程稱為「皂化反應」。下列關於皂化實驗的敘述，何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"應是長碳鏈的「親油端」進入油污，而帶電頭部的「親水端」則與水分子結合。","text":"肥皂分子的親水端會深入油污，將油污包圍"},{"isCorrect":false,"rationale":"硬水中的離子會干擾肥皂作用，使其失去去污能力並形成垢屑。","text":"肥皂在硬水中效果較差，是因為會與鈣、鎂離子生成不溶性沉澱"},{"isCorrect":false,"rationale":"長碳鏈結構不帶電，與非極性的油脂性質相近，故具有親油性。","text":"肥皂分子的親油端是一段長碳鏈結構"},{"isCorrect":false,"rationale":"兩者皆屬界面活性劑，結構中均具備分別與油、水結合的部分。","text":"合成清潔劑與肥皂的去污原理基本相同，皆具有親油與親水兩端"}],"hint":"分子的哪一端會被油「吸引」，哪一端會被水「拉走」？","question":"關於肥皂分子的「去污原理」，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"油脂的分子量約為 1000 左右，不屬於聚合物（分子量通常需大於 10000）。","text":"天然聚合物：澱粉、油脂；合成聚合物：尼龍"},{"isCorrect":true,"rationale":"$PE$ 具熱塑性，結構為長鏈狀；網狀聚合物（如輪胎橡膠）具熱固性，耐熱且不易熔化。","text":"鏈狀聚合物：聚乙烯 ($PE$)；網狀聚合物：橡膠"},{"isCorrect":false,"rationale":"$PVC$ 受熱會軟化，屬於熱塑性鏈狀聚合物。","text":"熱塑性聚合物：保麗龍；熱固性聚合物：聚氯乙烯 ($PVC$)"},{"isCorrect":false,"rationale":"聚合物由許多重複的小分子單元連接而成，這些單位稱為「單體」。","text":"聚合物的基本組成單位稱為「異構物」"}],"hint":"注意聚合物的分子量門檻，以及熱塑性與熱固性的差別。","question":"下列有關「有機聚合物」的分類與實例，何者組合完全正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"此計算可能誤用了長度而非「伸長量」與外力的比例關係。","text":"$300 \text{ gw}$"},{"isCorrect":false,"rationale":"此數值未正確套用虎克定律的線性比例常數。","text":"$225 \text{ gw}$"},{"isCorrect":false,"rationale":"這顯然小於 $200 \text{ gw}$ 物體產生的伸長效果。","text":"$150 \text{ gw}$"},{"isCorrect":true,"rationale":"外力增加 $100 \text{ gw}$，伸長量增加 $2 \text{ cm}$（$k = 50 \text{ gw/cm}$）。原長為 $10 \text{ cm}$，欲伸長 $5 \text{ cm}$ 需 $5 \times 50 = 250 \text{ gw}$。","text":"$250 \text{ gw}$"}],"hint":"虎克定律指出外力與「伸長量」成正比，需先求出彈簧原長。","question":"已知一條彈簧在彈性限度內，掛上 $100 \text{ gw}$ 的物體時長度為 $12 \text{ cm}$，掛上 $200 \text{ gw}$ 的物體時長度為 $14 \text{ cm}$。若欲使其長度變為 $15 \text{ cm}$，應掛上多少重量的物體？"},{"answerOptions":[{"isCorrect":false,"rationale":"最大靜摩擦力是啟動前的極限，靜止狀態受的是一般靜摩擦力。","text":"此時物體所受的是最大靜摩擦力"},{"isCorrect":false,"rationale":"當有外部水平施力且物體不動時，必存在靜摩擦力與之抵消。","text":"只要物體沒動，摩擦力就一定等於零"},{"isCorrect":true,"rationale":"物體靜止表示合力為零，水平推力必須與靜摩擦力大小相等、方向相反。","text":"摩擦力大小等於 $5 \text{ kgw}$，方向與推力相反"},{"isCorrect":false,"rationale":"若摩擦力大於推力，物體將會反向運動，這不符合力平衡現象。","text":"摩擦力大於 $5 \text{ kgw}$，所以物體推不動"}],"hint":"根據力平衡原理，靜止物體所受水平力總和應為零。","question":"一物體靜置於粗糙水平面上，當施予 $5 \text{ kgw}$ 的水平推力時物體仍保持靜止。關於此時物體所受的摩擦力，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"此計算僅考慮水重，忽略了杯子本身的重量。","text":"$20 \text{ gw/cm}^2$"},{"isCorrect":true,"rationale":"總重量 = $600 + 400 = 1000 \text{ gw}$。壓力 $P = \\frac{F}{A} = \\frac{1000}{20} = 50 \text{ gw/cm}^2$。","text":"$50 \text{ gw/cm}^2$"},{"isCorrect":false,"rationale":"此計算僅考慮杯重，忽略了水的重量。","text":"$30 \text{ gw/cm}^2$"},{"isCorrect":false,"rationale":"此數值可能是將力與面積錯誤運算後的結果。","text":"$100 \text{ gw/cm}^2$"}],"hint":"壓力公式為總垂直力除以接觸面積。","question":"阿亮在桌面上放置一個重量為 $600 \text{ gw}$、底面積為 $20 \text{ cm}^2$ 的保溫杯，若他在杯中倒入 $400 \text{ ml}$ 的水，則杯子底部對桌面的壓力為多少？"},{"answerOptions":[{"isCorrect":true,"rationale":"在靜止液體內的一點，壓力會同時向四面八方作用，大小皆相等。","text":"來自各個方向的壓力皆相同且垂直於接觸面"},{"isCorrect":false,"rationale":"在同一深度的各個方向壓力大小皆相等。","text":"向上壓力大於向下壓力"},{"isCorrect":false,"rationale":"垂直方向同樣存在壓力，且大小與水平方向一致。","text":"只有水平方向的壓力"},{"isCorrect":false,"rationale":"水的重量會造成各方向的擠壓，並非僅有向下壓力。","text":"只有垂直向下的壓力，因為水有重量"}],"hint":"靜止液體內部的壓力分布具有等向性。","question":"一容器裝滿水，在液面下 $10 \text{ cm}$ 深處的 $A$ 點，其所受到的液體壓力方向為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"高山上海拔高，其上方的空氣柱較短，密度也較稀薄，故壓力較小。","text":"在高山上壓力較大，是因為空氣柱較長"},{"isCorrect":false,"rationale":"吸氣使管內氣壓降低，外面的大氣壓力便將液體壓入管中。","text":"吸管吸取飲料是利用大氣壓力的作用"},{"isCorrect":false,"rationale":"大氣壓力與液體壓力性質類似，其作用力方向恆垂直於受力面。","text":"大氣壓力的方向總是垂直於接觸面"},{"isCorrect":false,"rationale":"這是托里切利實驗證實的標準數值。","text":"一大氣壓大約可以支撐 $76 \text{ cm}$ 高的水銀柱"}],"hint":"思考海拔高度與空氣柱高度及總質量的關係。","question":"下列關於「大氣壓力」的敘述，何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"大氣壓力僅能支撐固定高度的水銀柱，此高度指垂直海平面的距離。","text":"垂直高度保持不變，仍為 $76 \text{ cm}$"},{"isCorrect":false,"rationale":"除非管子傾斜角度極大且管長短於垂直高度，否則仍有真空區域。","text":"管內會完全充滿水銀，沒有真空部分"},{"isCorrect":false,"rationale":"垂直高度僅取決於外部的大氣壓力大小。","text":"垂直高度會變小，因為壓力分散了"},{"isCorrect":false,"rationale":"為了維持相同的垂直高度，沿管子的長度反而會增加。","text":"水銀柱沿管子的斜長會變短"}],"hint":"壓力只與流體垂直高度造成的重量有關。","question":"在托里切利實驗中，若將試管稍微傾斜，關於管內水銀柱高度的變化，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這僅是將力乘以面積比，但比例常數計算有誤。","text":"$50 \text{ kgw}$"},{"isCorrect":true,"rationale":"依據公式 $\\frac{F_1}{A_1} = \\frac{F_2}{A_2}$，$\\frac{10}{2} = \\frac{F_2}{100}$，解得 $F_2 = 500$。","text":"$500 \text{ kgw}$"},{"isCorrect":false,"rationale":"此計算未能正確反映面積放大倍數與力放大倍數的正比關係。","text":"$20 \text{ kgw}$"},{"isCorrect":false,"rationale":"此數值計算錯誤，未按比例係數進行轉換。","text":"$1000 \text{ kgw}$"}],"hint":"帕斯卡原理核心在於連通密閉流體中，各處受到的「壓力」皆相同。","question":"使用「帕斯卡原理」設計的油壓千斤頂，若小活塞面積為 $2 \text{ cm}^2$，大活塞面積為 $100 \text{ cm}^2$。若在小活塞施加 $10 \text{ kgw}$ 的力，大活塞可舉起多少重量？"},{"answerOptions":[{"isCorrect":false,"rationale":"在忽略毛細現象的連通管中，液面高度與管徑粗細無關。","text":"管子愈細，其液面高度會愈高"},{"isCorrect":true,"rationale":"因為各管液面直接與大氣接觸，且壓力需與深度一致才能達成平衡。","text":"底部相通的容器，裝入同一種液體靜止時，各管液面必在同一水平面"},{"isCorrect":false,"rationale":"液體壓力只與深度及密度有關，與表面積無關。","text":"液體壓力的計算與液體表面積的大小有關"},{"isCorrect":false,"rationale":"無論彎曲程度如何，只要底部相通，靜止時液面高度必等高。","text":"管子的形狀會影響液面的垂直高度"}],"hint":"連通管現象是液體壓力傳遞與平衡的結果。","question":"下列關於「連通管原理」的敘述，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"粗糙程度直接影響摩擦係數，進而改變摩擦力的上限。","text":"接觸面愈粗糙，最大靜摩擦力愈大"},{"isCorrect":true,"rationale":"實驗證明最大靜摩擦力與接觸面積大小無關。","text":"接觸面的面積愈大，最大靜摩擦力就愈大"},{"isCorrect":false,"rationale":"正向力增加會使接觸面咬合更緊密，提高移動所需的力道。","text":"物體與接觸面間的垂直正向力愈大，最大靜摩擦力愈大"},{"isCorrect":false,"rationale":"最大靜摩擦力是維持靜止狀態的臨界極限。","text":"當施力超過最大靜摩擦力後，物體便開始運動"}],"hint":"思考哪些物理量真正改變了接觸面「卡住」的程度。","question":"關於影響「最大靜摩擦力」大小的因素，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"若浮力等於重量，則物體應會浮在水面上，但此球密度較大會下沉。","text":"$120 \text{ gw}$"},{"isCorrect":false,"rationale":"這可能是誤算了物體在水中的「減輕量」而非浮力本身。","text":"$20 \text{ gw}$"},{"isCorrect":false,"rationale":"浮力不可能大於物體排開同體積液體的重量。","text":"$220 \text{ gw}$"},{"isCorrect":true,"rationale":"金屬球密度（$1.2 \text{ g/cm}^3$）大於水，必沉入底。沉體浮力 = 排開液重 = 體積 $\\times$ 水密度 = $100 \times 1 = 100 \text{ gw}$。","text":"$100 \text{ gw}$"}],"hint":"先判斷物體在水中是浮起、懸浮還是下沉，再套用阿基米德原理。","question":"將一個體積為 $100 \text{ cm}^3$、重量為 $120 \text{ gw}$ 的金屬球放入水中，該球所受的浮力為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"熱固性聚合物在高溫下僅會炭化分解，不會熔化流動。","text":"熱固性聚合物在高溫下會迅速軟化並流動"},{"isCorrect":false,"rationale":"保特瓶可加熱回收，屬於鏈狀結構的熱塑性塑料。","text":"保特瓶 ($PET$) 屬於熱固性聚合物"},{"isCorrect":true,"rationale":"鏈狀結構分子間引力較小，受熱易位移軟化，具回收再利用價值。","text":"熱塑性聚合物多為長鏈狀結構，受熱後可軟化再成型"},{"isCorrect":false,"rationale":"網狀結構分子間有強固的化學鍵結，受熱不熔化且具高度耐熱性。","text":"網狀結構的聚合物通常具有熱塑性"}],"hint":"結構的連結方式（鏈狀 vs 網狀）決定了受熱後的行為。","question":"下列關於「熱固性聚合物」與「熱塑性聚合物」的敘述，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"肥皂本身在高濃度鹽液中因溶解度低而浮出，並非物理上的硬化作用。","text":"將肥皂變硬，稱為硬化"},{"isCorrect":false,"rationale":"鹽析過程並非酸鹼中和反應。","text":"洗去肥皂中多餘的鹼，稱為中和"},{"isCorrect":false,"rationale":"皂化是製作過程的名稱，而非加入食鹽水的目的。","text":"增加肥皂的去污力，稱為皂化"},{"isCorrect":true,"rationale":"利用肥皂難溶於高濃度食鹽水的特性，將其與易溶的甘油分開。","text":"使肥皂與甘油分離，稱為鹽析"}],"hint":"利用溶解度差異來分離產物。","question":"在皂化實驗中，為什麼要加入飽和食鹽水？此過程稱為什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"甘油（丙三醇）屬於醇類，水溶液呈中性。","text":"丙三醇 ($C_3H_5(OH)_3$)"},{"isCorrect":false,"rationale":"醇類水溶液呈中性，不會改變石蕊試紙顏色。","text":"乙醇 ($C_2H_5OH$)"},{"isCorrect":false,"rationale":"酯類難溶於水且呈中性。","text":"乙酸乙酯 ($CH_3COOC_2H_5$)"},{"isCorrect":true,"rationale":"乙酸（醋酸）在水中可解離出 $H^+$，顯酸性。","text":"乙酸 ($CH_3COOH$)"}],"hint":"尋找分子結構中含有可解離氫原子的「羧基」。","question":"下列哪一種有機化合物的水溶液能使藍色石蕊試紙變紅？"},{"answerOptions":[{"isCorrect":false,"rationale":"其氫、氧比例常與水相同 ($2:1$)，故得名。","text":"碳水化合物主要由碳、氫、氧三種元素組成"},{"isCorrect":false,"rationale":"植物細胞壁的主要成分為纖維素，分布極廣。","text":"纖維素是地球上產量最豐富的有機聚合物之一"},{"isCorrect":false,"rationale":"許多葡萄糖分子經聚合反應連接而成澱粉。","text":"澱粉的組成單體是葡萄糖"},{"isCorrect":true,"rationale":"葡萄糖與蔗糖屬於小分子，澱粉與纖維素才是巨大的聚合物。","text":"所有糖類皆屬於聚合物"}],"hint":"並非所有的「糖」都是分子量巨大的分子。","question":"有關「糖類」（碳水化合物）的敘述，下列何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"溫度越高，分子平均動能越大，撞擊器壁的力量也越強。","text":"溫度升高時，氣體壓力通常會隨之增加"},{"isCorrect":true,"rationale":"在定溫下，氣體體積變大會使其分布更稀疏，碰撞頻率下降，壓力減小。","text":"容器體積變大時，氣體壓力會增加"},{"isCorrect":false,"rationale":"分子不斷運動並與邊界碰撞，單位面積受到的撞擊力即為壓力。","text":"氣體壓力是由於分子撞擊器壁產生的"},{"isCorrect":false,"rationale":"氣體分子移動迅速且分布均勻，在同一密閉空間內壓力一致。","text":"容器內各處的氣體壓力皆相等"}],"hint":"想像氣體分子在不同大小空間中的運動與碰撞頻率。","question":"關於「密閉容器內的氣體壓力」，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"平放面積最大，其壓力反而最小。","text":"平放時壓力最大，因為受力最均勻"},{"isCorrect":false,"rationale":"物重雖不變，但「集中程度」會隨面積改變。","text":"三種放法壓力皆相同，因為物重沒變"},{"isCorrect":true,"rationale":"在總重量（垂直力）相同下，壓力與接觸面積成反比。","text":"立放時壓力最大，因為接觸面積最小"},{"isCorrect":false,"rationale":"側放面積通常介於平放與立放之間，非極端值。","text":"側放時壓力最小"}],"hint":"力分布在不同大小的表面上時，集中程度會如何變化？","question":"將一個木塊分別平放、側放與立放在桌面上，關於桌面所受壓力的比較，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"滾動產生的摩擦力遠小於滑動摩擦。","text":"利用滾珠軸承以滾動代替滑動"},{"isCorrect":false,"rationale":"油液能填補微小凹凸並形成薄層減少直接摩擦。","text":"使用潤滑油"},{"isCorrect":false,"rationale":"氣體薄層能大幅降低接觸面的固體間摩擦。","text":"使用氣墊設備"},{"isCorrect":true,"rationale":"刻劃紋路（如輪胎胎紋）是為了增加粗糙度以提高摩擦力。","text":"在接觸面上刻劃凹槽紋路"}],"hint":"尋找目的是增加粗糙度或增加抓地力的選項。","question":"下列哪一種方法「無法」減少摩擦力？"},{"answerOptions":[{"isCorrect":false,"rationale":"這與液體壓力的物理規律完全相反。","text":"隨著深度增加，壓力反而減少"},{"isCorrect":false,"rationale":"雖然密度固定，但上方支撐的水柱重量隨深度增加。","text":"壓力保持不變，因為海水密度是固定的"},{"isCorrect":true,"rationale":"依公式 $P = h \\times d$，深度 $h$ 愈大，產生的液體壓力愈大。","text":"隨著深度增加，壓力也隨之增加"},{"isCorrect":false,"rationale":"液體壓力在各個方向皆存在，潛水艇全身皆受擠壓。","text":"潛水艇只有底部受壓力，頂部不受壓力"}],"hint":"考慮潛水艇上方承載的水量變化。","question":"潛水艇在海中下潛的過程中，關於其所受液體壓力的變化，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"沉體依然排開液體，故必受浮力，只是浮力小於其重量。","text":"下沉的物體不受浮力作用"},{"isCorrect":false,"rationale":"一旦完全沒入水中，排開體積不再增加，浮力即保持不變。","text":"物體沉入水中的深度愈深，所受浮力一定愈大"},{"isCorrect":true,"rationale":"這是阿基米德原理的基本定義，適用於任何沉浮狀態。","text":"物體在液體中所受的浮力，等於其所排開的液體重量"},{"isCorrect":false,"rationale":"浮體靜止時處於平衡狀態，浮力應精確等於其重量。","text":"浮在液面上的物體，其浮力大於物體的重量"}],"hint":"浮力的大小取決於「排開多少水」。","question":"下列關於「阿基米德原理」的應用，何者敘述正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"海水密度與浮力大小的關聯應透過排開體積來分析。","text":"浮力變小，因為海水重"},{"isCorrect":true,"rationale":"船均為浮體，浮力等於物重（不變）；海密度大，故排開體積 $V$ 可減小即可支撐。","text":"船受到的浮力不變，但在海中沒入水中的體積變小"},{"isCorrect":false,"rationale":"海水的支撐力較強（密度大），船沒入部分的深度反而會減小。","text":"船在海中會沉得比在淡水中深"},{"isCorrect":false,"rationale":"浮力若變大，船會向上彈跳而非平衡，平衡時浮力恆等於重量。","text":"船受到的浮力變大，因為海水浮力強"}],"hint":"輪船始終浮在水面上，處於重力與浮力的平衡狀態。","question":"一艘輪船從淡水河駛入大海（海水密度較大），關於船受力與深度的變化，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"如 $CO_{2}$、一氧化碳及碳酸鹽類等雖含碳，但在化學分類上屬於無機化合物。","text":"含碳的化合物皆屬於有機化合物。"},{"isCorrect":false,"rationale":"有機化合物結構的骨架必須是由碳原子構成的。","text":"不含碳的化合物也有可能是低分子量的有機物。"},{"isCorrect":true,"rationale":"有機化合物的現代定義是以碳化合物為核心，雖然含碳不一定是機，但有機一定含碳。","text":"有機化合物必定含有碳元素。"},{"isCorrect":false,"rationale":"這是舊有的生命力學說，現代化學已經可以人工合成多種有機化合物。","text":"有機化合物只能從具有生命力的生物體中取得。"}],"hint":"請思考邏輯中的「單向推導」關係。","question":"根據理化課程，下列關於「有機化合物」的定義敘述，何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"這三者分別屬於氧化物、氰化物與碳酸鹽類，是含碳化合物中的無機例外。","text":"二氧化碳、$KCN$（氰化鉀）、碳酸鈣"},{"isCorrect":false,"rationale":"酒精（乙醇）是有機化合物。","text":"酒精、二氧化碳、二硫化碳"},{"isCorrect":false,"rationale":"葡萄糖與醋酸含有碳、氫、氧且符合有機特徵。","text":"食鹽、葡萄糖、醋酸"},{"isCorrect":false,"rationale":"甲烷（$CH_{4}$）是最簡單的有機烴類。","text":"一氧化碳、甲烷、碳酸氫鈉"}],"hint":"注意碳酸根、氰根及簡單氧化物等常見例外。","question":"在區分有機與無機化合物時，下列哪一組物質「皆為無機化合物」？"},{"answerOptions":[{"isCorrect":false,"rationale":"這正是乾餾的基本定義，透過物理/化學變化分析成分。","text":"乾餾是利用「隔絕空氣加熱」的方式使物質分解。"},{"isCorrect":true,"rationale":"必須留一小開口作為通氣孔，否則內部產生的氣體壓力過大會產生危險或無法順利分解。","text":"使用鋁箔包覆竹筷時，必須完全密封不能留任何孔徑。"},{"isCorrect":false,"rationale":"黑色焦炭是乾餾後剩下的固體產物，可用來證明原物質含碳。","text":"實驗後殘留的黑色固體主要成分是碳。"},{"isCorrect":false,"rationale":"受熱分解產生了與原物質性質不同的新物質，如碳、焦油等。","text":"乾餾屬於一種化學變化。"}],"hint":"氣體產物若無處宣洩會發生什麼事？","question":"小夢進行「木材乾餾」實驗，關於實驗操作與原理，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"還包含氫氣（$H_{2}$）、甲烷（$CH_{4}$）與一氧化碳（$CO$）。","text":"氣體產物只有二氧化碳與水蒸氣。"},{"isCorrect":true,"rationale":"乾餾產生的液體分為兩層，酸性的醋酸及黑褐色、氣味難聞的焦油。","text":"液體產物包含醋酸與焦油，焦油具有惡臭。"},{"isCorrect
