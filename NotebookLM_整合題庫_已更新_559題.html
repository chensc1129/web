<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>題目</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
        :root {
            --bg: #f6f1e7; --bg-deep: #efe4d6; --ink: #171717; --muted: #5b5b5b; --accent: #d3542c;
            --accent-light: #ff8f5a; --accent-dark: #b14320; --teal: #1f6f78; --card: #fff7ef;
            --stroke: #e3d6c5; --shadow: 0 18px 40px rgba(23, 23, 23, 0.12); --radius-sm: 10px;
            --radius-md: 12px; --radius-lg: 14px; --radius-xl: 18px; --radius-2xl: 22px;
            --space-1: 6px; --space-2: 8px; --space-3: 10px; --space-4: 12px; --space-5: 14px;
            --space-6: 16px; --space-7: 18px; --space-8: 20px; --space-9: 24px; --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif; --font-body: 'IBM Plex Sans', sans-serif; --error: #b54832;
        }
        body {
            font-family: var(--font-body);
            background: radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%), radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%), linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .quiz-container { width: 100%; max-width: 800px; padding: var(--space-10) var(--space-8); box-sizing: border-box; background: var(--card); border-radius: var(--radius-2xl); border: 1px solid var(--stroke); box-shadow: var(--shadow); }
        .progress-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .progress-text { color: var(--muted); font-size: 0.9em; }
        .status-bar { display: flex; gap: 16px; font-size: 0.9em; font-weight: 500; }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-correct { color: var(--teal); } .status-wrong { color: var(--error); }
        .question-text { font-family: var(--font-display); font-size: 1.5em; font-weight: 600; margin-bottom: 32px; line-height: 1.4; white-space: pre-line; }
        .options-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 12px; }
        .option-item { background-color: #fff; border: 1px solid var(--stroke); padding: var(--space-4) var(--space-6); border-radius: var(--radius-lg); cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; display: flex; flex-direction: column; gap: 8px; }
        .option-item:hover:not(.selected) { background-color: var(--card); transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .option-item.selected.correct { background-color: rgba(31, 111, 120, 0.12); border-color: var(--teal); }
        .option-item.selected.incorrect { background-color: rgba(181, 72, 50, 0.12); border-color: var(--error); }
        .option-item.revealed-correct { border-color: rgba(31, 111, 120, 0.5); box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16); }
        .option-label { font-weight: 500; display: flex; align-items: center; gap: 12px; }
        .feedback-state { font-weight: bold; font-size: 0.9em; display: none; }
        .selected .feedback-state, .revealed-correct .feedback-state { display: block; }
        .correct .feedback-state, .revealed-correct .feedback-state { color: var(--teal); } .incorrect .feedback-state { color: var(--error); }
        .rationale { font-size: 0.95em; color: var(--muted); margin-top: 4px; line-height: 1.5; display: none; }
        .selected .rationale, .revealed-correct .rationale { display: block; }
        .hint-toggle { border: 1px solid var(--stroke); color: var(--muted); cursor: pointer; padding: var(--space-2) var(--space-6); border-radius: var(--radius-md); background-color: #fff; display: flex; align-items: center; gap: 8px; font-size: 0.9em; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hint-toggle:hover { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .hint-content { margin-top: 32px; padding: var(--space-6); background-color: #fff; border: 1px solid var(--stroke); border-radius: var(--radius-lg); font-size: 0.95em; color: var(--muted); display: none; align-items: flex-start; gap: 16px; }
        .hint-content.active { display: flex; }
        .hint-icon-box { color: var(--accent-dark); font-size: 1.2em; margin-top: -2px; }
        
        .navigation { margin-top: 32px; display: flex; justify-content: space-between; align-items: center; }
        .nav-buttons { display: flex; gap: 12px; align-items: center; }
        .btn { border-radius: var(--radius-md); padding: var(--space-2) var(--space-7); font-size: 0.95em; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .btn-prev { background-color: #fff; color: var(--ink); border-color: var(--stroke); }
        .btn-prev:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .btn-next { background: linear-gradient(90deg, var(--accent), var(--accent-light)); color: #fff; }
        .btn-next:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .btn-submit-early { background-color: transparent; border: 1px solid #b54832; color: #b54832; margin-right: 8px; }
        .btn-submit-early:hover { background-color: #fff5f2; transform: translateY(-1px); }

        .results-screen { display: flex; flex-direction: column; gap: var(--space-8); }
        .results-title { font-family: var(--font-display); font-size: 2.1em; margin: 0; }
        .results-subtitle { color: var(--muted); margin: 0; font-size: 1em; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-6); }
        .result-card { padding: var(--space-6); border-radius: var(--radius-xl); background: #fff; border: 1px solid var(--stroke); display: flex; flex-direction: column; gap: var(--space-3); }
        .result-label { color: var(--muted); font-size: 0.95em; }
        .result-value { font-size: 2em; font-family: var(--font-display); }
        .result-metrics { display: flex; flex-direction: column; gap: var(--space-2); color: var(--muted); font-size: 0.95em; }
        .results-actions { display: flex; gap: var(--space-4); flex-wrap: wrap; }
        .btn-ghost { background-color: transparent; border: 1px solid var(--stroke); color: var(--ink); }
        .hidden { display: none; }
        @media (max-width: 900px) { .quiz-container { margin: var(--space-8); max-width: 100%; } }
        @media (max-width: 720px) { .quiz-container { padding: var(--space-8) var(--space-6); } .question-text { font-size: 1.3em; } .option-item { padding: var(--space-4); } }
        @media (max-width: 520px) { body { align-items: flex-start; } .quiz-container { margin: var(--space-6); padding: var(--space-7) var(--space-5); } .progress-container { flex-direction: column; align-items: flex-start; gap: var(--space-3); } .navigation { flex-direction: column; align-items: stretch; gap: var(--space-4); } .nav-buttons { width: 100%; } .btn { width: 100%; } .hint-toggle { justify-content: space-between; } .results-actions { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="quiz-content"></div>
        <div id="results-content" class="hidden"></div>
        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>
        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle"><span>Hint</span><span id="hint-icon-arrow">▼</span></button>
            <div class="nav-buttons">
                <button id="submit-early-btn" class="btn btn-submit-early hidden">提前結算 (Submit)</button>
                <button id="prev-btn" class="btn btn-prev">Previous</button>
                <button id="next-btn" class="btn btn-next">Next</button>
            </div>
        </div>
    </div>
    <script>
        const quizData = [{"answerOptions":[{"isCorrect":false,"rationale":"這些分別是甲烷、乙醇與乙酸，屬於典型的有機化合物。","text":"$CH_{4}$、$C_{2}H_{5}OH$、$CH_{3}COOH$"},{"isCorrect":true,"rationale":"一氧化碳、二氧化碳、碳酸鹽類及氰化物因性質與無機物相似，被列為有機化合物的例外。","text":"$CO$、$CO_{2}$、$\\text{CaCO}_{3}$、$\\text{KCN}$"},{"isCorrect":false,"rationale":"這些物質完全不含碳元素，本來就是無機化合物。","text":"食鹽、水、鹽酸、氫氧化鈉"},{"isCorrect":false,"rationale":"糖類、蛋白質與油脂是生命體中重要的大分子有機化合物。","text":"$C_{6}H_{12}O_{6}$、蛋白質、油脂"}],"hint":"請回想那些與二氧化碳相關或在生命體出現前就存在的簡單含碳分子。","question":"根據理化課本定義，下列哪一組化合物雖然含有碳元素，但通常被歸類為「無機化合物」？"},{"answerOptions":[{"isCorrect":true,"rationale":"乾餾是隔絕空氣加熱，使有機物分解產生碳（木炭）及其他氣、液態產物。","text":"木炭"},{"isCorrect":false,"rationale":"二氧化錳是催化劑，並非有機物乾餾後的碳產物。","text":"二氧化錳"},{"isCorrect":false,"rationale":"焦油是乾餾產生的液態產物，而非黑色的固體殘渣。","text":"焦油"},{"isCorrect":false,"rationale":"雖然石墨也是碳，但乾餾產生的木炭排列並不整齊，不能直接稱為石墨。","text":"石墨"}],"hint":"這是一種常用來烤肉、質地疏鬆的黑色含碳固體。","question":"在「乾餾」木屑的實驗中，最後殘留在鋁箔紙內、可用來證明含有碳元素的黑色固體是什麼？"},{"answerOptions":[{"isCorrect":true,"rationale":"乾餾是吸熱的物理化學分解過程，需隔絕氧氣以避免直接燃燒成二氧化碳。","text":"乾餾必須隔絕空氣，而燃燒需要氧氣參與"},{"isCorrect":false,"rationale":"乾餾殘餘物主要是碳，燃燒後的灰燼則是無機鹽類。","text":"乾餾後的固體產物與燃燒後的灰燼成分相同"},{"isCorrect":false,"rationale":"乾餾會產生氫氣、甲烷等可燃氣體，完全燃燒則主要產生二氧化碳與水。","text":"兩者產生的氣體完全相同"},{"isCorrect":false,"rationale":"乾餾涉及大分子的受熱分解，兩者皆屬於化學變化。","text":"乾餾是物理變化，燃燒是化學變化"}],"hint":"考慮反應過程中是否需要外界的氧氣參與反應。","question":"有關「乾餾」與「燃燒」的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"藍色氯化亞鈷試紙遇水會變成粉紅色，常用於檢驗水的存在。","text":"藍色氯化亞鈷試紙"},{"isCorrect":false,"rationale":"廣用試紙也是用於檢驗 $pH$ 值，無法專一性檢驗水。","text":"廣用試紙"},{"isCorrect":false,"rationale":"石蕊試紙是用於檢驗溶液的酸鹼性，而非檢驗水分子。","text":"石蕊試紙"},{"isCorrect":false,"rationale":"粉紅色是含水狀態，應使用乾燥的藍色試紙來觀察變化。","text":"粉紅色氯化亞鈷試紙"}],"hint":"這種試紙乾燥時是藍色的，吸收水分後會改變顏色。","question":"利用氧化法檢驗有機化合物時，若產生水蒸氣，可用下列哪一種試紙檢驗？"},{"answerOptions":[{"isCorrect":false,"rationale":"同系物是指結構相似但在分子組成上相差一個或多個 $CH_{2}$ 結構單位的有機物。","text":"同系物"},{"isCorrect":true,"rationale":"原子種類與數量相同但結構排列不同的化合物互為同分異構物。","text":"同分異構物"},{"isCorrect":false,"rationale":"同位素是指原子序相同但中子數不同的原子，與分子結構無關。","text":"同位素"},{"isCorrect":false,"rationale":"同素異形體是指由同一種元素組成的不同單質，如石墨與鑽石。","text":"同素異形體"}],"hint":"關鍵在於「相同的成分比例，不同的建構方式」。","question":"乙醇（$C_{2}H_{5}OH$）與甲醚（$CH_{3}OCH_{3}$）具有相同的分子式，但構造與性質完全不同，這種關係稱為什麼？"},{"answerOptions":[{"isCorrect":true,"rationale":"糖粉與麵粉是有機物，受熱分解後會留下黑色的碳。","text":"糖粉、麵粉"},{"isCorrect":false,"rationale":"小蘇打受熱分解產生二氧化碳，但本身不屬於有機化合物。","text":"糖粉、小蘇打"},{"isCorrect":false,"rationale":"食鹽穩定性高，加熱不會炭化。","text":"食鹽、麵粉"},{"isCorrect":false,"rationale":"食鹽與小蘇打是無機鹽類，加熱不會產生黑色的碳元素。","text":"食鹽、小蘇打"}],"hint":"回想廚房中哪些物質烤焦後會聞到典型的有機物燒焦味。","question":"在簡易乾餾實驗中，將食鹽、糖粉、小蘇打及麵粉加熱，哪兩者會因含有碳元素而變黑？"},{"answerOptions":[{"isCorrect":false,"rationale":"醇類除了碳氫外，還含有羥基（$-OH$）官能基。","text":"醇類"},{"isCorrect":false,"rationale":"有機酸類含有羧基（$-COOH$），含有氧元素。","text":"有機酸類"},{"isCorrect":true,"rationale":"烴類（音同「聽」）由碳（火部）與氫（水部）各取部分組成其名。","text":"烴類"},{"isCorrect":false,"rationale":"酯類含有酯基（$-COO-$），亦含有氧元素。","text":"酯類"}],"hint":"這個名稱是由「碳」和「氫」兩個中文字切掉一半後拼湊而成的。","question":"有機化合物中，只含有「碳」與「氫」兩元素，統稱為下列何者？"},{"answerOptions":[{"isCorrect":false,"rationale":"碳數越多，分子間作用力通常越強，沸點越高。","text":"碳數越少，沸點越高"},{"isCorrect":true,"rationale":"多數烴類（如汽油、天然氣）不溶於水且會浮在水面上。","text":"通常難溶於水，且密度比水小"},{"isCorrect":false,"rationale":"低碳數烴類（如甲烷、丙烷）在常溫下通常為氣態。","text":"在常溫下皆為固態"},{"isCorrect":false,"rationale":"烴類含有氫，燃燒時還會產生水（$H_{2}O$）。","text":"完全燃燒時只會產生二氧化碳"}],"hint":"回想一下汽油或天然氣冒出水面時，是否會溶在水裡？","question":"有關「烴類」化合物的性質，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"食鹽水是用於後續的鹽析，而非反應的主要反應物。","text":"油脂、食鹽水"},{"isCorrect":false,"rationale":"這是酯化反應的原料，並非造化反應。","text":"有機酸、醇類"},{"isCorrect":false,"rationale":"濃硫酸通常作為酯化反應的催化劑與脫水劑。","text":"乙醇、濃硫酸"},{"isCorrect":true,"rationale":"造化反應是利用油脂與強鹼反應生成肥皂（脂肪酸鈉）與甘油。","text":"油脂、氫氧化鈉"}],"hint":"想想看，「肥」皂的名稱暗示了它與哪種廚房常見物質有關。","question":"製作肥皂的過程稱為「造化反應」，主要原料包含下列何者？"},{"answerOptions":[{"isCorrect":false,"rationale":"酒精並非造化反應的催化劑，它主要改善溶解度。","text":"作為催化劑，降低反應所需的活化能"},{"isCorrect":true,"rationale":"酒精能同時溶解油脂與氫氧化鈉溶液，增加碰撞機會。","text":"作為界面活性劑，幫助油水互溶以加速反應"},{"isCorrect":false,"rationale":"鹽析應加入濃食鹽水，而非酒精。","text":"用於鹽析，使肥皂固體析出"},{"isCorrect":false,"rationale":"酒精雖有揮發性，但主要功能並非提供香氣。","text":"為了讓肥皂更香，去除油臭味"}],"hint":"油與強鹼水溶液原本互不相溶，需要一個媒介來拉近它們。","question":"在造化實驗中，加入「酒精」的主要目的是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"蒸餾是利用沸點差異分離物質的方法。","text":"蒸餾"},{"isCorrect":false,"rationale":"中和是酸與鹼反應生成鹽與水，與此分離過程不同。","text":"中和反應"},{"isCorrect":false,"rationale":"萃取是利用溶劑對溶質溶解度的差異進行分離。","text":"萃取"},{"isCorrect":true,"rationale":"利用肥皂不溶於濃食鹽水且密度較小的特性，使其浮出水面。","text":"鹽析"}],"hint":"這是一個利用「溶解度」差異，讓固體浮上來的物理分離步驟。","question":"製作完成肥皂後，加入「濃食鹽水」使肥皂析出的過程稱為什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"帶電端的通常是親水端，長碳鏈端則不帶電。","text":"親油端帶有電荷，易與油脂反應"},{"isCorrect":false,"rationale":"應是親油端深入油污，親水端朝外接觸水。","text":"親水端深入油污內部將其打碎"},{"isCorrect":true,"rationale":"長碳鏈結構與油污相似（同性相溶），負責抓取油垢。","text":"親油端通常是一長串的碳鏈"},{"isCorrect":false,"rationale":"親水端負責與水分結合，將包裹好的油垢帶走。","text":"親水端負責與衣物表面的纖維結合"}],"hint":"想想「烴類」的結構如何與油脂產生交互作用。","question":"肥皂分子具有「親水端」與「親油端」，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"肥皂會與硬水中的 $Ca^{2+}$、$Mg^{2+}$ 反應生成不溶性的鈣皂或鎂皂。","text":"肥皂在硬水中容易產生沉澱，清潔力下降"},{"isCorrect":false,"rationale":"現代合成清潔劑多設計為中性或弱鹼性，較不傷衣物。","text":"合成清潔劑通常呈強鹼性，會傷害衣物"},{"isCorrect":false,"rationale":"兩者的去污原理相同，皆是利用界面活性劑的構造。","text":"肥皂的去污原理與合成清潔劑完全不同"},{"isCorrect":false,"rationale":"合成清潔劑多由石油化工產品合成。","text":"合成清潔劑的主要原料是天然油脂"}],"hint":"硬水是指含有較多鈣、鎂離子的水，肥皂遇上它們會發生什麼事？","question":"有關合成清潔劑與肥皂的比較，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這類分子量通常較小，不符合聚合物（分子量大於一萬）的定義。","text":"聚合物"},{"isCorrect":false,"rationale":"它們不含羥基（$-OH$）。","text":"醇類"},{"isCorrect":true,"rationale":"甲烷與丙烷僅含碳、氫元素，且碳與碳間以單鍵結合。","text":"烴類（烷類）"},{"isCorrect":false,"rationale":"兩者的分子式不同（碳原子數不同），不可互為同分異構物。","text":"同分異構物"}],"hint":"它們是只含碳和氫的簡單分子燃料。","question":"天然氣的主要成分是甲烷（$CH_{4}$），而液化石油氣的主要成分是丙烷（$C_{3}H_{8}$），兩者皆屬於下列何者？"},{"answerOptions":[{"isCorrect":false,"rationale":"澱粉是植物行光合作用產生的天然聚合物。","text":"澱粉"},{"isCorrect":false,"rationale":"蛋白質是生物體內天然存在的聚合物。","text":"蛋白質"},{"isCorrect":false,"rationale":"纖維素是構成植物細胞壁的天然聚合物。","text":"纖維素"},{"isCorrect":true,"rationale":"保麗龍是經由化學合成的人造聚合物。","text":"保麗龍（聚苯乙烯）"}],"hint":"區分「天然存在」於生物體中與「工廠製造」的材料。","question":"關於聚合物的分類，下列哪一種物質屬於「合成聚合物」？"},{"answerOptions":[{"isCorrect":true,"rationale":"蛋白質是由許多氨基酸分子經脫水縮合而成的長鏈。","text":"氨基酸"},{"isCorrect":false,"rationale":"乙烯是聚乙烯（$PE$）的單體。","text":"乙烯"},{"isCorrect":false,"rationale":"核苷酸是核酸（如 $DNA$）的單體。","text":"核苷酸"},{"isCorrect":false,"rationale":"葡萄糖是澱粉與纖維素的單體。","text":"葡萄糖"}],"hint":"這種小分子是人體合成肌肉等組織的基本材料。","question":"蛋白質是由下列哪一種「單體」所構成的聚合物？"},{"answerOptions":[{"isCorrect":false,"rationale":"熱固性聚合物的網狀結構使其更耐熱且穩定。","text":"熱塑性聚合物耐高溫能力通常強於熱固性"},{"isCorrect":false,"rationale":"輪胎橡膠多具交聯網狀結構，屬於熱固性或具彈性的聚合物。","text":"輪胎（合成橡膠）屬於典型的熱塑性聚合物"},{"isCorrect":false,"rationale":"熱固性具網狀結構，一旦成型受熱即分解，無法重塑。","text":"熱固性聚合物受熱後可無限次重新塑形"},{"isCorrect":true,"rationale":"鏈狀結構受熱後易滑動，可重複加熱塑形，有利回收。","text":"熱塑性聚合物受熱會軟化，分子結構通常呈鏈狀"}],"hint":"思考哪一種構造像是一堆雜亂的繩子，受熱後容易滑動？","question":"有關「熱塑性聚合物」與「熱固性聚合物」的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"油脂分子量約一千左右，未達一萬以上，屬於小分子有機物。","text":"油脂"},{"isCorrect":false,"rationale":"蛋白質是胺基酸連結成的巨分子，屬於聚合物。","text":"蛋白質"},{"isCorrect":false,"rationale":"澱粉是巨大的碳水化合物鏈，屬於聚合物。","text":"澱粉"},{"isCorrect":false,"rationale":"纖維素也是由葡萄糖聚合而成的長鏈，屬於聚合物。","text":"纖維素"}],"hint":"注意「聚合物」的定義在於分子量大小，此物質分子量僅約一千。","question":"下列哪一種食物成分雖然能量密度最高，但卻不屬於聚合物？"},{"answerOptions":[{"isCorrect":false,"rationale":"原長是常數，與外力無關。","text":"彈簧的原始長度"},{"isCorrect":false,"rationale":"力的大小決定於重量（質量），而非體積。","text":"所掛砝碼的體積"},{"isCorrect":true,"rationale":"虎克定律描述 $F = k \\cdot \\Delta x$，力與形變量成線性關係。","text":"外力（所掛砝碼重量）"},{"isCorrect":false,"rationale":"是伸長量（變化量）而非總長度與外力成正比。","text":"彈簧的總長度"}],"hint":"拉得越用力，彈簧變長的部分就越多。","question":"根據「虎克定律」，在彈性限度內，彈簧的「伸長量」與下列何者成正比？"},{"answerOptions":[{"isCorrect":true,"rationale":"$20\\text{ gw}$ 造成 $2\\text{ cm}$ 伸長，則 $60\\text{ gw}$ 造成 $6\\text{ cm}$ 伸長，$10+6=16$。","text":"$16\\text{ cm}$"},{"isCorrect":false,"rationale":"這可能誤算為伸長量與力成反比或加法錯誤。","text":"$14\\text{ cm}$"},{"isCorrect":false,"rationale":"這只是伸長量，題目要求的是總長度。","text":"$6\\text{ cm}$"},{"isCorrect":false,"rationale":"計算比例時可能將總長度直接代入比例式導致錯誤。","text":"$18\\text{ cm}$"}],"hint":"先找出掛 $20\\text{ gw}$ 時「多出來」的長度，再依比例推算。","question":"有一彈簧原長 $10\\text{ cm}$，掛上 $20\\text{ gw}$ 物體後長度變為 $12\\text{ cm}$。若改掛 $60\\text{ gw}$ 物體（未超彈性限度），長度變為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是平衡的必要條件之一。","text":"兩力大小必須相等"},{"isCorrect":false,"rationale":"若不在同一直線上會產生轉動。這是平衡條件之一。","text":"兩力必須作用在同一直線上"},{"isCorrect":false,"rationale":"這是平衡的必要條件之一。","text":"兩力方向必須相反"},{"isCorrect":true,"rationale":"兩力必須作用在「同一個」物體上才能互相抵消達到平衡。","text":"兩力必須作用在不同物體上"}],"hint":"想想看，如果你跟朋友各推一輛車，能抵消嗎？","question":"關於「兩力平衡」的條件，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"運動狀態已知（不變），即可確定合力為零。","text":"無法判斷"},{"isCorrect":false,"rationale":"若有合力，物體將會產生加速度，不會保持靜止或等速。","text":"合力向右"},{"isCorrect":false,"rationale":"若合力不為零，物體運動狀態必會改變。","text":"合力向上"},{"isCorrect":true,"rationale":"根據牛頓第一運動定律，合力為零時物體保持原運動狀態（靜止或等速）。","text":"合力為零"}],"hint":"當一個物體不改變其動態（不動或不變速），力的大小關係如何？","question":"物體受力分析時，若物體保持「靜止」或「等速度運動」，則其所受合力為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"只有物體未動時，靜摩擦力才等於推力；最大靜摩擦力是定值。","text":"最大靜摩擦力的大小等於推力的大小"},{"isCorrect":false,"rationale":"在正向力相同的情況下，摩擦力與接觸面積大小無關。","text":"接觸面積越大，摩擦力就越大"},{"isCorrect":true,"rationale":"摩擦力是阻礙相對運動或趨勢的一種阻力。","text":"摩擦力的方向恆與物體運動（或企圖運動）的方向相反"},{"isCorrect":false,"rationale":"若無推力且無運動趨勢，靜止物體所受摩擦力為零。","text":"物體只要與地面接觸，就一定有摩擦力"}],"hint":"摩擦力是一種「愛唱反調」的力。","question":"有關「摩擦力」的性質，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是正向力（重量），並非此時的水平摩擦力。","text":"$100\\text{ kgw}$"},{"isCorrect":false,"rationale":"若摩擦力為零，木箱受 $5\\text{ kgw}$ 推力應會移動。","text":"$0\\text{ kgw}$"},{"isCorrect":true,"rationale":"木箱保持靜止（合力為零），故靜摩擦力必須等於推力。","text":"$5\\text{ kgw}$"},{"isCorrect":false,"rationale":"若摩擦力大於推力，物體將會向推力的反方向移動。","text":"大於 $5\\text{ kgw}$"}],"hint":"當物體受力後卻「一動也不動」時，推力與阻力的大小關係？","question":"一重 $100\\text{ kgw}$ 的木箱置於水平地面，阿關用 $5\\text{ kgw}$ 的水平力推它，木箱不動。此時木箱受到的摩擦力是多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"正向力（重量）減少，最大靜摩擦力反而會變小。","text":"減輕車輛的總重量"},{"isCorrect":false,"rationale":"單純改變接觸面積並不能改變摩擦力大小。","text":"增加輪胎與地面的接觸面積"},{"isCorrect":false,"rationale":"油脂是潤滑劑，會大幅降低摩擦力。","text":"在輪胎上塗抹油脂"},{"isCorrect":true,"rationale":"增加接觸面的粗糙程度能有效提升最大靜摩擦力。","text":"加深輪胎表面的紋路以增加粗糙度"}],"hint":"回想一下，粗糙的砂紙與平滑的玻璃，哪一個比較難推？","question":"欲增加輪胎與地面的摩擦力以防打滑，下列哪種做法最有效？"},{"answerOptions":[{"isCorrect":false,"rationale":"只要有重量與接觸面，壓力就不可能為零。","text":"變為零"},{"isCorrect":false,"rationale":"面積減小時，相同力造成的壓力應上升而非下降。","text":"變小"},{"isCorrect":true,"rationale":"重量（作用力）不變，但接觸面積減少一半，故壓力變為兩倍。","text":"變大"},{"isCorrect":false,"rationale":"雖然體重不變，但分佈的面積改變了，壓力必然改變。","text":"不變"}],"hint":"力分佈得越「集中」，物理效果（壓力）就越明顯。","question":"壓力的定義為「垂直作用力除以接觸面積」（$P = \\frac{F}{A}$）。若一人由站立改為單腳站立，則其對地面的壓力有何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"面積中等（$15\\text{ cm}^2$），壓力非極值。","text":"$5 \\times 3\\text{ cm}$ 的面"},{"isCorrect":true,"rationale":"相同重量下，接觸面積最小（$12\\text{ cm}^2$）的面產生的壓力最大。","text":"$4 \\times 3\\text{ cm}$ 的面"},{"isCorrect":false,"rationale":"這是面積最大（$20\\text{ cm}^2$）的面，產生的壓力最小。","text":"$5 \\times 4\\text{ cm}$ 的面"},{"isCorrect":false,"rationale":"壓力與接觸面積有關，故不相同。","text":"無論哪一面朝下壓力都相同"}],"hint":"尋找面積最小的組合。","question":"一長方體金屬塊規格為 $5 \\times 4 \\times 3\\text{ cm}$，將其以不同面放置於水平地面，哪一種面朝下時壓力最大？"},{"answerOptions":[{"isCorrect":false,"rationale":"根據 $P = hD$，深度 $h$ 越大，壓力越大。","text":"深度越淺，壓力越大"},{"isCorrect":false,"rationale":"液壓正比於液體密度，密度越大壓強越大。","text":"液壓大小與液體的密度無關"},{"isCorrect":false,"rationale":"液體壓力作用於接觸面上，且必與面垂直（包含上、側向）。","text":"液體壓力必指向正下方"},{"isCorrect":true,"rationale":"液體壓力的特性是在同一深度處，具有向各個方向傳遞且大小一致的性質。","text":"同一深度，各個方向的壓力大小皆相等"}],"hint":"回想潛水時，耳朵感受到的不只是從上方壓下來的力量。","question":"關於靜止液體內部的壓力（液壓），下列敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"液壓計算應取垂直深度 $h = 10$，故 $P = 10 \\times 1 = 10$。","text":"$10\\text{ gw/cm}^2$"},{"isCorrect":fal ":"回想一下，為什麼在山上煮麵不容易煮熟？","question":"當我們爬到「高山」上時，大氣壓力的變化及現象下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"若物體是浮體，浮力皆等於其重力，與液體密度無關。","text":"在密度大的液體中，物體所受浮力一定較大"},{"isCorrect":false,"rationale":"沉體依然有排水，故仍受浮力作用，只是浮力小於重量。","text":"沉在水底的物體不受浮力作用"},{"isCorrect":true,"rationale":"這是阿基米德原理的核心定義，無論浮體或沉體皆適用。","text":"浮力大小等於物體所排開的液體重量"},{"isCorrect":false,"rationale":"浮力主要由物體沒入液體的體積與液體密度決定。","text":"浮力大小只跟物體的重量有關"}],"hint":"想想看，物體進入水中後「趕走」了多少水。","question":"有關「浮力」的敘述，下列何者符合「阿基米德原理」？"},{"answerOptions":[{"isCorrect":true,"rationale":"身為浮體，浮力恆等於船重，船重不變，浮力亦不變。","text":"不變"},{"isCorrect":false,"rationale":"海水密度雖大，但船隻會上浮一點以減少排水體積，使浮力維持等於船重。","text":"變大"},{"isCorrect":false,"rationale":"根據平衡原理，浮力必須等於重量，資訊已足夠判斷。","text":"無法判斷"},{"isCorrect":false,"rationale":"浮體浮力不會隨液體密度增加而減小。","text":"變小"}],"hint":"船始終「浮」在面上，合力應如何？","question":"一艘輪船由「淡水河」駛入「太平洋」，其所受浮力有何變化？（假設皆為浮體）"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然冰變水體積縮小，但它原本有一部分在液面上，融化後總體積不變。","text":"下降"},{"isCorrect":true,"rationale":"冰塊融化成水的重量與其排開水的重量相同，故體積恰好填補原空缺。","text":"不變"},{"isCorrect":false,"rationale":"根據密度與浮力原理，此結果與質量無關。","text":"視冰塊大小而定"},{"isCorrect":false,"rationale":"冰塊融化後體積會變小，恰好等於原沒入水下的體積。","text":"上升"}],"hint":"考慮「冰塊排開的水重」與「融化後變成的水重」之間的關係。","question":"已知冰塊密度為 $0.9\\text{ g/cm}^3$，水的密度為 $1.0\\text{ g/cm}^3$。當一塊冰浮在水面上融化後，水面高度將如何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"聚合物是由重複單元構成的巨分子，非單原子。","text":"單獨原子排列，無固定結構"},{"isCorrect":false,"rationale":"這是熱固性聚合物的特徵。","text":"立體網狀，各方向皆有共價鍵連結"},{"isCorrect":true,"rationale":"鏈狀結構使其具備受熱軟化的物理特性。","text":"長鏈狀，分子間無緊密交聯"},{"isCorrect":false,"rationale":"聚合物通常不是球狀分佈，且與塑性無關。","text":"球狀，分子間呈點對點接觸"}],"hint":"這種結構使得它在高溫下可以像麵條一樣滑動。","question":"有關「熱塑性聚合物」的結構示意圖，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"兩者分子量皆相對較小，不屬於聚合物。","text":"兩者皆屬於聚合物"},{"isCorrect":false,"rationale":"兩者皆是含碳的有機化合物。","text":"兩者皆為無機化合物"},{"isCorrect":true,"rationale":"酒精含 $-OH$ 基，油脂是由脂肪酸與甘油形成的酯類。","text":"酒精是醇類，油脂是酯類"},{"isCorrect":false,"rationale":"烴類僅含碳氫，酒精含氧；油脂不 體，浮力始終等於物重。","text":"變大"},{"isCorrect":false,"rationale":"雖然液體密度變小，但只要物體仍浮著，浮力不變。","text":"變小"},{"isCorrect":true,"rationale":"對於浮體而言，浮力恆等於物體的重量，只要物體不沉入，其重量未變則浮力不變。","text":"保持不變"}],"hint":"考慮物體在兩液體中的狀態（浮體或沉體）與物重的關係。","question":"一個密度為 $0.6 g/cm^{3}$ 的木塊浮在水面上，若改將其放入密度為 $0.8 g/cm^{3}$ 的酒精中，其所受的「浮力」會如何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"既然是「密閉」容器，則內外壓力是分開討論的。","text":"容器外部的大氣壓力滲透進去"},{"isCorrect":false,"rationale":"分子間引力與產生的壁面壓力無關。","text":"氣體分子的萬有引力"},{"isCorrect":true,"rationale":"密閉系統壓力來自於大量分子持續碰撞壁面產生的作用力分佈。","text":"氣體分子運動時對容器壁的碰撞"},{"isCorrect":false,"rationale":"氣體分子極輕，重量產生的壓力在微觀空間中可忽略。","text":"氣體分子的重量壓在容器壁上"}],"hint":"想像一顆球在盒子裡亂撞時產生的力。","question":"在密閉容器中，氣體壓力的產生主要是因為什麼原因？"},{"answerOptions":[{"isCorrect":false,"rationale":"彈簧必須接觸並發生形變才能產生彈力。","text":"彈力"},{"isCorrect":false,"rationale":"浮力需要液體或氣體分子接觸物體表面才能產生。","text":"浮力"},{"isCorrect":true,"rationale":"地球吸引物體不需要接觸（如自由落體中），屬於超距力。","text":"萬有引力"},{"isCorrect":false,"rationale":"摩擦力發生在兩接觸面之間。","text":"摩擦力"}],"hint":"想想磁鐵、靜電與重力的共同特性。","question":"下列哪一種力不需要實際接觸物體即可產生作用，稱為「超距力」？"},{"answerOptions":[{"isCorrect":false,"rationale":"相同深度下，密度 $D$ 越大，產生的壓力越高。","text":"液體密度越大，產生的壓力越大"},{"isCorrect":false,"rationale":"根據 $P=h \\times D$，深度 $h$ 增加，壓力確實隨之增大。","text":"深度越深，壓力越大"},{"isCorrect":false,"rationale":"這是靜止液體壓力的基本物理特性。","text":"同一深度，各個方向的壓力相等"},{"isCorrect":true,"rationale":"連通管原理告訴我們，壓力僅與垂直深度有關，與容器胖瘦或斜度無關。","text":"壓力的大小與容器的形狀有關"}],"hint":"回想連通管中，不同形狀的管子水面高度卻相同的原因。","question":"關於液體內部壓力的特性，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是水銀柱的高度而非水柱。","text":"76 公分"},{"isCorrect":false,"rationale":"這是水銀的密度數值。","text":"13.6 公分"},{"isCorrect":false,"rationale":"這是百帕單位的數值轉化，非水柱高度。","text":"1013 公分"},{"isCorrect":true,"rationale":"因為水的密度為 $1 g/cm^{3}$，$P=h \\times 1 = 1033.6$，故高度即為 1033.6 公分。","text":"1033.6 公分"}],"hint":"利用 $P=h \\times D$ 公式，水的密度 $D=1$。","question":"在海平面高度，若大氣壓力為 $1033.6 gw/cm^{2}$，相當於多少公分高的水柱壓力？"},{"answerOptions":[{"isCorrect":false,"rationale":"降落傘主要涉及空氣阻力。","text":"降落傘"},{"isCorrect":false,"rationale":"吸盤主要利用大氣壓力差。","text":"吸盤勾"},{"isCorrect":false,"rationale":"指南針利用磁場的相互作用。","text":"指南針"},{"isCorrect":true,"rationale":"帕斯卡原理指密閉流體傳遞壓力不變，可用小活塞施小力產生大活塞的大推力。","text":"汽車油壓煞車系統"}],"hint":"這與液體在密閉管路中傳遞壓力的特性有關。","question":"帕斯卡原理主要應用於下列哪一種設備？"},{"answerOptions":[{"isCorrect":false,"rationale":"若摩擦力大於外力，物體將往受力反方向運動，這不符合常理。","text":"大於 10 公斤重"},{"isCorrect":false,"rationale":"靜摩擦力由水平外力決定，而非由垂直重力直接決定。","text":"等於物體的重量"},{"isCorrect":true,"rationale":"物體靜止代表處於平衡狀態，摩擦力必須與外力大小相等、方向相反。","text":"10 公斤重"},{"isCorrect":false,"rationale":"若無摩擦力，物體在受力下應會產生運動。","text":"0 公斤重"}],"hint":"考慮「力平衡」的條件：物體靜止時，合力必須為零。","question":"一個重物放在水平地面上，施加 10 公斤重的水平力後物體仍靜止不動，此時物體受到的「摩擦力」為多少？"},{"answerOptions":[{"isCorrect":true,"rationale":"二氧化碳的碳與水的氫必然來自原物質，故可確定含碳與氫。","text":"碳、氫"},{"isCorrect":false,"rationale":"忽視了水蒸氣所代表的氫元素。","text":"碳、氧"},{"isCorrect":false,"rationale":"氧可能來自外界助燃的氧氣，故不能百分之百證明原物質含氧。","text":"碳、氫、氧"},{"isCorrect":false,"rationale":"水的產生證明了氫元素的存在。","text":"只有碳"}],"hint":"考慮燃燒反應式中，哪些原子必須由反應物提供。","question":"關於「燃燒分析法」檢驗有機化合物，若完全燃燒後產生二氧化碳與水，可證明該化合物一定含有哪些元素？"},{"answerOptions":[{"isCorrect":false,"rationale":"甲烷是烴類，僅含碳與氫。","text":"甲烷"},{"isCorrect":false,"rationale":"乙酸乙酯屬於酯類，不溶於水且官能基不同。","text":"乙酸乙酯"},{"isCorrect":false,"rationale":"乙酸的官能基是 $-COOH$。","text":"乙酸"},{"isCorrect":true,"rationale":"乙醇屬於醇類，含有 $-OH$ 官能基，且與水無限互溶。","text":"乙醇"}],"hint":"這種物質在生活中常用於消毒或釀酒。","question":"下列哪一種有機化合物的官能基為 $-OH$，且易溶於水？"},{"answerOptions":[{"isCorrect":false,"rationale":"通常使用「濃硫酸」作為催化劑與脫水劑。","text":"反應需要加入稀鹽酸作為催化劑"},{"isCorrect":true,"rationale":"酯類通常具有芳香氣味，常作為人工香料。","text":"酯類具有特殊的果香味"},{"isCorrect":false,"rationale":"這是造化反應的產物。","text":"產物包含肥皂與甘油"},{"isCorrect":false,"rationale":"酯類密度比水小且難溶於水，會浮在水面上。","text":"酯類密度比水大且易溶於水"}],"hint":"回想製作人工香料或指甲油稀釋劑時的特性。","question":"關於「酯化反應」的產物，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是在描述合成塑膠的分類特性。","text":"天然纖維"},{"isCorrect":false,"rationale":"網狀結構受熱後不熔化，會直接焦黑分解。","text":"熱硬性聚合物"},{"isCorrect":true,"
