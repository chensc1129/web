":false,"rationale":"木炭主要成分是碳，在氧氣充足下可進行燃燒產生二氧化碳。","text":"固體產物黑色木炭無法再被燃燒。"},{"isCorrect":false,"rationale":"二氧化碳不助燃也不自燃；具有可燃性的氣體通常是氫氣、甲烷或一氧化碳。","text":"產生的氣體中，二氧化碳具有助燃性。"}],"hint":"區分液體分層的性質與氣體的可燃性。","question":"木材乾餾後會產生多種物質。關於其產物的描述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"食鹽與砂糖皆易溶於水，無法判斷是否含有碳鏈結構。","text":"將其放入水中觀察溶解度。"},{"isCorrect":false,"rationale":"兩者皆為白色晶體，肉眼難以精準區分。","text":"觀察其顏色與結晶形狀。"},{"isCorrect":true,"rationale":"砂糖受熱會碳化變黑（產生碳），食鹽則不會，這能證明砂糖含有碳元素。","text":"將粉末置於坩堝中強熱，觀察是否產生焦黑物質。"},{"isCorrect":false,"rationale":"這與化學分類上有機與否無直接邏輯關聯。","text":"使用放大鏡觀察其吸濕性。"}],"hint":"有機化合物的一個關鍵特徵是受熱容易碳化。","question":"若要鑑定某白色粉末是食鹽還是砂糖，下列哪一種實驗方式最能直接證明其為「有機化合物」？"},{"answerOptions":[{"isCorrect":true,"rationale":"含碳物質氧化產生二氧化碳（$CO_{2}$），會與澄清石灰水反應生成碳酸鈣沉澱。","text":"碳（$C$）"},{"isCorrect":false,"rationale":"氫元素氧化後產生水（$H_{2}O$），通常使用藍色氯化亞鈷試紙檢驗。","text":"氫（$H$）"},{"isCorrect":false,"rationale":"氮氧化物不會使石灰水變混濁。","text":"氮（$N$）"},{"isCorrect":false,"rationale":"氧氣無法透過澄清石灰水檢驗，且通常由氧化劑提供。","text":"氧（$O$）"}],"hint":"澄清石灰水是哪種氣體的專屬檢驗劑？","question":"在鑑定有機化合物的「氧化法」實驗中，若產生的氣體使澄清石灰水變混濁，證明原物質含何種元素？"},{"answerOptions":[{"isCorrect":false,"rationale":"分餾產物是沸點相近的化合物集合體，仍屬於混合物。","text":"分餾得到的產物如汽油、煤油等皆為純物質。"},{"isCorrect":false,"rationale":"瀝青主要是高分子量的烴類混合物。","text":"分餾後剩餘的瀝青是有機酸類。"},{"isCorrect":true,"rationale":"沸點低者易汽化，會先到達分餾塔高處冷凝收集。","text":"沸點較低的成分會先從分餾塔上方逸出。"},{"isCorrect":false,"rationale":"分餾是利用「沸點」的不同。","text":"分餾是利用物質「溶解度」的不同進行分離。"}],"hint":"回想分餾塔高低位置與沸點的關係。","question":"關於石油的分餾，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"丁代表含四個碳。","text":"丁烷"},{"isCorrect":false,"rationale":"乙代表含二個碳。","text":"乙烷"},{"isCorrect":false,"rationale":"甲代表含一個碳。","text":"甲烷"},{"isCorrect":true,"rationale":"依序為甲、乙、丙、丁...，故 3 個碳為丙。","text":"丙烷"}],"hint":"使用天干（甲、乙、丙、丁...）來計數。","question":"有機化合物的命名通常依照其含碳數目。請問含碳數為 3 的烷類稱為？"},{"answerOptions":[{"isCorrect":false,"rationale":"結構不同會導致性質大不相同。","text":"性質完全相同的兩種有機物。"},{"isCorrect":false,"rationale":"必須各原子的「數量」也相同。","text":"只要原子種類相同就稱為同分異構物。"},{"isCorrect":false,"rationale":"分子式必須完全一致，包括各種原子的個數。","text":"含碳量相同但氫原子數不同的化合物。"},{"isCorrect":true,"rationale":"結構不同導致物理與化學性質也不同，例如乙醇與甲醚。","text":"分子式相同，但原子排列方式不同的物質。"}],"hint":"就像相同的積木零件可以組出車子也可以組出房子。","question":"下列關於「同分異構物」的敘述，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"乙醇（酒精）與水可以任意比例互溶。","text":"乙醇"},{"isCorrect":true,"rationale":"酯類通常不溶於水且密度比水小，會浮在水面上。","text":"乙酸乙酯"},{"isCorrect":false,"rationale":"乙酸（醋酸）易溶於水。","text":"乙酸"},{"isCorrect":false,"rationale":"葡萄糖含有多個羥基，易溶於水。","text":"葡萄糖"}],"hint":"哪一類物質具有水果香味且常浮在水面？","question":"下列哪一種有機化合物難溶於水，且其密度小於水？"},{"answerOptions":[{"isCorrect":false,"rationale":"應該是油脂與「強鹼」（如氫氧化鈉）反應。","text":"反應物為油脂與強酸。"},{"isCorrect":false,"rationale":"應加入「飽和食鹽水」進行鹽析。","text":"皂化反應完成後，應加入大量濃鹽酸進行收集。"},{"isCorrect":true,"rationale":"油脂不溶於水，酒精能幫助油脂與氫氧化鈉溶液均勻混合。","text":"加入酒精是為了加速反應，作為界面活性劑。"},{"isCorrect":false,"rationale":"副產物還有丙三醇（甘油）。","text":"反應產物只有肥皂（脂肪酸鈉）。"}],"hint":"油脂和鹼水本不互溶，需要什麼媒人？","question":"關於肥皂的製作（皂化反應），下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"鹽析是物理性質的改變，並非化學反應。","text":"食鹽與肥皂發生化學反應產生沉澱。"},{"isCorrect":false,"rationale":"甘油易溶於水，鹽析是為了讓肥皂浮起以便分離。","text":"利用食鹽水將肥皂內部的甘油吸收。"},{"isCorrect":false,"rationale":"與密度相對大小無關，主要是溶解度排擠作用。","text":"食鹽的密度比肥皂小。"},{"isCorrect":true,"rationale":"食鹽水會讓肥皂的溶解度下降，使肥皂浮在液面與甘油分離。","text":"肥皂在飽和食鹽水中的溶解度極小。"}],"hint":"飽和食鹽水對脂肪酸鈉（肥皂）的溶解性如何？","question":"所謂的「鹽析」現象，是利用什麼原理將肥皂析出？"},{"answerOptions":[{"isCorrect":true,"rationale":"烴鏈（碳鏈）是非極性的，容易與油垢結合。","text":"親油端"},{"isCorrect":false,"rationale":"此為無關選項。","text":"催化端"},{"isCorrect":false,"rationale":"肥皂本身呈弱鹼性，且此描述不符結構功能。","text":"酸性端"},{"isCorrect":false,"rationale":"親水端通常是帶電荷或極性較強的一端（如 $-COONa$）。","text":"親水端"}],"hint":"碳鏈的部分跟油還是水長得比較像？","question":"肥皂分子的結構中，具有「長鏈碳氫基」的一端稱為什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"一般自來水雖含微量離子，但影響不如典型硬水嚴重。","text":"自來水"},{"isCorrect":true,"rationale":"鈣、鎂離子會與肥皂生成不溶性的鈣肥皂或鎂肥皂沉澱，失去洗滌作用。","text":"含有多量鈣、鎂離子的硬水"},{"isCorrect":false,"rationale":"純水中肥皂效果良好。","text":"蒸餾水"},{"isCorrect":false,"rationale":"軟水中沒有鈣、鎂離子干擾。","text":"軟水"}],"hint":"鹼土族離子會讓肥皂發生沉澱。","question":"肥皂在下列哪一種水中，其去污效果會大打折扣？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是正確的，合成清潔劑不與鈣鎂離子反應產生沉澱。","text":"合成清潔劑可以在硬水中正常使用。"},{"isCorrect":false,"rationale":"這是正確的，兩者皆為界面活性劑。","text":"兩者的去污原理相似，皆具有親水與親油端。"},{"isCorrect":true,"rationale":"合成清潔劑主要是由石油化學產品（烴類）合成，而非直接由油脂皂化。","text":"合成清潔劑的主成分來自於天然油脂與強鹼的反應。"},{"isCorrect":false,"rationale":"正確，肥皂確實不適合洗滌蛋白質類衣物。","text":"肥皂水溶液呈鹼性，可能損傷蠶絲等蛋白質纖維。"}],"hint":"合成清潔劑的原料來源通常與石化工業有關。","question":"關於合成清潔劑與肥皂的比較，下列何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是伸長量，而非原長。","text":"$5\\ cm$"},{"isCorrect":true,"rationale":"根據虎克定律，$100\\ gw$ 對應 $2\\ cm$，則 $250\\ gw$ 對應伸長量應為 $5\\ cm$。總長 $15\\ cm - 5\\ cm = 10\\ cm$。","text":"$10\\ cm$"},{"isCorrect":false,"rationale":"這是 $100\\ gw$ 時的總長度。","text":"$13\\ cm$"},{"isCorrect":false,"rationale":"計算錯誤，未按比例推導。","text":"$12\\ cm$"}],"hint":"先算伸長量與外力的比例，再反推原長。","question":"在彈簧秤實驗中，若掛上 $100\\ gw$ 的物體，彈簧伸長了 $2\\ cm$。在彈性限度內，掛上 $250\\ gw$ 物體時，彈簧總長度變為 $15\\ cm$，則彈簧原長為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"需接觸才能施力。","text":"推車時手的推力"},{"isCorrect":false,"rationale":"空氣粒子碰撞物體，屬於接觸力。","text":"空氣產生的風力"},{"isCorrect":true,"rationale":"磁力不需互相接觸即可產生作用，是典型的超距力。","text":"磁鐵吸引迴紋針的磁力"},{"isCorrect":false,"rationale":"水分子與船體接觸產生的力。","text":"靜止水對沉船產生的浮力"}],"hint":"哪一種力不需要「碰到」就能發生效應？","question":"關於「力」的性質，下列哪一項屬於「超距力」？"},{"answerOptions":[{"isCorrect":false,"rationale":"靜止時摩擦力與推力相等，此推導不正確。","text":"介於 $10$ 與 $50\\ kgw$ 之間"},{"isCorrect":false,"rationale":"這是箱子的重力，不是摩擦力。","text":"$50\\ kgw$"},{"isCorrect":false,"rationale":"只要有推力且物體靜止，必存在靜摩擦力與推力平衡。","text":"$0\\ kgw$"},{"isCorrect":true,"rationale":"物體靜止代表合力為零，水平推力必須等於靜摩擦力。","text":"$10\\ kgw$"}],"hint":"當物體維持靜止時，合力必須為多少？","question":"水平地面上有一個 $50\\ kgw$ 的箱子，小華用 $10\\ kgw$ 的水平力推它，箱子仍保持靜止。此時箱子受到的摩擦力大小為多少？"},{"answerOptions":[{"isCorrect":true,"rationale":"一旦突破最大靜摩擦力進入運動狀態，所受阻力即為動摩擦力。","text":"物體開始滑動後，其摩擦力稱為動摩擦力。"},{"isCorrect":false,"rationale":"一般情況下，摩擦力與接觸面積無關。","text":"接觸面面積越大，產生的摩擦力就越大。"},{"isCorrect":false,"rationale":"若無外力企圖使其移動，摩擦力為零。","text":"表面越粗糙的物體，放著不動時一定有摩擦力。"},{"isCorrect":false,"rationale":"正向力（下壓力）越大，接觸面嚙合越緊，最大靜摩擦力越大。","text":"最大靜摩擦力的大小與正向力無關。"}],"hint":"注意「最大靜摩擦力」與「動摩擦力」的定義區別。","question":"下列關於摩擦力的敘述，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"受力雖相同，但分佈的面積不同，壓力就不等。","text":"不論哪個面，壓力都相同"},{"isCorrect":true,"rationale":"根據 $P = \\frac{F}{A}$，力相同時面積越小壓力越大，$6 \\times 5 = 30$ 是最小的面積。","text":"$6\\ cm \\times 5\\ cm$ 的面"},{"isCorrect":false,"rationale":"面積居中，壓力也居中。","text":"$10\\ cm \\times 5\\ cm$ 的面"},{"isCorrect":false,"rationale":"面積最大，壓力最小。","text":"$10\\ cm \\times 6\\ cm$ 的面"}],"hint":"壓力與接觸面積成反比。","question":"一個重量為 $600\\ gw$ 的長方體，長寬高分別為 $10\\ cm、6\\ cm、5\\ cm$。當它以哪一個面接觸地面時，對地面產生的壓力最大？"},{"answerOptions":[{"isCorrect":false,"rationale":"液體壓力僅與深度及密度有關，與容器形狀無關。","text":"容器形狀越奇怪，底部壓力就越大。"},{"isCorrect":false,"rationale":"靜止液體內部任一點，各方向壓力必相等。","text":"在同一水平面上，各個方向的液體壓力不相等。"},{"isCorrect":true,"rationale":"根據公式 $P = h \\times d$，深度 $h$ 與壓力 $P$ 成正比。","text":"深度越深，液體產生的壓力越大。"},{"isCorrect":false,"rationale":"壓力方向垂直於接觸面，可向上、向下或向側面。","text":"液體壓力的方向必定向下。"}],"hint":"思考潛水者感受到的壓力如何隨深度變化。","question":"關於液體壓力的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"錯誤，內部的空氣壓力會向下壓，使水銀柱高度下降。","text":"若玻璃管頂端不慎滲入空氣，水銀柱垂直高度會上升。"},{"isCorrect":false,"rationale":"正確，這是實驗特有的現象。","text":"水銀柱上方接近真空的空間稱為托里切利真空。"},{"isCorrect":false,"rationale":"正確，標準海平面的大氣壓約為 $76\\ cmHg$。","text":"此時的大氣壓力稱為 $1$ 大氣壓。"},{"isCorrect":false,"rationale":"正確，垂直高度代表大氣壓力所能支撐的重量平衡。","text":"若將玻璃管傾斜，垂直高度仍保持為 $76\\ cm$。"}],"hint":"管內空氣會「幫忙」大氣壓力還是「對抗」大氣壓力？","question":"小明在海邊進行托里切利實驗，若管內水銀柱高度為 $76\\ cm$，則下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是面積比值的平方，不符合帕斯卡原理。","text":"$2500\\ kgw$"},{"isCorrect":false,"rationale":"倍數計算錯誤。","text":"$50\\ kgw$"},{"isCorrect":true,"rationale":"根據帕斯卡原理，$\\frac{F_{1}}{A_{1}} = \\frac{F_{2}}{A_{2}}$，即 $F_{2} = 2 \\times 50 = 100$。","text":"$100\\ kgw$"},{"isCorrect":false,"rationale":"這沒有發揮帕斯卡原理的省力效果。","text":"$2\\ kgw$"}],"hint":"施力除以面積（壓力）在連通系統中處處相等。","question":"若一個水壓機的大小活塞面積比為 $1:50$，在小活塞施加 $2\\ kgw$ 的力，大活塞最多能舉起多少質量的物體？"},{"answerOptions":[{"isCorrect":true,"rationale":"浮力是由液體壓力差產生的垂直向上合力，正好對抗重力。","text":"浮力的方向永遠與重力方向相反。"},{"isCorrect":false,"rationale":"完全沉入後，排開液體體積不再改變，浮力亦不變。","text":"物體沉入水中越深，所受浮力越大。"},{"isCorrect":false,"rationale":"只要物體有排開液體，就一定有浮力，只是浮力不足以支撐其重量。","text":"沈在水底的石頭不受浮力作用。"},{"isCorrect":false,"rationale":"浮力取決於排開液重。油的密度通常比水小，相同體積下水中浮力較大。","text":"物體在油中受到的浮力一定比在水中大。"}],"hint":"浮力是由液體對物體向上與向下的壓力差所產生的。","question":"關於浮力的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"若小於重力，木球會下沉。","text":"小於 $100\\ gw$"},{"isCorrect":true,"rationale":"浮體達到平衡時，向上的浮力等於向下的物重。","text":"等於 $100\\ gw$"},{"isCorrect":false,"rationale":"雖然浮力等於排開水重，但對於浮體而言，排開水重也正好等於物重。","text":"等於木球排開水的體積，與重量無關"},{"isCorrect":false,"rationale":"若大於重力，木球會持續往上飛。","text":"大於 $100\\ gw$"}],"hint":"對於浮在水面上的物體，力平衡的條件是什麼？","question":"一顆 $100\\ g$ 的木球浮在水面上，請問此木球受到的浮力大小為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"高山氣壓低使水沸點降低，這證明了氣壓隨高度變化的性質。","text":"在高山上煮飯不容易煮熟。"},{"isCorrect":true,"rationale":"這是萬有引力（重力）的作用，與大氣壓力無關。","text":"蘋果從樹上掉下來。"},{"isCorrect":false,"rationale":"这是利用吸管內壓降低，外側大氣壓將液體壓入管內。","text":"用吸管吸飲料。"},{"isCorrect":false,"rationale":"吸盤內的空氣被擠出，外側大氣壓將其壓緊在壁面上。","text":"吸盤掛勾可以吸附在瓷磚面上。"}],"hint":"大氣壓力是由空氣重量產生的，尋找與「壓力差」有關的現象。","question":"下列哪一種情形不能說明「大氣壓力的存在」？"},{"answerOptions":[{"isCorrect":true,"rationale":"雖然砂糖含有氧，但水滴中的氧可能來自於燒杯內的空氣或砂糖本身，此實驗無法確定氧的來源。","text":"氧元素"},{"isCorrect":false,"rationale":"這是正確的，唯獨氧無法在此簡易裝置中直接證明來源。","text":"碳和氫元素皆可證明"},{"isCorrect":false,"rationale":"出現水滴（$H_{2}O$）證明成分中含有氫。","text":"氫元素"},{"isCorrect":false,"rationale":"變黑即為碳化的證據。","text":"碳元素"}],"hint":"燃燒或加熱分解產生的氧化物，其氧原子可能來自周圍。","question":"在乾燥的燒杯中放入砂糖加熱，燒杯壁出現水滴，且砂糖變黑。此現象不能證明砂糖含有哪一種元素？"},{"answerOptions":[{"isCorrect":false,"rationale":"正確，分子量大則引力大，沸點隨之升高。","text":"烴類的含碳數越多，沸點通常越高。"},{"isCorrect":true,"rationale":"錯誤，烴類如天然氣、石油成分通常不溶於水，且密度多比水小。","text":"烴類易溶於水，可與水互溶。"},{"isCorrect":false,"rationale":"正確，這是烴類的定義。","text":"僅由碳、氫兩種元素組成。"},{"isCorrect":false,"rationale":"正確，碳變 $CO_{2}$，氫變 $H_{2}O$。","text":"完全燃燒後的產物為二氧化碳與水。"}],"hint":"想想水火同源奇觀中，天然氣是否溶在水裡？","question":"關於烴類（碳氫化合物）的敘述，下列何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"乙酸分子式為 $C_{2}H_{4}O_{2}$。","text":"乙酸"},{"isCorrect":false,"rationale":"甲醚雖然也是 $C_{2}H_{6}O$，但它難溶於水且通常為氣態。","text":"甲醚"},{"isCorrect":false,"rationale":"乙烷分子式為 $C_{2}H_{6}$，不含氧。","text":"乙烷"},{"isCorrect":true,"rationale":"乙醇分子式為 $C_{2}H_{5}OH$（即 $C_{2}H_{6}O$），且可與水互溶。","text":"乙醇"}],"hint":"注意酒精的互溶性與其分子結構。","question":"某種有機化合物分子式為 $C_{2}H_{6}O$。已知它具有揮發性且可與水互溶，則它最可能是？"},{"answerOptions":[{"isCorrect":true,"rationale":"濃硫酸能加速反應進行，並吸收生成的水促進平衡向右移。","text":"催化劑及脫水劑"},{"isCorrect":false,"rationale":"香氣來自生成的酯類，而非硫酸。","text":"增加香氣"},{"isCorrect":false,"rationale":"硫酸具腐蝕性且並非作為主要溶劑。","text":"溶劑，幫助溶解乙酸"},{"isCorrect":false,"rationale":"硫酸並未出現在最終產物的結構中。","text":"主要反應物"}],"hint":"這是在有機酸與醇反應中，為了「吸水」和「加速」而加的。","question":"關於酯化反應實驗「乙醇 + 乙酸 $\\xrightarrow{濃硫酸}$ 乙酸乙酯 + 水」，濃硫酸的作用為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"這屬於舊有的「生命力說」，自從尿素被人工合成後，此觀念已被打破。","text":"有機化合物只能從生命體中取得，無法人工合成"},{"isCorrect":true,"rationale":"根據現代化學定義，有機化合物主要是指含碳的化合物，儘管有少數例外如 $CO_2$ 被歸類為無機。","text":"有機化合物一定含有碳元素"},{"isCorrect":false,"rationale":"這忽略了碳酸鹽、氰化物以及一氧化碳、二氧化碳等含碳但被歸為無機的例外狀況。","text":"含有碳元素的化合物必定是有機化合物"},{"isCorrect":false,"rationale":"不含碳確實不是有機物，但「物質」包含純物質與混合物，且元素（如 $O_2$）不稱為化合物。","text":"不含碳元素的物質一定不是有機化合物，但必定是無機化合物"}],"hint":"請思考有機化合物的核心組成元素及其定義的例外。","question":"有關有機化合物的定義，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"二氧化碳是含碳化合物中最典型的無機物例外。","text":"乾冰 ($CO_2$)"},{"isCorrect":true,"rationale":"酒精含有碳、氫、氧元素，且不屬於無機含碳化合物的例外清單。","text":"酒精 ($C_2H_5OH$)"},{"isCorrect":false,"rationale":"碳酸氫鈉屬於碳酸鹽類，習慣上被歸類為無機化合物。","text":"小蘇打 ($NaHCO_3$)"},{"isCorrect":false,"rationale":"氰化物雖然含碳，但因其性質與生命體關聯性較低，被歸類為無機化合物。","text":"氰化鉀 ($KCN$)"}],"hint":"注意排除掉碳酸鹽、氧化物與氰化物等例外。","question":"下列物質中，何者屬於有機化合物？"},{"answerOptions":[{"isCorrect":false,"rationale":"乾餾能分解有機物並趕走揮發性物質，留下含碳量極高的固體殘渣。","text":"乾餾後的固體殘渣為黑色的木炭，其主要成分是碳"},{"isCorrect":true,"rationale":"乾餾的定義是「隔絕空氣加熱」，而非直接接觸氧氣燃燒。","text":"乾餾是將物質直接與氧氣接觸燃燒的過程"},{"isCorrect":false,"rationale":"醋酸可使石蕊試紙變紅，而焦油則是暗褐色、具臭味的黏稠液體。","text":"液體產物包含酸性的醋酸與黏稠狀的焦油"},{"isCorrect":false,"rationale":"乾餾分解產生的可燃性氣體可以用火點燃，這是檢驗乾餾產物的方式之一。","text":"產生的氣體中含有氫氣、甲烷、一氧化碳等具可燃性的成分"}],"hint":"乾餾與燃燒在與空氣接觸的條件上有很大的區別。","question":"關於木材「乾餾」的實驗，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"相同分子式但結構排列不同，導致物理與化學性質相異，此即同分異構現象。","text":"同分異構物"},{"isCorrect":false,"rationale":"同素異形體是指同一種元素組成不同的單質，如鑽石與石墨。","text":"同素異形體"},{"isCorrect":false,"rationale":"同位素是指質子數相同但中子數不同的原子，屬於原子層級而非分子層級。","text":"同位素"},{"isCorrect":false,"rationale":"同系物是指結構相似，在分子組成上相差一個或多個 $CH_2$ 單位的化合物。","text":"同系物"}],"hint":"關鍵在於「分子組成相同」但「結構與性質不同」。","question":"乙醇（酒精）與甲醚的分子式皆為 $C_2H_6O$，但兩者的化學性質完全不同，這種現象稱為："},{"answerOptions":[{"isCorrect":false,"rationale":"氫元素氧化後會生成水蒸氣，通常使用氯化亞鈷試紙來檢驗。","text":"氫元素"},{"isCorrect":true,"rationale":"樣本中的碳與氧化銅反應生成二氧化碳，二氧化碳能使澄清石灰水產生碳酸鈣沉澱而變混濁。","text":"碳元素"},{"isCorrect":false,"rationale":"澄清石灰水變混濁是二氧化碳的專屬檢驗反應，與氮元素無關。","text":"氮元素"},{"isCorrect":false,"rationale":"氧化銅提供氧進行反應，無法區分生成的二氧化碳中氧的來源，故不能證明樣本含氧。","text":"氧元素"}],"hint":"石灰水變混濁是檢驗哪一種特定氣體的反應？","question":"在檢驗有機化合物的成分實驗中，將樣本與氧化銅 ($CuO$) 混合加熱，若產生使澄清石灰水變混濁的氣體，可證明樣本含有："},{"answerOptions":[{"isCorrect":false,"rationale":"分子量愈大，分子間吸引力通常愈強，沸點隨碳數增加而升高。","text":"碳原子數愈多的烴類，其沸點通常愈低"},{"isCorrect":false,"rationale":"由於含有氫元素，完全燃燒後必定會產生水 ($H_2O$)。","text":"烴類完全燃燒後的產物只有二氧化碳"},{"isCorrect":true,"rationale":"烴（Hydrocarbon）定義即為碳氫化合物，其極性極低，故難以溶於水中。","text":"僅由碳、氫兩種元素組成，且難溶於水"},{"isCorrect":false,"rationale":"烴類在常溫下的狀態隨碳數增加而改變，如甲烷為氣態，蠟為固態。","text":"烴類化合物皆為液態，可用作燃料"}],"hint":"烴類的名稱組合自「碳」與「氫」。","question":"關於「烴類」的性質，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"酯化反應速率較慢，實驗中通常需要水浴加熱來提高反應速度。","text":"酯化反應過程非常迅速，不需加熱即可完成"},{"isCorrect":true,"rationale":"酯化是酸醇結合的脫水反應，濃硫酸具有催化與脫水作用，可加速反應並增加產量。","text":"有機酸與醇反應生成酯與水，通常需濃硫酸當催化劑"},{"isCorrect":false,"rationale":"酯類通常難溶於水且密度小於水，反應後會浮在液面上。","text":"酯類易溶於水，且密度通常大於水"},{"isCorrect":false,"rationale":"雖然許多低分子量酯類有香味，但酯類不具備界面活性劑的構造，不能用作清潔劑。","text":"產生的酯類必定具有水果香味，可作為清潔劑"}],"hint":"考慮反應的反應物、產物以及所需的催化條件。","question":"有關「酯化反應」的描述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"酒精是溶劑而非皂化反應的主反應物，且皂化需要鹼性環境。","text":"酒精與鹽酸"},{"isCorrect":false,"rationale":"此組合通常會導致蛋白質炭化，而非生成肥皂。","text":"蛋白質與濃硫酸"},{"isCorrect":true,"rationale":"皂化反應是利用油脂（酯類）在鹼性條件下水解生成肥皂（脂肪酸鈉）與甘油。","text":"油脂與氫氧化鈉"},{"isCorrect":false,"rationale":"醋酸是有機酸，而皂化需要強鹼與油脂反應。","text":"食鹽水與醋酸"}],"hint":"肥皂的「肥」字暗示了其中一種主要的天然成分來源。","question":"製作肥皂的「皂化反應」，其主要原料為："},{"answerOptions":[{"isCorrect":false,"rationale":"去污是物理化學的界面作用，與分子的揮發性無直接關係。","text":"易揮發的性質，可帶走油垢"},{"isCorrect":true,"rationale":"親油端（碳鏈）深入油污，親水端與水結合，使油污分散成微滴懸浮於水中被沖走。","text":"長鏈的親油端與帶電荷的親水端"},{"isCorrect":false,"rationale":"熔沸點是物質的物理常數，非決定去污原理的核心構造。","text":"極高的沸點與極低的熔點"},{"isCorrect":false,"rationale":"肥皂分子本身呈弱鹼性，並非靠強酸鹼反應去污。","text":"強酸性基團與強鹼性基團"}],"hint":"想像分子如何像「橋樑」一樣連接油與水。","question":"肥皂能去除油污，主要是因為其分子構造同時具有："},{"answerOptions":[{"isCorrect":false,"rationale":"食鹽水是中性鹽類，無法中和強鹼。","text":"中和殘餘的強鹼氫氧化鈉"},{"isCorrect":false,"rationale":"油脂在鹽水中的溶解度更低，這並非加入鹽水的目的。","text":"幫助油脂溶解在水中"},{"isCorrect":false,"rationale":"飽和食鹽水不具催化功能，真正的反應在此步驟前已大致完成。","text":"作為催化劑，加速皂化反應"},{"isCorrect":true,"rationale":"肥皂難溶於高濃度的食鹽水，加入鹽水可使肥皂析出並利用密度差異浮於表面以便收集。","text":"進行「鹽析」，使肥皂與甘油分離並浮出液面"}],"hint":"這是一個利用溶解度差異來分離產物的步驟。","question":"在製作肥皂的過程中，加入飽和食鹽水的目的為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"兩者皆是利用親水端與親油端的界面活性作用來去污，原理相同。","text":"兩者的去污原理完全不同"},{"isCorrect":false,"rationale":"肥皂呈弱鹼性，合成清潔劑則可依設計製成中性、酸性或鹼性。","text":"肥皂液呈中性，而合成清潔劑皆呈強鹼性"},{"isCorrect":true,"rationale":"肥皂中的脂肪酸根會與硬水中的 $Ca^{2+}$、$Mg^{2+}$ 結合生成不溶性沉澱，合成清潔劑則不會。","text":"肥皂在硬水中容易產生沉澱而降低效能，合成清潔劑則較不受影響"},{"isCorrect":false,"rationale":"來源剛好相反，肥皂多來自天然油脂，合成清潔劑多由石油化學產品合成。","text":"肥皂通常由石油提煉，合成清潔劑則由天然油脂製成"}],"hint":"回想一下，為什麼洗髮精和洗碗精在各種水質下都比較好用？","question":"下列關於「合成清潔劑」與「肥皂」的比較，何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"這兩者皆為鏈狀構造聚合物，具有受熱軟化、冷卻變硬的可塑性，可回收再利用。","text":"皆屬於熱塑性聚合物，受熱後會軟化變形"},{"isCorrect":false,"rationale":"網狀構造是熱固性聚合物的特徵（如輪胎、電路板），$PE$ 與 $PVC$ 是鏈狀的。","text":"皆屬於網狀構造，具有耐高溫不易變形的性質"},{"isCorrect":false,"rationale":"兩者皆是藉由石化原料經化學反應合成的人造聚合物。","text":"皆屬於天然有機聚合物"},{"isCorrect":false,"rationale":"$PE$ 的單體是乙烯，$PVC$ 的單體是氯乙烯，多了一個氯原子。","text":"兩者的單體（構成單元）完全相同"}],"hint":"考慮它們分子鏈的排列方式以及對溫度的反應。","question":"聚乙烯 ($PE$) 與聚氯乙烯 ($PVC$) 皆屬於聚合物，關於它們的共同點，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"15 公分是總長度（原長 10 + 伸長量 5），題目問的是伸長量。","text":"15 公分"},{"isCorrect":false,"rationale":"這可能是將重量比值計算錯誤或顛倒了比例。","text":"2.5 公分"},{"isCorrect":true,"rationale":"根據虎克定律，$20g$ 伸長 $2cm$，則 $1g$ 伸長 $0.1cm$。$50g$ 會伸長 $50 \\times 0.1 = 5cm$。","text":"5 公分"},{"isCorrect":false,"rationale":"這可能是錯誤地將重量直接視為伸長量。","text":"10 公分"}],"hint":"虎克定律指出外力與「伸長量」成正比，請先算出每單位力造成的伸長。","question":"一彈簧原長 10 公分，掛上 20 克重的砝碼後，總長變為 12 公分。若改掛 50 克重的砝碼且未超過彈性限度，則彈簧的「伸長量」為多少公分？"},{"answerOptions":[{"isCorrect":false,"rationale":"物體必須浸入流體中，與流體分子接觸後才會受到向上支撐的力。","text":"浮力"},{"isCorrect":true,"rationale":"電荷之間的吸引力或排斥力不需要物體直接接觸即可發生。","text":"靜電力"},{"isCorrect":false,"rationale":"彈簧或彈性體必須被拉動或壓縮（接觸）才會施予彈力。","text":"彈力"},{"isCorrect":false,"rationale":"摩擦力必須發生在兩個相互接觸並有相對運動趨勢的表面之間。","text":"摩擦力"}],"hint":"哪一種力可以在物體不互相碰到時，就產生吸引或排斥的作用？","question":"有關「力」的種類，下列何者屬於「超距力」（非接觸力）？"},{"answerOptions":[{"isCorrect":false,"rationale":"只有在物體「恰好要啟動」的一瞬間，摩擦力才等於最大靜摩擦力。","text":"等於最大靜摩擦力"},{"isCorrect":false,"rationale":"若摩擦力大於施力，物體將會朝反方向運動，這不符合常理。","text":"大於施力的大小"},{"isCorrect":true,"rationale":"當物體受力後仍靜止，代表合力為零，水平施力與靜摩擦力大小相等、方向相反。","text":"等於施力的大小"},{"isCorrect":false,"rationale":"50 公斤重是垂直向下的重力，不代表水平方向的靜摩擦力。","text":"等於 50 公斤重"}],"hint":"考慮物體處於「平衡狀態」時，各方向合力的關係。","question":"在水平桌面上推一個重 50 公斤重的木箱，若木箱保持靜止不動，此時木箱受到的「摩擦力」大小為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"壓力 $P = \\frac{F}{A}$。在重量相同的條件下，接觸面積 $A$ 愈小（$12 \\text{ cm}^2$），產生的壓力愈大。","text":"立放（接觸面為 $4 \\times 3$）"},{"isCorrect":false,"rationale":"接觸面積為中等（$15 \\text{ cm}^2$），產生的壓力介於兩者之間。","text":"側放（接觸面為 $5 \\times 3$）"},{"isCorrect":false,"rationale":"接觸面積最大（$20 \\text{ cm}^2$），會產生最小的壓力。","text":"平放（接觸面為 $5 \\times 4$）"},{"isCorrect":false,"rationale":"雖然總力（重量）不變，但壓力的定義是力在單位面積上的分佈，會隨面積改變。","text":"不論何種放法，壓力皆相同"}],"hint":"壓力的大小取決於作用力與「接觸面積」的比值。","question":"一長方體金屬塊規格為 $5 \\times 4 \\times 3 \\text{ cm}$，重量為 600 克重。將其平放、側放或立放於桌面上，哪種方式產生的「壓力」最大？"},{"answerOptions":[{"isCorrect":false,"rationale":"根據 $P = h \\times D$，深度愈深，上方的液體柱愈重，壓力隨之增加。","text":"液體壓力隨深度的增加而減少"},{"isCorrect":false,"rationale":"液體壓力只與「深度」與「密度」有關，與容器的寬窄或總液重無直接關係。","text":"容器形狀愈寬大，底部的液體壓力愈大"},{"isCorrect":false,"rationale":"液體壓力垂直於接觸面，方向會隨接觸面的角度而改變，並非只向下。","text":"液體壓力的方向恆指向容器底部"},{"isCorrect":true,"rationale":"靜止液體中某一點所受的壓力，在向上、向下、向左、向右等各個方向皆相同。","text":"同一深度，各個方向的液體壓力大小皆相等"}],"hint":"思考在水面下同一個點，感受到的擠壓感是否有方向差異。","question":"有關「液體壓力」的性質，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"計算倍數時出現錯誤。","text":"10 公斤重"},{"isCorrect":false,"rationale":"這忽略了施力大小，直接套用面積比例。","text":"50 公斤重"},{"isCorrect":false,"rationale":"可能將比例關係平方或計算錯誤。","text":"250 公斤重"},{"isCorrect":true,"rationale":"根據帕斯卡原理，$\\frac{F_1}{A_1} = \\frac{F_2}{A_2}$，即 $\\frac{2}{1} = \\frac{x}{50}$，可得 $x = 100$。","text":"100 公斤重"}],"hint":"密閉液體能傳遞相等的「壓力」，請利用力與面積的比值關係。","question":"一裝滿水的密閉連通管，左右兩端活塞面積比為 $1:50$。若在小活塞施加 2 公斤重的力，則大活塞可支撐多少公斤重的物體？"},{"answerOptions":[{"isCorrect":false,"rationale":"高山大氣壓力較小，能支撐的水銀柱高度也會隨之降低（低於 76 公分）。","text":"若改到高山上做實驗，水銀柱高度會大於 76 公分"},{"isCorrect":false,"rationale":"混入空氣會產生向下壓力，使水銀柱下降，導致測量值偏低。","text":"水銀柱上方若混入少量空氣，測得的高度會更準確"},{"isCorrect":false,"rationale":"無論傾斜與否，平衡大氣壓力的「垂直高度」在相同地點應保持不變。","text":"將水銀管傾斜放置時，管內水銀柱的「垂直高度」會增加"},{"isCorrect":true,"rationale":"管外水面承受的大氣壓力與管內 76 公分高的水銀柱壓力達到平衡。","text":"水銀柱高度之所以維持 76 公分，是因為大氣壓力的支撐"}],"hint":"考慮管內外壓力平衡的概念，以及海拔對氣壓的影響。","question":"關於托里切利的水銀柱實驗，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是鐵塊在水中的「下沉力」（重量減去浮力）。","text":"680 克重"},{"isCorrect":false,"rationale":"只要物體沒入液體中，不論沉浮皆會受到浮力作用。","text":"0 克重"},{"isCorrect":false,"rationale":"這是鐵塊本身的重量（$100 \\times 7.8$），而非浮力。","text":"780 克重"},{"isCorrect":true,"rationale":"根據阿基米德原理，浮力等於排開液體的重量。沒入體積 $100 \\text{ cm}^3 \\times$ 水的密度 $1 \\text{ g/cm}^3 = 100 \\text{ gw}$。","text":"100 克重"}],"hint":"浮力的大小等於物體所「排開液體的重量」。","question":"有一鐵塊體積為 $100 \\text{ cm}^3$，密度為 $7.8 \\text{ g/cm}^3$。若將鐵塊完全沒入水中，其受到的浮力為多少克重？"},{"answerOptions":[{"isCorrect":false,"rationale":"船重不變的情況下，浮體受到的浮力必然等於船重。","text":"浮力減小，船身稍微浮起"},{"isCorrect":false,"rationale":"忽略了海水與河水的密度差異，排開體積必須改變以維持相同浮力。","text":"浮力不變，沉陷深度亦不變"},{"isCorrect":true,"rationale":"輪船在河水與海水中皆浮起，浮力等於重力（船重不變）。海水密度大，排開體積只需較小即可達成相同浮力。","text":"浮力不變，船身稍微浮起（沒入水中體積減小）"},{"isCorrect":false,"rationale":"若船重不變且仍為浮體，浮力就不會改變。","text":"浮力增加，船身稍微沉下"}],"hint":"船在兩處皆為浮體，故浮力皆等於船重。但液體密度不同時，排開的體積會如何調整？","question":"一艘萬噸輪船從淡水河口駛入海洋，關於輪船所受浮力與沉陷深度的變化，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是界面活性劑的基本物理化學功能。","text":"可降低水與油之間的界面張力，使兩者互溶"},{"isCorrect":false,"rationale":"物理性的運動有助於界面活性劑發揮效能，將油污乳化並帶走。","text":"藉由搓揉動作，可使被包圍的油垢分散成微滴脫離表面"},{"isCorrect":true,"rationale":"錯誤。分子的親油端應向內深入油垢，親水端則向外接觸水，才能將油垢帶入水中。","text":"去污過程中，分子會將油污包圍，親油端向外接觸水"},{"isCorrect":false,"rationale":"雖然兩者化學式不同，但去污的活性構造原理是一致的。","text":"肥皂與合成清潔劑皆含有此類分子結構"}],"hint":"思考分子的兩端分別與油、水結合的方向。","question":"有關「界面活性劑」的去污機制，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"水中浮力 $50g$，故體積為 $50 \\text{ cm}^3$。油中浮力為 $50 \\times 0.8 = 40g$。讀數為 $200 - 40 = 160g$。","text":"160 克重"},{"isCorrect":false,"rationale":"液體密度不同，物體受到的浮力必然不同。","text":"150 克重"},{"isCorrect":false,"rationale":"計算浮力時倍數關係處理錯誤。","text":"120 克重"},{"isCorrect":false,"rationale":"這是物體在油中受到的「浮力」，而非彈簧秤的「讀數」。","text":"40 克重"}],"hint":"利用水中的讀數差異算出物體體積，再計算油中所產生的浮力。","question":"一物體在空氣中重 200 克重，投入水中後，彈簧秤讀數為 150 克重。若改投入密度 0.8 的油中，則彈簧秤讀數為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"碳與氫將氧化銅還原為金屬銅，這屬於化學上的氧化還原反應。","text":"管口附近的氧化銅（黑色）會部分轉變為紅色（銅）"},{"isCorrect":false,"rationale":"這三者皆為有機物，含有碳元素，燃燒會產生二氧化碳。","text":"產生的氣體可使澄清石灰水變混濁"},{"isCorrect":false,"rationale":"這三者皆含有氫元素，氧化後會產生水蒸氣。","text":"產生的液體可使藍色氯化亞鈷試紙變為粉紅色"},{"isCorrect":true,"rationale":"有機物氧化後生成二氧化碳與水，不會產生氯化鈉（食鹽）。","text":"反應結束後，試管底部會殘留白色的氯化鈉固體"}],"hint":"這三種物質都是「有機化合物」，思考它們共同的元素組成與反應產物。","question":"取木屑、砂糖與茶葉分別進行氧化實驗（加氧化銅加熱），下列何者不是這三種樣本的共同現象？"},{"answerOptions":[{"isCorrect":false,"rationale":"此情境不涉及磁性物質的相互作用。","text":"磁力"},{"isCorrect":false,"rationale":"雖然小明與牆壁之間有微弱引力，但「推牆」產生的主要力道來自於肌肉推動的接觸。","text":"萬有引力"},{"isCorrect":false,"rationale":"此力必須透過接觸面傳遞，不具備遠距離作用的特性。","text":"超距力"},{"isCorrect":true,"rationale":"推牆壁必須物理性地接觸到牆面，其產生的力屬於接觸力。","text":"接觸力"}],"hint":"這股力量是在什麼樣的物理條件下產生的？","question":"小明用力推牆壁，牆壁給小明的反作用力屬於哪一種力？"},{"answerOptions":[{"isCorrect":false,"rationale":"這將數值除反了。","text":"2 atm"},{"isCorrect":false,"rationale":"直接將測得的公分數視為大氣壓力單位，是錯誤的。","text":"38 atm"},{"isCorrect":true,"rationale":"$1 \\text{ atm} = 76 \\text{ cmHg}$，故 $38 \\text{ cmHg} = \\frac{38}{76} = 0.5 \\text{ atm}$。","text":"0.5 atm"},{"isCorrect":false,"rationale":"與已知的 76 cmHg 標準不符。","text":"1 atm"}],"hint":"利用測得壓力值與標準一大氣壓（76 cmHg）的比值來計算。","question":"在海平面處，有一大氣壓等於 76 cmHg。若在一封閉容器內裝入氣體，測得壓力為 38 cmHg，則該氣體壓力相當於多少大氣壓？"},{"answerOptions":[{"isCorrect":false,"rationale":"此時排開體積極小，浮力也最小。","text":"物體剛好碰到水面時"},{"isCorrect":true,"rationale":"沒入體積相同時，根據 $B = V_{排} \\times D_{液}$，液體密度愈大，產生的浮力愈大。","text":"同一物體完全沒入密度最大的液體中時"},{"isCorrect":false,"rationale":"浮體浮力等於物重，若沒入更深或液體更重，浮力可能增加或保持不變，視情況而定。","text":"同一物體浮在水面上時"},{"isCorrect":false,"rationale":"浮力僅與排開體積及密度有關，與靜水壓力的高低無關。","text":"物體沉到海底受到巨大水壓時"}],"hint":"回想阿基米德原理公式中，決定浮力的兩個變數。","question":"關於浮力大小的判斷，下列何種情況物體受到的浮力「最大」？"},{"answerOptions":[{"isCorrect":false,"rationale":"莫耳數計算過程中可能在氫或氧的部分出現失誤。","text":"$2:4:1$"},{"isCorrect":false,"rationale":"數值計算不正確，不符合燃燒分析法的結果。","text":"$3:8:3$"},{"isCorrect":false,"rationale":"這通常是醣類（如葡萄糖）的比例，並非此題數據所得之結果。","text":"$1:2:1$"},{"isCorrect":true,"rationale":"碳重 $176 \\times \\frac{12}{44}=48g$，氫重 $108 \\times \\frac{2}{18}=12g$，氧重 $92-48-12=32g$。莫耳數比 $C:H:O = \\frac{48}{12}:\\frac{12}{1}:\\frac{32}{16} = 4:12:2 = 2:6:1$。","text":"$2:6:1$"}],"hint":"利用二氧化碳算碳重，利用水算氫重，最後扣除求出氧重，再換算莫耳數比。","question":"將 92 克的有機化合物完全燃燒，得到 176 克二氧化碳與 108 克水。該化合物的實驗式中，碳、氫、氧的原子個數比為何？ (原子量: $C=12, H=1, O=16$)"},{"answerOptions":[{"isCorrect":false,"rationale":"這忽略了活塞面積差異對力的放大效應。","text":"500 公斤重"},{"isCorrect":false,"rationale":"計算面積比值時出現錯誤。","text":"50 公斤重"},{"isCorrect":true,"rationale":"$\\frac{x}{200} = \\frac{500}{1000}$，解得 $x = 100$ 公斤重。","text":"100 公斤重"},{"isCorrect":false,"rationale":"這誤將面積比值乘到大活塞的力上，方向反了。","text":"2500 公斤重"}],"hint":"帕斯卡原理的核心是「傳遞相等的壓力」。","question":"有一水壓機，大小活塞面積分別為 $200 \\text{ cm}^2$ 與 $1000 \\text{ cm}^2$。若在大活塞放置 500 公斤的重物，小活塞必須施加多少力才能維持平衡？"},{"answerOptions":[{"isCorrect":false,"rationale":"甲烷是結構最簡單的烴類，屬於典型的有機化合物。","text":"$CH_{4}$"},{"isCorrect":true,"rationale":"碳酸鹽類如碳酸鈣，因性質與礦石相似且在生命體出現前即存在，被歸類為無機化合物。","text":"$CaCO_{3}$"},{"isCorrect":false,"rationale":"乙酸含有羧基（$-COOH$），是常見的有機酸。","text":"$CH_{3}COOH$"},{"isCorrect":false,"rationale":"乙醇含有碳、氫、氧元素，且具有有機分子的結構特徵，屬於有機物。","text":"$C_{2}H_{5}OH$"}],"hint":"考慮老師提到的例外清單，包含二氧化碳家族、碳酸鹽及氰化物。","question":"在區分有機化合物與無機化合物時，下列哪一項物質雖然含有碳元素，但通常被歸類為「無機化合物」？"},{"answerOptions":[{"isCorrect":false,"rationale":"乾餾是在隔絕空氣下加熱使物質分解，會產生新物質，屬於化學變化。","text":"乾餾是物理變化，因為產物中仍包含原本的木頭成分"},{"isCorrect":false,"rationale":"液體產物包含酸性的醋酸以及黏稠、帶有焦味的黑色煤焦油。","text":"液體產物中，只有酸性的醋酸，不含有其他成分"},{"isCorrect":true,"rationale":"木材乾餾產生的氣體包含氫氣、甲烷、一氧化碳等可燃氣體，以及不可燃的二氧化碳。","text":"產生的氣體中，含有可燃性的氫氣及甲烷"},{"isCorrect":false,"rationale":"留下的黑色固體是木炭，主要成分是元素態的碳。","text":"留下的固體殘渣是白色的灰燼，主要成分是碳酸鈣"}],"hint":"回憶實驗中收集到的固、液、氣三態產物特徵。","question":"有關「木材乾餾」實驗的產物說明，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"碳元素會氧化成二氧化碳，通入澄清石灰水產生混濁即可證明其存在。","text":"此方法無法檢驗出物質是否含有碳元素"},{"isCorrect":true,"rationale":"燃燒產生的水（$H_{2}O$）中的氫原子必然來自受測的有機物，因為氧化銅不含氫。","text":"若產生水蒸氣，可證明該物質含有氫元素"},{"isCorrect":false,"rationale":"氧化銅擔任氧化劑提供氧原子，反應後會被還原成金屬銅，質量會改變。","text":"氧化銅在此實驗中擔任催化劑，反應前後質量不變"},{"isCorrect":false,"rationale":"產生二氧化碳是為了證明該物質含有碳元素，氧可能來自氧化銅或原物質。","text":"若產生二氧化碳，可證明該物質含有氧元素"}],"hint":"思考產物中的原子來源，以及氧化銅在反應中的角色。","question":"在檢驗有機化合物的成分時，若將物質與氧化銅（$CuO$）混合加熱，下列推論何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"乙醇屬於醇類具有羥基，甲醚屬於醚類，其氧原子夾在碳鏈中間。","text":"乙醇含有羥基（$-OH$），甲醚則無"},{"isCorrect":false,"rationale":"同分異構物的定義即為分子式（原子種類與數目）相同。","text":"兩者的分子式相同，皆為 $C_{2}H_{6}O$"},{"isCorrect":false,"rationale":"因為分子式相同且質量相等，其所包含的各原子莫耳數與總數必相等。","text":"相同質量的乙醇與甲醚，所含的原子總數相等"},{"isCorrect":true,"rationale":"由於原子排列結構不同（官能基不同），兩者的化學性質與物理性質（如沸點）會有顯著差異。","text":"兩者的化學性質完全相同"}],"hint":"結構決定性質，結構不同則性質必然不同。","question":"有關「同分異構物」的性質，以乙醇（$C_{2}H_{5}OH$）與甲醚（$CH_{3}OCH_{3}$）為例，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"酒精的主要功能與溫度調節無關，而是為了解決油脂與水溶液不互溶的問題。","text":"降低反應混合物的沸點，避免溫度過高"},{"isCorrect":false,"rationale":"酒精雖然加快反應，但其原理是增加接觸機會而非傳統化學定義上的降低活化能催化。","text":"作為催化劑，增加反應速率但反應後可完全回收"},{"isCorrect":true,"rationale":"油脂不溶於水，而酒精可同時溶解油脂與鹼液，作為界面活性劑增加兩者的接觸機會。","text":"協助油脂與氫氧化鈉溶液均勻混合"},{"isCorrect":false,"rationale":"酒精（乙醇）在此反應中不參與反應生成新物質，它是作為溶劑使用。","text":"作為反應物，與油脂結合產生酯類"}],"hint":"油脂不溶於水，思考如何讓兩者「碰在一起」發生反應。","question":"製作肥皂的「皂化反應」實驗中，加入酒精的主要目的是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"蛋白質是天然聚合物，但合成纖維是人工合成的聚合物。","text":"合成纖維與蛋白質皆屬於天然聚合物"},{"isCorrect":false,"rationale":"網狀聚合物具有熱固性，受熱不熔化且結構堅硬。","text":"網狀聚合物具有熱塑性，受熱易熔化"},{"isCorrect":false,"rationale":"標示有回收代碼的塑膠通常為熱塑性聚合物。","text":"保麗龍（回收代碼 6）屬於熱固性聚合物"},{"isCorrect":true,"rationale":"鏈狀聚合物（熱塑性）分子間連接較弱，加熱後會軟化變形，具回收價值。","text":"鏈狀聚合物受熱後會軟化，可回收重複利用"}],"hint":"關鍵在於「結構」與「受熱表現」的對應關係。","question":"下列關於「聚合物」的分類與性質敘述，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"計算過程中對伸長量比例的推算有誤。","text":"$40$"},{"isCorrect":false,"rationale":"此計算可能忽略了原長的補償，僅觀察增長倍率。","text":"$30$"},{"isCorrect":true,"rationale":"每增加 $10 \\text{ gw}$ 伸長 $2 \\text{ cm}$。掛 $x$ 時伸長量為 $17 - 10 = 7 \\text{ cm}$，計算得 $x = 35 \\text{ gw}$。","text":"$35$"},{"isCorrect":false,"rationale":"可能將總長度直接視為比例，未考慮原長。","text":"$25$"}],"hint":"先找出彈簧的原長或「每伸長 $1 \\text{ cm}$ 需要多少力」。","question":"使用一個彈簧進行力學實驗，已知掛上 $10 \\text{ gw}$ 的物體時長度為 $12 \\text{ cm}$，掛上 $20 \\text{ gw}$ 物體時長度為 $14 \\text{ cm}$。若掛上 $x \\text{ gw}$ 的物體時，長度變為 $17 \\text{ cm}$，且未超過彈性限度，則 $x$ 為多少？"},{"answerOptions":[{"isCorrect":true,"rationale":"物體不動時，靜摩擦力的大小等於水平推力，以維持力平衡。","text":"推力 $F$ 越大，摩擦力也隨之增大"},{"isCorrect":false,"rationale":"若有推力作用且物體仍靜止，即便桌面光滑，仍須有摩擦力來抵銷推力。","text":"只要桌面夠光滑，靜止物體就不會有摩擦力"},{"isCorrect":false,"rationale":"除非物體正處於「恰好要動」的瞬間，否則此時僅為一般的靜摩擦力。","text":"此時物體受到的摩擦力為「最大靜摩擦力」"},{"isCorrect":false,"rationale":"摩擦力的方向必然與相對運動趨勢（推力方向）相反。","text":"摩擦力的方向與推力 $F$ 的方向相同"}],"hint":"物體「靜止」代表合力為零。","question":"一個物體靜置於桌面上，受水平推力 $F$ 作用但仍保持不動。下列關於摩擦力的敘述，何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"液體壓力 $P = h \\times d$，深度 $h$ 越深，壓力越高。","text":"液體內部深度越深，產生的液體壓力越小"},{"isCorrect":false,"rationale":"海拔越高，頭頂空氣柱越短，大氣壓力越小。","text":"大氣壓力的大小與海拔高度無關"},{"isCorrect":true,"rationale":"壓力與受力面積成反比，面積越小力越集中，壓力越大。","text":"相同的作用力作用在較小的面積上，會產生較大的壓力"},{"isCorrect":false,"rationale":"壓力並非「力」，而是單位面積受到的作用力，且液體壓力方向為各個方向。","text":"壓力是一種力，其方向必定垂直向上"}],"hint":"思考穿高跟鞋與平底鞋踩在沙灘上的差別。","question":"有關「壓力」的定義與計算，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"若垂直高度變短，則該點壓力將無法平衡大氣壓力。","text":"垂直高度變短，管內水銀柱長度不變"},{"isCorrect":false,"rationale":"傾斜時，為了維持相同的垂直高度，水銀柱在管內的佔據長度必須增加。","text":"垂直高度與長度皆保持不變"},{"isCorrect":false,"rationale":"這違反了液體壓力與深度的物理原理。","text":"垂直高度變長，管內水銀柱長度變短"},{"isCorrect":true,"rationale":"大氣壓力支撐的是固定高度的水銀柱重，傾斜時垂直高度仍受大氣壓決定，故斜長變長。","text":"垂直高度保持不變，管內水銀柱長度變長"}],"hint":"大氣壓力平衡的是「垂直水銀柱」產生的壓力。","question":"在「托里切利實驗」中，若將水銀管傾斜，則管內水銀柱的變化為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"浮體受到的浮力等於物重。物重 $= 100 \\text{ cm}^{3} \\times 0.6 \\text{ g/cm}^{3} = 60 \\text{ g}$，故浮力為 $60 \\text{ gw}$。","text":"$60 \\text{ gw}$"},{"isCorrect":false,"rationale":"這是密度值，而非力的單位。","text":"$0.6 \\text{ gw}$"},{"isCorrect":false,"rationale":"這是木塊完全沒入水時排開水的重量，但木塊是浮體。","text":"$100 \\text{ gw}$"},{"isCorrect":false,"rationale":"這是木塊露出水面的體積數值，非浮力大小。","text":"$40 \\text{ gw}$"}],"hint":"記住「浮體」的重要特性：向上推力等於向下的重力。","question":"一塊密度為 $0.6 \\text{ g/cm}^{3}$、體積為 $100 \\text{ cm}^{3}$ 的木塊浮在水面上，則木塊受到的浮力大小為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"機械裝置可省力但不可省功，省力的代價是移動距離變長。","text":"此裝置可以達到「省功」的效果"},{"isCorrect":false,"rationale":"應是小活塞面積越小，相同的力產生的壓力越大，傳遞到大活塞後產生的總推力越大。","text":"小活塞面積越大，越能省力地舉起大活塞"},{"isCorrect":true,"rationale":"這是帕斯卡原理的核心：密閉容器內流體的壓力改变量會大小不變地傳遞到各點。","text":"密閉液體受壓時，壓力會平均傳遞到液體的各個部分"},{"isCorrect":false,"rationale":"千斤頂主要利用壓力的傳遞來放大作用力，而非僅考量液面平衡。","text":"它是利用連通管原理使液面保持高度相同"}],"hint":"壓力 $P = \\frac{F_{1}}{A_{1}} = \\frac{F_{2}}{A_{2}}$。","question":"根據「帕斯卡原理」設計的油壓千斤頂，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然紙片有質量受引力，但此處吸引力明顯大於引力且由電荷引起。","text":"萬有引力"},{"isCorrect":false,"rationale":"摩擦力是阻礙相對運動的接觸力，而非吸引碎紙片的力。","text":"摩擦力"},{"isCorrect":false,"rationale":"磁力存在於磁性物質間，塑膠與紙張摩擦產生的是電荷。","text":"磁力"},{"isCorrect":true,"rationale":"摩擦起電使塑膠板帶電，藉由感應起電或靜電吸引輕小的碎紙片，屬於超距力。","text":"靜電力"}],"hint":"這是一種不需接觸即可產生的「超距力」，源於電荷。","question":"在乾燥環境下，塑膠板摩擦毛衣後可吸引碎紙片，這是因為哪種力的作用？"},{"answerOptions":[{"isCorrect":false,"rationale":"山上氣壓較小，造成耳膜內外壓力不平衡導致疼痛。","text":"登山時覺得耳膜疼痛是因為山上的大氣壓力變大"},{"isCorrect":false,"rationale":"吸盤是排除內部空氣，利用外部強大的大氣壓力壓在牆上。","text":"吸盤能掛在牆上是因為牆壁對吸盤有磁力吸附"},{"isCorrect":false,"rationale":"颱風是強大的低氣壓系統，其中心氣壓低於四周。","text":"颱風中心的氣壓通常比周圍環境高"},{"isCorrect":true,"rationale":"吸氣使吸管內壓力下降，外側大氣壓力大於內側，故將飲料壓入管中。","text":"吸管吸取飲料是利用大氣壓力將液體壓入吸管中"}],"hint":"大氣壓力總是從壓力大的地方推向壓力小的地方。","question":"有關大氣壓力的生活實例，下列哪一項敘述正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"若摩擦力大於 $10 \\text{ kgw}$，物體原本就無法做等速運動。","text":"大於 $10 \\text{ kgw}$"},{"isCorrect":false,"rationale":"只要物體還在運動且接觸面不變，動摩擦力依然存在。","text":"$0$"},{"isCorrect":true,"rationale":"等速度運動代表合力為零，故推力與動摩擦力相等（$10 \\text{ kgw}$）。推力消失後，動摩擦力維持不變直到停下。","text":"$10 \\text{ kgw}$"},{"isCorrect":false,"rationale":"若摩擦力小於 $10 \\text{ kgw}$，物體會做加速運動。","text":"小於 $10 \\text{ kgw}$"}],"hint":"注意「等速度」這個關鍵字對於合力的意義。","question":"一物體在水平面上受 $10 \\text{ kgw}$ 的力作用而以「等速度」運動。若推力消失，則此時摩擦力的大小為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"排開液重即為浮力，對於浮體而言始終等於物重，應保持不變。","text":"船排開液體的重量會變大"},{"isCorrect":false,"rationale":"根據 $B = V_{排} \\times d_{液}$，海水密度較大，則排開體積應減小。","text":"船在海水中排開液體的體積較大"},{"isCorrect":true,"rationale":"船在兩處皆為浮體，浮力皆等於船重，故保持不變。","text":"船受到的浮力保持不變"},{"isCorrect":false,"rationale":"進入密度大的海水，排開體積減小，船身會略微上浮，深度應變淺。","text":"船在海水中下沉的深度較深"}],"hint":"在不同液體中維持浮動，代表「浮力」依然相等。","question":"若將同一艘船從淡水河駛入海中，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"此為甲醇，只有一個碳原子。","text":"$CH_{3}OH$"},{"isCorrect":false,"rationale":"此為乙醇，屬於醇類。","text":"$C_{2}H_{5}OH$"},{"isCorrect":true,"rationale":"具有兩個碳原子（乙）且含有羧基（$-COOH$），故為乙酸。","text":"$CH_{3}COOH$"},{"isCorrect":false,"rationale":"此為乙酸甲酯，屬於酯類。","text":"$CH_{3}COOCH_{3}$"}],"hint":"尋找代表酸類特徵的 $-COOH$ 原子團。","question":"有關有機化合物的命名，下列哪一個化學式代表「乙酸」？"},{"answerOptions":[{"isCorrect":true,"rationale":"這增加了垂直地面的作用力（正向力），會使最大靜摩擦力成正比增加。","text":"在物體上方多放一個重物"},{"isCorrect":false,"rationale":"力的形式不影響接觸面的最大靜摩擦係數或正向力。","text":"改用水平拉力而非推力"},{"isCorrect":false,"rationale":"這會使接觸面變光滑，降低最大靜摩擦力。","text":"在接觸面上塗抹潤滑油"},{"isCorrect":false,"rationale":"最大靜摩擦力與接觸面積的大小無關。","text":"增加接觸面的面積"}],"hint":"考慮老師提到的正向力與表面粗糙度兩個變因。","question":"下列哪一種情形會增加物體與地面的最大靜摩擦力？"},{"answerOptions":[{"isCorrect":false,"rationale":"這可能是誤用面積比直接乘倍率，未考慮基準點。","text":"$500 \\text{ kgw}$"},{"isCorrect":false,"rationale":"這在比例計算上有明顯數量級錯誤。","text":"$100 \\text{ kgw}$"},{"isCorrect":false,"rationale":"這忽略了活塞面積比對力的放大效果。","text":"$5 \\text{ kgw}$"},{"isCorrect":true,"rationale":"根據帕斯卡原理，壓力相等：$\\frac{5}{2} = \\frac{F_{2}}{100}$，解得 $F_{2} = 250 \\text{ kgw}$。","text":"$250 \\text{ kgw}$"}],"hint":"利用比例式 $\\frac{F_{1}}{A_{1}} = \\frac{F_{2}}{A_{2}}$。","question":"有一密閉充滿水的容器，左端活塞面積 $2 \\text{ cm}^{2}$，右端活塞面積 $100 \\text{ cm}^{2}$。若在左端施力 $5 \\text{ kgw}$，右端可舉起多少質量的重物？"},{"answerOptions":[{"isCorrect":false,"rationale":"纖維素、澱粉、蛋白質等都是大自然界存在的天然聚合物。","text":"所有聚合物都是人工合成的"},{"isCorrect":false,"rationale":"聚合物的分子量通常在數萬甚至數百萬以上。","text":"聚合物的分子量通常很小"},{"isCorrect":true,"rationale":"聚合物（高分子）是由上千個單體經化學反應聚合而成的大型分子。","text":"聚合物是由許多相同或不同的「單體」連結而成"},{"isCorrect":false,"rationale":"葡萄糖是單體（單醣），多個葡萄糖聚合而成的澱粉或纖維素才是聚合物。","text":"葡萄糖是一種典型的聚合物"}],"hint":"積木與積木拼出的城堡，誰才是「聚合物」？","question":"有關「聚合物」的建構單位，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"球的密度大於水也大於油，故會下沉，浮力不可能等於球重。","text":"$600 \\text{ gw}$"},{"isCorrect":false,"rationale":"此球在水中沉入，代表其體積為 $150 \\text{ cm}^{3}$，在不同液體中浮力會隨密度改變。","text":"$150 \\text{ gw}$"},{"isCorrect":false,"rationale":"此計算可能誤用其他變量乘法。","text":"$480 \\text{ gw}$"},{"isCorrect":true,"rationale":"球在水中沉沒，體積 $V = \\frac{B}{d_{水}} = 150 \\text{ cm}^{3}$。在油中浮力 $B_{油} = 150 \\times 0.8 = 120 \\text{ gw}$。","text":"$120 \\text{ gw}$"}],"hint":"物體沉入液體中，排開液體的體積等於物體體積。","question":"一個重量 $600 \\text{ gw}$ 的金屬球投入水中，測得浮力為 $150 \\text{ gw}$。若將此球投入密度為 $0.8 \\text{ g/cm}^{3}$ 的油中，浮力會變為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"許多酯類是植物香味的來源，常應用於香料工業。","text":"酯類通常具有特殊的果香味"},{"isCorrect":true,"rationale":"酯類的密度通常比水小，且不易溶於水，因此會浮在水面上。","text":"反應後加入水，酯類會沉在容器底部"},{"isCorrect":false,"rationale":"這是酯化反應的基本定義：酸 + 醇 $\\rightarrow$ 酯 + 水。","text":"酯化反應是由有機酸與醇反應生成"},{"isCorrect":false,"rationale":"濃硫酸可脫水並加速反應，是常用的催化劑。","text":"實驗中常加入濃硫酸作為催化劑"}],"hint":"考慮油與水的分層現象。","question":"有關「酯化反應」的產物特性，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"超過彈性限度後彈簧會永久變形，不再遵守伸長量與力成正比的規則。","text":"受力必須在彈簧的彈性限度內"},{"isCorrect":false,"rationale":"不同粗細與材質的彈簧有不同的力常數。","text":"任何材質製成的彈簧，其受力與長度關係皆相同"},{"isCorrect":false,"rationale":"成正比的是「伸長量」，而非總長度。","text":"彈簧的總長度與受力大小成正比"},{"isCorrect":false,"rationale":"彈簧秤測量的是力的作用，任何性質的力（如拉力）均可測量。","text":"彈簧秤只能用來測量地球上的重力"}],"hint":"回憶老師提到的「長度」與「伸長量」的差別。","question":"在那使用彈簧秤測量力時，必須遵守「虎克定律」。下列何者是正確的應用前提？"},{"answerOptions":[{"isCorrect":false,"rationale":"碳數較少的為氣態，中等碳數為液態（如汽油），多碳數則為固態。","text":"烴類在常溫常壓下一定都是氣態"},{"isCorrect":false,"rationale":"烴類（Hydrocarbons）僅由碳、氫二種元素組成。","text":"烴類是由碳、氫、氧三種元素組成的化合物"},{"isCorrect":true,"rationale":"烷類是烴類的一種，符合僅含碳、氫原子的定義。","text":"甲烷、乙烷等物質屬於此類"},{"isCorrect":false,"rationale":"絕大多數烴類皆為良好的燃料，易於燃燒。","text":"所有的烴類在高溫下都不可燃"}],"hint":"從「烴」這個字的蒼頡造字（火、氫、碳）來聯想。","question":"有關「烴類」的組成特徵，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"垂直高度受大氣壓影響，與管子的粗細、形狀無關。","text":"粗管內的水銀柱垂直高度會比細管低"},{"isCorrect":false,"rationale":"漏入空氣後，空氣壓力會向下壓水銀，導致高度下降。","text":"若管內漏入空氣，水銀柱高度會上升"},{"isCorrect":true,"rationale":"因大氣壓固定，液體密度 $d$ 越小，所需的高度 $h$ 就越長。","text":"改用密度較小的液體，支撐的高度會變大"},{"isCorrect":false,"rationale":"高山氣壓較低，支撐的水銀柱會變短。","text":"若將實驗移至高山上，水銀柱高度會變長"}],"hint":"壓力 $P = h \\times d$。","question":"在同一海拔高度，用不同粗細的玻璃管做托里切利實驗。若垂直高度為 $76 \\text{ cmHg}$，則下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然不知道具體值，但比例可由密度直接推得。","text":"無法判斷，需知道鐵塊體積"},{"isCorrect":false,"rationale":"鐵塊會沉沒，排開體積相同但液體密度不同，故浮力不同。","text":"$1 : 1$"},{"isCorrect":true,"rationale":"鐵塊皆沉沒。浮力比 $= (V \\times 1.0) : (V \\times 0.8) = 1 : 0.8 = 5 : 4$。","text":"$5 : 4$"},{"isCorrect":false,"rationale":"此為比例反轉錯誤。","text":"$4 : 5$"}],"hint":"沉體排開液體的體積等於自身體積。","question":"某生將一鐵塊分別投入水與酒精中（酒精密度 $0.8 \\text{ g/cm}^{3}$），則鐵塊在兩者中所受浮力的比例（水：酒精）為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"熱固性塑膠受熱不熔化且會炭化，無法重複熔製。","text":"廢棄後可以反覆熔化再製，回收方便"},{"isCorrect":false,"rationale":"鏈狀是熱塑性的特徵，熱固性具有複雜的網狀交聯。","text":"分子構造呈長鏈狀，沒有交聯結構"},{"isCorrect":false,"rationale":"保特瓶（$PET$）與塑膠袋（$PE$）皆屬於受熱軟化的熱塑性塑膠。","text":"寶特瓶、塑膠袋是熱固性的代表產物"},{"isCorrect":true,"rationale":"網狀結構使其具有較佳的耐熱性與機械強度，不易受熱變形。","text":"輪胎橡膠與電路板通常屬於此類"}],"hint":"想像這種分子的結構像一張「結實的漁網」。","question":"對於「熱固性聚合物」的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"有機化合物必定含碳，不含碳的化合物必定屬於無機化合物。","text":"不含碳的化合物一定是有機化合物。"},{"isCorrect":false,"rationale":"歷史上的生命力論已被推翻，目前人類已能在實驗室合成數百萬種有機化合物。","text":"有機化合物只能從生命體中取得，無法在實驗室合成。"},{"isCorrect":false,"rationale":"有機化合物若含有氫或氧，燃燒時亦會產生水蒸汽。","text":"有機化合物燃燒後一定只會產生二氧化碳。"},{"isCorrect":true,"rationale":"有機化合物的現代定義是以碳為骨架的化合物，但簡單的含碳分子如二氧化碳、一氧化碳、碳酸鹽等通常被歸類為無機物。","text":"含碳的化合物未必都是有機化合物，例如 $CO_{2}$ 或 $CaCO_{3}$。"}],"hint":"回想一下老師在課堂中提到的「例外」情況。","question":"有關有機化合物的定義與特性，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"乾溜的目的正是要避免與氧氣發生劇烈反應。","text":"提高燃燒溫度，使木材能與氧氣充分反應。"},{"isCorrect":true,"rationale":"乾溜的關鍵在於「隔絕氧氣」，若直接燃燒木頭會變成灰燼而非木炭。","text":"隔絕空氣加熱，使木材發生熱分解而非直接燃燒。"},{"isCorrect":false,"rationale":"實驗時必須留有通風口排出氣體，否則鋁箔可能會因氣壓過高而破裂。","text":"防止產生的氣體溢散，以便在鋁箔內形成高壓環境。"},{"isCorrect":false,"rationale":"鋁箔在此實驗中僅作為物理阻隔與傳熱介質，並非化學反應的催化劑。","text":"鋁箔是催化劑，可加速木材分解產生氣體。"}],"hint":"注意「隔絕空氣」這四個字在實驗中的作用。","question":"將木筷進行乾溜實驗時，有關鋁箔包裝的用意，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"水蒸氣不可燃，醋酸在乾溜後通常冷凝為液態產物。","text":"水蒸氣、醋酸、甲烷"},{"isCorrect":false,"rationale":"醋酸與焦油在常溫下為液體，且二氧化碳不可燃。","text":"二氧化碳、醋酸、焦油"},{"isCorrect":true,"rationale":"乾溜產生的氣體中，這三者皆具可燃性，二氧化碳則不可燃。","text":"氫氣、甲烷、一氧化碳"},{"isCorrect":false,"rationale":"二氧化碳不具備可燃性，常用於滅火。","text":"一氧化碳、二氧化碳、氫氣"}],"hint":"思考哪些氣體在點火測試時會有火花或燃燒現象。","question":"在乾溜木筷產生的物質中，下列哪一組皆屬於氣態產物且具有可燃性？"},{"answerOptions":[{"isCorrect":false,"rationale":"聚合物是由大量重複單位組成的高分子量化合物，與此概念無關。","text":"聚合物"},{"isCorrect":false,"rationale":"界面活性劑是用於降低表面張力以協助洗滌的物質，例如肥皂。","text":"界面活性劑"},{"isCorrect":true,"rationale":"同分異構物是指原子種類與數量相同（分子式相同），但原子排列方式（結構）不同的物質。","text":"同分異構物"},{"isCorrect":false,"rationale":"同位素是指中子數不同但質子數相同的原子，而非化合物的結構差異。","text":"同位素"}],"hint":"這個詞描述了「材料相同，組裝形狀不同」的有機物特徵。","question":"乙醇（$C_{2}H_{5}OH$）與二甲醚（$CH_{3}OCH_{3}$）具有相同的分子式，但其構造不同導致性質相異。此種現象稱為什麼？"},{"answerOptions":[{"isCorrect":true,"rationale":"烴類的定義即為碳氫化合物，且其非極性特質使其與極性的水互不相溶。","text":"僅含碳、氫兩種元素，且大多難溶於水。"},{"isCorrect":false,"rationale":"甲烷與乙烷在常溫常壓下皆為氣態烴類。","text":"甲烷與乙烷皆為固體燃料。"},{"isCorrect":false,"rationale":"液化石油氣（桶裝瓦斯）的主要成分是丙烷與丁烷。","text":"液化石油氣的主要成分是甲烷與乙烷。"},{"isCorrect":false,"rationale":"通常烴類分子的碳原子數越多（分子量越大），其沸點會越高。","text":"烴類的碳原子數越多，其熔點與沸點通常越低。"}],"hint":"烴（Hydrocarbon）的命名由來是其組成的元素。","question":"有關烴類化合物的特性，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"酯類是酸與醇反應的產物，自身不含 $-OH$ 基團。","text":"酯類"},{"isCorrect":false,"rationale":"烴類僅含碳與氫，不含羥基原子團。","text":"烴類"},{"isCorrect":false,"rationale":"有機酸含有 $-COOH$ 基團，且其水溶液呈弱酸性。","text":"有機酸類"},{"isCorrect":true,"rationale":"醇類的特徵是含有羥基（$-OH$），其中性特徵常被誤認為鹼，且是酯化反應的原料。","text":"醇類"}],"hint":"注意該基團的符號以及它在化妝品或酒精飲料中的常見性。","question":"某有機化合物含有 $OH$ 原子團，其水溶液呈中性，與有機酸反應可產生香味。該化合物最可能屬於哪一類？"},{"answerOptions":[{"isCorrect":false,"rationale":"羧基（$-COOH$）是有機酸的官能基。","text":"其分子內含有 $-COOH$ 原子團。"},{"isCorrect":false,"rationale":"甲酸又名蟻酸，是許多昆蟲防禦時分泌的化學物質。","text":"甲酸存在於螞蟻或蜜蜂的分泌物中。"},{"isCorrect":false,"rationale":"純乙酸的熔點約為 $16.7^{\\circ}C$，在低溫下會凝結。","text":"冰醋酸是指純度極高且在低溫下凝固成冰狀的乙酸。"},{"isCorrect":true,"rationale":"乙酸（醋酸）屬於弱電解質，在水中僅部分解離，呈弱酸性而非強酸性。","text":"乙酸水溶液呈強酸性，可導電。"}],"hint":"考慮醋酸在日常生活中稀釋後的酸度強度。","question":"下列有關有機酸的敘述，何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是皂化反應，產物是肥皂與甘油，而非香味酯類。","text":"油脂 + 強鹼"},{"isCorrect":true,"rationale":"酯化反應的基本定義是酸與醇結合並脫去一個水分子的過程。","text":"有機酸 + 醇類"},{"isCorrect":false,"rationale":"烴與水通常不反應，且無法直接生成酯類。","text":"烴類 + 水"},{"isCorrect":false,"rationale":"糖類與醇類的反應並不屬於中學範圍內的酯化反應定義。","text":"糖類 + 醇類"}],"hint":"想一想「乙酸乙酯」這個名稱是結合了哪兩種化合物的名字。","question":"酯化反應中，通常會加入濃硫酸作為催化劑，並產出具有香味的產物。該反應的原料為？"},{"answerOptions":[{"isCorrect":false,"rationale":"乙醇雖有沸點性質，但在該反應中的關鍵角色是協助溶解。","text":"降低溶液沸點，防止加熱時發生突沸。"},{"isCorrect":false,"rationale":"乙醇不參與造皂化反應的原子組成，反應物是油脂與鹼。","text":"作為反應物，與油脂反應生成肥皂。"},{"isCorrect":true,"rationale":"油脂不溶於水（強鹼液），乙醇能溶解兩者使反應物充分接觸。","text":"作為界面活性劑，使油脂與強鹼溶液互溶以加速反應。"},{"isCorrect":false,"rationale":"乙醇主要作為溶劑，香味通常是事後添加香精產生的。","text":"增加肥皂的香味與美觀。"}],"hint":"想想為什麼油水不溶的環境下，反應會進行得很慢。","question":"在製作肥皂的過程中，加入乙醇的主要目的是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"分餾是利用沸點差異分離液體混合物的物理方法。","text":"分餾"},{"isCorrect":false,"rationale":"酯化是產生酯類的化學反應，與肥皂分離無關。","text":"酯化"},{"isCorrect":true,"rationale":"鹽析是利用肥皂難溶於食鹽水且密度較小的特性，使其浮出水面的過程。","text":"鹽析"},{"isCorrect":false,"rationale":"乾溜是隔絕空氣加熱固體的過程。","text":"乾溜"}],"hint":"利用「飽和食鹽水」將大分子的鹽類排擠出來的動作。","question":"皂化反應完成後，加入飽和食鹽水可使肥皂與甘油分離，此程序稱為？"},{"answerOptions":[{"isCorrect":true,"rationale":"親油端是長碳鏈（非極性），親水端才是帶電且吸引水分的部分。","text":"親油端通常是帶電荷的原子團，容易吸引水分。"},{"isCorrect":false,"rationale":"界面活性劑的特性就是具有親水與親油雙重性質。","text":"肥皂是一種界面活性劑，能打破油水界線。"},{"isCorrect":false,"rationale":"肥皂分子的包裹作用使油脂與水分離並懸浮。","text":"肥皂能將大油滴分散成細小油珠，隨水流沖走。"},{"isCorrect":false,"rationale":"這是肥皂去汙的基本構造描述。","text":"親水端負責與水分結合，親油端負責吸附油垢。"}],"hint":"親油端就像是油脂的「好朋友」，兩者化學性質應該相似。","question":"有關肥皂分子的去汙原理，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"肥皂會與硬水中的鎂、鈣離子反應生成不溶性沉澱，清潔劑則較無此限制。","text":"在硬水中仍能保持良好的去汙效果，且不會產生沉澱。"},{"isCorrect":false,"rationale":"合成清潔劑通常設計為中性，以避免損傷織物。","text":"一定是呈強酸性，適合洗滌細緻衣物。"},{"isCorrect":false,"rationale":"兩者皆能有效處理常見的油脂類汙垢。","text":"只能去除油脂，無法去除汗漬。"},{"isCorrect":false,"rationale":"合成清潔劑多來自石化工業原料，並非天然油脂。","text":"其分子結構完全由天然油脂製成，較環保。"}],"hint":"考慮水質中含有的「礦物質」對洗滌劑的影響。","question":"合成清潔劑與肥皂相比，其主要優點為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"電路板基材屬於熱固性塑膠，具有高度耐熱性。","text":"電子電路板（酚醛樹脂）"},{"isCorrect":false,"rationale":"硫化橡膠屬於網狀結構的熱固性聚合物，受熱不軟化。","text":"輪胎（硫化橡膠）"},{"isCorrect":true,"rationale":"熱塑性聚合物為鏈狀結構，受熱會軟化可重複塑形。","text":"保麗龍（聚苯乙烯，PS）"},{"isCorrect":false,"rationale":"油脂不屬於聚合物，其分子量較小。","text":"人造奶油（氫化油脂）"}],"hint":"找出一種受熱後會熔化變形，且通常能回收再製的塑膠。","question":"下列哪一種高分子化合物屬於「熱塑性聚合物」？"},{"answerOptions":[{"isCorrect":false,"rationale":"澱粉與纖維素的單體皆為葡萄糖。","text":"澱粉的單體為蔗糖。"},{"isCorrect":false,"rationale":"天然橡膠的單體是異戊二烯，聚乙烯本身就是一種合成聚合物。","text":"天然橡膠的單體為聚乙烯。"},{"isCorrect":true,"rationale":"蛋白質是由許多氨基酸經由胜肽鍵連結而成的生物聚合物。","text":"蛋白質的單體為氨基酸。"},{"isCorrect":false,"rationale":"纖維素是多醣類，由葡萄糖聚合而成。","text":"纖維素的單體為脂肪酸。"}],"hint":"考慮人體消化吸收時，這些大分子最終會被分解成什麼基本單位。","question":"有關天然聚合物的組成，下列對應何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"除非題目明確指出超過彈性限度，否則遵循物理定律計算。","text":"彈簧會永久形變。"},{"isCorrect":false,"rationale":"虎克定律指出伸長量與外力成正比。","text":"伸長量與法碼重成反比。"},{"isCorrect":false,"rationale":"成正比的是「伸長量」而非「總長度」（因為有原長存在）。","text":"總長度與法碼重成正比。"},{"isCorrect":true,"rationale":"根據虎克定律 $F=k\\Delta x$，外力加倍，伸長量從 5 cm 變 10 cm，總長為 $10+10=20$ cm。","text":"若未超過彈性限度，則總長應為 20 cm。"}],"hint":"注意區分「總長度」與「伸長量」的不同。","question":"在彈簧長度的測量實驗中，若原長 10 cm 的彈簧掛上 50 gw 法碼後總長變為 15 cm。當改掛 100 gw 法碼時，下列推論何者最合理？"},{"answerOptions":[{"isCorrect":false,"rationale":"不動是推力被等大的摩擦力抵消所致。","text":"物體不動是因為其質量太大，與摩擦力無關。"},{"isCorrect":false,"rationale":"靜平衡狀態下的合力必定為零。","text":"此時物體合力大於零，否則無法平衡。"},{"isCorrect":true,"rationale":"物體靜止代表合力為零，水平推力與靜摩擦力互抵。","text":"此時物體所受的靜摩擦力等於 5 kgw，方向向後。"},{"isCorrect":false,"rationale":"最大靜摩擦力是臨界值，靜摩擦力會隨推力大小而變動。","text":"摩擦力隨時等於最大靜摩擦力。"}],"hint":"靜止不動時，推力與阻力的關係為何？","question":"有一物體靜置於粗糙水平面上，若施予 5 kgw 的水平推力仍無法推動。下列敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"增加接觸面的粗糙程度可提高最大靜摩擦力，防止打滑。","text":"汽車輪胎上刻有深槽花紋。"},{"isCorrect":false,"rationale":"潤滑是為了減少接觸面粗糙度以降低摩擦力。","text":"在機械齒輪中加入潤滑油。"},{"isCorrect":false,"rationale":"以滾動代替滑動可大幅減少運動阻力。","text":"搬運重物時使用滾輪墊在下方。"},{"isCorrect":false,"rationale":"這是為了減少空氣阻力。","text":"流線型的跑車設計。"}],"hint":"找出一種讓表面更不平滑、抓地力更強的做法。","question":"有關影響摩擦力大小的因素，下列哪項舉措是為了「增加」摩擦力？"},{"answerOptions":[{"isCorrect":true,"rationale":"壓力與接觸面積成反比。最小面積為 10 ($5 \\times 2$)，最大面積為 50 ($10 \\times 5$)，壓力比為 $50:10 = 5:1$。","text":"$5:1$"},{"isCorrect":false,"rationale":"此比例僅考慮部分邊長比，未計算完整面積比。","text":"$2:1$"},{"isCorrect":false,"rationale":"此為最大邊長與最小邊長比，非面積比。","text":"$10:1$"},{"isCorrect":false,"rationale":"雖然重量相同，但接觸面積不同會導致壓力不相等。","text":"$1:1$"}],"hint":"壓力公式為 $P = \\frac{F}{A}$，注意面積與壓力的反比關係。","question":"一長方體金屬塊規格為 $10 \\times 5 \\times 2$ cm，重量為 1000 gw。將其不同的面接觸地面，產生的最大壓力與最小壓力比為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"容器中液體的總量不影響特定深度的點壓力。","text":"液體壓力僅與液體總量有關，與深度無關。"},{"isCorrect":false,"rationale":"深處上方的水柱較重，壓力應較大。","text":"液體壓力在深處會變小。"},{"isCorrect":true,"rationale":"根據公式 $P = h \\times d$，深度 $h$ 越大，壓力 $P$ 越大。","text":"液體壓力隨深度增加而變大。"},{"isCorrect":false,"rationale":"靜止液體壓力會向各個方向傳遞且垂直於接觸面。","text":"液體壓力僅作用於底部，側壁不受壓。"}],"hint":"想一想潛水員潛得越深，身體承受的感覺。","question":"當一個點在液面下的深度增加時，液體壓力如何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是利用重力平衡大氣壓力的原理（托里切利實驗）。","text":"水銀氣壓計測量高度。"},{"isCorrect":true,"rationale":"利用密閉液體能傳遞壓力的特性，在小面積施力產生大面積的推力。","text":"汽車維修站的油壓千斤頂。"},{"isCorrect":false,"rationale":"電風扇是將電能轉化為機械能帶動空氣流動。","text":"電風扇旋轉吹風。"},{"isCorrect":false,"rationale":"機翼升力主要基於白努利定律而非帕斯卡原理。","text":"飛機機翼產生的升力。"}],"hint":"考慮「小力換大力」的密閉液體系統。","question":"帕斯卡原理（Pascal's Principle）主要應用在下列哪一種裝置？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然與密度有關，但計算結果應約為 $10.3$ 公尺。","text":"$13.6$ m"},{"isCorrect":true,"rationale":"一大氣壓可支撐 $76$ cm 水銀柱，換成水後高度為 $76 \\times 13.6 = 1033.6$ cm。","text":"$1033.6$ cm"},{"isCorrect":false,"rationale":"水比水銀輕得多，大氣壓力能支撐更高的水柱。","text":"$76$ cm"},{"isCorrect":false,"rationale":"此數值顯然過小，不符合海平面的大氣壓力強度。","text":"$10$ cm"}],"hint":"大氣壓力相同時，液體高度與其密度成反比。","question":"在海平面高度進行托里切利實驗，若將水銀換成水，則水柱的高度約為多少？（已知水銀密度為 $13.6$ $g/cm^{3}$）"},{"answerOptions":[{"isCorrect":true,"rationale":"大氣壓力來自上方空氣的重量，海拔高則空氣總量減少。","text":"海拔高度越高，上方空氣柱越短，大氣壓力越小。"},{"isCorrect":false,"rationale":"流體（氣體）壓力作用於各個方向且垂直接觸面。","text":"大氣壓力僅作用於物體上方。"},{"isCorrect":false,"rationale":"通常高氣壓地區天氣晴朗，低氣壓地區容易降雨。","text":"晴天時氣壓通常比陰雨天低。"},{"isCorrect":false,"rationale":"管內若有空氣，氣壓會抵銷部分大氣壓力，使水銀柱下降。","text":"一公尺長的水銀管內若有空氣，水銀柱高度會維持 76 cm。"}],"hint":"想像在高山上呼吸較吃力，是因為空氣壓力與密度的關係。","question":"有關大氣壓力的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是物體在水中的「視重」（減輕後的重量），而非浮力。","text":"$300$ gw"},{"isCorrect":true,"rationale":"阿基米德原理指出，浮力等於排開液重。完全沒入水（密度 1）中，浮力 = $200 \\times 1 = 200$ gw。","text":"$200$ gw"},{"isCorrect":false,"rationale":"浮力不可能大於排開的液體體積（在密度為 1 的水中）。","text":"$700$ gw"},{"isCorrect":false,"rationale":"物體密度大於水，會下沉，其浮力不等於物重。","text":"$500$ gw"}],"hint":"記住阿基米德原理：浮力 = 排開液體重。","question":"一物體重 500 gw，體積為 $200$ $cm^{3}$，將其完全沒入水中時，所受浮力為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"浮體浮力僅由物重決定，且海水較濃，船會浮得更高。","text":"浮力變大，沉入體積變大。"},{"isCorrect":false,"rationale":"因液體密度改變，根據 $B = V_{out} \\times d_{liq}$，沉入體積必會調整。","text":"兩者皆不變。"},{"isCorrect":true,"rationale":"船皆為浮體，浮力等於物重（皆不變）。海水密度大，故排開體積減少以維持相同浮力。","text":"浮力不變，沉入體積變小。"},{"isCorrect":false,"rationale":"沉入體積不變則浮力會因液體密度增加而變大，船會上升平衡。","text":"浮力變大，沉入體積不變。"}],"hint":"既然船都浮著，它受到的向上推力必須等於它的重量。","question":"一艘輪船由河口開往大海（海水密度大於淡水），則輪船所受浮力與沉入水下的體積如何變化？"},{"answerOptions":[{"isCorrect":true,"rationale":"澄清石灰水變混濁代表產生 $CO_{2}$（含碳），出現水滴代表產生 $H_{2}O$（含氫）。","text":"碳、氫"},{"isCorrect":false,"rationale":"氧化法中，產物二氧化碳的氧可能來自氧化銅或空氣，無法直接證明原物含氧。","text":"碳、氧"},{"isCorrect":false,"rationale":"此實驗現象與這兩項元素無關。","text":"氮、磷"},{"isCorrect":false,"rationale":"石灰水的反應明確指出了碳的存在。","text":"氫、氧"}],"hint":"根據產物 $CO_{2}$ 與 $H_{2}O$ 回推其組成元素。","question":"小明取一有機物與氧化銅混合加熱，產生的氣體使澄清石灰水變混濁，且試管壁出現水滴。由此推斷該有機物必含哪些元素？"},{"answerOptions":[{"isCorrect":false,"rationale":"兩者皆為無色透明液體，肉眼難以區分。","text":"觀察顏色與透明度。"},{"isCorrect":true,"rationale":"砂糖是有機物，受熱會脫水炭化產生黑碳；食鹽是無機鹽類，加熱不會變黑。","text":"加熱進行氧化或乾溜，觀察是否有黑色殘留物。"},{"isCorrect":false,"rationale":"雖然食鹽導電，但這屬於物理性質檢測，非來源素材提及的有機物鑑定法。","text":"測量液體的導電性。"},{"isCorrect":false,"rationale":"在常溫下，食鹽水與砂糖水皆無明顯氣味。","text":"聞其氣味。"}],"hint":"有機化合物與無機鹽類在「火」的作用下表現非常不同。","question":"下列哪一種行為最能有效區分食鹽水與砂糖水？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是熱塑性聚合物的特徵。","text":"結構為長鏈狀，適合回收加熱再製成新產品。"},{"isCorrect":false,"rationale":"聚合物（高分子）的分子量通常遠大於 10000。","text":"其分子量通常小於 1000。"},{"isCorrect":true,"rationale":"網狀結構使其分子間連結極為穩固，無法受熱重塑。","text":"原子間形成三度空間的網狀結構，受熱不熔化、不變形。"},{"isCorrect":false,"rationale":"PE 與 PET 皆為熱塑性聚合物。","text":"常見例子包括聚乙烯（PE）與寶特瓶（PET）。"}],"hint":"這類物質一旦成型就像「煮熟的雞蛋」無法變回原樣。","question":"有關「熱固性聚合物」的結構與特性，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"只要施加「力」，彈簧仍會產生對應的形變。","text":"在無重力狀態下操作。"},{"isCorrect":false,"rationale":"法碼形狀不影響其總重量對彈簧施加的拉力。","text":"法碼的形狀不規則。"},{"isCorrect":false,"rationale":"不同彈簧會有不同的比例常數（$k$），但個別仍遵循其比例關係。","text":"更換不同粗細的彈簧。"},{"isCorrect":true,"rationale":"超過限度後，彈簧發生永久形變，長度變化不再與外力成正比。","text":"施加的力超過彈簧的彈性限度。"}],"hint":"考慮讓彈簧「壞掉」或「拉長後回不去」的界限。","question":"虎克定律中，若施力 $F$ 與伸長量 $x$ 成正比，下列何種情況會使此規律失效？"},{"answerOptions":[{"isCorrect":true,"rationale":"定速前進（等速度運動）代表合力為零，推力與阻力大小相等。","text":"推力等於摩擦力。"},{"isCorrect":false,"rationale":"行駛中的汽車必然受到各種阻力，引擎必須提供對應的推力。","text":"兩者皆等於零。"},{"isCorrect":false,"rationale":"若推力較大，汽車會持續加速而非定速。","text":"推力大於摩擦力。"},{"isCorrect":false,"rationale":"若推力較小，汽車會減速最終停止。","text":"推力小於摩擦力。"}],"hint":"注意「定速（等速度）」運動的受力分析。","question":"一輛汽車在高速公路上定速前進，若水平方向僅受引擎推力與摩擦力，則兩力大小關係為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"此高度產生的壓力遠低於 16 cm 的水柱壓力。","text":"$8$ cm"},{"isCorrect":false,"rationale":"酒精較輕，應需更高的高度才能產生與水相同的壓力。","text":"$12.8$ cm"},{"isCorrect":true,"rationale":"平衡時底端壓力相等，$h_{w} \\times d_{w} = h_{alc} \\times d_{alc}$，故 $16 \\times 1.0 = h_{alc} \\times 0.8$，得 $h_{alc} = 20$。","text":"$20$ cm"},{"isCorrect":false,"rationale":"不同密度的液體，液面高度不會相等。","text":"$16$ cm"}],"hint":"利用液體壓力公式 $P = h \\times d$，平衡時底部總壓應相等。","question":"某實驗室設計了一套簡易連通管，分別裝入水（密度 1.0）與酒精（密度 0.8），若右管水面高 16 cm，則左管酒精面高應為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然有機物必含碳，但如 $CO_2$、碳酸鹽等含碳化合物被歸類為無機物。","text":"只要化合物中含有碳元素，就百分之百屬於有機化合物。"},{"isCorrect":true,"rationale":"在維勒合成尿素之前，化學家普遍認為有機物與無機物的區別在於生命力的存在。","text":"早期科學家認為有機化合物只能由具有「生命力」的生物體產生。"},{"isCorrect":false,"rationale":"這與事實完全相反，有機化合物是指含碳的化合物（除少數例外）。","text":"有機化合物的現代定義是「不含碳的化合物」。"},{"isCorrect":false,"rationale":"此定義已被維勒在實驗室中從無機物合成有機物的實驗所顛覆。","text":"目前科學界仍沿用「有機物來自生命體，無機物來自無生命體」的定義。"}],"hint":"思考維勒（Wöhler）合成尿素實驗對科學界帶來的衝擊。","question":"關於有機會合物定義的演變，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"食鹽與水不含碳，二氧化碳雖含碳但屬於有機定義中的例外。","text":"食鹽（$NaCl$）、水（$H_2O$）、二氧化碳（$CO_2$）"},{"isCorrect":false,"rationale":"蔗糖是來自生物體的有機化合物。","text":"木炭、金剛石、蔗糖（$C_{12}H_{22}O_{11}$）"},{"isCorrect":false,"rationale":"這三者皆含有碳氫氧，屬於有機化合物。","text":"乙醇（$C_2H_5OH$）、醋酸（$CH_3COOH$）、蛋白質"},{"isCorrect":false,"rationale":"葡萄糖是典型的有機化合物。","text":"葡萄糖（$C_6H_{12}O_6$）、一氧化碳（$CO$）、碳酸鈣（$CaCO_3$）"}],"hint":"注意含有碳元素但被歸類為無機物的特定家族。","question":"下列哪一組物質全部都是無機化合物？"},{"answerOptions":[{"isCorrect":false,"rationale":"乾餾必須隔絕空氣（氧氣），否則會發生燃燒反應將碳變為氣體。","text":"讓木材與氧氣充分燃燒，以產生大量的二氧化碳。"},{"isCorrect":true,"rationale":"乾餾是利用高溫分解有機物，殘留的黑色固體碳可證明其組成。","text":"隔絕空氣加熱使木材分解，藉此觀察產物以證明木材含有碳。"},{"isCorrect":false,"rationale":"乾餾是化學分解過程，而非物理性的抽出氣體。","text":"將木材中的二氧化碳抽出，純化木材的纖維。"},{"isCorrect":false,"rationale":"實驗重點在於隔絕空氣分解，而非增加溼度。","text":"增加實驗的溼度，觀察木材是否會產生水蒸氣。"}],"hint":"關鍵在於「隔絕空氣加熱」的定義與產物。","question":"在「認識有機化合物」的實驗中，將木材進行「乾餾」的主要目的是什麼？"},{"answerOptions":[{"isCorrect":true,"rationale":"二氧化碳不助燃也不自燃，常用於滅火。","text":"二氧化碳（$CO_2$）"},{"isCorrect":false,"rationale":"氫氣是具有高度可燃性的氣體產物。","text":"氫氣（$H_2$）"},{"isCorrect":false,"rationale":"甲烷是有機物分解產生的可燃性氣體。","text":"甲烷（$CH_4$）"},{"isCorrect":false,"rationale":"一氧化碳雖然有毒，但仍具有可燃性。","text":"一氧化碳（$CO$）"}],"hint":"回想乾餾產生的四種主要氣體中，哪一種常被用來滅火。","question":"乾餾木屑時，鋁箔紙開口處冒出的氣體，下列何者「不具備」助燃性或可燃性？"},{"answerOptions":[{"isCorrect":false,"rationale":"氮元素的檢驗需要不同的化學指示劑，石灰水僅對二氧化碳有感。","text":"氮（$N$）"},{"isCorrect":false,"rationale":"氫元素燃燒會生成水，應使用氯化亞鈷紙檢驗。","text":"氫（$H$）"},{"isCorrect":true,"rationale":"澄清石灰水與二氧化碳反應生成碳酸鈣沉澱，二氧化碳中的碳來自原有機物。","text":"碳（$C$）"},{"isCorrect":false,"rationale":"實驗通常使用氧化銅提供氧，產物的氧來源包含原物質與氧化劑，難以單獨證明。","text":"氧（$O$）"}],"hint":"回想國小學過檢驗二氧化碳的標準試劑。","question":"使用「氧化法」檢驗有機化合物時，若將產物通入澄清石灰水產生渾濁，可證明原物質含有哪種元素？"},{"answerOptions":[{"isCorrect":false,"rationale":"酒精在反應中是助溶劑的角色，並非定義上的催化劑。","text":"作為催化劑，降低反應所需的活化能。"},{"isCorrect":false,"rationale":"皂化是水解反應，並非氧化反應。","text":"作為氧化劑，將油脂轉變為酸類物質。"},{"isCorrect":true,"rationale":"油脂不溶於水，酒精可與兩者互溶，增加反應物碰撞機率。","text":"作為界面活性劑，幫助油脂與強鹼溶液互相溶解以加速反應。"},{"isCorrect":false,"rationale":"肥皂的香味通常來自額外添加的香精，而非酒精。","text":"為了讓肥皂產生濃郁的酒香味。"}],"hint":"考慮油脂與水溶液（氫氧化鈉）是否能輕易混合。","question":"在製作肥皂的「皂化反應」實驗中，加入酒精的主要用途為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"肥皂在硬水中會產生沉澱失去效用，這是其主要缺點。","text":"兩者在硬水中皆能發揮絕佳的洗淨效果。"},{"isCorrect":true,"rationale":"兩者皆屬界面活性劑，利用長鏈碳氫結構親油，帶電荷端親水。","text":"皆具有親油端與親水端，能將油汙包圍並分散於水中。"},{"isCorrect":false,"rationale":"去汙是物理性質的包覆分散過程，而非酸鹼中和反應。","text":"皆能與油汙發生中和反應，產生水與鹽。"},{"isCorrect":false,"rationale":"肥皂是油脂與鹼反應，合成清潔劑通常來自石油化學原料，成分不同。","text":"它們的化學成分完全相同，只是製造方法不同。"}],"hint":"觀察清潔劑分子的結構特徵，如何同時與水和油接觸。","question":"肥皂與合成清潔劑在「去汙原理」上的共同點是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"這符合課程中強調的物理概念，壓力是分布狀況。","text":"壓力是指力在接觸面上的分布程度，並非力本身。"},{"isCorrect":false,"rationale":"物體的重量不隨擺放方式改變，總作用力確實相等。","text":"無論以哪一面接觸，金屬塊對桌面的總作用力（重量）皆不變。"},{"isCorrect":false,"rationale":"力集中在小面積上會產生較大的壓強效果。","text":"若要產生最大壓力，應選擇面積最小的一面作為底面。"},{"isCorrect":true,"rationale":"根據公式，在作用力固定下，壓力與接觸面積成反比。","text":"接觸面積愈小，對桌面產生的壓力愈小。"}],"hint":"注意公式中壓力與面積是成正比還是反比。","question":"關於固體壓力 $P = \\frac{F}{A}$ 的應用，當同一個金屬塊以不同面接觸桌面時，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"液體壓力來自上方液柱的重量，深度愈深，液柱愈重，壓力愈大。","text":"該點距液面的垂直深度。"},{"isCorrect":false,"rationale":"壓力隨位置深度改變，並非全容器各點壓力皆等於總高度計算值。","text":"容器內液體的總高度。"},{"isCorrect":false,"rationale":"物理公式中採用的必須是垂直距離。","text":"該點距液面最遠的斜向距離。"},{"isCorrect":false,"rationale":"液壓與底部距離無關，而是與上方液體多寡有關。","text":"該點距容器底部的垂直高度。"}],"hint":"思考潛水時，感受到壓力變化是取決於距離水面還是距離海底。","question":"靜止液體壓力公式為 $P = h \\times D$，其中 $h$ 代表什麼物理意義？"},{"answerOptions":[{"isCorrect":false,"rationale":"除非垂直長度小於 $76 \\text{ cm}$，否則上方仍會維持真空。","text":"水銀會充滿整支玻璃管，不留空隙。"},{"isCorrect":false,"rationale":"液體壓力由垂直高度決定，若垂直高度變小，壓力平衡會被打破。","text":"沿管長度維持 $76 \\text{ cm}$，但垂直高度下降。"},{"isCorrect":false,"rationale":"幾何上斜邊必定大於垂直邊，兩者不可能同時相等。","text":"垂直高度與沿管長度皆維持 $76 \\text{ cm}$。"},{"isCorrect":true,"rationale":"大氣壓力支撐的是固定重量的液柱，其產生的壓力僅與垂直高度有關。","text":"垂直高度維持 $76 \\text{ cm}$，但沿管長度增加。"}],"hint":"回想連通管原理與液體壓力只與「垂直深度」有關的特性。","question":"托里切利實驗中，玻璃管內水銀柱高度維持 $76 \\text{ cm}$。若將玻璃管稍微傾斜，管內水銀柱的變化為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"玉山仍在地球大氣層內，雖壓力較小但並非真空。","text":"變為 $0 \\text{ cm}$，因為高山接近外太空，沒有大氣壓。"},{"isCorrect":false,"rationale":"實驗測量的是靜止空氣的重力壓強，高度增加則壓強減少。","text":"大於 $76 \\text{ cm}$，因為高山風大會增加側向壓力。"},{"isCorrect":true,"rationale":"高山上海拔較高，上方的空氣柱較短且密度較低，壓力隨之下降。","text":"小於 $76 \\text{ cm}$，因為高山空氣稀薄，大氣壓力較小。"},{"isCorrect":false,"rationale":"大氣壓力會隨著地點的海拔與天氣狀況而改變。","text":"維持 $76 \\text{ cm}$，因為大氣壓力是全球統一的常數。"}],"hint":"考慮高山上的空氣柱長度比平地長還是短。","question":"在玉山頂上（高海拔地區）進行托里切利實驗，測得的水銀柱高度將會如何變化？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是物體在空氣中的重量，不代表受到的向上支撐力。","text":"$500 \\text{ gw}$"},{"isCorrect":false,"rationale":"這是物體在水中的「視重」，即彈簧秤顯示的數值。","text":"$350 \\text{ gw}$"},{"isCorrect":false,"rationale":"誤將重量與視重相加，不符合浮力的定義。","text":"$850 \\text{ gw}$"},{"isCorrect":true,"rationale":"浮力等於物體在空氣中與在液體中的重量差（$500 - 350 = 150$）。","text":"$150 \\text{ gw}$"}],"hint":"利用浮力定義：空氣中重減去液體中重。","question":"一個重量 $500 \\text{ gw}$ 的物體放入水中後，測得其在水中的重量為 $350 \\text{ gw}$，則該物體所受浮力大小為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"雖然排開體積變小，但液體密度變大，兩者乘積（浮力）維持不變。","text":"輪船所受浮力變小，因為排開的海水體積減少了。"},{"isCorrect":false,"rationale":"高密度液體能提供更大的浮力壓強，使物體更易浮起。","text":"輪船會往下沉一些，因為海水的支撐力變小。"},{"isCorrect":true,"rationale":"輪船皆為浮體，浮力等於物重。海水密度較大，根據 $B = V \\times D$，排開體積會變小。","text":"輪船所受浮力不變，但船身會稍微浮起一些。"},{"isCorrect":false,"rationale":"對於浮體而言，浮力始終等於物重，不會因液體密度增加而變大。","text":"輪船所受浮力變大，因為海水密度較大。"}],"hint":"船始終浮在水面上，處於力平衡狀態，思考浮力與重量的關係。","question":"一艘輪船從淡水河駛入大海（海水密度大於淡水），下列敘述何者正確？"},{"answerOptions":[{"isCorrect":true,"rationale":"這是浮力最基本的原理，適用於沉體與浮體。","text":"物體所受的浮力等於其排開液體的重量。"},{"isCorrect":false,"rationale":"重量損失即浮力，浮力大小與液體密度成正比。","text":"物體在水中的重量損失，與排開液體的密度無關。"},{"isCorrect":false,"rationale":"還需考慮物體是沉入水中還是浮在面上，排開的「液體體積」才是關鍵。","text":"體積愈大的物體，在水中受到的浮力一定愈大。"},{"isCorrect":false,"rationale":"只要物體排開液體，不論是否沉底，皆會受到浮力作用。","text":"沉入水底的物體不再受到浮力的作用。"}],"hint":"重點在於「排開的液體」與「浮力」的換算關係。","question":"關於阿基米德原理，下列敘述何者最準確？"},{"answerOptions":[{"isCorrect":true,"rationale":"伸長量與外力成正比。$20 \\text{ g}$ 伸長 $2 \\text{ cm}$，則再加 $20 \\text{ g}$（共 $40 \\text{ g}$）會伸長 $4 \\text{ cm}$，總長 $10 + 4 = 14$。","text":"$14 \\text{ cm}$"},{"isCorrect":false,"rationale":"這只是伸長量，非總長度。","text":"$4 \\text{ cm}$"},{"isCorrect":false,"rationale":"這是掛一個法碼時的長度。","text":"$12 \\text{ cm}$"},{"isCorrect":false,"rationale":"錯誤地將總長度直接翻倍。","text":"$24 \\text{ cm}$"}],"hint":"先計算單一法碼造成的「伸長量」，再加回原長。","question":"有一彈簧原長 $10 \\text{ cm}$，掛上 $20 \\text{ g}$ 法碼後總長變為 $12 \\text{ cm}$。若再加掛一個同樣的法碼，總長度變為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"重力作用使蘋果由靜止變為運動，屬運動狀態改變。","text":"手鬆開後，蘋果自由落下。"},{"isCorrect":false,"rationale":"這是力產生的「形變」效果。","text":"皮球受擠壓後變扁。"},{"isCorrect":false,"rationale":"這是力產生的「運動狀態改變」效果。","text":"行駛中的汽車緊急煞車停止。"},{"isCorrect":true,"rationale":"力主要產生「形變」與「運動狀態改變」，顏色變化通常是化學或光學效果。","text":"物體維持原本的顏色與光澤。"}],"hint":"尋找與形狀、速度無關的選項。","question":"下列哪一種現象「不屬於」力對物體產生的效果？"},{"answerOptions":[{"isCorrect":false,"rationale":"手必須碰到門才能施加推力。","text":"推開門扇的推力。"},{"isCorrect":false,"rationale":"水必須接觸船體才能產生力。","text":"水流對船隻產生的推力。"},{"isCorrect":true,"rationale":"磁力不須物體接觸即可產生作用，與重力、電力同屬超距力。","text":"磁鐵吸引迴紋針的磁力。"},{"isCorrect":false,"rationale":"腳底與地面必須直接接觸。","text":"腳踩地面的支撐力。"}],"hint":"思考哪種力不需要「碰在一起」就能發生作用。","question":"下列力中，何者屬於「非接觸力」（超距力）？"},{"answerOptions":[{"isCorrect":false,"rationale":"若無推力且桌面水平，物體不受摩擦力。","text":"只要物體在桌面上，就一定會受到摩擦力的作用。"},{"isCorrect":false,"rationale":"一旦推動後，動摩擦力通常會小於最大靜摩擦力。","text":"滑動摩擦力的大小通常大於最大靜摩擦力。"},{"isCorrect":false,"rationale":"最大靜摩擦力與接觸面積大小無關，主要與正向力與粗糙度有關。","text":"接觸面愈大，產生的摩擦力一定愈大。"},{"isCorrect":true,"rationale":"物體未動前，靜摩擦力與水平拉力大小相等、方向相反。","text":"靜摩擦力的大小會隨著外力的大小而改變，直到達到最大靜摩擦力。"}],"hint":"回想推桌子時，為什麼稍微用力還是推不動，力去哪裡了？","question":"關於摩擦力的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"產物中無含氮物質，無法證明含有氮。","text":"氮（$N$）與碳（$C$）"},{"isCorrect":false,"rationale":"產物中有水，說明必然含有氫。","text":"只有碳（$C$）"},{"isCorrect":true,"rationale":"產物中的碳與氫必然來自原化合物（因為氧可由空氣提供）。","text":"碳（$C$）與氫（$H$）"},{"isCorrect":false,"rationale":"氧元素可能來自空氣中的氧氣，不一定原本就存在於化合物中。","text":"碳（$C$）、氫（$H$）與氧（$O$）"}],"hint":"產物的組成元素必然源自反應物，但要注意助燃物的貢獻。","question":"若一個有機化合物經燃燒分析後，產生二氧化碳與水。由此可知該化合物「一定」含有哪些元素？"},{"answerOptions":[{"isCorrect":false,"rationale":"乙醇的結構式確實包含槍基（$-OH$）。","text":"乙醇含有 $-OH$ 官能基，屬於醇類。"},{"isCorrect":true,"rationale":"它們是同分異構物，排列方式完全不同。","text":"兩者的分子結構與排列方式完全相同。"},{"isCorrect":false,"rationale":"這正是「同分」的含義，分子式確實相同。","text":"兩者的分子式皆為 $C_2H_6O$。"},{"isCorrect":false,"rationale":"這是同分異構物的基本特徵。","text":"兩者的原子種類與個數完全相等。"}],"hint":"尋找違反「異構物」定義的錯誤描述。","question":"有關「酒精」（乙醇）與「甲醚」的比較，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"雖然其 $H:O$ 比例也是 $2:1$，但其結構與化學特性屬於有機酸類。","text":"乙酸（醋酸，$CH_3COOH$）"},{"isCorrect":false,"rationale":"它是最基本的單醣類。","text":"葡萄糖（$C_6H_{12}O_6$）"},{"isCorrect":false,"rationale":"澱粉是由大量葡萄糖組成的多醣類。","text":"澱粉"},{"isCorrect":false,"rationale":"常見的食用糖，屬於雙醣類。","text":"蔗糖（$C_{12}H_{22}O_{11}$）"}],"hint":"糖類通常包含醣基結構，且氫氧比多為 $2:1$。","question":"下列哪種物質不屬於「碳水化合物」（糖類）？"},{"answerOptions":[{"isCorrect":false,"rationale":"甘油並非酯類，而是製作油脂的原料之一。","text":"脂類"},{"isCorrect":true,"rationale":"甘油（丙三醇）含有 $-OH$ 基，雖然名為油但屬於醇類。","text":"醇類"},{"isCorrect":false,"rationale":"甘油不含 $-COOH$ 官能基。","text":"有機酸類"},{"isCorrect":false,"rationale":"甘油含有氧元素，並非純碳氫化合物。","text":"烴類"}],"hint":"注意其學名「丙三醇」的字尾暗示。","question":"製作肥皂的反應式為：油脂 + 氫氧化鈉 $\\rightarrow$ 肥皂 + 甘油。請問甘油的化學類別為何？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是連通管原理能維持液面高度一致的物理基礎。","text":"當液體靜止時，各管中相同水平面處的壓力相等。"},{"isCorrect":true,"rationale":"液面高度與截面積無關，靜止時高度必相等。","text":"只要容器底部連通，各管液面高度必與其截面積成正比。"},{"isCorrect":false,"rationale":"這些都是日常生活中連通管原理的實例。","text":"自來水供應系統與家中熱水瓶的水位計皆利用此原理。"},{"isCorrect":false,"rationale":"這確實是連通管的主要物理應用。","text":"此原理可用來檢驗不同管子中液體是否處於同一水平面。"}],"hint":"液體壓力 $P = h \\times D$ 是否受容器胖瘦（面積）影響？","question":"有關「連通管原理」的敘述，下列何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"空氣柱長度變短，故壓力隨高度下降。","text":"海拔愈高，大氣壓力通常愈低。"},{"isCorrect":false,"rationale":"這是利用氣壓差產生作用力的典型例子。","text":"吸塵器是利用減少內部氣壓，靠外部大氣壓力將灰塵壓入。"},{"isCorrect":false,"rationale":"氣體作為流體，其壓力方向與液壓性質相似。","text":"大氣壓力的方向在各個接觸面上皆垂直於該面。"},{"isCorrect":true,"rationale":"大氣壓力主要是由空氣的「重量」產生的。","text":"大氣壓力的大小是由於空氣分子間的排斥力造成的。"}],"hint":"思考大氣壓力的本質與「重量」的關係。","question":"關於大氣壓力的敘述，下列何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"計算錯誤，浮體平衡時合力應為零。","text":"$20 \\text{ gw}$"},{"isCorrect":false,"rationale":"這是完全沒入水中時的最大浮力，但木塊會浮起，並非全沒入。","text":"$100 \\text{ gw}$"},{"isCorrect":false,"rationale":"浮力不可能大於最大排水重或物重。","text":"$180 \\text{ gw}$"},{"isCorrect":true,"rationale":"密度小於水的木塊會浮在水面，浮體浮力等於物重。","text":"$80 \\text{ gw}$"}],"hint":"判斷物體在水中是沉還是浮，浮體有其特殊的力平衡規律。","question":"將一個體積 $100 \\text{ cm}^3$、重量 $80 \\text{ g}$ 的木塊丟入水中，待其靜止後，木塊受到的浮力為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"酸醇結合脫水形成酯，濃硫酸可催化並吸水促進反應。","text":"由有機酸與醇反應生成酯類與水，常需加入濃硫酸作為催化劑。"},{"isCorrect":false,"rationale":"油脂（三酸甘油酯）雖是酯類，但一般指的是小分子的揮發性酯類產物。","text":"酯類物質是製作肥皂的主要原料。"},{"isCorrect":false,"rationale":"兩者雖皆涉及脂肪酸與醇，但反應機制與條件不同。","text":"酯化反應與皂化反應互為逆反應。"},{"isCorrect":false,"rationale":"酯類通常「難溶於水」，密度比水小，會浮在液面上。","text":"生成的酯類易溶於水，且具有特殊香味。"}],"hint":"回想實驗中，加入濃硫酸的目的與產物的香味、溶解性。","question":"關於「酯化反應」的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"這不符合壓力的作用方向，外壓大應是推入而非吸出。","text":"降低，因為管外壓力過大，水銀被吸出。"},{"isCorrect":false,"rationale":"高度是由外壓與密度共同決定的變量。","text":"不變，水銀柱高度僅與水銀密度有關。"},{"isCorrect":false,"rationale":"靜止狀態下，液面最終會趨於穩定。","text":"左右擺動，無法維持平衡。"},{"isCorrect":true,"rationale":"管內液柱壓力必須增加以重新達到平衡。","text":"升高，因為外部大氣將更多水銀壓入管內。"}],"hint":"大氣壓力就像一隻無形的手，把液體往下按並推向管內。","question":"在托里切利實驗中，若水銀槽上方的大氣壓力增加，管內水銀柱高度將會如何？"},{"answerOptions":[{"isCorrect":false,"rationale":"使用了錯誤的接觸面（$5 \\times 2$）進行計算。","text":"$200$"},{"isCorrect":false,"rationale":"這是接觸面積，而非壓力。","text":"$50$"},{"isCorrect":true,"rationale":"$P = \\frac{1000}{10 \\times 5} = \\frac{1000}{50} = 20$。","text":"$20$"},{"isCorrect":false,"rationale":"計算面積時可能發生錯誤（誤乘高度）。","text":"$100$"}],"hint":"找出「平放」面所對應的底面積，套用 $P = \\frac{F}{A}$。","question":"一長方體金屬塊長、寬、高分別為 $10 \\text{ cm}$、$5 \\text{ cm}$、$2 \\text{ cm}$，重量為 $1000 \\text{ gw}$。將其平放（$10 \\times 5$ 面）於桌面，產生的壓力為多少 $\\text{ gw/cm}^2$？"},{"answerOptions":[{"isCorrect":false,"rationale":"烴類呈中性，不會改變指示劑顏色。","text":"所有的烴類皆具有酸性，可使石蕊試紙變色。"},{"isCorrect":false,"rationale":"碳數少的烴（如甲烷、丙烷）在常溫下是氣體。","text":"常溫下所有的烴類皆為液體，如汽油。"},{"isCorrect":false,"rationale":"烴類屬於非極性物質，難溶於水。","text":"烴類極易溶於水，因為它們含有氫原子。"},{"isCorrect":true,"rationale":"烴（Hydrocarbon）字源自「氫」與「碳」。","text":"烴類僅由碳與氫兩種元素組成，又稱碳氫化合物。"}],"hint":"注意其名稱的組成文字，以及日常生活中天然氣（烴類）的狀態。","question":"有關「烴類」的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"有機酸必然含碳，否則無法稱作有機物。","text":"所有的有機酸皆不含碳元素。"},{"isCorrect":true,"rationale":"這是羧酸類有機物的定義官能基。","text":"分子中含有 $-COOH$ 基團，溶於水呈弱酸性。"},{"isCorrect":false,"rationale":"一般而言，有機酸屬於弱酸。","text":"有機酸的強度通常比無機酸（如鹽酸）強許多。"},{"isCorrect" e,"rationale":"反而因為產生沉澱而大幅降低清潔效能。","text":"硬水能增強肥皂的親油性，使去汙更快。"},{"isCorrect":false,"rationale":"合成清潔劑設計上能避開硬水離子的干擾，較無此問題。","text":"只有合成清潔劑在硬水中會產生沉澱。"},{"isCorrect":false,"rationale":"酸性物質會直接破壞肥皂結構，無法有效防止皂垢生成。","text":"加入大量白醋可以解決肥皂在硬水中的沉澱問題。"}],"hint":"思考為何在某些地區洗澡時，肥皂泡泡很少且水盆有白垢。","question":"關於「硬水」對肥皂清潔效果的影響，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"計算浮力差值時可能出錯。","text":"$1.1$"},{"isCorrect":false,"rationale":"食鹽水密度應大於純水，數值不合理。","text":"$0.8$"},{"isCorrect":false,"rationale":"計算過程中體積換算錯誤。","text":"$1.5$"},{"isCorrect":true,"rationale":"$B_w = 500-400=100$，則 $V=100 \\text{ cm}^3$。$B_{\\text{salt}} = 500-380=120 = 100 \\times d_{\\text{salt}}$，故 $d=1.2$。","text":"$1.2$"}],"hint":"先利用在水中的重量損失算出物體「體積」，再代入鹽水的浮力公式。","question":"一物體在空氣中重 $500 \\text{ gw}$，沉入食鹽水中重 $380 \\text{ gw}$，在水中重 $400 \\text{ gw}$。則食鹽水的密度為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是帕斯卡原理與流體力學的基礎。","text":"兩者在封閉容器內皆可傳遞壓力。"},{"isCorrect":true,"rationale":"流體壓力在各個方向皆有作用（向各方傳遞）。","text":"兩者皆僅能在垂直向下的方向產生作用。"},{"isCorrect":false,"rationale":"這是流體平衡的基本狀態。","text":"在同一水平面上，靜止的流體壓力通常相等。"},{"isCorrect":false,"rationale":"物理公式中密度皆是決定壓強的關鍵因子。","text":"兩者的壓力大小皆與流體密度有關。"}],"hint":"思考「流體」與「固體」在傳遞壓力方向上的差別。","question":"有關「大氣壓力」與「液體壓力」的共同特性，下列何者錯誤？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是外部大氣壓強。","text":"$76 \\text{ cmHg}$"},{"isCorrect":false,"rationale":"若為 $0$，高度應為 $76 \\text{ cm}$（真空）。","text":"$0 \\text{ cmHg}$"},{"isCorrect":true,"rationale":"外壓（$76$）= 管內汞柱壓（$60$）+ 內部氣壓，故氣壓為 $16$。","text":"$16 \\text{ cmHg}$"},{"isCorrect":false,"rationale":"這是液柱高度，非氣體壓力。","text":"$60 \\text{ cmHg}$"}],"hint":"利用內外壓力平衡原理：$P_{\\text{out}} = P_{\\text{liquid}} + P_{\\text{gas}}$。","question":"在海平面上，一根長 $1 \\text{ m}$ 的水銀管中混入少量空氣。測得水銀柱垂直高度僅 $60 \\text{ cm}$，此時管頂內部的氣壓為多少？"},{"answerOptions":[{"isCorrect":false,"rationale":"這是檢驗「水」的反應，並非乙醇。","text":"能使藍色氯化亞鈷紙變為紅色。"},{"isCorrect":false,"rationale":"乙醇本身無色透明且呈中性。","text":"是一種藍色的透明液體，具有酸味。"},{"isCorrect":true,"rationale":"$75\\%$ 的酒精具有良好的穿 或弱極性，難溶於水。","text":"烴類與酯類皆能輕易溶於水中。"},{"isCorrect":false,"rationale":"酯類密度通常比水小，且不互溶，會浮在液面。","text":"酯類的密度比水大，溶解後會沉在水底。"},{"isCorrect":true,"rationale":"如乙醇與乙酸，皆能以任何比例與水互溶。","text":"低碳數的醇類與酸類通常易溶於水。"},{"isCorrect":false,"rationale":"如葡萄糖、乙醇等皆是良好的水溶性有機物。","text":"所有的有機化合物皆不溶於水。"}],"hint":"聯想日常生活中的酒、醋與油（酯類）的混合狀況。","question":"有關「烴類、醇類、酸類、酯類」對水的溶解性，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"公分換算毫米，數值確實擴大十倍。","text":"$760 \\text{ mmHg}$"},{"isCorrect":false,"rationale":"這是托里切利實驗最直觀的測量結果。","text":"$76 \\text{ cmHg}$"},{"isCorrect":false,"rationale":"這是以水銀柱高度與密度乘積換算出的壓強值。","text":"$1033.6 \\text{ gw/cm}^2$"},{"isCorrect":true,"rationale":"$1 \\text{ atm} = 76 \\text{ cmHg} \\approx 1033.6 \\text{ gw/cm}^2$，兩者不可直接混用單位數值。","text":"$76 \\text{ gw/cm}^2$"}],"hint":"區分「高度單位」與「壓力（力/面積）單位」的換算。","question":"關於「壓力」的單位換算，下列何者「不等於」一標準大氣壓（$1 \\text{ atm}$）？"},{"answerOptions":[{"isCorrect":false,"rationale":"有機化合物主要由非金屬元素（如碳、氫、氧）組成，金屬元素通常存在於無機鹽類中。","text":"金屬元素"},{"isCorrect":false,"rationale":"氮元素常見於蛋白質等有機物，但許多基礎有機物如甲烷、乙醇並不含氮。","text":"氮元素"},{"isCorrect":false,"rationale":"並非所有有機化合物都含氧，例如烴類（只含碳和氫）就是典型的例子。","text":"氧元素"},{"isCorrect":true,"rationale":"現代定義將有機化合物歸類為含碳的化合物，儘管存在少數例外，但含碳是其必要條件。","text":"碳元素"}],"hint":"請思考有機化合物在現代科學中被重新定義的核心元素為何。","question":"依據現代化學對有機化合物的定義，下列哪一項物質必定包含在有機化合物的成分中？"},{"answerOptions":[{"isCorrect":true,"rationale":"二氧化碳、一氧化碳、碳酸鹽及氰化物雖然含碳，但因其性質接近無機物且在生命出現前即存在，故被視為例外。","text":"二氧化碳 ($CO_{2}$)"},{"isCorrect":false,"rationale":"蛋白質是由胺基酸組成的生物大分子，是生命體的核心有機成分。","text":"蛋白質"},{"isCorrect":false,"rationale":"葡萄糖是生物體內重要的能量來源，屬於典型的有機化合物。","text":"葡萄糖 ($C_{6}H_{12}O_{6}$)"},{"isCorrect":false,"rationale":"乙酸含有羧基功能基，具有典型的有機酸性質，屬於有機化合物。","text":"乙酸 ($CH_{3}COOH$)"}],"hint":"請注意含碳化合物中，與碳酸、一氧化碳相關的特定例外家族。","question":"下列哪一種含碳物質，在分類上被歸類為「無機化合物」？"},{"answerOptions":[{"isCorrect":false,"rationale":"收集液體產物通常依靠試管冷凝，鋁箔包裹木材主要是為了營造缺氧環境。","text":"收集液體產物"},{"isCorrect":false,"rationale":"鋁箔雖導熱快，但在實驗中的核心作用是物理隔離空氣，而非單純為了加熱。","text":"增加導熱速度"},{"isCorrect":false,"rationale":"乾餾過程中必須留有開口讓產生的氣體排出，否則容器會因壓力過大發生危險。","text":"防止氣體逸出"},{"isCorrect":true,"rationale":"乾餾的定義是在隔絕空氣（氧氣）的狀態下加熱分解，以防止碳直接燃燒變成二氧化碳。","text":"隔絕空氣加熱"}],"hint":"乾餾與燃燒最大的差別在於是否接觸到大氣中的某種助燃氣體。","question":"在木材乾餾實驗中，使用鋁箔包裹木條的主要目的是什麼？"},{"answerOptions":[{"isCorrect":false,"rationale":"氮氣在一般加熱環境下化學性質穩定，不具備可燃性。","text":"氮氣 ($N_{2}$)"},{"isCorrect":false,"rationale":"二氧化碳是不可燃且不助燃的氣體，常作為滅火使用。","text":"二氧化碳 ($CO_{2}$)"},{"isCorrect":true,"rationale":"乾餾產生的氣體包含氫氣、甲烷、一氧化碳等可燃性氣體，以及不可燃的二氧化碳。","text":"甲烷 ($CH_{4}$)"},{"isCorrect":false,"rationale":"水蒸氣是燃燒後的產物 or 原本含有的水分受熱蒸發，並不具備可燃性。","text":"水蒸氣 ($H_{2}O$)"}],"hint":"試著回憶實驗中能點火燃燒的氣體成分有哪些。","question":"將竹筷乾餾後，所產生的氣體中哪一種具有可燃性？"},{"answerOptions":[{"isCorrect":false,"rationale":"乙醇屬於醇類，而二甲醚屬於醚類，其氧原子夾在兩個碳原子中間。","text":"兩者都屬於醇類"},{"isCorrect":false,"rationale":"由於結構不同（如乙醇含 $-OH$ 基），導致它們的反應性與沸點有顯著差異。","text":"兩者的化學性質完全相同"},{"isCorrect":false,"rationale":"同分異構物的核心定義就是分子式完全相同。","text":"兩者的分子式不同"},{"isCorrect":true,"rationale":"它們擁有相同的分子式 ($C_{2}H_{6}O$)，但原子排列結構不同，故物理與化學性質也不同。","text":"兩者互為同分異構物"}],"hint":"這兩種物質用同樣的原子材料組成，但「組裝」方式不同。","question":"關於乙醇（酒精）與二甲醚的敘述，下列何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"氧元素難以透過氧化產物直接回推，因為氧化過程本身會加入氧氣。","text":"氧 ($O$)"},{"isCorrect":false,"rationale":"檢驗氫元素的依據是觀察是否有水生成，通常使用氯化亞鈷試紙。","text":"氫 ($H$)"},{"isCorrect":false,"rationale":"氮元素的檢測通常會產生氨氣或氮氧化物，石灰水主要用於二氧化碳檢測。","text":"氮 ($N$)"},{"isCorrect":true,"rationale":"有機物氧化產生的二氧化碳會與石灰水反應生成碳酸鈣沉澱，證明原物質含碳。","text":"碳 ($C$)"}],"hint":"澄清石灰水是國小就學過的哪種氣體專屬檢驗劑？","question":"在使用氧化法檢驗未知有機物時，若澄清石灰水變混濁，代表該物質含核種元素？"},{"answerOptions":[{"isCorrect":false,"rationale":"烴類是燃料的主要成分，極易與氧氣反應放出熱量。","text":"所有烴類在高溫下都不具可燃性"},{"isCorrect":false,"rationale":"烴類化合物（如汽油、蠟燭）通常不溶於水，密度也多比水小。","text":"烴類易溶於水"},{"isCorrect":false,"rationale":"碳原子數較少（1至4個）的烴類（如甲烷、丁烷）在常溫下通常為氣態。","text":"碳原子數越少的烴類，常溫下必定為固態"},{"isCorrect":true,"rationale":"「烴」字即由「碳」的火部與「氫」的巠部組成，代表僅由這兩種元素構成。","text":"分子中僅含有碳、氫兩種元素"}],"hint":"從「烴」這個字的造字邏輯去思考它的組成。","question":"關於烴類的定義與性質，下列敘述何者正確？"},{"answerOptions":[{"isCorrect":false,"rationale":"酒精參與溶解過程而非化學反應途徑的催化，反應結束後可蒸發除去。","text":"作為催化劑改變反應途徑"},{"isCorrect":true,"rationale":"油脂不溶於水，酒精能與水及油互溶，充當界面媒介以增加碰撞機會並加速反應。","text":"作為溶劑使油脂與鹼液均勻混合"},{"isCorrect":false,"rationale":"幫助肥皂析出的過程稱為「鹽析」，使用的是濃食鹽水而非酒精。","text":"幫助肥皂從溶液中沉澱析出"},{"isCorrect":false,"rationale":"酒精本身接近中性，不會中和強鹼，皂化反應需要強鹼環境才能進行。","text":"降低溶液的 PH 值使其呈中性"}],"hint":"油脂和強鹼水溶液原本互不相溶，需要一個「和事佬」來牽線。","question":"製作肥皂的「皂化反應」中，加入酒精的主要功能為何？"},{"answerOptions":[{"isCorrect":true,"rationale":"肥皂在飽和食鹽水中的溶解度極低，且其密度小於鹽水，故會析出並浮起。","text":"肥皂不溶於濃食鹽水且密度較小"},{"isCorrect":false,"rationale":"鹽析過程主要與溶解度有關，與分子的熱脹冷縮無關。","text":"肥皂分子受熱膨脹導致體積增加"},{"isCorrect":false,"rationale":"食鹽（氯化鈉）是中性鹽類，無法中和氫氧化鈉等強鹼。","text":"食鹽水會中和多餘的強鹼"},{"isCorrect":false,"rationale":"這只是物理溶解度的改變（排擠效應），並未發生新的化學反應生成新物質。","text":"肥皂與食鹽反應生成不溶性固體"}],"hint":"考慮「溶解度」與「密度」在混合過程中的影響。","question":"在皂化實驗結束後進行「鹽析」步驟，肥皂會浮在食鹽水上方，這是利用什麼性質？"},{"answerOptions":[{"isCorrect":true,"rationale":"長碳鏈是由非極性的碳氫組成，性質與油接近，應為「親油端」而非親水端。","text":"肥皂分子的長碳鏈端為親水端"},{"isCorrect":false,"rationale":"帶電荷的極性端易與水分結合，負責拉動油垢進入水中。","text":"帶電的頭部端為親水端"},{"isCorrect":false,"rationale":"肥皂作為界面活性劑，能將油垢包裹在水中形成乳化狀態。","text":"肥皂能使水與油界面消失而達成互溶"},{"isCorrect":false,"rationale":"同性相吸原理，非極性的親油端確實會與油垢結合。","text":"親油端會伸入油垢中"}],"hint":"觀察肥皂分子的「頭」與「尾」分別對水和油的偏好。","question":"關於肥皂分子的結構與去污原理，下列敘述何者錯誤？"},{"answerOptions":[{"isCorrect":true,"rationale":"硬水中的多價金屬離子會與肥皂反應生成不溶性的鈣肥皂或鎂肥皂。","text":"肥皂會與鈣、鎂離子產生白色沉澱而失效"},{"isCorrect":false,"rationale":"分子的結構功能基不會因環境而發生端點性質倒置。","text":"硬水會使肥皂分子的親水端轉變為親油端"},{"isCorrect":false,"rationale":"硬水並不代表酸性水，肥皂失效的主因是沉澱而非酸鹼中和。","text":"硬水的酸性太強，中和了肥皂的鹼性"},{"isCorrect":false,"rationale":"硬水離子不會化學分解碳鏈，而是發生離子交換沉澱反應。","text":"硬水會直接分解肥皂的長碳鏈"}],"hint":"思考硬水中的特定礦物質離子如何與肥皂分子發生「搶奪」反應。","question":"為什麼肥皂在「硬水」（含鈣、鎂離子較多）中的洗滌效果較差？"},{"answerOptions":[{"isCorrect":true,"rationale":"萬有引力、電力、磁力屬於超距力，不需要接觸即可在空間中作用。","text":"靜電力"},{"isCorrect":false,"rationale":"浮力是流體與物體接觸表面產生的向上壓力差，屬於接觸力。","text":"浮力"},{"isCorrect":false,"rationale":"摩擦力必須發生在兩個接觸面產生相對運動或趨勢時。","text": `;
            const hintText = document.getElementById('hint-text'); hintText.innerText = q.hint || 'No hint available for this question.';
            if (s.hintVisible) { hintBox.classList.add('active'); } else { hintBox.classList.remove('active'); }
            results.classList.add('hidden'); content.classList.remove('hidden'); hintBox.classList.remove('hidden'); nav.classList.remove('hidden');
            
            prevBtn.disabled = currentIndex === 0; nextBtn.disabled = false;
            
            if (mode === 'quiz') { submitEarlyBtn.classList.remove('hidden'); } else { submitEarlyBtn.classList.add('hidden'); }
            
            if (mode === 'review') { nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Back to Results' : 'Next'; }
            else { nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finish' : 'Next'; }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }
        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        function selectOption(idx) { if (mode !== 'quiz' || state[currentIndex].selectedIndex !== null) return; state[currentIndex].selectedIndex = idx; renderQuestion(); }
        function toggleHint() { if (mode === 'results') return; state[currentIndex].hintVisible = !state[currentIndex].hintVisible; renderQuestion(); }
        
        function renderResults() {
            const stats = getStats(); const content = document.getElementById('quiz-content'); const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box'); const nav = document.querySelector('.navigation');
            results.innerHTML = `
                <div class="results-screen">
                    <div><h1 class="results-title">You did it! Quiz Complete.</h1><p class="results-subtitle">Review your score or take another run.</p></div>
                    <div class="results-grid">
                        <div class="result-card"><div class="result-label">Score</div><div class="result-value">${stats.correct} / ${quizData.length}</div></div>
                        <div class="result-card"><div class="result-label">Accuracy</div><div class="result-value">${stats.accuracy}%</div></div>
                        <div class="result-card"><div class="result-metrics"><div>Right <strong>${stats.correct}</strong></div><div>Wrong <strong>${stats.wrong}</strong></div><div>Skipped <strong>${stats.skipped}</strong></div></div></div>
                    </div>
                    <div class="results-actions"><button id="review-btn" class="btn btn-ghost">Review Quiz</button><button id="retake-btn" class="btn btn-next">Retake Quiz</button></div>
                </div>
`;
            content.classList.add('hidden'); results.classList.remove('hidden'); hintBox.classList.add('hidden'); nav.classList.add('hidden');
            document.getElementById('review-btn').onclick = () => { mode = 'review'; currentIndex = 0; renderQuestion(); };
            document.getElementById('retake-btn').onclick = () => { mode = 'quiz'; currentIndex = 0; shuffleQuestions(); shuffleAnswers(); resetState(); renderQuestion(); };
        }
        
        document.getElementById('prev-btn').onclick = () => { if (currentIndex > 0) { currentIndex--; renderQuestion(); } };
        document.getElementById('next-btn').onclick = () => {
            if (mode === 'review') { if (currentIndex < quizData.length - 1) { currentIndex++; renderQuestion(); } else { mode = 'results'; renderResults(); } return; }
            if (currentIndex < quizData.length - 1) { currentIndex++; renderQuestion(); } else { mode = 'results'; renderResults(); }
        };
        
        document.getElementById('submit-early-btn').onclick = () => {
            if(confirm("確定要提前結束測驗並觀看目前的得分與結果嗎？")) {
                mode = 'results';
                renderResults();
            }
        };
        
        document.getElementById('hint-toggle').onclick = toggleHint; renderQuestion();
    </script>
</body>
</html>
